    {id:65,text:"Quel prophète prédit la 'Nouvelle Alliance' inscrite dans les cœurs, non sur des tables de pierre ?",options:["Ésaïe","Jérémie","Ézéchiel","Osée"],answer:"Jérémie",explanation:"Jérémie 31:31-34 annonce une alliance intérieure reprise dans l'épître aux Hébreux pour désigner la nouvelle alliance en Christ.",reference:"Jérémie 31:31",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:66,text:"Quelle nation conquit Juda et détruisit le premier Temple de Jérusalem ?",options:["L'Assyrie","L'Égypte","Babylone","La Perse"],answer:"Babylone",explanation:"Nabuchodonosor détruisit le Temple en 586 av. J.-C., déportant l'élite de Juda. Jérémie fut le témoin prophétique de cette catastrophe.",reference:"2 Rois 25:9",theme:"PROPHETES",difficulty:"DEBUTANT"},
    {id:67,text:"Quel prophète annonce que Bethléem serait le lieu de naissance du Messie ?",options:["Ésaïe","Amos","Michée","Zacharie"],answer:"Michée",explanation:"Michée 5:2 désigne explicitement Bethléem comme berceau du futur chef d'Israël. Matthieu cite ce texte pour la naissance de Jésus.",reference:"Michée 5:2",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:68,text:"Combien d'années dura la captivité à Babylone selon la prophétie de Jérémie ?",options:["40","50","70","100"],answer:"70",explanation:"Jérémie 29:10 annonce 70 ans. Daniel, captif à Babylone, méditera sur cette prophétie pour les '70 semaines'.",reference:"Jérémie 29:10",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:69,text:"Quel prophète vit la 'vallée des ossements secs' reprendre vie ?",options:["Jérémie","Ézéchiel","Ésaïe","Zacharie"],answer:"Ézéchiel",explanation:"Ézéchiel 37 est la vision de la résurrection nationale d'Israël. Les ossements se recouvrent de chair et reprennent vie à la parole du prophète.",reference:"Ézéchiel 37:1-14",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:70,text:"Quelle est la profession de Daniel à la cour de Babylone ?",options:["Soldat","Scribe","Conseiller royal et interprète de songes","Grand prêtre"],answer:"Conseiller royal et interprète de songes",explanation:"Daniel et ses trois compagnons (Schadrach, Méschak, Abed-Nego) deviennent conseillers à la cour de Nabuchodonosor.",reference:"Daniel 1:19-20",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:71,text:"Quel prophète fut envoyé à Ninive et fut d'abord avalé par un grand poisson ?",options:["Amos","Jonas","Nahoum","Sophonie"],answer:"Jonas",explanation:"Jonas fuit sa mission. Le récit insiste sur la miséricorde de Dieu qui s'étend même aux ennemis d'Israël.",reference:"Jonas 1:2",theme:"PROPHETES",difficulty:"DEBUTANT"},
    {id:72,text:"Quel prophète mineur dénonce les injustices sociales d'Israël au VIIIe siècle av. J.-C. ?",options:["Osée","Joël","Amos","Abdias"],answer:"Amos",explanation:"Amos, berger de Tekoa, dénonce avec force les inégalités économiques et la corruption religieuse du royaume du Nord.",reference:"Amos 1:1",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:73,text:"Quel prophète utilise son mariage douloureux comme métaphore de la fidélité de Dieu à Israël ?",options:["Osée","Joël","Amos","Malachie"],answer:"Osée",explanation:"Osée épouse Gomer qui le trahit — image de l'infidélité d'Israël et de l'amour immuable de Dieu malgré tout.",reference:"Osée 1:2",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:74,text:"Quel prophète mineur annonce le don de l'Esprit 'sur toute chair', cité par Pierre à la Pentecôte ?",options:["Amos","Joël","Michée","Zacharie"],answer:"Joël",explanation:"Pierre cite explicitement Joël 2:28-32 pour expliquer les phénomènes de la Pentecôte (Actes 2:17).",reference:"Joël 2:28",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:75,text:"Quel est le dernier livre de l'Ancien Testament selon le canon protestant ?",options:["Zacharie","Malachie","Abdias","Aggée"],answer:"Malachie",explanation:"Malachie clôt l'AT en annonçant le retour d'Élie avant le 'grand jour de l'Éternel'. Jean-Baptiste sera identifié à cette figure.",reference:"Malachie 4:5",theme:"PROPHETES",difficulty:"DEBUTANT"},
    {id:76,text:"Quel prophète mineur prophétisa la destruction définitive de Ninive ?",options:["Jonas","Amos","Nahoum","Habacuc"],answer:"Nahoum",explanation:"Nahoum annonce le jugement de Ninive, quelques décennies après que Jonas y avait prêché et obtenu un repentir temporaire.",reference:"Nahoum 1:1",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:77,text:"Quel prophète pose la question 'Jusqu'à quand, Éternel, crierai-je sans être entendu ?' ?",options:["Amos","Aggée","Habacuc","Sophonie"],answer:"Habacuc",explanation:"Habacuc engage un dialogue direct avec Dieu sur l'injustice et le silence de Dieu — l'une des voix les plus audacieuses de l'AT.",reference:"Habacuc 1:2",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:78,text:"Quel prophète appela le peuple à reconstruire le Temple après le retour d'exil ?",options:["Malachie","Zacharie","Aggée","Abdias"],answer:"Aggée",explanation:"Aggée et Zacharie prophétisèrent vers 520 av. J.-C. pour encourager la reconstruction du second Temple sous Zorobabel.",reference:"Aggée 1:8",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:79,text:"Quel prophète décrit un roi humble entrant à Jérusalem sur un âne — cité lors de l'entrée de Jésus ?",options:["Joël","Aggée","Abdias","Zacharie"],answer:"Zacharie",explanation:"Zacharie 9:9 est cité explicitement par Matthieu et Jean pour l'entrée de Jésus à Jérusalem le dimanche des Rameaux.",reference:"Zacharie 9:9",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:80,text:"Quel est le plus court livre de l'Ancien Testament, adressé à la nation d'Édom ?",options:["Nahoum","Abdias","Sophonie","Habacuc"],answer:"Abdias",explanation:"Abdias (21 versets) est le plus court livre de l'AT, entièrement consacré au jugement d'Édom, nation rivale d'Israël.",reference:"Abdias 1:1",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:81,text:"À qui l'Apocalypse est-elle d'abord adressée ?",options:["À l'Église universelle","Aux sept Églises d'Asie","Aux apôtres","À Israël"],answer:"Aux sept Églises d'Asie",explanation:"L'Apocalypse s'ouvre sur des lettres aux sept Églises : Éphèse, Smyrne, Pergame, Thyatire, Sardes, Philadelphie, Laodicée.",reference:"Apocalypse 1:4",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:82,text:"Quelle Église est décrite comme 'tiède, ni froide ni chaude', que Jésus menace de vomir ?",options:["Éphèse","Smyrne","Sardes","Laodicée"],answer:"Laodicée",explanation:"Laodicée est le symbole de la tiédeur spirituelle — riche matériellement mais pauvre spirituellement.",reference:"Apocalypse 3:16",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:83,text:"Combien de sceaux sont ouverts dans le livre de l'Apocalypse ?",options:["4","6","7","12"],answer:"7",explanation:"Les 7 sceaux, 7 trompettes et 7 coupes structurent les jugements de l'Apocalypse en trois séries.",reference:"Apocalypse 6:1",theme:"APOCALYPSE",difficulty:"DEBUTANT"},
    {id:84,text:"Quel nombre représente les 'rachetés' scellés dans l'Apocalypse ?",options:["7000","12000","144000","1000000"],answer:"144000",explanation:"144 000 = 12 × 12 × 1000, symbole de plénitude totale. Son interprétation varie selon les traditions chrétiennes.",reference:"Apocalypse 7:4",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:85,text:"Comment s'appelle la grande ville symbole de la corruption et de l'oppression dans l'Apocalypse ?",options:["Sodome","Babylone","Ninive","Tyr"],answer:"Babylone",explanation:"'Babylone' dans l'Apocalypse désigne Rome et tout système d'oppression anti-chrétien. 'Elle est tombée, Babylone la grande !'",reference:"Apocalypse 18:2",theme:"APOCALYPSE",difficulty:"DEBUTANT"},
    {id:86,text:"Quel animal symbolise Jésus sous deux aspects différents dans l'Apocalypse ?",options:["Le lion et l'agneau","L'aigle et le taureau","Le cheval et l'agneau","Le lion et l'aigle"],answer:"Le lion et l'agneau",explanation:"Jésus est le Lion de Juda (puissance royale) et l'Agneau immolé (sacrifice rédempteur) — paradoxe central de l'Apocalypse.",reference:"Apocalypse 5:5-6",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:87,text:"Sur quelle île Jean reçut-il les visions de l'Apocalypse ?",options:["Chypre","Rhodes","Patmos","Crète"],answer:"Patmos",explanation:"Jean fut exilé à Patmos par les autorités romaines — c'est dans cet isolement qu'il reçut les révélations.",reference:"Apocalypse 1:9",theme:"APOCALYPSE",difficulty:"DEBUTANT"},
    {id:88,text:"Que symbolisent les quatre cavaliers de l'Apocalypse ?",options:["Les quatre évangélistes","La conquête, la guerre, la famine et la mort","Les quatre saisons","Les quatre empires mondiaux"],answer:"La conquête, la guerre, la famine et la mort",explanation:"Cheval blanc (conquête), rouge (guerre), noir (famine), pâle (mort) — quatre fléaux qui précèdent le jugement.",reference:"Apocalypse 6:1-8",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:89,text:"Qu'est-ce que la Nouvelle Jérusalem dans l'Apocalypse ?",options:["Une ville terrestre restaurée","La cité céleste descendant du ciel","Le Temple reconstruit","Le royaume de David renouvelé"],answer:"La cité céleste descendant du ciel",explanation:"La Nouvelle Jérusalem (Ap 21) descend du ciel — Dieu demeure avec les hommes. Il n'y a plus de Temple car Dieu lui-même en est le Temple.",reference:"Apocalypse 21:2",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:90,text:"Quel est le dernier verset de la Bible entière ?",options:["'Je viens bientôt'","'La grâce du Seigneur Jésus soit avec tous'","'Amen, viens Seigneur Jésus'","'Que celui qui a soif vienne'"],answer:"'La grâce du Seigneur Jésus soit avec tous'",explanation:"Apocalypse 22:21 clôt la Bible sur une bénédiction de grâce — la même formule que les épîtres pauliniennes.",reference:"Apocalypse 22:21",theme:"APOCALYPSE",difficulty:"AVANCE"},
    {id:91,text:"Quel miracle Jésus accomplit-il lors d'une tempête sur le lac de Galilée ?",options:["Il transforme l'eau en vin","Il marche sur les eaux","Il pêche miraculeusement","Il calme la tempête"],answer:"Il calme la tempête",explanation:"Jésus interpelle les vents et les flots. La stupeur des disciples : 'Qui est-il donc pour que les vents lui obéissent ?'",reference:"Matthieu 8:23-27",theme:"MIRACLES",difficulty:"DEBUTANT"},
    {id:92,text:"Combien de fois le miracle de la multiplication des pains est-il relaté dans les quatre Évangiles ?",options:["1","2","4","6"],answer:"6",explanation:"La multiplication des 5000 est dans les 4 Évangiles. Celle des 4000 (plus discrète) est dans Matthieu et Marc — 6 récits au total.",reference:"Matthieu 14:13-21",theme:"MIRACLES",difficulty:"AVANCE"},
    {id:93,text:"Quel apôtre accomplit le premier miracle après la Pentecôte, guérissant un boiteux à la Belle Porte ?",options:["Jean","Paul","Pierre","Étienne"],answer:"Pierre",explanation:"Pierre et Jean guérissent un boiteux à la Belle Porte du Temple — premier miracle apostolique décrit dans les Actes des Apôtres.",reference:"Actes 3:1-8",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:94,text:"Quelle femme fut guérie d'une perte de sang après avoir touché le vêtement de Jésus ?",options:["Marie-Madeleine","Marthe","Une femme anonyme","Salomé"],answer:"Une femme anonyme",explanation:"Cette femme souffrait depuis 12 ans. Elle touche le bord du manteau de Jésus et est guérie instantanément sans que Jésus l'ait vue.",reference:"Luc 8:43-48",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:95,text:"Quel prophète de l'AT ressuscita le fils d'une veuve de Sarepta ?",options:["Moïse","Élie","Élisée","Ésaïe"],answer:"Élie",explanation:"Élie ressuscita le fils de la veuve de Sarepta — premier récit de résurrection dans l'Ancien Testament.",reference:"1 Rois 17:22",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:96,text:"Quel prophète guérit Naaman le général syrien lépreux en lui disant de se baigner 7 fois dans le Jourdain ?",options:["Élie","Élisée","Ésaïe","Jérémie"],answer:"Élisée",explanation:"Naaman était réticent à cette méthode humble. Sa guérison illustre l'universalité de la grâce divine au-delà d'Israël.",reference:"2 Rois 5:1-14",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:97,text:"Quel miracle Moïse accomplit-il pour abreuver le peuple dans le désert à Horeb ?",options:["Il fait pleuvoir de l'eau du ciel","Il frappe le rocher","Il dessale l'eau de mer","Il trouve une source cachée"],answer:"Il frappe le rocher",explanation:"Moïse frappe le rocher et l'eau jaillit. Paul voit en ce rocher une image du Christ qui donne l'eau vive.",reference:"Exode 17:6",theme:"MIRACLES",difficulty:"DEBUTANT"},
    {id:98,text:"Quel nombre de poissons les disciples pêchent-ils lors de la pêche miraculeuse après la résurrection ?",options:["100","120","153","200"],answer:"153",explanation:"Jean 21:11 précise le nombre exact — 153 poissons — détail souvent commenté par les Pères de l'Église comme symbole de plénitude.",reference:"Jean 21:11",theme:"MIRACLES",difficulty:"AVANCE"},
    {id:99,text:"Quel roi d'Israël fut guéri d'une maladie mortelle après avoir prié, et sa vie fut prolongée de 15 ans ?",options:["David","Salomon","Ézéchias","Josias"],answer:"Ézéchias",explanation:"Ézéchias pria avec larmes, et Dieu envoya Ésaïe lui annoncer que sa vie serait prolongée de 15 ans.",reference:"2 Rois 20:6",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:100,text:"Quel personnage du NT fut ressuscité par Paul après être tombé d'une fenêtre à Troas ?",options:["Lazare","Dorcas","Eutychus","Tabitha"],answer:"Eutychus",explanation:"Eutychus s'endormit pendant le long discours de Paul et tomba du troisième étage. Paul se jeta sur lui et le ressuscita.",reference:"Actes 20:9-10",theme:"MIRACLES",difficulty:"AVANCE"},
    {id:101,text:"Quel titre Jésus utilise-t-il le plus souvent pour se désigner lui-même dans les Évangiles ?",options:["Fils de Dieu","Messie","Fils de l'homme","Seigneur"],answer:"Fils de l'homme",explanation:"'Fils de l'homme' (ben adam) renvoie à Daniel 7:13 — c'est le titre que Jésus préfère, ambigu entre humanité et transcendance.",reference:"Daniel 7:13 / Marc 8:31",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:102,text:"Quels deux personnages de l'AT apparaissent lors de la Transfiguration de Jésus ?",options:["Abraham et David","Élie et Élisée","Moïse et Élie","Abraham et Moïse"],answer:"Moïse et Élie",explanation:"Moïse représente la Loi, Élie les Prophètes — Jésus est leur accomplissement. Pierre veut dresser trois tentes.",reference:"Matthieu 17:3",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:103,text:"Quelle ville était le centre principal du ministère de Jésus en Galilée, appelée 'sa propre ville' ?",options:["Nazareth","Bethléem","Capharnaüm","Tibériade"],answer:"Capharnaüm",explanation:"Capharnaüm est 'sa propre ville' (Matthieu 9:1). C'est là que Pierre habitait et que Jésus enseignait dans la synagogue.",reference:"Matthieu 4:13",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:104,text:"Quelle est la première parole de Jésus depuis la croix selon Luc ?",options:["'Mon Dieu, pourquoi m'as-tu abandonné ?'","'Père, pardonne-leur'","'Tout est accompli'","'Femme, voilà ton fils'"],answer:"'Père, pardonne-leur'",explanation:"Jésus prie pour ses bourreaux depuis la croix. Ce geste de pardon radical est souvent cité comme modèle de l'éthique chrétienne.",reference:"Luc 23:34",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:105,text:"Combien de jours Jésus jeûna-t-il dans le désert avant d'être tenté ?",options:["20","30","40","50"],answer:"40",explanation:"40 jours rappelle les 40 ans d'Israël au désert, les 40 jours de Moïse au Sinaï et les 40 jours d'Élie à l'Horeb.",reference:"Matthieu 4:2",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:106,text:"Quel disciple marcha sur les eaux vers Jésus avant de douter et de s'enfoncer ?",options:["Jean","André","Jacques","Pierre"],answer:"Pierre",explanation:"Pierre marche sur les eaux, puis s'enfonce par manque de foi. Jésus le rattrape : 'Homme de peu de foi, pourquoi as-tu douté ?'",reference:"Matthieu 14:28-31",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:107,text:"Quelle femme oint Jésus d'un parfum de nard pur peu avant sa Passion à Béthanie ?",options:["Marie-Madeleine","Marie de Béthanie","Marthe","Suzanne"],answer:"Marie de Béthanie",explanation:"Marie verse du nard précieux sur Jésus. Judas s'indigne du gaspillage. Jésus dit qu'elle a préparé sa sépulture.",reference:"Jean 12:3",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:108,text:"Quel est le sens littéral du mot 'Gethsémani' en araméen ?",options:["Jardin des roses","Pressoir à huile","Lieu de prière","Vallée des larmes"],answer:"Pressoir à huile",explanation:"Gethsémani signifie 'pressoir à huile' — l'agonement de Jésus y est souvent vu comme une image de la pression de la Passion.",reference:"Matthieu 26:36",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:109,text:"Combien de paroles Jésus prononce-t-il depuis la croix dans les quatre Évangiles combinés ?",options:["3","5","7","9"],answer:"7",explanation:"Les 7 paroles de la croix sont réparties entre les 4 Évangiles. Elles sont méditées comme un testament spirituel de Jésus.",reference:"Luc 23:34-46 / Jean 19:26-30",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:110,text:"Quel apôtre confessa le premier 'Tu es le Christ, le Fils du Dieu vivant' ?",options:["Jean","Thomas","André","Pierre"],answer:"Pierre",explanation:"Pierre fait cette confession à Césarée de Philippe. Jésus lui répond : 'Sur cette pierre je bâtirai mon Église.'",reference:"Matthieu 16:16-18",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:111,text:"Quel apôtre était percepteur d'impôts avant d'être appelé par Jésus à Capharnaüm ?",options:["Pierre","André","Matthieu","Thomas"],answer:"Matthieu",explanation:"Matthieu (Lévi) était collecteur d'impôts — une profession méprisée. Jésus le choisit comme signe de la grâce ouverte à tous.",reference:"Matthieu 9:9",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:112,text:"Quel apôtre exigea de toucher les plaies de Jésus pour croire à la résurrection ?",options:["Pierre","Jean","Philippe","Thomas"],answer:"Thomas",explanation:"Thomas dit qu'il ne croira que s'il touche les plaies. Jésus lui apparaît : 'Parce que tu m'as vu, tu as cru. Heureux ceux qui croient sans avoir vu.'",reference:"Jean 20:25-28",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:113,text:"Quel fut le premier concile de l'Église primitive, qui trancha la question de la circoncision des non-Juifs ?",options:["Concile de Rome","Concile de Jérusalem","Concile d'Antioche","Concile d'Éphèse"],answer:"Concile de Jérusalem",explanation:"Le Concile de Jérusalem (Actes 15) est le premier débat doctrinal de l'Église. Il décida que les non-Juifs n'avaient pas à se circoncire.",reference:"Actes 15:1-29",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:114,text:"Dans quelle ville Paul et Silas chantèrent-ils en prison avant un tremblement de terre miraculeux ?",options:["Rome","Jérusalem","Philippes","Corinthe"],answer:"Philippes",explanation:"À minuit, Paul et Silas prient et chantent. Un séisme ouvre les portes. Le geôlier se convertit avec toute sa famille.",reference:"Actes 16:25-31",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:115,text:"Quel disciple accompagna Paul lors de son premier voyage missionnaire vers Chypre et l'Asie Mineure ?",options:["Silas","Timothée","Barnabas","Tite"],answer:"Barnabas",explanation:"Barnabas fut le premier à accueillir Paul après sa conversion. Ils partirent ensemble depuis Antioche pour le premier voyage missionnaire.",reference:"Actes 13:2",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:116,text:"Quel est le premier des Dix Commandements ?",options:["Tu ne tueras point","Tu n'auras pas d'autres dieux devant ma face","Tu ne voleras point","Souviens-toi du jour du sabbat"],answer:"Tu n'auras pas d'autres dieux devant ma face",explanation:"Le premier commandement établit le monothéisme exclusif d'Israël — fondement de toute la Loi.",reference:"Exode 20:3",theme:"LOI",difficulty:"DEBUTANT"},
    {id:117,text:"Combien de livres compose la Torah (Pentateuque) ?",options:["3","4","5","7"],answer:"5",explanation:"Genèse, Exode, Lévitique, Nombres, Deutéronome — les cinq livres de Moïse forment la Torah.",reference:"Deutéronome 31:9",theme:"LOI",difficulty:"DEBUTANT"},
    {id:118,text:"Quel rituel annuel permettait au grand prêtre d'entrer dans le Saint des Saints ?",options:["La Pâque","La Pentecôte","Yom Kippour","Les Prémices"],answer:"Yom Kippour",explanation:"Le Jour des Expiations (Yom Kippour) était le seul jour où le grand prêtre entrait dans le Saint des Saints pour expier les péchés du peuple.",reference:"Lévitique 16:2",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:119,text:"Que représente l'arche d'alliance dans la théologie biblique ?",options:["Un bateau sacré","Le trône de Dieu parmi son peuple","Un simple coffre à documents","Le tombeau des patriarches"],answer:"Le trône de Dieu parmi son peuple",explanation:"L'arche était le signe de la présence divine — Dieu 'trônait sur les chérubins' au-dessus du propitiatoire.",reference:"Exode 25:22",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:120,text:"Quelle fête commémore la sortie d'Égypte et le passage de l'ange de la mort ?",options:["La Pentecôte","Le Yom Kippour","La Pâque","Les Tabernacles"],answer:"La Pâque",explanation:"La Pâque (Pessah) rappelle la délivrance d'Égypte. L'agneau paschal préfigure pour les chrétiens le Christ, 'agneau de Dieu'.",reference:"Exode 12:1-14",theme:"LOI",difficulty:"DEBUTANT"},
    {id:121,text:"Quelle est la signification du mot 'sabbat' en hébreu ?",options:["Prière","Repos","Alliance","Lumière"],answer:"Repos",explanation:"Shabbat vient de la racine shavat (cesser, se reposer). Il commémore le repos de Dieu au septième jour de la création.",reference:"Genèse 2:2 / Exode 20:8",theme:"LOI",difficulty:"DEBUTANT"},
    {id:122,text:"Quel livre de la Torah contient essentiellement les lois de pureté et les règles sacrificielles ?",options:["L'Exode","Le Lévitique","Les Nombres","Le Deutéronome"],answer:"Le Lévitique",explanation:"Le Lévitique rassemble les lois destinées aux Lévites et aux prêtres — pureté rituelle, sacrifices, fêtes liturgiques.",reference:"Lévitique 1:1",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:123,text:"Quelle fête des 50 jours après la Pâque commémore le don de la Torah au Sinaï ?",options:["Pâque","Pentecôte (Shavouot)","Roch Hachana","Soukot"],answer:"Pentecôte (Shavouot)",explanation:"Shavouot (50 jours après Pessah) commémore le don de la Loi. C'est à cette même fête que les disciples reçurent l'Esprit Saint.",reference:"Lévitique 23:15-16",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:124,text:"Qu'est-ce que le 'Shema Israël', verset central du judaïsme ?",options:["Une prière de repentir","La confession de foi en un seul Dieu","La bénédiction sacerdotale","La récitation des Dix Commandements"],answer:"La confession de foi en un seul Dieu",explanation:"'Écoute Israël, l'Éternel notre Dieu, l'Éternel est un.' C'est la confession monothéiste fondamentale, citée par Jésus comme premier commandement.",reference:"Deutéronome 6:4",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:125,text:"Quel commandement Jésus cite-t-il comme 'le plus grand de la Loi' ?",options:["Ne pas tuer","Honorer son père et sa mère","Aimer Dieu de tout son être","Garder le sabbat"],answer:"Aimer Dieu de tout son être",explanation:"Jésus cite Deutéronome 6:5 et y ajoute Lévitique 19:18 (aimer son prochain) — toute la Loi y est suspendue.",reference:"Matthieu 22:37",theme:"LOI",difficulty:"DEBUTANT"},
    {id:126,text:"Qu'est-ce que le Jubilé dans la loi mosaïque ?",options:["Une fête annuelle de Pâques","Une année de libération tous les 50 ans","Un sacrifice extraordinaire","Un pèlerinage à Jérusalem"],answer:"Une année de libération tous les 50 ans",explanation:"Le Jubilé (tous les 50 ans) imposait la libération des esclaves, l'effacement des dettes et le retour des terres à leurs propriétaires originels.",reference:"Lévitique 25:10",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:127,text:"Quelle est la Loi de la réciprocité ('œil pour œil') appelée en droit hébraïque ?",options:["La Loi de grâce","Le Talion","La Loi du Jubilé","Le Décalogue"],answer:"Le Talion",explanation:"La Loi du Talion (lex talionis) visait à limiter la vengeance à une juste proportion, pas à l'encourager. Jésus la dépasse dans le Sermon sur la montagne.",reference:"Exode 21:24",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:128,text:"Quel sacrifice de l'AT consistait à brûler entièrement l'animal sans en garder de portion ?",options:["Le sacrifice de paix","Le sacrifice pour le péché","L'holocauste","Le sacrifice d'action de grâces"],answer:"L'holocauste",explanation:"L'holocauste (olah) était entièrement consumé — symbole de l'offrande totale à Dieu, sans retour pour l'offrant.",reference:"Lévitique 1:3",theme:"LOI",difficulty:"AVANCE"},
    {id:129,text:"Que signifie le mot 'alliance' (berith en hébreu) dans la théologie biblique ?",options:["Un contrat commercial","Un traité solennel entre Dieu et son peuple","Une promesse conditionnelle","Un simple accord verbal"],answer:"Un traité solennel entre Dieu et son peuple",explanation:"La berith est plus qu'un contrat — c'est un lien d'appartenance mutuelle. Les grandes alliances bibliques sont avec Noé, Abraham, Moïse, David.",reference:"Genèse 15:18",theme:"LOI",difficulty:"AVANCE"},
    {id:130,text:"Quel livre contient le célèbre 'Grand Commandement' du Shema et le rappel de la sortie d'Égypte ?",options:["L'Exode","Le Lévitique","Les Nombres","Le Deutéronome"],answer:"Le Deutéronome",explanation:"Le Deutéronome ('Deuxième Loi') est le grand discours de Moïse avant sa mort — récapitulatif de la Loi avec l'accent sur l'amour de Dieu.",reference:"Deutéronome 6:4-5",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:131,text:"Dans la parabole du semeur, que représente la semence tombée sur la bonne terre ?",options:["Ceux qui entendent mais oublient","Ceux qui reçoivent la Parole et portent du fruit","Ceux qui sont riches","Les disciples directs de Jésus"],answer:"Ceux qui reçoivent la Parole et portent du fruit",explanation:"Les quatre types de sol illustrent les différentes façons dont les hommes reçoivent (ou non) l'annonce du Royaume.",reference:"Matthieu 13:23",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:132,text:"Que représente le 'grain de sénevé' dans la parabole de Jésus ?",options:["La foi de chaque croyant","Le Royaume de Dieu qui commence petit et devient immense","L'Église catholique","Le peuple d'Israël"],answer:"Le Royaume de Dieu qui commence petit et devient immense",explanation:"La graine de moutarde est la plus petite des graines mais devient un grand arbre — image du Royaume qui commence avec une poignée de disciples.",reference:"Matthieu 13:31-32",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:133,text:"Dans la parabole des talents, que fit le serviteur qui avait reçu un seul talent ?",options:["Il le fit fructifier","Il le donna aux pauvres","Il l'enfouit dans la terre","Il le perdit"],answer:"Il l'enfouit dans la terre",explanation:"Ce serviteur est condamné pour avoir gardé le talent sans le faire fructifier. La parabole insiste sur la responsabilité des dons reçus.",reference:"Matthieu 25:18",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:134,text:"Dans la parabole des dix vierges, que symbolise l'huile des vierges sages ?",options:["Les richesses matérielles","La foi persévérante et la préparation spirituelle","Les bonnes œuvres visibles","La connaissance de la Loi"],answer:"La foi persévérante et la préparation spirituelle",explanation:"Les vierges sages ont pris de l'huile de réserve — image de la vigilance spirituelle face au retard de la venue du marié.",reference:"Matthieu 25:4",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:135,text:"Quelle parabole décrit un père qui partage son héritage entre deux fils ?",options:["Le semeur","Le fils prodigue","Les ouvriers de la 11e heure","Le Samaritain"],answer:"Le fils prodigue",explanation:"Le fils cadet part, dilapide tout, revient affamé. Le père court à sa rencontre — image la plus forte de l'amour paternel de Dieu.",reference:"Luc 15:11-32",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:136,text:"Dans la parabole du fils prodigue, quelle est la réaction du fils aîné au retour de son frère ?",options:["Il se réjouit avec le père","Il va chercher son frère lui-même","Il est jaloux et refuse d'entrer","Il demande sa part d'héritage à son tour"],answer:"Il est jaloux et refuse d'entrer",explanation:"Le fils aîné représente les pharisiens qui se scandalisent que Dieu accueille les pécheurs. Le père sort aussi pour l'inviter.",reference:"Luc 15:28",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:137,text:"Quelle parabole met en scène des ouvriers payés tous pareil quelle que soit l'heure d'arrivée ?",options:["Le semeur","Les talents","Les ouvriers de la vigne","Les dix vierges"],answer:"Les ouvriers de la vigne",explanation:"Tous reçoivent un denier. Ceux de la première heure murmurent. La parabole illustre la générosité gratuite de Dieu, non la justice méritocratique.",reference:"Matthieu 20:1-16",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:138,text:"Dans la parabole du riche et de Lazare, que demande le riche depuis l'enfer ?",options:["De sortir de là","Qu'on avertisse ses frères encore vivants","De revoir sa famille","D'avoir de l'eau pour se rafraîchir"],answer:"D'avoir de l'eau pour se rafraîchir",explanation:"Le riche demande une goutte d'eau, puis que Lazare avertisse ses frères. Abraham répond : 'S'ils n'écoutent pas Moïse et les prophètes...'",reference:"Luc 16:24",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:139,text:"Quelle parabole illustre la valeur d'une seule âme perdue aux yeux de Dieu, avec une brebis ?",options:["Le semeur","La brebis perdue","Le grain de sénevé","Le filet"],answer:"La brebis perdue",explanation:"Le berger laisse 99 brebis pour chercher la brebis perdue. Il revient avec joie. 'Il y aura plus de joie au ciel pour un seul pécheur qui se repent...'",reference:"Luc 15:3-7",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:140,text:"Dans la parabole du banquet, que font les invités initiaux lorsqu'ils sont conviés ?",options:["Ils acceptent tous","Ils refusent avec diverses excuses","Ils demandent un délai","Ils envoient des représentants à leur place"],answer:"Ils refusent avec diverses excuses",explanation:"Les excuses (champ, bœufs, mariage) symbolisent les priorités terrestres. Le roi invite alors les pauvres et les boiteux des carrefours.",reference:"Matthieu 22:2-10",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:141,text:"Que représente le 'trésor caché dans un champ' selon la parabole de Jésus ?",options:["Les richesses matérielles","Le Royaume des cieux qui vaut tout sacrifier pour l'obtenir","La sagesse humaine","La Terre promise"],answer:"Le Royaume des cieux qui vaut tout sacrifier pour l'obtenir",explanation:"Celui qui trouve le trésor vend tout ce qu'il a pour acheter le champ. Le Royaume mérite de tout sacrifier pour l'obtenir.",reference:"Matthieu 13:44",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:142,text:"Dans quelle parabole Jésus se décrit-il comme la 'vraie vigne' ?",options:["La parabole des sarments","La parabole du vigneron","Je suis la vraie vigne (Jean 15)","La parabole des ouvriers de la vigne"],answer:"Je suis la vraie vigne (Jean 15)",explanation:"Jean 15 : Jésus est la vigne, le Père le vigneron, les disciples les sarments. 'Celui qui demeure en moi porte beaucoup de fruit.'",reference:"Jean 15:1-5",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:143,text:"Quelle parabole met en scène un juge injuste et une veuve qui obtient justice à force d'insister ?",options:["La veuve et le juge injuste","La brebis perdue","Le fils prodigue","La pièce d'argent perdue"],answer:"La veuve et le juge injuste",explanation:"Jésus enseigne la persévérance dans la prière. Si un juge injuste cède, combien plus Dieu qui est juste exaucera-t-il ceux qui crient à lui.",reference:"Luc 18:1-8",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:144,text:"Dans la parabole du pharisien et du publicain, lequel repart 'justifié' du Temple ?",options:["Le pharisien","Le publicain","Les deux","Aucun des deux"],answer:"Le publicain",explanation:"Le pharisien se vante de ses vertus. Le publicain dit simplement : 'Dieu, sois apaisé envers moi, pécheur.' C'est lui qui repart justifié.",reference:"Luc 18:13-14",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:145,text:"Quelle parabole décrit deux bâtisseurs, l'un sur le roc et l'autre sur le sable ?",options:["Le semeur","Les deux fils","Les deux bâtisseurs","Les talents"],answer:"Les deux bâtisseurs",explanation:"La maison sur le roc tient face à la tempête, celle sur le sable s'effondre. Jésus conclut le Sermon sur la montagne par cette image.",reference:"Matthieu 7:24-27",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:146,text:"Quelle ruse Jacob utilisa-t-il pour obtenir la bénédiction de son père Isaac à la place d'Ésaü ?",options:["Il se déguisa en chasseur","Il mit des peaux de chèvre sur ses mains et son cou","Il vola le sceau d'Isaac","Il fit boire Isaac jusqu'à l'ivresse"],answer:"Il mit des peaux de chèvre sur ses mains et son cou",explanation:"Rébecca et Jacob trompent Isaac aveugle : peaux de chèvre sur les bras pour simuler la pilosité d'Ésaü. La bénédiction, une fois donnée, ne peut être reprise.",reference:"Genèse 27:15-23",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:147,text:"Quel événement marqua la fin des 40 ans d'errance d'Israël au désert ?",options:["La mort de Moïse","La traversée du Jourdain sous Josué","La prise de Jéricho","Le partage des tribus"],answer:"La traversée du Jourdain sous Josué",explanation:"La traversée du Jourdain, à pied sec comme la mer Rouge, marque le passage du désert à la Terre promise — entrée dans l'héritage.",reference:"Josué 3:17",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:148,text:"Comment les murailles de Jéricho tombèrent-elles selon le livre de Josué ?",options:["Elles furent minées","Un séisme les fit s'écrouler","Au son des trompettes après 7 jours de marche","Les soldats les escaladèrent"],answer:"Au son des trompettes après 7 jours de marche",explanation:"Pendant 7 jours, les Israélites tournent autour de Jéricho. Au 7e jour, 7 fois, les prêtres sonnent des trompettes — les murs s'effondrent.",reference:"Josué 6:20",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:149,text:"Quelle femme cacha les espions envoyés par Josué à Jéricho et fut sauvée grâce à un cordon écarlate ?",options:["Dalila","Rahab","Déborah","Ruth"],answer:"Rahab",explanation:"Rahab, prostituée de Jéricho, cacha les espions sur son toit. Sa foi lui valut le salut — elle est citée dans la généalogie de Jésus et dans Hébreux 11.",reference:"Josué 2:1-21",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:150,text:"Quelle juge d'Israël accompagna Barak à la bataille contre Sisera ?",options:["Ester","Ruth","Déborah","Miriam"],answer:"Déborah",explanation:"Déborah est la seule femme juge d'Israël. Elle prédit que la gloire ira à une femme — Yaël, qui tuera le général Sisera.",reference:"Juges 4:4-9",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:151,text:"Quel roi d'Israël était connu pour ses 700 femmes et 300 concubines, qui dévièrent son cœur ?",options:["David","Salomon","Achab","Roboam"],answer:"Salomon",explanation:"Salomon accumula des alliances diplomatiques par le mariage. Ses femmes étrangères l'entraînèrent vers d'autres dieux — sa plus grande faute.",reference:"1 Rois 11:3",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:152,text:"En quelle année le premier Temple de Jérusalem fut-il détruit par Babylone ?",options:["722 av. J.-C.","612 av. J.-C.","586 av. J.-C.","539 av. J.-C."],answer:"586 av. J.-C.",explanation:"Nabuchodonosor détruisit le Temple en 586 av. J.-C. — l'une des dates les plus tragiques de l'histoire d'Israël.",reference:"2 Rois 25:8-9",theme:"HISTOIRE",difficulty:"AVANCE"},
    {id:153,text:"Quel roi perse autorisa le retour des Juifs en exil et la reconstruction du Temple ?",options:["Nabuchodonosor","Darius","Cyrus","Xerxès"],answer:"Cyrus",explanation:"L'édit de Cyrus (538 av. J.-C.) libéra les Juifs captifs. Ésaïe l'avait prophétisé 150 ans avant sa naissance en le nommant par son nom.",reference:"Esdras 1:1-4",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:154,text:"Quel scribe et prêtre conduisit une réforme religieuse à Jérusalem sous le roi Artaxerxès ?",options:["Néhémie","Esdras","Zorobabel","Malachie"],answer:"Esdras",explanation:"Esdras revint de Babylone et entreprit une réforme radicale centrée sur la Loi — renvoi des femmes étrangères, lecture publique de la Torah.",reference:"Esdras 7:6",theme:"HISTOIRE",difficulty:"AVANCE"},
    {id:155,text:"Quel gouverneur juif rebâtit les murs de Jérusalem en 52 jours malgré l'opposition des ennemis ?",options:["Zorobabel","Esdras","Néhémie","Ésaïe"],answer:"Néhémie",explanation:"Néhémie, officier du roi perse, obtint la permission de rebâtir Jérusalem. Les travailleurs construisaient d'une main et tenaient une arme de l'autre.",reference:"Néhémie 4:17",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:156,text:"Qui est Esther et pourquoi est-elle célébrée dans le judaïsme ?",options:["Une prophétesse qui prédit l'exil","Une reine juive qui sauva son peuple d'un massacre en Perse","La femme de Moïse","La mère de Samuel"],answer:"Une reine juive qui sauva son peuple d'un massacre en Perse",explanation:"Esther, reine de Perse, révéla son identité juive pour sauver son peuple du complot d'Haman. Sa victoire est célébrée à Pourim.",reference:"Esther 4:14",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:157,text:"Quel est le sens de la phrase d'Esther : 'Si je dois périr, je périrai' ?",options:["Elle exprime sa résignation","Elle affirme sa résolution d'agir même au risque de sa vie","Elle prédit sa mort","Elle demande la permission au roi"],answer:"Elle affirme sa résolution d'agir même au risque de sa vie",explanation:"Esther décide d'aller voir le roi sans invitation — ce qui pouvait être puni de mort. Sa phrase résume un courage face à l'impossible.",reference:"Esther 4:16",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:158,text:"Quel roi d'Israël fit construire des veaux d'or à Béthel et Dan après la division du royaume ?",options:["Roboam","Jéroboam","Achab","Manassé"],answer:"Jéroboam",explanation:"Jéroboam dit au peuple : 'Voici tes dieux, Israël' — parodie du veau d'or du Sinaï. Cette faute est rappelée comme emblème de l'idolâtrie royale.",reference:"1 Rois 12:28-29",theme:"HISTOIRE",difficulty:"AVANCE"},
    {id:159,text:"Quelle bataille marqua la fin du royaume du Nord d'Israël en 722 av. J.-C. ?",options:["La chute de Jéricho","La conquête par l'Assyrie","La bataille de Megiddo","La prise par Babylone"],answer:"La conquête par l'Assyrie",explanation:"Salmanasar V et Sargon II d'Assyrie détruisirent Samarie en 722 av. J.-C., déportant les 10 tribus du Nord — les 'tribus perdues d'Israël'.",reference:"2 Rois 17:6",theme:"HISTOIRE",difficulty:"AVANCE"},
    {id:160,text:"Quelle reine étrangère rendit visite à Salomon pour éprouver sa sagesse avec des énigmes ?",options:["Dalila","La reine de Saba","Jézabel","Bethsabée"],answer:"La reine de Saba",explanation:"La reine de Saba vint de loin pour tester Salomon. Après ses réponses, elle déclara que la renommée ne reflétait que la moitié de la réalité.",reference:"1 Rois 10:1-9",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:161,text:"Que créa Dieu le premier jour selon la Genèse ?",options:["Le soleil et la lune","Les animaux","La lumière","Les eaux"],answer:"La lumière",explanation:"La lumière est créée au jour 1, avant les luminaires (jour 4) — Dieu lui-même est source de lumière avant tout astre.",reference:"Genèse 1:3",theme:"CREATION",difficulty:"DEBUTANT"},
    {id:162,text:"Quel être humain marcha avec Dieu et fut enlevé sans mourir, avant le déluge ?",options:["Noé","Seth","Hénoc","Mathusalem"],answer:"Hénoc",explanation:"'Hénoc marcha avec Dieu, et il ne fut plus, parce que Dieu l'enleva.' Avec Élie, il est l'un des rares personnages bibliques à ne pas mourir.",reference:"Genèse 5:24",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
    {id:163,text:"Quel oiseau Noé envoya-t-il en premier pour voir si les eaux avaient baissé ?",options:["Une colombe","Un corbeau","Un aigle","Un moineau"],answer:"Un corbeau",explanation:"Noé envoya d'abord un corbeau qui allait et venait, puis une colombe qui revint avec un rameau d'olivier — signe que les eaux baissaient.",reference:"Genèse 8:7-8",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
    {id:164,text:"Quelle est la durée totale de la vie de Mathusalem selon la Genèse ?",options:["777 ans","888 ans","969 ans","999 ans"],answer:"969 ans",explanation:"Mathusalem est l'homme le plus vieux de la Bible selon la Genèse. Son nom est devenu synonyme de longévité extrême.",reference:"Genèse 5:27",theme:"CREATION",difficulty:"DEBUTANT"},
    {id:165,text:"Que signifie le nom 'Adam' en hébreu ?",options:["Fort comme un roc","Homme tiré de la terre (adamah)","Premier-né de Dieu","Fait à l'image divine"],answer:"Homme tiré de la terre (adamah)",explanation:"Adam (adamah = terre rouge) exprime l'origine terrestre de l'humanité et son retour à la poussière — 'Tu es poussière et tu retourneras en poussière.'",reference:"Genèse 2:7",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
    {id:166,text:"Pourquoi Dieu disperse-t-il les hommes lors de la Tour de Babel ?",options:["Parce qu'ils adoraient des idoles","Parce qu'ils voulaient atteindre le ciel et égaler Dieu","Parce qu'ils avaient commis des meurtres","Parce qu'ils refusaient de se multiplier"],answer:"Parce qu'ils voulaient atteindre le ciel et égaler Dieu",explanation:"L'orgueil humain cherche à s'égaler à Dieu. La dispersion des langues est la réponse divine à cette démesure (hubris).",reference:"Genèse 11:4-8",theme:"CREATION",difficulty:"DEBUTANT"},
    {id:167,text:"Combien de personnes étaient dans l'arche de Noé ?",options:["4","6","8","12"],answer:"8",explanation:"Noé, sa femme, ses trois fils (Sem, Cham, Japhet) et leurs femmes — 8 personnes au total. Pierre y voit une image du baptême.",reference:"Genèse 7:13 / 1 Pierre 3:20",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
    {id:168,text:"Quelle promesse Dieu fit-il à Noé après le déluge, symbolisée par l'arc-en-ciel ?",options:["Qu'Israël hériterait la Terre","Qu'il n'y aurait plus jamais de déluge universel","Que l'humanité vivrait éternellement","Que la mort serait vaincue"],answer:"Qu'il n'y aurait plus jamais de déluge universel",explanation:"L'alliance noachique est universelle — Dieu s'engage envers toute l'humanité et toute vie. L'arc-en-ciel en est le signe.",reference:"Genèse 9:11",theme:"CREATION",difficulty:"DEBUTANT"},
    {id:169,text:"Quel est le sens du nom 'Ève' (Havvah) en hébreu ?",options:["Lumière du foyer","Mère de tous les vivants","Aide comparable","Née du côté d'Adam"],answer:"Mère de tous les vivants",explanation:"Adam nomme sa femme Ève (Havvah = vie) parce qu'elle est 'la mère de tous les vivants'.",reference:"Genèse 3:20",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
    {id:170,text:"Qui sont les fils de Noé dont les descendants peupleront la terre après le déluge ?",options:["Caïn, Abel, Seth","Sem, Cham, Japhet","Ésaü, Jacob, Ruben","Abraham, Ismaël, Isaac"],answer:"Sem, Cham, Japhet",explanation:"Sem (ancêtre des Sémites), Cham (Afrique/Canaan), Japhet (peuples du Nord/Europe) — la table des nations (Genèse 10) s'appuie sur eux.",reference:"Genèse 9:18",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
    {id:171,text:"Quel apôtre écrivit la majorité des épîtres du Nouveau Testament ?",options:["Pierre","Jean","Paul","Jacques"],answer:"Paul",explanation:"Paul est l'auteur de 13 à 14 épîtres (selon l'attribution d'Hébreux) — soit environ la moitié du Nouveau Testament.",reference:"2 Pierre 3:15",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:172,text:"Sur quel chemin Paul eut-il sa vision du Christ ressuscité qui le convertit ?",options:["Le chemin de Jéricho","Le chemin de Damas","Le chemin d'Émmaüs","Le chemin de Corinthe"],answer:"Le chemin de Damas",explanation:"Saul partait persécuter les chrétiens. Une lumière l'aveugle, une voix dit : 'Saul, pourquoi me persécutes-tu ?' Sa vie est transformée.",reference:"Actes 9:3-5",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:173,text:"Quels disciples rencontrèrent Jésus ressuscité sur le chemin d'Emmaüs sans le reconnaître ?",options:["Pierre et Jean","Deux disciples anonymes (dont Cléopas)","Jacques et André","Thomas et Philippe"],answer:"Deux disciples anonymes (dont Cléopas)",explanation:"Cléopas et un compagnon marchent avec Jésus ressuscité sans le reconnaître — jusqu'à la fraction du pain. Il disparaît aussitôt reconnu.",reference:"Luc 24:13-35",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:174,text:"Quelle femme de Joppé, disciple connue pour ses œuvres de bienfaisance, fut ressuscitée par Pierre ?",options:["Marie-Madeleine","Lydie","Dorcas (Tabitha)","Priscille"],answer:"Dorcas (Tabitha)",explanation:"Tabitha (Dorcas en grec) mourut et Pierre la ressuscita — les veuves qu'elle avait aidées montrèrent leurs vêtements pour témoigner de sa charité.",reference:"Actes 9:36-42",theme:"APOTRES",difficulty:"AVANCE"},
    {id:175,text:"Quel est le discours de Paul à l'Aréopage d'Athènes, commençant par 'Hommes Athéniens' ?",options:["Une condamnation des philosophes grecs","Un discours partant de l'autel au Dieu inconnu pour annoncer le Christ","Une défense de la Loi mosaïque","Un appel au repentir collectif de la ville"],answer:"Un discours partant de l'autel au Dieu inconnu pour annoncer le Christ",explanation:"Paul utilise la culture grecque — l'autel au 'Dieu inconnu' — comme point de départ pour annoncer la résurrection. Modèle d'inculturation.",reference:"Actes 17:22-31",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:176,text:"Quelle Église Paul fonde-t-il en Macédoine lors de son deuxième voyage missionnaire ?",options:["L'Église de Thessalonique","L'Église de Philippes","L'Église de Corinthe","L'Église d'Éphèse"],answer:"L'Église de Philippes",explanation:"Philippes est la première communauté chrétienne en Europe. Lydie, marchande de pourpre, est la première convertie d'Europe.",reference:"Actes 16:12-15",theme:"APOTRES",difficulty:"AVANCE"},
    {id:177,text:"Quelle est la thèse centrale de l'épître aux Romains ?",options:["La supériorité de la foi sur la Loi","La justification par la grâce au moyen de la foi","L'organisation de l'Église locale","Les dons de l'Esprit Saint"],answer:"La justification par la grâce au moyen de la foi",explanation:"Romains développe que le salut vient non des œuvres de la Loi mais de la grâce de Dieu reçue par la foi. Luther y trouva la 'tour de foudre'.",reference:"Romains 1:17",theme:"APOTRES",difficulty:"AVANCE"},
    {id:178,text:"Quel est l'hymne christologique de l'épître aux Philippiens décrivant Jésus qui 's'est abaissé' ?",options:["Philippiens 2:6-11","Philippiens 4:7","Philippiens 1:21","Philippiens 3:14"],answer:"Philippiens 2:6-11",explanation:"'Étant en forme de Dieu... il s'est dépouillé lui-même... jusqu'à la mort de la croix.' Cet hymne décrit la kénose (auto-abaissement) du Christ.",reference:"Philippiens 2:6-11",theme:"APOTRES",difficulty:"AVANCE"},
    {id:179,text:"Quelle femme est décrite comme 'diaconesse' et recommandée par Paul aux Romains ?",options:["Priscille","Lydie","Phœbé","Marie de Magdala"],answer:"Phœbé",explanation:"Paul recommande Phœbé de Cenchrées — probablement la messagère qui porta l'épître aux Romains. Elle est qualifiée de diakonos (servante/diacre).",reference:"Romains 16:1",theme:"APOTRES",difficulty:"AVANCE"},
    {id:180,text:"Combien de voyages missionnaires Paul effectua-t-il selon les Actes des Apôtres ?",options:["1","2","3","4"],answer:"3",explanation:"Les trois voyages de Paul couvrent l'Asie Mineure, la Grèce et l'Europe. Un quatrième voyage (en prison vers Rome) est parfois comptabilisé.",reference:"Actes 13-21",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:181,text:"Que signifie 'Abba' en araméen, terme utilisé par Jésus pour s'adresser à Dieu ?",options:["Seigneur tout-puissant","Père (terme intime)","Dieu de gloire","Créateur du ciel"],answer:"Père (terme intime)",explanation:"Abba est un terme familier et affectueux (proche de 'papa'). Jésus l'utilise à Gethsémani. Paul dit que l'Esprit nous fait aussi crier 'Abba, Père'.",reference:"Marc 14:36 / Galates 4:6",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:182,text:"Quelle est la signification du baptême de Jésus pour les chrétiens ?",options:["Jésus reconnaissait ses péchés","Il inaugurait son ministère public et s'identifiait à l'humanité pécheresse","Il accomplissait un rite légal juif","Il recevait le pouvoir de guérir"],answer:"Il inaugurait son ministère public et s'identifiait à l'humanité pécheresse",explanation:"Jésus, sans péché, se fait baptiser pour s'identifier aux pécheurs. La voix du Père et la colombe de l'Esprit révèlent la Trinité.",reference:"Matthieu 3:13-17",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:183,text:"Quel est le sens de 'Éli, Éli, lama sabachthani' crié par Jésus sur la croix ?",options:["'Je meurs de soif'","'Tout est accompli'","'Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné ?'","'Père, pardonne-leur'"],answer:"'Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné ?'",explanation:"Ces mots en araméen ouvrent le Psaume 22. Jésus cite le cri de détresse du juste souffrant — qui se conclut par la délivrance divine.",reference:"Matthieu 27:46",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:184,text:"Combien de fois Jésus prédit sa mort et sa résurrection dans les Évangiles synoptiques ?",options:["1","2","3","5"],answer:"3",explanation:"Jésus annonce trois fois sa Passion (Marc 8, 9, 10). À chaque fois, les disciples ne comprennent pas.",reference:"Marc 8:31 / 9:31 / 10:33",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:185,text:"Quelle est la signification théologique du terme 'Emmanuel' ?",options:["Dieu pardonne","Dieu avec nous","Dieu est roi","Dieu sauve"],answer:"Dieu avec nous",explanation:"Emmanuel (Immanu-El) signifie 'Dieu avec nous'. Matthieu cite Ésaïe 7:14 et conclut son Évangile par : 'Je suis avec vous tous les jours.'",reference:"Matthieu 1:23",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:186,text:"Quelle est la dernière instruction de Jésus ressuscité avant l'Ascension selon Matthieu ?",options:["Allez à Jérusalem et attendez","Faites de toutes les nations des disciples","Aimez-vous les uns les autres","Priez sans cesse"],answer:"Faites de toutes les nations des disciples",explanation:"Le 'Grand Mandat' (Matthieu 28:19-20) : baptiser au nom du Père, du Fils et du Saint-Esprit, et enseigner à observer tous ses commandements.",reference:"Matthieu 28:19",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:187,text:"Quel est le signe donné par les pharisiens que Jésus refuse, sauf le 'signe de Jonas' ?",options:["Un miracle de guérison","Un signe du ciel","Une vision","La descente de feu"],answer:"Un signe du ciel",explanation:"Jésus refuse de donner un signe spectaculaire aux pharisiens qui testent sa légitimité. Il n'accorde que le signe de Jonas : trois jours dans la mort.",reference:"Matthieu 12:38-40",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:188,text:"Dans quel dialogue Jésus révèle-t-il qu'il est la résurrection et la vie à une femme en deuil ?",options:["Avec Marie-Madeleine au tombeau","Avec Marthe avant la résurrection de Lazare","Avec la Samaritaine au puits","Avec Nicodème de nuit"],answer:"Avec Marthe avant la résurrection de Lazare",explanation:"Marthe dit : 'Si tu avais été ici, mon frère ne serait pas mort.' Jésus répond : 'Je suis la résurrection et la vie.'",reference:"Jean 11:25",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:189,text:"Que signifie l'expression 'naître de nouveau' utilisée par Jésus dans son dialogue avec Nicodème ?",options:["Recommencer sa vie moralement","Naître physiquement une seconde fois","Renaître de l'eau et de l'Esprit pour entrer dans le Royaume","Se convertir au judaïsme"],answer:"Renaître de l'eau et de l'Esprit pour entrer dans le Royaume",explanation:"Jésus explique à Nicodème qu'il faut une naissance spirituelle, non charnelle. 'Ce qui est né de la chair est chair, ce qui est né de l'Esprit est esprit.'",reference:"Jean 3:5",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:190,text:"Quelle déclaration Jésus fait-il qui scandalisa les chefs religieux juifs lors d'un débat au Temple ?",options:["'Je suis le pain de vie'","'Avant qu'Abraham fût, je suis'","'Je suis le bon berger'","'Je suis le chemin, la vérité et la vie'"],answer:"'Avant qu'Abraham fût, je suis'",explanation:"Jésus utilise le 'Je suis' (Égo eimi), nom divin de l'AT. Les chefs religieux prirent des pierres pour le lapider pour blasphème.",reference:"Jean 8:58",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:191,text:"Quel juge israélite mit en déroute l'armée madianite avec seulement 300 hommes ?",options:["Samson","Jephté","Gédéon","Barak"],answer:"Gédéon",explanation:"Dieu réduit l'armée de Gédéon à 300 hommes pour montrer que la victoire vient de lui. Trompettes, torches et jarres comme armes.",reference:"Juges 7:7",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:192,text:"Quel prophète oignit David comme roi d'Israël alors qu'il n'était qu'un jeune berger ?",options:["Élie","Nathan","Samuel","Gad"],answer:"Samuel",explanation:"Dieu rejette l'apparence : 'L'Éternel regarde au cœur.' Samuel oint David, le plus jeune fils de Jessé, contre toute attente.",reference:"1 Samuel 16:12-13",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:193,text:"Quel roi d'Israël construisit des autels à Baal sous l'influence de sa femme Jézabel ?",options:["Roboam","Jéroboam","Achab","Manassé"],answer:"Achab",explanation:"Achab épousa Jézabel de Sidon qui introduisit le culte de Baal. Le prophète Élie l'affronta directement au mont Carmel.",reference:"1 Rois 16:31-32",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:194,text:"Comment mourut le prophète Élie selon la Bible ?",options:["Il fut décapité","Il mourut de vieillesse","Il fut emporté au ciel dans un char de feu","Il se noya dans le Jourdain"],answer:"Il fut emporté au ciel dans un char de feu",explanation:"Élie et Élisée marchent vers le Jourdain. Un char de feu les sépare et Élie monte au ciel dans un tourbillon. Élisée hérite d'un double esprit.",reference:"2 Rois 2:11",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:195,text:"Quel roi de Juda détruisit les hauts lieux et fit une réforme religieuse centrée sur le Temple ?",options:["Roboam","Ézéchias","Manassé","Achaz"],answer:"Ézéchias",explanation:"Ézéchias mena la plus grande réforme religieuse avant Josias — destruction des idoles, rétablissement du culte, célébration de la Pâque.",reference:"2 Rois 18:4",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:196,text:"Quel livre de l'AT relate le retour de l'exil et la reconstruction du Temple sous Zorobabel ?",options:["Esdras","Néhémie","Esther","Aggée"],answer:"Esdras",explanation:"Esdras relate le retour des premiers exilés sous Zorobabel (538 av. J.-C.) et la reconstruction du second Temple.",reference:"Esdras 1:1",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:197,text:"Qui était le père de Jean-Baptiste selon l'Évangile de Luc ?",options:["Joseph","Zacharie","Siméon","Aaron"],answer:"Zacharie",explanation:"Zacharie, prêtre du Temple, reçut la vision de l'ange Gabriel qui lui annonça la naissance de Jean-Baptiste. Sa femme Élisabeth était stérile et âgée.",reference:"Luc 1:13",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:198,text:"Quel événement précéda immédiatement la présentation de Jésus au Temple par ses parents ?",options:["La visite des Mages","La circoncision de Jésus le 8e jour","La fuite en Égypte","Le baptême de Jean"],answer:"La circoncision de Jésus le 8e jour",explanation:"Jésus fut circoncis le 8e jour selon la Loi, puis présenté au Temple le 40e jour. Siméon et Anne y prophétisèrent sur lui.",reference:"Luc 2:21-22",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:199,text:"Quelle ville fut la capitale du royaume du Nord d'Israël après la division ?",options:["Jérusalem","Samarie","Sichem","Béthel"],answer:"Samarie",explanation:"Omri fonda Samarie vers 880 av. J.-C. Elle devint la capitale du royaume du Nord jusqu'à sa chute en 722 av. J.-C.",reference:"1 Rois 16:24",theme:"HISTOIRE",difficulty:"AVANCE"},
    {id:200,text:"Quel fut le crime de David qui lui valut la condamnation du prophète Nathan ?",options:["L'idolâtrie","Le meurtre d'Urie et l'adultère avec Bethsabée","La désobéissance au Sinaï","Le mariage avec des étrangères"],answer:"Le meurtre d'Urie et l'adultère avec Bethsabée",explanation:"David convoqua Bethsabée, puis fit placer Urie au front pour le faire tuer. Nathan dit : 'Tu es cet homme !' — confrontation prophétique courageuse.",reference:"2 Samuel 12:7",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:201,text:"Quelle était la profession de Matthieu avant d'être appelé par Jésus ?",options:["Pêcheur","Collecteur d'impôts","Charpentier","Pharisien"],answer:"Collecteur d'impôts",explanation:"Matthieu (Lévi) travaillait pour Rome — une profession considérée comme traîtrise et péché. Jésus le choisit pour montrer que sa grâce dépasse les conventions.",reference:"Matthieu 9:9",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:202,text:"Quel est le nom hébreu de Jérusalem qui signifie 'fondement de la paix' ?",options:["Salem","Sion","Yerushalaïm","Beth-El"],answer:"Yerushalaïm",explanation:"Yerushalaïm associe 'yeru' (fondation) et 'shalom' (paix) — ville de la paix par excellence, paradoxalement l'une des plus disputées de l'histoire.",reference:"Psaume 122:6",theme:"HISTOIRE",difficulty:"AVANCE"},
    {id:203,text:"Quel livre de l'AT est un recueil de lamentations sur la destruction de Jérusalem ?",options:["Ézéchiel","Jérémie","Les Lamentations","Les Psaumes"],answer:"Les Lamentations",explanation:"Les Lamentations (Qinot) sont attribuées à Jérémie. Cinq poèmes pleurent la chute de Jérusalem en 586 av. J.-C.",reference:"Lamentations 1:1",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:204,text:"Quelle femme moabite resta fidèle à sa belle-mère Naomi après la mort de son mari ?",options:["Orpa","Ruth","Dalila","Tamar"],answer:"Ruth",explanation:"Ruth dit à Naomi : 'Où tu iras, j'irai.' Sa fidélité lui vaut d'épouser Boaz et de devenir ancêtre du roi David et de Jésus.",reference:"Ruth 1:16",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:205,text:"Comment s'appelait le fils de David qui tenta de s'emparer de son trône et mourut la tête coincée dans un chêne ?",options:["Amnon","Salomon","Absalom","Adonija"],answer:"Absalom",explanation:"Absalom, célèbre pour sa chevelure, se rebella contre David. Sa mule passa sous un chêne et ses cheveux le suspendirent. Joab l'y tua.",reference:"2 Samuel 18:9-14",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:206,text:"Quel animal parlant tenta Ève dans le jardin d'Éden selon la Genèse ?",options:["Un aigle","Un lion","Un serpent","Un cheval"],answer:"Un serpent",explanation:"Le serpent, 'plus rusé que tous les animaux', questionne la parole de Dieu pour semer le doute. La tradition le lie à la figure de Satan.",reference:"Genèse 3:1",theme:"CREATION",difficulty:"DEBUTANT"},
    {id:207,text:"Quel est le premier acte de Dieu après que l'homme eut péché dans le jardin ?",options:["Il le chasse immédiatement","Il lui pose une question et l'habille","Il l'ignore","Il le punit sans lui parler"],answer:"Il lui pose une question et l'habille",explanation:"Dieu cherche l'homme ('Où es-tu ?'), lui pose des questions, puis lui fait des habits de peau — geste de soin avant l'expulsion.",reference:"Genèse 3:9-21",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
    {id:208,text:"Que planta Dieu à l'est du jardin pour empêcher l'accès à l'arbre de vie après la chute ?",options:["Un mur de feu","Des chérubins et une épée flamboyante","Un océan","Une montagne"],answer:"Des chérubins et une épée flamboyante",explanation:"Les chérubins gardent le chemin de l'arbre de vie. Dans l'Apocalypse, l'accès à cet arbre sera finalement rouvert pour les rachetés.",reference:"Genèse 3:24",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
    {id:209,text:"Selon la Genèse, pourquoi Dieu créa-t-il la femme ?",options:["Pour obéir à Adam","Parce qu'Adam était seul et avait besoin d'une aide","Pour perpétuer l'espèce","Pour garder le jardin"],answer:"Parce qu'Adam était seul et avait besoin d'une aide",explanation:"'Il n'est pas bon que l'homme soit seul' — Dieu crée une 'aide correspondante' (ezer kenegdo), une égale face à face.",reference:"Genèse 2:18",theme:"CREATION",difficulty:"DEBUTANT"},
    {id:210,text:"Quel acte symbolique Adam accomplit-il en nommant les animaux selon la Genèse ?",options:["Il prouve sa supériorité sur eux","Il exerce la domination culturelle sur la création","Il les identifie pour les sacrifier","Il montre sa solitude"],answer:"Il exerce la domination culturelle sur la création",explanation:"Nommer dans la Bible signifie exercer une autorité. Adam reçoit un mandat de soin et de gouvernement sur la création ('dominium terrae').",reference:"Genèse 2:20",theme:"CREATION",difficulty:"AVANCE"},
    {id:211,text:"Quel psaume commence par 'L'Éternel règne, que la terre se réjouisse' ?",options:["Psaume 95","Psaume 97","Psaume 100","Psaume 103"],answer:"Psaume 97",explanation:"Le Psaume 97 est un hymne de règne universel. Feu, éclairs et tonnerre accompagnent la théophanie royale de Dieu.",reference:"Psaume 97:1",theme:"PSAUMES",difficulty:"AVANCE"},
    {id:212,text:"Quel psaume dit 'Seigneur, tu nous as été un refuge de génération en génération' ?",options:["Psaume 46","Psaume 90","Psaume 91","Psaume 121"],answer:"Psaume 90",explanation:"Le Psaume 90, attribué à Moïse, médite sur la brièveté de la vie humaine (70 ou 80 ans) face à l'éternité de Dieu.",reference:"Psaume 90:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
    {id:213,text:"Quel psaume décrit l'omniprésence et l'omniscience de Dieu qui connaît chaque pensée ?",options:["Psaume 8","Psaume 19","Psaume 51","Psaume 139"],answer:"Psaume 139",explanation:"'Tu me sondes et tu me connais... Si je prends les ailes de l'aurore... même là ta main me conduirait.' Psaume de la présence totale de Dieu.",reference:"Psaume 139:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
    {id:214,text:"Quel psaume royal commence par 'Le Seigneur a dit à mon Seigneur : siège à ma droite' ?",options:["Psaume 2","Psaume 45","Psaume 72","Psaume 110"],answer:"Psaume 110",explanation:"Le Psaume 110 est le plus cité du NT — Jésus l'utilise pour questionner la filiation du Messie, et les apôtres pour affirmer l'exaltation du Christ.",reference:"Psaume 110:1",theme:"PSAUMES",difficulty:"AVANCE"},
    {id:215,text:"Dans quel psaume David dit-il : 'Je lèverai les yeux vers les montagnes. D'où me viendra le secours ?' ?",options:["Psaume 46","Psaume 91","Psaume 121","Psaume 130"],answer:"Psaume 121",explanation:"Le Psaume 121 est un psaume de pèlerinage : 'Mon secours vient de l'Éternel, qui a fait les cieux et la terre.'",reference:"Psaume 121:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
    {id:216,text:"Quel psaume dit 'Les fleuves de Babylone, là nous étions assis et nous pleurions' ?",options:["Psaume 79","Psaume 137","Psaume 126","Psaume 44"],answer:"Psaume 137",explanation:"Ce psaume de l'exil exprime la nostalgie de Sion. 'Comment chanterions-nous un cantique de l'Éternel sur une terre étrangère ?'",reference:"Psaume 137:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
    {id:217,text:"Quel psaume est appelé 'le grand Hallel' et chanté lors du repas de la Pâque juive ?",options:["Psaume 117","Psaume 118","Psaume 135","Psaume 136"],answer:"Psaume 136",explanation:"Le Psaume 136 est le Grand Hallel. Chaque verset se conclut par le refrain 'Car sa bonté dure à toujours' — litanie de la fidélité de Dieu.",reference:"Psaume 136:1",theme:"PSAUMES",difficulty:"AVANCE"},
    {id:218,text:"Quel psaume décrit le bonheur de celui qui habite dans la maison de Dieu et dit 'Mieux vaut un jour dans tes parvis' ?",options:["Psaume 42","Psaume 63","Psaume 84","Psaume 92"],answer:"Psaume 84",explanation:"'Mieux vaut un jour dans tes parvis que mille ailleurs.' Psaume du désir ardent de Dieu, attribué aux fils de Coré.",reference:"Psaume 84:10",theme:"PSAUMES",difficulty:"AVANCE"},
    {id:219,text:"Quel chapitre des Proverbes décrit la femme de valeur ('eshet hayil') ?",options:["Proverbes 8","Proverbes 22","Proverbes 31","Proverbes 16"],answer:"Proverbes 31",explanation:"Proverbes 31:10-31 est un acrostiche alphabétique louant la femme vaillante — active, sage, généreuse, craignant Dieu.",reference:"Proverbes 31:10",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
    {id:220,text:"Dans le livre de Job, qu'est-ce que Dieu rend finalement à Job à la fin du livre ?",options:["Uniquement la santé","Rien — le livre se termine dans la tristesse","Le double de ce qu'il avait perdu","La connaissance de pourquoi il avait souffert"],answer:"Le double de ce qu'il avait perdu",explanation:"Job reçoit le double de ses troupeaux et de nouveaux enfants. Sa restauration souligne que Dieu n'abandonne pas le juste qui lui fait confiance.",reference:"Job 42:10",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
    {id:221,text:"Que dit l'Ecclésiaste sur le temps, dans le chapitre 3 commençant par 'Il y a un temps pour tout' ?",options:["Que tout est inutile","Que chaque chose a son moment voulu par Dieu","Que l'homme contrôle son destin","Que la jeunesse est la meilleure période"],answer:"Que chaque chose a son moment voulu par Dieu",explanation:"'Un temps pour naître et un temps pour mourir... pour pleurer et pour rire...' — tout s'inscrit dans un plan divin que l'homme ne maîtrise pas.",reference:"Ecclésiaste 3:1-8",theme:"SAGESSE",difficulty:"DEBUTANT"},
    {id:222,text:"Quel verset des Proverbes dit 'Confie-toi en l'Éternel de tout ton cœur et ne t'appuie pas sur ta sagesse' ?",options:["Proverbes 1:7","Proverbes 3:5","Proverbes 16:9","Proverbes 22:6"],answer:"Proverbes 3:5",explanation:"Proverbes 3:5-6 est l'un des versets les plus mémorisés de l'AT : confiance totale en Dieu contre la sagesse auto-suffisante.",reference:"Proverbes 3:5",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
    {id:223,text:"Quelle image le Cantique des Cantiques utilise-t-il pour décrire l'amour aussi fort que la mort ?",options:["Un fleuve infranchissable","Le feu de Dieu lui-même","Une montagne impossible à escalader","Les eaux de l'abîme"],answer:"Le feu de Dieu lui-même",explanation:"'L'amour est fort comme la mort... ses flammes sont des flammes de feu, une flamme divine.' Cantique 8:6 — le seul verset qui mentionne Dieu explicitement.",reference:"Cantique 8:6",theme:"SAGESSE",difficulty:"AVANCE"},
    {id:224,text:"Quel livre de sagesse contient la personnification de la Sagesse comme première œuvre de Dieu avant la création ?",options:["Job","L'Ecclésiaste","Les Proverbes","Le Cantique"],answer:"Les Proverbes",explanation:"Proverbes 8 présente la Sagesse (Hokmah) parlant à la première personne : 'J'étais là quand il posa les fondements de la terre.' Les Pères y voient une préfigure du Logos.",reference:"Proverbes 8:22-31",theme:"SAGESSE",difficulty:"AVANCE"},
    {id:225,text:"Quelle observation de l'Ecclésiaste anticipe le principe thermodynamique d'entropie ?",options:["'Vanité des vanités'","'Ils s'useront tous comme un vêtement'","'Il n'y a rien de nouveau sous le soleil'","'Le soleil se lève et se couche'"],answer:"'Ils s'useront tous comme un vêtement'",explanation:"Cette observation sur l'usure universelle des cieux (Ecclésiaste / Psaume 102) préfigure le concept moderne d'entropie — la dégradation irréversible.",reference:"Ecclésiaste 1:4",theme:"SAGESSE",difficulty:"AVANCE"},
    {id:226,text:"Quel est le miracle qui précède immédiatement l'entrée triomphale de Jésus à Jérusalem selon Jean ?",options:["La guérison d'un aveugle","La résurrection de Lazare","La multiplication des pains","La marche sur l'eau"],answer:"La résurrection de Lazare",explanation:"Selon Jean, c'est la résurrection de Lazare qui déclenche la décision des chefs religieux d'éliminer Jésus et provoque l'entrée à Jérusalem.",reference:"Jean 11:45-12:1",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:227,text:"Quel miracle Élisée accomplit-il pour purifier une source d'eau nocive à Jéricho ?",options:["Il y jeta de la farine","Il pria simplement","Il y jeta du sel","Il plongea son bâton dedans"],answer:"Il y jeta du sel",explanation:"Élisée jeta du sel dans la source de Jéricho qui était mauvaise. Le sel — symbole de purification — la rendit bonne.",reference:"2 Rois 2:20-21",theme:"MIRACLES",difficulty:"AVANCE"},
    {id:228,text:"Quel miracle permit à Pierre d'obtenir de l'argent pour payer le tribut du Temple ?",options:["Un don miraculeux d'un passant","Il trouva la pièce dans la bouche d'un poisson","Un ange lui apporta l'argent","Il multiplia ses deniers"],answer:"Il trouva la pièce dans la bouche d'un poisson",explanation:"Jésus dit à Pierre de lancer son hameçon — le premier poisson pris aurait une pièce de quatre drachmes dans la bouche, pour payer le tribut.",reference:"Matthieu 17:27",theme:"MIRACLES",difficulty:"AVANCE"},
    {id:229,text:"Quel miracle Jésus accomplit-il lors d'un sabbat dans la synagogue de Capharnaüm qui indigna les pharisiens ?",options:["Il guérit un aveugle","Il ressuscita un enfant","Il guérit un homme à la main sèche","Il chassa un démon"],answer:"Il guérit un homme à la main sèche",explanation:"Jésus guérit le jour du sabbat malgré l'opposition — 'Est-il permis de faire du bien le jour du sabbat ?' Les pharisiens décident de le perdre.",reference:"Matthieu 12:10-13",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:230,text:"Quel miracle Moïse accomplit-il en étendant son bâton sur la mer Rouge ?",options:["Il fit pleuvoir de la manne","Il sépara les eaux pour qu'Israël puisse traverser à pied sec","Il fit jaillir de l'eau","Il calma une tempête"],answer:"Il sépara les eaux pour qu'Israël puisse traverser à pied sec",explanation:"La traversée de la mer Rouge est l'événement fondateur de l'histoire d'Israël — acte de délivrance que Paul lit comme un baptême préfiguratif.",reference:"Exode 14:21",theme:"MIRACLES",difficulty:"DEBUTANT"},
    {id:231,text:"Quel miracle Élie accomplit-il sur le mont Carmel face aux 450 prophètes de Baal ?",options:["Il fit pleuvoir après 3 ans de sécheresse","Il fit tomber le feu du ciel sur son sacrifice","Il ressuscita un enfant","Il multiplia l'huile d'une veuve"],answer:"Il fit tomber le feu du ciel sur son sacrifice",explanation:"Le feu de l'Éternel tomba et consuma l'holocauste. Le peuple tomba face contre terre : 'C'est l'Éternel qui est Dieu !'",reference:"1 Rois 18:38-39",theme:"MIRACLES",difficulty:"DEBUTANT"},
    {id:232,text:"Quel est le seul miracle de Jésus relaté dans les quatre Évangiles ?",options:["La résurrection de Lazare","La multiplication des pains pour 5000 personnes","La marche sur les eaux","La guérison d'un aveugle"],answer:"La multiplication des pains pour 5000 personnes",explanation:"La multiplication des pains est le seul miracle (avec la résurrection) présent dans les quatre Évangiles — signe de son importance centrale.",reference:"Jean 6:1-13",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:233,text:"Quelle guérison Jésus accomplit-il en crachant par terre et faisant de la boue avec sa salive ?",options:["Un lépreux","Un aveugle de naissance","Un sourd-muet","Un paralysé"],answer:"Un aveugle de naissance",explanation:"Jésus fait de la boue, l'applique sur les yeux de l'aveugle et lui dit d'aller se laver à Siloé. L'homme revient voyant — premier miracle sur la vision totale.",reference:"Jean 9:6-7",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:234,text:"Quelle Église de l'Apocalypse est louée pour avoir gardé sa foi mais blâmée pour avoir 'abandonné son premier amour' ?",options:["Smyrne","Pergame","Éphèse","Philadelphie"],answer:"Éphèse",explanation:"L'Église d'Éphèse a du zèle et déteste les faux docteurs, mais elle a perdu la ferveur du début. 'Souviens-toi d'où tu es tombé.'",reference:"Apocalypse 2:4",theme:"APOCALYPSE",difficulty:"AVANCE"},
    {id:235,text:"Que symbolise la 'femme vêtue du soleil' dans l'Apocalypse ?",options:["Marie, mère de Jésus","La Cité de Rome","Le peuple de Dieu (Israël/l'Église)","La Sagesse divine"],answer:"Le peuple de Dieu (Israël/l'Église)",explanation:"La femme vêtue du soleil (Ap 12) est interprétée comme Israël ou l'Église — persécutée par le dragon mais protégée par Dieu.",reference:"Apocalypse 12:1",theme:"APOCALYPSE",difficulty:"AVANCE"},
    {id:236,text:"Quel fleuve traverse la Nouvelle Jérusalem dans la vision finale de l'Apocalypse ?",options:["Le Jourdain","Le fleuve d'eau de la vie","Le fleuve de feu","Le Nil transformé"],answer:"Le fleuve d'eau de la vie",explanation:"'Il me montra un fleuve d'eau de la vie, limpide comme du cristal, sortant du trône de Dieu et de l'Agneau.' Image de la vie éternelle abondante.",reference:"Apocalypse 22:1",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:237,text:"Qu'est-ce que le 'lac de feu' dans l'Apocalypse ?",options:["Un lieu de purification temporaire","La seconde mort","Le séjour des morts","Un symbole du jugement terrestre"],answer:"La seconde mort",explanation:"L'Apocalypse identifie le lac de feu à la 'seconde mort' — destination finale de ceux dont le nom n'est pas inscrit dans le livre de vie.",reference:"Apocalypse 20:14",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:238,text:"Combien d'années dure le règne millénaire mentionné dans l'Apocalypse ?",options:["100","500","1000","Indéfini"],answer:"1000",explanation:"L'Apocalypse 20 décrit un règne de mille ans (millennium). Ce passage est au cœur de nombreux débats eschatologiques entre chrétiens.",reference:"Apocalypse 20:4",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:239,text:"Quelle parabole Jésus raconte-t-il immédiatement après la question 'Qui est mon prochain ?' ?",options:["Le fils prodigue","Le bon Samaritain","Les dix vierges","Le semeur"],answer:"Le bon Samaritain",explanation:"Un légiste veut se justifier. Jésus renverse la question : ce n'est pas 'qui est mon prochain ?' mais 'suis-je prochain envers l'autre ?'",reference:"Luc 10:29-37",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:240,text:"Quelle déclaration Jésus fait-il à la Samaritaine au puits de Jacob ?",options:["'Je suis la lumière du monde'","'Celui qui boira de cette eau aura soif de nouveau, mais je lui donnerai une eau vive'","'Je suis le pain de vie'","'Avant Abraham, je suis'"],answer:"'Celui qui boira de cette eau aura soif de nouveau, mais je lui donnerai une eau vive'",explanation:"Jésus propose l'eau vive — symbole de l'Esprit et de la vie éternelle. Il révèle qu'il est le Messie à cette femme marginale avant ses disciples.",reference:"Jean 4:13-26",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:241,text:"Combien d'années Jésus avait-il lors de sa première visite au Temple à Jérusalem pour la Pâque ?",options:["3","8","12","18"],answer:"12",explanation:"Jésus reste au Temple sans avertir ses parents. Retrouvé après trois jours parmi les docteurs, il dit : 'Ne saviez-vous pas que je dois être chez mon Père ?'",reference:"Luc 2:42-46",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:242,text:"Quel est le verset le plus court de la Bible en français, dans le récit de la résurrection de Lazare ?",options:["'Viens et vois'","'Jésus pleura'","'Lazare, viens dehors'","'Il est ressuscité'"],answer:"'Jésus pleura'",explanation:"Jean 11:35 — 'Jésus pleura' est le verset le plus court de la Bible en français. Face au tombeau de Lazare, Jésus manifeste une vraie émotion humaine.",reference:"Jean 11:35",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:243,text:"Qui chercha à embrasser Jésus pour permettre aux soldats de l'identifier au jardin de Gethsémani ?",options:["Pierre","Jean","Thomas","Judas"],answer:"Judas",explanation:"L'embrassement de Judas — signal convenu pour désigner Jésus dans l'obscurité — est devenu le symbole par excellence de la trahison hypocrite.",reference:"Luc 22:47-48",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:244,text:"Que fit Pierre lors de l'arrestation de Jésus au jardin ?",options:["Il s'enfuit aussitôt","Il coupa l'oreille du serviteur du grand prêtre","Il se cacha dans les buissons","Il appela les autres disciples"],answer:"Il coupa l'oreille du serviteur du grand prêtre",explanation:"Pierre coupa l'oreille de Malchus. Jésus la guérit et dit : 'Remets ton épée — ceux qui prennent l'épée périront par l'épée.'",reference:"Jean 18:10",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:245,text:"Quel titre Pilate fit-il inscrire sur la croix de Jésus en trois langues ?",options:["'Roi des Juifs'","'Blasphémateur'","'Rebelle contre Rome'","'Faux prophète'"],answer:"'Roi des Juifs'",explanation:"INRI = Iesus Nazarenus Rex Iudaeorum, en latin, grec et hébreu. Les chefs religieux voulaient changer le titre. Pilate répondit : 'Ce que j'ai écrit, je l'ai écrit.'",reference:"Jean 19:19-22",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:246,text:"Quel disciple fut le premier à entrer dans le tombeau vide et croire à la résurrection selon Jean ?",options:["Pierre","Jean (le disciple bien-aimé)","Marie-Madeleine","Thomas"],answer:"Jean (le disciple bien-aimé)",explanation:"Jean arriva le premier, regarda, puis entra après Pierre et 'il vit et il crut'. Il perçut le sens des bandelettes soigneusement placées.",reference:"Jean 20:8",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:247,text:"Quel est le sens de 'Maranatha', expression araméenne des premières communautés chrétiennes ?",options:["Gloire à Dieu","Viens, Seigneur !","Dieu est vivant","La paix soit avec vous"],answer:"Viens, Seigneur !",explanation:"Maranatha (Maran atha) est l'une des premières prières chrétiennes, attestée dans la Didachè et 1 Corinthiens. Elle exprime l'attente du retour du Christ.",reference:"1 Corinthiens 16:22",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:248,text:"Dans quelle circonstance Jésus dit-il 'Rendez à César ce qui est à César, et à Dieu ce qui est à Dieu' ?",options:["Lors du Sermon sur la montagne","En réponse à une question piège sur l'impôt","En parlant des dîmes","Lors d'un débat sur la résurrection"],answer:"En réponse à une question piège sur l'impôt",explanation:"Les pharisiens et hérodiens tentent de piéger Jésus. Sa réponse distingue deux ordres d'appartenance — sans opposer foi et citoyenneté.",reference:"Matthieu 22:21",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
    {id:249,text:"Quelle est la thèse centrale de l'épître aux Galates de Paul ?",options:["La vie communautaire dans l'Église","La liberté chrétienne contre le joug de la Loi","Les dons de l'Esprit","La résurrection des morts"],answer:"La liberté chrétienne contre le joug de la Loi",explanation:"Paul combat des 'judaïsants' qui imposent la circoncision aux gentils convertis. 'C'est pour la liberté que Christ nous a affranchis.'",reference:"Galates 5:1",theme:"APOTRES",difficulty:"AVANCE"},

<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>BibleQuiz</title>
<meta content="#0f0e17" name="theme-color"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&amp;family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&amp;display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   BIBLEQUIZ — Design System v2
   Direction : Manuscrit sacré × Interface moderne
   Palette : Nuit d'encre + Or antique + Parchemin
═══════════════════════════════════════════════ */
:root {
  /* Couleurs */
  --bg:        #0c0b10;
  --bg2:       #100f15;
  --surface:   #161420;
  --surface2:  #1d1a28;
  --surface3:  #242133;
  --accent:    #c9943a;
  --accent2:   #e8c068;
  --accent3:   #f5d98a;
  --gold-dim:  rgba(201,148,58,.18);
  --gold-glow: rgba(201,148,58,.35);
  --text:      #ede8df;
  --text2:     #8a8499;
  --text3:     #5c5670;
  --correct:   #3ecf72;
  --wrong:     #f05252;
  --border:    rgba(255,255,255,.07);
  --border2:   rgba(201,148,58,.22);
  --radius:    14px;
  --radius-sm: 8px;
  --shadow:    0 4px 24px rgba(0,0,0,.55);
  --shadow-gold: 0 0 28px rgba(201,148,58,.12);
}

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  /* Grain subtil */
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,148,58,.08) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
}

/* ── Typographie ── */
h1, h2, h3, .brand, .page-title, .dash-header h1,
.quiz-setup h2, .scoreboard h2 {
  font-family: 'Cinzel', Georgia, serif;
  letter-spacing: .02em;
}

/* ── Navigation ── */
nav {
  background: rgba(14,13,20,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: 0 20px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 1px;
  position: sticky;
  top: 0;
  z-index: 100;
  overflow-x: auto;
  scrollbar-width: none;
  box-shadow: 0 1px 0 rgba(201,148,58,.1), 0 4px 20px rgba(0,0,0,.4);
}
nav::-webkit-scrollbar { display:none; }

.brand {
  font-family: 'Cinzel', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent2);
    margin-right: 8px; cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: .08em;
  text-shadow: 0 0 20px rgba(232,192,104,.3);
}

nav button {
  background: none;
  border: 1px solid transparent;
  color: var(--text3);
  padding: 0;
  width: 38px;
  height: 38px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 1.25rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .18s;
  position: relative;
}
nav button:hover { color: var(--accent2); background: var(--gold-dim); }
nav button.active {
  border-color: var(--border2);
  color: var(--accent2);
  background: var(--gold-dim);
}
/* Tooltip au hover */
nav button[title]:hover::after {
  content: attr(title);
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: .72rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  letter-spacing: .04em;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 6px;
  pointer-events: none;
  z-index: 200;
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
nav button.logout { color: rgba(240,82,82,.5); font-size: 1rem; }
nav button.logout:hover { color: var(--wrong); background: rgba(240,82,82,.1); border-color: rgba(240,82,82,.3); }

/* ── Layout ── */
main { max-width: 880px; margin: 0 auto; padding: 32px 18px; }

/* ── Auth ── */
.auth-wrap {
  max-width: 420px;
  margin: 60px auto;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: var(--shadow), var(--shadow-gold);
}
.auth-wrap h1 {
  font-size: 2rem;
  color: var(--accent2);
  margin-bottom: 6px;
  text-shadow: 0 0 30px rgba(232,192,104,.25);
}
.auth-wrap > p { color: var(--text2); margin-bottom: 28px; font-size: .9rem; }

.auth-tabs { display:flex; gap:8px; margin-bottom:24px; }
.auth-tabs button {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: .88rem;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
}
.auth-tabs button.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0c0b10;
  border-color: transparent;
  font-weight: 700;
}

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: .76rem;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 500;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: .95rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,148,58,.12);
}

.btn-primary {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #0c0b10;
  font-weight: 700;
  font-size: .95rem;
  font-family: 'DM Sans', sans-serif;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  letter-spacing: .03em;
  transition: opacity .2s, transform .15s;
}
.btn-primary:hover { opacity: .9; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.error-msg {
  background: rgba(240,82,82,.1);
  border: 1px solid rgba(240,82,82,.4);
  color: #f87171;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  font-size: .86rem;
}
.hint-msg { font-size:.75rem; color:var(--text3); margin-bottom:14px; }

/* ── Dashboard ── */
.dash-header { margin-bottom: 28px; }
.dash-header h1 { font-size: 1.6rem; color: var(--accent2); }
.dash-header p { color: var(--text2); margin-top: 4px; font-size: .88rem; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 22px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 12px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, transform .2s;
}
.stat-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(201,148,58,.06) 0%, transparent 60%);
  pointer-events: none;
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.stat-value {
  display: block;
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent2);
  font-family: 'Cinzel', serif;
  line-height: 1;
}
.stat-label { display: block; font-size:.72rem; color:var(--text2); margin-top:5px; text-transform:uppercase; letter-spacing:.06em; }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: border-color .2s;
}
.section-card:hover { border-color: rgba(255,255,255,.1); }
.section-card h3 {
  font-family: 'Cinzel', serif;
  color: var(--accent);
  margin-bottom: 13px;
  font-size: .88rem;
  letter-spacing: .06em;
}

/* ── Boutons ── */
.daily-btn, .start-btn {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #0c0b10;
  font-weight: 700;
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .88rem;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: .02em;
  transition: opacity .2s, transform .15s;
}
.daily-btn:hover, .start-btn:hover { opacity: .9; transform: translateY(-1px); }

.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .8rem;
  font-family: 'DM Sans', sans-serif;
  margin-bottom: 20px;
  transition: all .2s;
}
.back-btn:hover { border-color: var(--border2); color: var(--accent2); }

/* ── Nav Cards (Dashboard) ── */
.nav-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
  gap: 12px;
}
.nav-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: all .25s;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.nav-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(201,148,58,.1) 0%, transparent 70%);
  opacity: 0;
  transition: opacity .25s;
}
.nav-card:hover { border-color: var(--border2); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4), var(--shadow-gold); }
.nav-card:hover::after { opacity: 1; }
.nav-card .icon { font-size: 1.8rem; margin-bottom: 9px; display:block; }
.nav-card h3 { font-size: .88rem; color: var(--text); margin-bottom: 3px; font-family: 'DM Sans', sans-serif; font-weight: 600; }
.nav-card p { font-size: .73rem; color: var(--text2); }

/* ── XP & Progression ── */
.xp-wrap { margin-bottom: 18px; }
.xp-bar-wrap {
  background: var(--surface3);
  border-radius: 99px;
  height: 6px;
  overflow: hidden;
}
.xp-bar-fill {
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  height: 6px;
  border-radius: 99px;
  transition: width .7s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px rgba(232,192,104,.4);
}

/* ── Streak ── */
.streak-row { display:flex; gap:5px; flex-wrap:wrap; }
.streak-day {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .65rem;
  color: var(--text3);
  flex-direction: column;
  transition: all .2s;
}
.streak-day.done {
  background: var(--gold-dim);
  border-color: var(--border2);
  color: var(--accent2);
}
.streak-day.today { box-shadow: 0 0 10px rgba(201,148,58,.5); border-color: var(--accent); }

/* ── Badges ── */
.badges-grid { display:flex; flex-wrap:wrap; gap:10px; }
.badge-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  text-align: center;
  min-width: 82px;
  opacity: .3;
  transition: all .3s;
  filter: grayscale(1);
}
.badge-item.earned {
  opacity: 1;
  filter: none;
  border-color: var(--border2);
  background: var(--gold-dim);
}
.badge-item .b-icon { font-size: 1.6rem; }
.badge-item .b-name { font-size: .67rem; color: var(--text2); margin-top: 5px; line-height: 1.2; }
.badge-item.earned .b-name { color: var(--accent2); }

/* ── Quiz ── */
.quiz-setup { text-align:center; padding:20px 0; }
.quiz-setup h2 { font-size: 1.5rem; color: var(--accent2); margin-bottom: 6px; }
.quiz-setup p { color: var(--text2); margin-bottom: 28px; font-size: .9rem; }
.filter-row { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; margin-bottom:24px; }
.filter-row select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 14px;
  border-radius: var(--radius-sm);
  font-size: .86rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: border-color .2s;
}
.filter-row select:hover, .filter-row select:focus { border-color: var(--border2); outline:none; }

.progress-bar-wrap { background: var(--surface); border-radius:99px; height:3px; margin-bottom:24px; }
.progress-bar-fill { background: linear-gradient(90deg, var(--accent), var(--accent2)); height:3px; border-radius:99px; transition:width .4s; box-shadow: 0 0 6px rgba(201,148,58,.4); }

.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.q-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:6px; }
.q-badge {
  background: var(--gold-dim);
  color: var(--accent2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 3px 12px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.q-counter { font-size: .78rem; color: var(--text2); font-variant-numeric: tabular-nums; }
.question-card h2 { font-size: 1.08rem; line-height: 1.6; margin-bottom: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 400; }
.q-ref { font-size: .76rem; color: var(--accent); margin-bottom: 22px; font-style: italic; }

.options { display:grid; gap:9px; }
.opt-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 13px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .9rem;
  font-family: 'DM Sans', sans-serif;
  text-align: left;
  transition: all .2s;
  line-height: 1.45;
}
.opt-btn:hover:not(:disabled) { border-color: var(--border2); background: var(--gold-dim); color: var(--accent2); }
.opt-btn.correct-ans { border-color: var(--correct); background: rgba(62,207,114,.1); color: var(--correct); }
.opt-btn.wrong-ans { border-color: var(--wrong); background: rgba(240,82,82,.1); color: var(--wrong); }
.opt-btn:disabled { cursor:default; }

.feedback-panel { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; border: 1px solid var(--border); }
.feedback-panel.correct { border-color: rgba(62,207,114,.4); background: rgba(62,207,114,.04); }
.feedback-panel.wrong { border-color: rgba(240,82,82,.4); background: rgba(240,82,82,.04); }
.fb-header { font-size: .95rem; font-weight: 700; margin-bottom: 10px; font-family: 'DM Sans', sans-serif; }
.feedback-panel.correct .fb-header { color: var(--correct); }
.feedback-panel.wrong .fb-header { color: var(--wrong); }
.fb-exp { color: var(--text2); font-size: .86rem; margin-bottom: 6px; line-height: 1.65; }
.fb-ref { font-size: .77rem; color: var(--accent); margin-bottom: 14px; font-style:italic; }
.fb-row { display:flex; align-items:center; gap:13px; }

.next-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0c0b10;
  font-weight: 700;
  padding: 9px 22px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .86rem;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .2s, transform .15s;
}
.next-btn:hover { opacity: .9; transform: translateY(-1px); }
.xp-gain { color: var(--accent2); font-size: .8rem; font-weight: 600; }

/* ── Scoreboard ── */
.scoreboard { text-align:center; padding:24px 0; }
.scoreboard h2 { font-size: 1.7rem; color: var(--accent2); margin-bottom: 24px; }
.score-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 1.8rem;
  font-weight: 700;
  font-family: 'Cinzel', serif;
  box-shadow: 0 0 30px rgba(201,148,58,.2);
}
.score-circle.success { border-color: var(--correct); color: var(--correct); box-shadow: 0 0 30px rgba(62,207,114,.2); }
.score-circle.fail { border-color: var(--wrong); color: var(--wrong); box-shadow: 0 0 30px rgba(240,82,82,.2); }
.score-detail { color:var(--text2); margin-bottom:10px; font-size:.9rem; }
.congrats { color:var(--correct); font-weight:700; margin-bottom:22px; font-family:'Cinzel',serif; letter-spacing:.04em; }
.restart-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--accent2);
  padding: 9px 22px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .88rem;
  font-family: 'DM Sans', sans-serif;
  margin: 4px;
  transition: all .2s;
}
.restart-btn:hover { background: var(--gold-dim); }

/* ── Mini-jeux ── */
.mg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.mg-type {
  font-size: .7rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-bottom: 13px;
  font-weight: 600;
}
.mg-text { font-size: 1.05rem; line-height: 1.9; margin-bottom: 18px; }
.blank {
  display: inline-block;
  border-bottom: 2px solid var(--accent);
  min-width: 75px;
  text-align: center;
  padding: 2px 6px;
  color: var(--accent2);
  font-weight: 600;
}
.blank input { background:none; border:none; outline:none; color:var(--accent2); font-size:.97rem; font-weight:600; width:100%; text-align:center; font-family:'DM Sans',sans-serif; }
.blank.correct-ans { border-color:var(--correct); }
.blank.wrong-ans { border-color:var(--wrong); }
.mg-options { display:flex; flex-wrap:wrap; gap:9px; margin-bottom:18px; }
.mg-opt {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .87rem;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
}
.mg-opt:hover:not(:disabled) { border-color: var(--border2); background: var(--gold-dim); }
.mg-opt.correct-ans { border-color:var(--correct); background:rgba(62,207,114,.1); color:var(--correct); }
.mg-opt.wrong-ans { border-color:var(--wrong); background:rgba(240,82,82,.1); color:var(--wrong); }
.mg-submit {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0c0b10;
  font-weight: 700;
  padding: 9px 22px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .87rem;
  font-family: 'DM Sans', sans-serif;
}
.mg-nav { display:flex; gap:9px; margin-top:14px; flex-wrap:wrap; }
.mg-nav button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .8rem;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
}
.mg-nav button:hover:not(:disabled) { border-color: var(--border2); color: var(--accent2); }
.mg-nav button:disabled { opacity:.3; cursor:default; }

/* ── Bibliothèque ── */
.lecture-grid { display:grid; gap:12px; }
.lecture-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}

/* ── Responsive ── */
/* ═════════════════════════════════════════════

#drawer button{display:flex;align-items:center;gap:14px;width:100%;background:none;border:none;padding:14px 20px;cursor:pointer;color:var(--text);font-size:.95rem;font-family:'DM Sans',sans-serif;text-align:left;min-height:52px;transition:background .12s;-webkit-tap-highlight-color:transparent}

/* ══ FRESQUE CHRONOLOGIQUE — Refonte v3 ══════════════════════ */

/* ── Mini-carte de navigation ── */
#tl-minimap {
  position: sticky;
  top: 58px;
  z-index: 50;
  background: rgba(14,13,20,.96);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border2);
  padding: 8px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
#tl-minimap::-webkit-scrollbar { display: none; }
.tl-era-pill {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: .72rem;
  font-weight: 700;
  font-family: 'Cinzel', serif;
  letter-spacing: .04em;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .18s;
  white-space: nowrap;
}
.tl-era-pill.active { transform: scale(1.05); }

/* ── Bande de filtres ── */
.tl-filter-band {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.tl-band-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  font-size: .77rem;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  transition: all .18s;
  white-space: nowrap;
}
.tl-band-btn:hover { border-color: var(--border2); color: var(--accent2); }
.tl-band-btn.active { color: #0f0e17; border-color: transparent; }
.tl-band-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Conteneur principal scrollable ── */
#tl-scroll-host {
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  cursor: grab;
  user-select: none;
  border-radius: 14px;
  border: 1px solid var(--border2);
  background: var(--surface);
  scrollbar-width: thin;
  scrollbar-color: rgba(201,148,58,.3) transparent;
}
#tl-scroll-host:active { cursor: grabbing; }
#tl-scroll-host::-webkit-scrollbar { height: 4px; }
#tl-scroll-host::-webkit-scrollbar-track { background: transparent; }
#tl-scroll-host::-webkit-scrollbar-thumb { background: rgba(201,148,58,.3); border-radius: 4px; }

/* ── Bands thématiques ── */
.tl-band-row {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--border);
  min-height: 72px;
}
.tl-band-label {
  width: 90px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 12px 0 8px;
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text3);
  border-right: 1px solid var(--border);
  background: rgba(14,13,20,.6);
  position: sticky;
  left: 0;
  z-index: 10;
}
.tl-band-content {
  flex: 1;
  position: relative;
  min-height: 72px;
}

/* ── Ères background ── */
.tl-era-bg {
  position: absolute;
  top: 0;
  bottom: 0;
  pointer-events: none;
  transition: opacity .2s;
}

/* ── Axe temporel ── */
.tl-axis-row {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border2);
  height: 36px;
  background: rgba(14,13,20,.8);
}
.tl-axis-sticky {
  width: 90px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  height: 100%;
  background: rgba(14,13,20,.8);
  position: sticky;
  left: 0;
  z-index: 10;
}
.tl-axis-content {
  flex: 1;
  position: relative;
  height: 100%;
}

/* ── Items (empires = barres, events/people/books = pins) ── */
.tl-empire-bar {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: filter .15s, transform .15s;
  overflow: hidden;
  white-space: nowrap;
  z-index: 5;
}
.tl-empire-bar:hover { filter: brightness(1.2); transform: translateY(-50%) scaleY(1.08); }
.tl-empire-label {
  font-size: 10px;
  font-weight: 700;
  padding: 0 8px;
  font-family: 'Cinzel', serif;
  text-shadow: 0 1px 3px rgba(0,0,0,.8);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.tl-pin {
  position: absolute;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  z-index: 6;
  transition: transform .15s;
}
.tl-pin:hover { transform: translateX(-50%) translateY(-2px); }
.tl-pin-dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  transition: box-shadow .15s;
  flex-shrink: 0;
}
.tl-pin:hover .tl-pin-dot { box-shadow: 0 0 10px currentColor; }
.tl-pin-dot.discovered { background: rgba(14,13,20,.95); }
.tl-pin-dot.undiscovered { background: rgba(12,10,20,.8); opacity: .5; }
.tl-pin-dot.new-badge::after {
  content: '';
  position: absolute;
  top: -3px; right: -3px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent2);
  border: 1px solid var(--bg);
  animation: pulse-dot 1.8s ease-in-out infinite;
}
.tl-pin { position: absolute; }
@keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

.tl-pin-name {
  font-size: 8.5px;
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
  text-shadow: 0 1px 4px #000, 0 0 6px #000;
  max-width: 70px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Focus card ── */
#tl-focus-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8,7,14,0.75);
  z-index: 500;
  backdrop-filter: blur(4px);
}
#tl-focus-overlay.open { display: block; }
#tl-focus-card {
  display: none;
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%,-50%) scale(.94);
  z-index: 501;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 26px 26px 22px;
  max-width: 400px;
  width: calc(100vw - 32px);
  box-shadow: 0 0 60px rgba(201,148,58,.15), 0 24px 64px rgba(0,0,0,.7);
  opacity: 0;
  transition: opacity .2s ease, transform .2s ease;
}
#tl-focus-card.open {
  display: block;
  opacity: 1;
  transform: translate(-50%,-50%) scale(1);
}
.tl-fc-close {
  position: absolute;
  top: 12px; right: 14px;
  background: none; border: none;
  color: var(--text2); font-size: 1.6rem;
  cursor: pointer; line-height: 1;
}
.tl-fc-era-tag {
  display: inline-block;
  font-size: .67rem;
  font-weight: 700;
  border-radius: 20px;
  padding: 3px 11px;
  margin-bottom: 12px;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.tl-fc-title {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  color: var(--accent2);
  margin: 6px 0 4px;
  line-height: 1.3;
}
.tl-fc-year { font-size: .78rem; font-style: italic; margin-bottom: 12px; }
.tl-fc-desc {
  font-size: .88rem;
  line-height: 1.75;
  color: var(--text2);
  max-height: 180px;
  overflow-y: auto;
  scrollbar-width: thin;
  margin-bottom: 12px;
}
.tl-fc-vignette {
  width: 100%;
  height: 80px;
  border-radius: 10px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.8rem;
  overflow: hidden;
  position: relative;
}
.tl-fc-xp {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: .75rem;
  font-weight: 700;
  color: #0f0e17;
  background: var(--accent2);
  border-radius: 20px;
  padding: 4px 12px;
}

/* ── Progression ── */
.tl-progress-wrap { margin-bottom: 16px; }
.tl-era-tiles { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.tl-era-tile {
  flex: 1;
  min-width: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  transition: border-color .2s;
}
.tl-era-tile.complete { border-color: var(--border2); }
.tl-era-tile-name { font-size: .7rem; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-era-tile-bar { background: var(--surface3); border-radius: 99px; height: 4px; margin-bottom: 4px; overflow: hidden; }
.tl-era-tile-fill { height: 4px; border-radius: 99px; transition: width .7s .2s; }
.tl-era-tile-sub { font-size: .65rem; color: var(--text3); }

/* ── Tooltip ── */
#tl-tooltip {
  display: none;
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: .78rem;
  pointer-events: none;
  z-index: 400;
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
  max-width: 200px;
}
#tl-tooltip.visible { display: block; }
.tl-tt-year { font-size: .7rem; color: var(--text2); margin-top: 2px; }

/* ── Artefact popup ── */
.tl-artefact-popup {
  position: fixed;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%) scale(.85);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 28px 28px 22px;
  max-width: 320px;
  width: calc(100vw - 32px);
  z-index: 600;
  text-align: center;
  box-shadow: 0 0 60px rgba(201,148,58,.25), 0 24px 64px rgba(0,0,0,.8);
  opacity: 0;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.tl-artefact-popup.show { opacity: 1; transform: translate(-50%,-50%) scale(1); pointer-events: auto; }
.tl-art-icon { font-size: 3rem; margin-bottom: 10px; }
.tl-art-title { font-family:'Cinzel',serif; font-size:1rem; color:var(--accent2); margin-bottom:6px; }
.tl-art-sub { font-size:.82rem; color:var(--text2); margin-bottom:18px; }
.tl-artefact-popup button { background:var(--accent); color:#0f0e17; border:none; border-radius:8px; padding:10px 24px; font-weight:700; cursor:pointer; font-size:.9rem; }

/* ── Vignettes ── */
.tl-vignette-bg {
  position: absolute;
  inset: 0;
  opacity: 0.12;
  background-size: cover;
  background-position: center;
  filter: blur(1px);

.timeline-hero{
  position:relative;

  padding:28px;
  margin-bottom:18px;

    linear-gradient(145deg, rgba(24,21,34,.98), rgba(10,10,14,.98));

.timeline-era-grid{
  display:grid;

  gap:14px;
  margin:20px 0;

.timeline-era-card{
  position:relative;
  overflow:hidden;

.timeline-era-card::before{

  inset:0;
  background:linear-gradient(180deg, transparent, rgba(0,0,0,.25));
  pointer-events:none;
}
.timeline-era-icon{

.timeline-era-title{

}
.timeline-era-date{

}

}
.timeline-era-progress{

}
.timeline-era-progress .bar{
  height:5px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,.06);
}
.timeline-era-progress .fill{
  height:5px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.timeline-era-progress span{
  display:block;
  margin-top:6px;
  color:var(--text2);
  font-size:.72rem;
}
.timeline-local-view{
  background:linear-gradient(145deg, rgba(20,18,28,.98), rgba(12,11,16,.98));

}

.timeline-tags{

}

  padding:5px 10px;
  font-size:.7rem;

/* ═══════════════════════════════════════════════
   CORRECTIF MOBILE — suppression barre haute au scroll
   Objectif : aucune barre interne fixe/sticky en haut sur téléphone.
═══════════════════════════════════════════════ */
@media (max-width: 600px) {
  html, body {
    margin: 0 !important;
    padding-top: 0 !important;
    overflow-x: hidden !important;
    background-color: var(--bg) !important;
  }

  /* Supprime toute navigation haute interne sur téléphone */
  #navbar,
  nav#navbar,
  #tl-minimap {
    display: none !important;
    visibility: hidden !important;
    height: 0 !important;
    min-height: 0 !important;
    max-height: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    border: 0 !important;
    box-shadow: none !important;
    position: static !important;
    top: auto !important;
    overflow: hidden !important;
  }

  /* Évite qu'un élément sticky/fixed laisse une trace visuelle en haut */
  body::before {
    top: 0 !important;
  }

  main {
    padding-top: 14px !important;
  }

  /* La navigation mobile reste uniquement en bas */
  #bottom-nav {
    display: block !important;
    top: auto !important;
  }
}

const FINGERTIPS=[
  // ── LIVRE ──────────────────────────────────
  {id:1,cat:'LIVRE',title:'Le livre le plus vendu',fact:'La Bible est le livre le plus vendu de l\'histoire, avec plus de 5 milliards d\'exemplaires distribués.',src:''},
  {id:2,cat:'LIVRE',title:'66 ou 73 livres ?',fact:'Elle est composée de 66 livres (canon protestant) ou 73 (canon catholique avec les deutérocanoniques).',src:''},
  {id:3,cat:'LIVRE',title:'40 auteurs, 1 500 ans',fact:'Elle a été écrite par environ 40 auteurs différents sur une période de 1 500 ans.',src:''},
  {id:4,cat:'LIVRE',title:'Étymologie : "les livres"',fact:'Le mot "Bible" vient du grec biblía, signifiant "les livres".',src:''},
  {id:5,cat:'LIVRE',title:'3 500 langues',fact:'La Bible a été traduite en plus de 3 500 langues dans le monde.',src:''},
  {id:6,cat:'LIVRE',title:'Le plus long chapitre',fact:'Le plus long chapitre de la Bible est le Psaume 119, avec 176 versets.',src:'Psaume 119'},
  {id:7,cat:'LIVRE',title:'Le plus court verset',fact:'Le plus court verset de la Bible est Jean 11:35 : "Jésus pleura."',src:'Jean 11:35'},
  {id:8,cat:'LIVRE',title:'La division en chapitres',fact:'La division par chapitres a été introduite au XIIIe siècle par Étienne Langton, archevêque de Cantorbéry.',src:''},
  {id:9,cat:'LIVRE',title:'La division en versets',fact:'La division par versets a été faite en 1551 par Robert Estienne, imprimeur français.',src:''},
  {id:10,cat:'LIVRE',title:'La Bible de Gutenberg',fact:'La première Bible imprimée est la Bible de Gutenberg, vers 1455 — début de l\'ère de l\'imprimerie.',src:''},
  {id:11,cat:'LIVRE',title:'Louis Segond, 1880',fact:'La première Bible Louis Segond a été publiée à Oxford en 1880.',src:''},
  {id:12,cat:'LIVRE',title:'La trinité introuvable',fact:'Le mot "trinité" n\'apparaît pas une seule fois dans la Bible.',src:''},
  {id:13,cat:'LIVRE',title:'Job, le plus ancien ?',fact:'Le livre de Job est considéré par certains chercheurs comme le plus ancien texte de la Bible.',src:''},
  {id:14,cat:'LIVRE',title:'Hébreu, araméen, grec',fact:'L\'Ancien Testament a été rédigé majoritairement en hébreu, avec quelques passages en araméen. Le Nouveau Testament en grec koinè.',src:''},
  {id:15,cat:'LIVRE',title:'Fins en point d\'interrogation',fact:'Les livres des Lamentations et de Jonas se terminent tous deux par un point d\'interrogation.',src:''},
  {id:16,cat:'LIVRE',title:'Le plus court chapitre',fact:'Le Psaume 117 est le chapitre le plus court de toute la Bible — 2 versets seulement.',src:'Psaume 117'},
  {id:17,cat:'LIVRE',title:'783 000 mots',fact:'La Bible contient environ 783 000 mots dans sa version King James anglaise.',src:''},
  {id:18,cat:'LIVRE',title:'3 Jean, 14 versets',fact:'La lettre la plus courte du Nouveau Testament est 3 Jean, avec seulement 14 versets.',src:'3 Jean'},
  {id:19,cat:'LIVRE',title:'Canon éthiopien',fact:'L\'Église éthiopienne reconnaît 81 livres dans son canon biblique — le plus large de toutes les confessions chrétiennes.',src:''},
  {id:20,cat:'LIVRE',title:'La Didachè',fact:'La Didachè est un texte chrétien du Ier ou IIe siècle décrivant les pratiques des premières communautés.',src:''},
  // ── ANCIEN TESTAMENT ───────────────────────
  {id:21,cat:'AT',title:'Adam et Ève',fact:'Adam et Ève sont les premiers êtres humains décrits dans la Genèse. Ève fut créée à partir d\'une côte d\'Adam.',src:'Genèse 2'},
  {id:22,cat:'AT',title:'Caïn et Abel',fact:'Caïn et Abel sont les premiers enfants d\'Adam et Ève. Caïn tua son frère par jalousie — premier meurtre de la Bible.',src:'Genèse 4'},
  {id:23,cat:'AT',title:'Mathusalem, 969 ans',fact:'Mathusalem est l\'homme le plus vieux mentionné dans la Bible, mort à 969 ans selon la Genèse.',src:'Genèse 5:27'},
  {id:24,cat:'AT',title:'Noé avait 600 ans',fact:'Noé avait 600 ans quand le déluge commença selon la Genèse. L\'arche devait mesurer ~135 mètres de long.',src:'Genèse 7'},
  {id:25,cat:'AT',title:'La tour de Babel',fact:'La tour de Babel explique bibliquement l\'origine de la diversité des langues humaines.',src:'Genèse 11:1-9'},
  {id:26,cat:'AT',title:'Abraham, père des trois religions',fact:'Abraham est considéré comme le père des trois religions abrahamiques : judaïsme, christianisme, islam.',src:'Genèse 12'},
  {id:27,cat:'AT',title:'Sara, mère à 90 ans',fact:'Sara, femme d\'Abraham, aurait accouché d\'Isaac à l\'âge de 90 ans selon la Genèse.',src:'Genèse 17:17'},
  {id:28,cat:'AT',title:'Jacob, 14 ans pour Rachel',fact:'Jacob a travaillé 14 ans pour obtenir la main de Rachel — 7 ans trompé par Laban, puis 7 autres années.',src:'Genèse 29:18-30'},
  {id:29,cat:'AT',title:'Joseph vendu 20 pièces',fact:'Joseph, fils de Jacob, fut vendu comme esclave par ses propres frères pour 20 pièces d\'argent.',src:'Genèse 37:28'},
  {id:30,cat:'AT',title:'Moïse, le plus cité',fact:'Moïse est le personnage cité le plus souvent dans la Bible. Il reçut les Dix Commandements sur le mont Sinaï.',src:'Exode 19-20'},
  {id:31,cat:'AT',title:'Aaron, premier grand prêtre',fact:'Aaron, frère de Moïse, fut le premier grand prêtre d\'Israël.',src:'Exode 28'},
  {id:32,cat:'AT',title:'Josué conquiert Canaan',fact:'Josué dirigea la conquête de Canaan après la mort de Moïse — les murailles de Jéricho tombèrent au son des trompettes.',src:'Josué 6'},
  {id:33,cat:'AT',title:'Déborah, juge unique',fact:'Déborah est la seule femme juge mentionnée dans le livre des Juges.',src:'Juges 4'},
  {id:34,cat:'AT',title:'Samson et ses cheveux',fact:'Samson possédait une force surnaturelle liée à sa chevelure non coupée. Dalila le trahit en la faisant couper.',src:'Juges 16'},
  {id:35,cat:'AT',title:'Ruth, ancêtre de David',fact:'Ruth, femme moabite et étrangère, est l\'ancêtre du roi David selon le récit biblique.',src:'Ruth 4:17'},
  {id:36,cat:'AT',title:'Saül, premier roi',fact:'Saül fut le premier roi d\'Israël, oint par le prophète Samuel.',src:'1 Samuel 10:24'},
  {id:37,cat:'AT',title:'David et Goliath',fact:'David tua le géant Goliath avec une simple pierre lancée à la fronde. La lance de Goliath pesait ~7 kg.',src:'1 Samuel 17'},
  {id:38,cat:'AT',title:'Salomon le sage',fact:'Salomon, fils de David, était réputé pour sa sagesse légendaire et construisit le premier Temple de Jérusalem.',src:'1 Rois 6'},
  {id:39,cat:'AT',title:'Élie, jamais mort',fact:'Élie est l\'un des rares personnages bibliques à ne pas être mort : il fut emporté au ciel dans un char de feu.',src:'2 Rois 2:11'},
  {id:40,cat:'AT',title:'Ésaïe, 66 chapitres',fact:'Ésaïe est l\'un des plus grands prophètes. Son livre contient 66 chapitres — autant que la Bible complète.',src:''},
  {id:41,cat:'AT',title:'Jérémie, prophète des larmes',fact:'Jérémie est surnommé "le prophète des larmes" en raison du ton douloureux de ses écrits.',src:''},
  {id:42,cat:'AT',title:'Daniel dans la fosse aux lions',fact:'Daniel a survécu à une nuit dans la fosse aux lions. Ses compagnons Chadrac, Méchak et Abed-Nego survécurent à la fournaise ardente.',src:'Daniel 3 & 6'},
  {id:43,cat:'AT',title:'Jonas et le grand poisson',fact:'Jonas passa trois jours dans le ventre d\'un grand poisson — le texte hébreu ne dit pas "baleine". Image reprise par Jésus pour parler de sa résurrection.',src:'Jonas 1:17 / Mt 12:40'},
  {id:44,cat:'AT',title:'Job et la souffrance',fact:'Job perdit tout — famille, biens, santé — mais ne renia pas sa foi. Son livre traite du silence apparent de Dieu face à la souffrance du juste.',src:'Job 1'},
  {id:45,cat:'AT',title:'Les 150 Psaumes',fact:'Les Psaumes sont 150 poèmes ou chants liturgiques, attribués surtout à David, encore utilisés dans la liturgie chrétienne quotidienne.',src:''},
  {id:46,cat:'AT',title:'La pomme n\'est pas la pomme',fact:'La Bible ne mentionne pas que la pomme fut le fruit défendu — le texte parle simplement de "fruit".',src:'Genèse 3:3'},
  {id:47,cat:'AT',title:'Absalom et sa chevelure',fact:'Absalom, fils de David, était célèbre pour sa chevelure abondante — il se faisait couper les cheveux une fois par an.',src:'2 Samuel 14:26'},
  {id:48,cat:'AT',title:'La "licorne" biblique',fact:'La Bible mentionne des "licornes" dans certaines traductions anciennes (terme rendu par "aurochs" dans les versions modernes).',src:''},
  {id:49,cat:'AT',title:'Le chien et le chat',fact:'Le chien est mentionné une quinzaine de fois dans la Bible, mais le chat n\'y apparaît presque pas.',src:''},
  {id:50,cat:'AT',title:'Ézéchias gagne 15 ans',fact:'Ézéchias, roi de Juda, vit sa vie prolongée de 15 ans après une prière fervente.',src:'2 Rois 20:6'},
  // ── NOUVEAU TESTAMENT ──────────────────────
  {id:51,cat:'NT',title:'Les quatre Évangiles',fact:'Le Nouveau Testament commence par quatre Évangiles : Matthieu, Marc, Luc et Jean — chacun avec sa perspective unique.',src:''},
  {id:52,cat:'NT',title:'Marc, le plus ancien',fact:'L\'Évangile de Marc est considéré comme le plus ancien, rédigé vers 65-70 ap. J.-C.',src:''},
  {id:53,cat:'NT',title:'Luc, auteur double',fact:'Luc est l\'auteur à la fois de l\'Évangile de Luc et des Actes des Apôtres.',src:''},
  {id:54,cat:'NT',title:'Jean, le plus théologique',fact:'L\'Évangile de Jean est le plus théologique des quatre, commençant par "Au commencement était la Parole".',src:'Jean 1:1'},
  {id:55,cat:'NT',title:'Les Mages : combien ?',fact:'La Bible ne précise pas le nombre de Mages — la tradition occidentale en a fixé trois d\'après les trois cadeaux.',src:'Matthieu 2:1-12'},
  {id:56,cat:'NT',title:'Jean-Baptiste, cousin',fact:'Jean-Baptiste est le cousin de Jésus selon l\'Évangile de Luc.',src:'Luc 1:36'},
  {id:57,cat:'NT',title:'5 pains, 2 poissons, 5 000',fact:'La multiplication des pains nourrit 5 000 personnes avec seulement 5 pains et 2 poissons.',src:'Jean 6:9-13'},
  {id:58,cat:'NT',title:'Marie-Madeleine, première',fact:'Marie-Madeleine fut la première à découvrir le tombeau vide selon les Évangiles.',src:'Jean 20:1'},
  {id:59,cat:'NT',title:'Zachée dans le sycomore',fact:'Zachée, collecteur d\'impôts de petite taille, grimpa dans un sycomore pour voir Jésus passer à Jéricho.',src:'Luc 19:4'},
  {id:60,cat:'NT',title:'Paul, 13 ou 14 épîtres',fact:'Paul (Saül de Tarse) fut d\'abord persécuteur des chrétiens. Il a rédigé 13 ou 14 épîtres qui constituent une large part du NT.',src:''},
  {id:61,cat:'NT',title:'L\'Apocalypse à Patmos',fact:'L\'Apocalypse est le seul livre prophétique du Nouveau Testament, rédigé par Jean dans l\'île de Patmos sous l\'Empire romain.',src:'Apocalypse 1:9'},
  {id:62,cat:'NT',title:'La femme samaritaine',fact:'La femme samaritaine rencontrée au puits est l\'une des conversations les plus longues de Jésus dans les Évangiles.',src:'Jean 4'},
  {id:63,cat:'NT',title:'Romains, chef-d\'œuvre de Paul',fact:'L\'épître aux Romains est considérée comme l\'exposé théologique le plus complet de Paul.',src:''},
  {id:64,cat:'NT',title:'La Tour de Siloé',fact:'La Tour de Siloé dont la chute tua 18 personnes est mentionnée par Jésus lui-même.',src:'Luc 13:4'},
  // ── JÉSUS ──────────────────────────────────
  {id:65,cat:'JESUS',title:'Yeshua — "Dieu sauve"',fact:'Le nom "Jésus" vient de l\'hébreu Yeshua, signifiant "Dieu sauve". "Christ" est la traduction grecque de "Messie" (l\'Oint).',src:''},
  {id:66,cat:'JESUS',title:'Ministère de 3 ans',fact:'Jésus a commencé son ministère public vers 30 ans. Il a duré environ trois ans selon les Évangiles synoptiques.',src:''},
  {id:67,cat:'JESUS',title:'37 miracles distincts',fact:'Jésus a accompli au moins 37 miracles distincts décrits dans les quatre Évangiles.',src:''},
  {id:68,cat:'JESUS',title:'La Transfiguration',fact:'La Transfiguration de Jésus eut lieu sur un mont (traditionnellement le Thabor) devant Pierre, Jacques et Jean.',src:'Matthieu 17'},
  {id:69,cat:'JESUS',title:'La Cène du jeudi saint',fact:'La Cène (dernier repas) eut lieu le soir du jeudi saint. Jésus fut trahi par Judas pour 30 pièces d\'argent.',src:'Matthieu 26'},
  {id:70,cat:'JESUS',title:'Pierre renia trois fois',fact:'Pierre renia Jésus trois fois avant le chant du coq, exactement comme Jésus l\'avait prédit.',src:'Matthieu 26:75'},
  {id:71,cat:'JESUS',title:'Golgotha, "lieu du crâne"',fact:'La crucifixion eut lieu au Golgotha, "le lieu du crâne", à Jérusalem. Jésus prononça sept paroles depuis la croix.',src:'Jean 19:17'},
  {id:72,cat:'JESUS',title:'INRI sur la croix',fact:'Le INRI sur la croix est l\'abréviation latine de "Jésus de Nazareth, Roi des Juifs" (Iesus Nazarenus Rex Iudaeorum).',src:'Jean 19:19'},
  {id:73,cat:'JESUS',title:'La résurrection, cœur de la foi',fact:'La résurrection de Jésus est le cœur de la foi chrétienne selon Paul : "Si le Christ n\'est pas ressuscité, votre foi est vaine."',src:'1 Corinthiens 15:17'},
  {id:74,cat:'JESUS',title:'L\'Ascension, 40 jours après',fact:'L\'Ascension de Jésus eut lieu 40 jours après sa résurrection.',src:'Actes 1:3'},
  {id:75,cat:'JESUS',title:'Langue de Jésus',fact:'Jésus parlait principalement l\'araméen. Des mots ont été conservés dans les Évangiles : Talitha koum, Éli Éli lama sabactani, Maranatha.',src:'Marc 5:41'},
  {id:76,cat:'JESUS',title:'Les marchands du Temple',fact:'Jésus a chassé les marchands du Temple à Jérusalem — l\'un de ses actes les plus "militants" et les plus polémiques.',src:'Jean 2:13-16'},
  // ── HISTOIRE PRIMITIVE ─────────────────────
  {id:77,cat:'HISTOIRE',title:'"Chrétien" à Antioche',fact:'Le terme "chrétien" fut utilisé pour la première fois à Antioche selon les Actes 11:26.',src:'Actes 11:26'},
  {id:78,cat:'HISTOIRE',title:'Étienne, premier martyr',fact:'Étienne est considéré comme le premier martyr chrétien, lapidé vers 36 ap. J.-C. alors que Paul assistait.',src:'Actes 7:59'},
  {id:79,cat:'HISTOIRE',title:'Mise en commun',fact:'Les premières communautés chrétiennes mettaient tout en commun — une forme de communauté fraternelle radicale.',src:'Actes 2:44-45'},
  {id:80,cat:'HISTOIRE',title:'Néron et l\'incendie de Rome',fact:'La persécution des chrétiens sous Néron (64 ap. J.-C.) fit suite à l\'incendie de Rome, dont il les accusa.',src:''},
  {id:81,cat:'HISTOIRE',title:'Pierre et Paul martyrisés',fact:'Pierre et Paul auraient tous deux été martyrisés à Rome sous le règne de Néron, vers 64-67 ap. J.-C.',src:''},
  {id:82,cat:'HISTOIRE',title:'Édit de Milan, 313',fact:'L\'Édit de Milan (313) de Constantin Ier accorda la liberté de religion aux chrétiens dans tout l\'Empire romain.',src:''},
  {id:83,cat:'HISTOIRE',title:'Constantin, premier converti',fact:'Constantin Ier est le premier empereur romain à s\'être converti au christianisme.',src:''},
  {id:84,cat:'HISTOIRE',title:'Édit de Thessalonique, 380',fact:'L\'Édit de Thessalonique (380) fit du christianisme nicéen la religion officielle de l\'Empire romain.',src:''},
  {id:85,cat:'HISTOIRE',title:'Grand Schisme, 1054',fact:'Le Grand Schisme de 1054 sépara définitivement l\'Église catholique romaine de l\'Église orthodoxe orientale.',src:''},
  {id:86,cat:'HISTOIRE',title:'L\'Arménie, premier État chrétien',fact:'L\'Arménie est considérée comme le premier État à avoir adopté le christianisme comme religion d\'État (301 ap. J.-C.).',src:''},
  {id:87,cat:'HISTOIRE',title:'Les Croisades',fact:'Les croisades visaient officiellement la libération des lieux saints — elles furent au nombre de 8 ou 9 selon les décomptes.',src:''},
  // ── PÈRES & THÉOLOGIENS ────────────────────
  {id:88,cat:'PERES',title:'Augustin, vie dissolue',fact:'Saint Augustin d\'Hippone (354-430) vécut une jeunesse dissolue avant sa conversion. Sa mère Monique pria pour lui pendant des décennies.',src:''},
  {id:89,cat:'PERES',title:'Les Confessions',fact:'Les Confessions d\'Augustin est la première autobiographie spirituelle de la littérature occidentale.',src:''},
  {id:90,cat:'PERES',title:'Thomas d\'Aquin, "bœuf muet"',fact:'Ses condisciples appelaient Thomas d\'Aquin "le bœuf muet" à cause de sa discrétion. Son maître dit : "Ce bœuf remplira le monde de ses mugissements."',src:''},
  {id:91,cat:'PERES',title:'La Somme Théologique',fact:'La Somme Théologique de Thomas d\'Aquin est l\'une des œuvres philosophiques les plus monumentales de l\'humanité.',src:''},
  {id:92,cat:'PERES',title:'Ambroise baptise Augustin',fact:'Saint Ambroise de Milan baptisa Saint Augustin en 387.',src:''},
  {id:93,cat:'PERES',title:'Chrysostome, "bouche d\'or"',fact:'Jean Chrysostome ("bouche d\'or") est réputé pour ses homélies éloquentes sur les Évangiles.',src:''},
  {id:94,cat:'PERES',title:'Origène, premier commentateur',fact:'Origène (185-254) fut l\'un des premiers grands commentateurs systématiques de la Bible.',src:''},
  {id:95,cat:'PERES',title:'La Vulgate de Jérôme',fact:'Saint Jérôme traduisit la Bible en latin (la Vulgate) entre 382 et 405. Elle resta la référence catholique pendant plus de 1 000 ans.',src:''},
  // ── LIEUX SACRÉS ───────────────────────────
  {id:96,cat:'LIEUX',title:'Jérusalem, cité sainte',fact:'Jérusalem est la ville la plus sainte du christianisme, lieu de la Passion, de la Résurrection et du Saint-Sépulcre.',src:''},
  {id:97,cat:'LIEUX',title:'Bethléem à 9 km',fact:'Bethléem est à seulement 9 km au sud de Jérusalem. La basilique de la Nativité y est l\'une des plus anciennes églises encore en activité.',src:''},
  {id:98,cat:'LIEUX',title:'La basilique Saint-Pierre',fact:'La basilique Saint-Pierre du Vatican est la plus grande église chrétienne du monde.',src:''},
  {id:99,cat:'LIEUX',title:'Santiago de Compostela',fact:'Santiago de Compostela en Espagne est le terminus du célèbre pèlerinage de Saint-Jacques.',src:''},
  {id:100,cat:'LIEUX',title:'Lourdes, 1858',fact:'Lourdes, en France, est l\'un des principaux lieux de pèlerinage catholique depuis les 18 apparitions mariales de 1858.',src:''},
  {id:101,cat:'LIEUX',title:'Mont Athos',fact:'Le mont Athos en Grèce est une communauté monastique orthodoxe autonome depuis le Xe siècle.',src:''},
  {id:102,cat:'LIEUX',title:'Constantinople',fact:'Constantinople (Istanbul) fut le siège du patriarcat œcuménique orthodoxe pendant des siècles.',src:''},
  // ── SACREMENTS & LITURGIE ──────────────────
  {id:103,cat:'SACREMENTS',title:'7 sacrements catholiques',fact:'L\'Église catholique reconnaît 7 sacrements. Les Églises protestantes n\'en reconnaissent généralement que deux : baptême et communion.',src:''},
  {id:104,cat:'SACREMENTS',title:'Le Carême, 40 jours',fact:'Le Carême dure 40 jours avant Pâques, en référence aux 40 jours de Jésus au désert.',src:'Matthieu 4:2'},
  {id:105,cat:'SACREMENTS',title:'Le Mercredi des Cendres',fact:'Le Mercredi des Cendres marque le début du Carême avec l\'imposition de cendres sur le front.',src:''},
  {id:106,cat:'SACREMENTS',title:'Le dimanche de Rameaux',fact:'Le dimanche de Rameaux commémore l\'entrée de Jésus à Jérusalem sur un âne.',src:''},
  {id:107,cat:'SACREMENTS',title:'La Semaine Sainte',fact:'La Semaine Sainte va du dimanche des Rameaux au dimanche de Pâques — sept jours de commémorations liturgiques.',src:''},
  {id:108,cat:'SACREMENTS',title:'L\'Avent, 4 semaines',fact:'L\'Avent est la période de quatre semaines précédant Noël, temps de préparation et d\'attente.',src:''},
  {id:109,cat:'SACREMENTS',title:'L\'Agape primitive',fact:'L\'Agape (repas fraternel) était une pratique des premières communautés chrétiennes, distincte de l\'Eucharistie.',src:''},
  // ── FÊTES ──────────────────────────────────
  {id:110,cat:'FETES',title:'Noël, date arbitraire',fact:'Noël célèbre la naissance de Jésus, fixée au 25 décembre par l\'Église romaine au IVe siècle. La date exacte est inconnue.',src:''},
  {id:111,cat:'FETES',title:'Pâques, calcul lunaire',fact:'La date de Pâques varie chaque année selon un calcul lunaire complexe : premier dimanche après la pleine lune qui suit l\'équinoxe de printemps.',src:''},
  {id:112,cat:'FETES',title:'La Pentecôte, 50 jours',fact:'La Pentecôte chrétienne tombe toujours un dimanche, 50 jours après Pâques. Elle commémore la descente de l\'Esprit Saint.',src:'Actes 2:1'},
  {id:113,cat:'FETES',title:'L\'Ascension, jeudi',fact:'La fête de l\'Ascension tombe toujours un jeudi, 40 jours après Pâques.',src:'Actes 1:3'},
  {id:114,cat:'FETES',title:'L\'Épiphanie, 6 janvier',fact:'L\'Épiphanie (6 janvier) commémore la visite des Mages à l\'Enfant Jésus.',src:'Matthieu 2'},
  {id:115,cat:'FETES',title:'La Toussaint, 1er novembre',fact:'La Toussaint (1er novembre) célèbre tous les saints connus et inconnus.',src:''},
  {id:116,cat:'FETES',title:'L\'Assomption, 15 août',fact:'L\'Assomption (15 août) célèbre l\'élévation corporelle de la Vierge Marie au ciel — dernier dogme catholique défini (1950).',src:''},
  {id:117,cat:'FETES',title:'La Chandeleur, 40 jours',fact:'La Chandeleur (2 février) commémore la présentation de Jésus au Temple, 40 jours après Noël.',src:'Luc 2:22'},
  // ── SAINTS ─────────────────────────────────
  {id:118,cat:'SAINTS',title:'4 étapes vers la canonisation',fact:'Le processus de canonisation comporte 4 étapes : serviteur de Dieu, vénérable, bienheureux, saint. Deux miracles sont généralement requis.',src:''},
  {id:119,cat:'SAINTS',title:'Saint Nicolas → Père Noël',fact:'Saint Nicolas de Myre (IVe siècle) est le saint qui inspira la figure du Père Noël.',src:''},
  {id:120,cat:'SAINTS',title:'Jeanne d\'Arc brûlée en 1431',fact:'Sainte Jeanne d\'Arc fut brûlée en 1431 et canonisée... en 1920, près de 500 ans plus tard.',src:''},
  {id:121,cat:'SAINTS',title:'François et les stigmates',fact:'Saint François d\'Assise (1181-1226) est le premier saint à avoir reçu les stigmates selon la tradition catholique.',src:''},
  {id:122,cat:'SAINTS',title:'Thérèse de Lisieux, 24 ans',fact:'Sainte Thérèse de Lisieux mourut à 24 ans et est Docteur de l\'Église depuis 1997.',src:''},
  {id:123,cat:'SAINTS',title:'Patrick n\'était pas irlandais',fact:'Saint Patrick, patron de l\'Irlande, était en réalité d\'origine romano-bretonne — capturé et esclave avant de devenir missionnaire.',src:''},
  {id:124,cat:'SAINTS',title:'Saint Valentin, lien incertain',fact:'Saint Valentin est associé à la fête des amoureux, bien que son lien historique avec les amoureux soit incertain.',src:''},
  {id:125,cat:'SAINTS',title:'Saint Christophe, retiré',fact:'Saint Christophe, patron des voyageurs, a été retiré du calendrier universel romain en 1969 faute de preuves historiques.',src:''},
  {id:126,cat:'SAINTS',title:'Martin Luther King, pasteur',fact:'Martin Luther King Jr. était pasteur baptiste. Son discours "I have a dream" est profondément nourri de références bibliques.',src:''},
  {id:127,cat:'SAINTS',title:'L\'abbé Pierre et Emmaüs',fact:'L\'abbé Pierre (1912-2007) fonda en 1949 la communauté Emmaüs, symbole d\'un christianisme social engagé.',src:''},
  {id:128,cat:'SAINTS',title:'Mère Teresa, Prix Nobel',fact:'Mère Teresa de Calcutta fonda les Missionnaires de la Charité en 1950 et reçut le Prix Nobel de la Paix en 1979.',src:''},
  {id:129,cat:'SAINTS',title:'François Xavier à la porte de la Chine',fact:'François Xavier, jésuite, évangélisa l\'Inde et le Japon. Il mourut en 1552 aux portes de la Chine, sans jamais avoir pu y entrer.',src:''},
  // ── PAPES ──────────────────────────────────
  {id:130,cat:'PAPES',title:'Plus de 260 papes',fact:'Il y a eu plus de 260 papes dans l\'histoire de l\'Église catholique.',src:''},
  {id:131,cat:'PAPES',title:'Pie IX, 31 ans',fact:'Le plus long pontificat fut celui de Pie IX (1846-1878) : 31 ans et 7 mois.',src:''},
  {id:132,cat:'PAPES',title:'Benoît IX, le plus jeune',fact:'Le plus jeune pape aurait été Benoît IX, élu vers l\'âge de 18-20 ans au XIe siècle.',src:''},
  {id:133,cat:'PAPES',title:'Jean-Paul II, premier Polonais',fact:'Jean-Paul II (1978-2005) a été le premier pape polonais et le premier pape non-italien depuis 455 ans.',src:''},
  {id:134,cat:'PAPES',title:'Benoît XVI démissionne',fact:'Benoît XVI (2013) fut le premier pape à démissionner depuis Grégoire XII en 1415.',src:''},
  {id:135,cat:'PAPES',title:'François, premier jésuite',fact:'François (2013-2025) fut le premier pape jésuite et le premier pape latino-américain.',src:''},
  {id:136,cat:'PAPES',title:'Charlemagne couronné',fact:'Léon III couronna Charlemagne empereur le 25 décembre 800, fondant l\'idée d\'empire chrétien d\'Occident.',src:''},
  {id:137,cat:'PAPES',title:'Urbain II et la 1ère Croisade',fact:'Le pape Urbain II lança la première Croisade en 1095 lors du concile de Clermont.',src:''},
  {id:138,cat:'PAPES',title:'Alexandre VI Borgia',fact:'Alexandre VI (Rodrigo Borgia), pape de 1492 à 1503, est l\'un des papes les plus controversés de l\'histoire.',src:''},
  {id:139,cat:'PAPES',title:'Jean XXIII et Vatican II',fact:'Jean XXIII convoqua le Concile Vatican II (1962-1965), première grande réforme de l\'Église catholique depuis 400 ans.',src:''},
  // ── RÉFORME ────────────────────────────────
  {id:140,cat:'REFORME',title:'31 octobre 1517',fact:'Martin Luther afficha ses 95 thèses à Wittenberg le 31 octobre 1517 — date symbolique de la Réforme protestante.',src:''},
  {id:141,cat:'REFORME',title:'Luther excommunié',fact:'Luther fut excommunié par le pape Léon X en 1521 à la Diète de Worms.',src:''},
  {id:142,cat:'REFORME',title:'Luther traduit la Bible',fact:'Luther traduisit la Bible en allemand populaire entre 1522 et 1534, rendant le texte accessible au peuple.',src:''},
  {id:143,cat:'REFORME',title:'Calvin à Genève',fact:'Jean Calvin (1509-1564) fit de Genève une "Rome protestante". Il développa la doctrine de la prédestination.',src:''},
  {id:144,cat:'REFORME',title:'Zwingli mort au combat',fact:'Ulrich Zwingli (1484-1531) fut le réformateur de Zurich. Il mourut au combat lors d\'une guerre de religion.',src:''},
  {id:145,cat:'REFORME',title:'Henri VIII et l\'anglicanisme',fact:'La Réforme anglicane fut lancée par Henri VIII en 1534, autant pour des raisons politiques que religieuses.',src:''},
  {id:146,cat:'REFORME',title:'La Confession d\'Augsbourg',fact:'La Confession d\'Augsbourg (1530) est le premier document confessionnel luthérien officiel.',src:''},
  {id:147,cat:'REFORME',title:'Les anabaptistes',fact:'Les anabaptistes, courant radical de la Réforme, prônaient le baptême uniquement des adultes croyants.',src:''},
  // ── MONASTÈRES ─────────────────────────────
  {id:148,cat:'MONASTERES',title:'Benoît, "Ora et Labora"',fact:'Saint Benoît de Nursie (480-547) est le fondateur du monachisme occidental. Sa règle se résume en "Ora et Labora" (prie et travaille).',src:''},
  {id:149,cat:'MONASTERES',title:'Les Cisterciens',fact:'Les moines cisterciens fondèrent de nombreux monastères au XIIe siècle, dont Cîteaux en Bourgogne.',src:''},
  {id:150,cat:'MONASTERES',title:'Bernard de Clairvaux',fact:'Bernard de Clairvaux (1090-1153) fut la figure dominante de l\'Église au XIIe siècle.',src:''},
  {id:151,cat:'MONASTERES',title:'Les moines irlandais',fact:'Les moines irlandais ont joué un rôle crucial dans la préservation des manuscrits antiques pendant le haut Moyen Âge.',src:''},
  {id:152,cat:'MONASTERES',title:'Les Chartreux, silence total',fact:'Les moines chartreux vivent dans un silence presque total et ne se retrouvent en communauté que pour la liturgie.',src:''},
  {id:153,cat:'MONASTERES',title:'Les Dominicains',fact:'Les moines dominicains (Ordre des Prêcheurs) furent fondés par Saint Dominique en 1216 pour combattre l\'hérésie par la prédication.',src:''},
  {id:154,cat:'MONASTERES',title:'Hildegarde de Bingen',fact:'Hildegarde de Bingen (1098-1179), abbesse bénédictine, était musicienne, visionnaire, herboriste et Docteur de l\'Église.',src:''},
  // ── CONCILES & DOGMES ──────────────────────
  {id:155,cat:'CONCILES',title:'Nicée I, 325',fact:'Le premier Concile œcuménique fut Nicée I (325), qui condamna l\'arianisme et établit le Credo de Nicée.',src:''},
  {id:156,cat:'CONCILES',title:'Constantinople I, 381',fact:'Le Concile de Constantinople I (381) ajouta les articles sur le Saint-Esprit au Credo de Nicée.',src:''},
  {id:157,cat:'CONCILES',title:'Éphèse et la Theotokos',fact:'Le Concile d\'Éphèse (431) proclama Marie "Mère de Dieu" (Theotokos).',src:''},
  {id:158,cat:'CONCILES',title:'Chalcédoine, 451',fact:'Le Concile de Chalcédoine (451) définit Jésus comme "vrai Dieu et vrai homme" en deux natures.',src:''},
  {id:159,cat:'CONCILES',title:'Trente contre la Réforme',fact:'Le Concile de Trente (1545-1563) fut la réponse catholique à la Réforme protestante.',src:''},
  {id:160,cat:'CONCILES',title:'Immaculée Conception, 1854',fact:'Le dogme de l\'Immaculée Conception de Marie fut défini par Pie IX en 1854.',src:''},
  {id:161,cat:'CONCILES',title:'Infaillibilité pontificale, 1870',fact:'Le dogme de l\'infaillibilité pontificale fut défini lors du Concile Vatican I en 1870.',src:''},
  {id:162,cat:'CONCILES',title:'Assomption, 1950',fact:'Le dogme de l\'Assomption de Marie fut le dernier dogme catholique défini, par Pie XII en 1950.',src:''},
  {id:163,cat:'CONCILES',title:'Vatican II, langues vernaculaires',fact:'Vatican II (1962-1965) permit notamment la célébration de la messe en langues vernaculaires au lieu du latin.',src:''},
  // ── SYMBOLES ───────────────────────────────
  {id:164,cat:'SYMBOLES',title:'La croix',fact:'La croix est le symbole principal du christianisme, rappelant la crucifixion du Christ.',src:''},
  {id:165,cat:'SYMBOLES',title:'ICHTHUS, signe secret',fact:'Le poisson (ichthus en grec) était un signe secret des premiers chrétiens persécutés. ICHTHUS = "Jésus-Christ, Fils de Dieu, Sauveur".',src:''},
  {id:166,cat:'SYMBOLES',title:'L\'agneau, Agnus Dei',fact:'L\'agneau est un symbole du Christ (Agnus Dei), rappelant les sacrifices de l\'Ancien Testament.',src:''},
  {id:167,cat:'SYMBOLES',title:'La colombe, l\'Esprit',fact:'La colombe symbolise l\'Esprit Saint, notamment lors du baptême de Jésus dans le Jourdain.',src:''},
  {id:168,cat:'SYMBOLES',title:'Le Chi-Rho de Constantin',fact:'Le chi-rho (☧) combine les deux premières lettres de Christos en grec. Constantin l\'adopta comme emblème militaire.',src:''},
  {id:169,cat:'SYMBOLES',title:'Alpha et Oméga',fact:'L\'alpha et l\'oméga symbolisent le Christ comme commencement et fin de toutes choses.',src:'Apocalypse 1:8'},
  {id:170,cat:'SYMBOLES',title:'Croix de Saint-André',fact:'La croix de Saint-André (en X) rappelle le martyre de l\'apôtre André, crucifié sur une croix de cette forme.',src:''},
  {id:171,cat:'SYMBOLES',title:'Croix celtique',fact:'La croix celtique associe la croix chrétienne à un cercle solaire, fusion du christianisme et des traditions celtes.',src:''},
  // ── MARIE ──────────────────────────────────
  {id:172,cat:'MARIE',title:'Marie et le Coran',fact:'Marie est la femme la plus mentionnée dans le Coran, citée plus souvent que dans le Nouveau Testament lui-même.',src:''},
  {id:173,cat:'MARIE',title:'Notre-Dame de Guadalupe',fact:'Notre-Dame de Guadalupe au Mexique est le sanctuaire marial le plus visité au monde.',src:''},
  {id:174,cat:'MARIE',title:'Le Magnificat',fact:'Le Magnificat, hymne de Marie (Luc 1:46-55), est chanté chaque soir aux Vêpres depuis des siècles.',src:'Luc 1:46-55'},
  {id:175,cat:'MARIE',title:'Fatima, Lourdes, Guadalupe',fact:'La tradition catholique reconnaît des apparitions mariales à Fatima (1917), Lourdes (1858) et Guadalupe (1531).',src:''},
  {id:176,cat:'MARIE',title:'L\'Annonciation',fact:'L\'Annonciation (25 mars) commémore la visite de l\'ange Gabriel à Marie pour lui annoncer la conception de Jésus.',src:'Luc 1:28'},
  {id:177,cat:'MARIE',title:'La Fuite en Égypte',fact:'Marie et Joseph s\'enfuirent en Égypte avec le nouveau-né Jésus pour fuir le massacre des Innocents ordonné par Hérode.',src:'Matthieu 2:13'},
  {id:178,cat:'MARIE',title:'Perpetua Virginitas',fact:'La doctrine de la Perpetua Virginitas affirme que Marie est restée vierge toute sa vie — position majoritaire en catholicisme et orthodoxie.',src:''},
  // ── CHIFFRES & STATS ───────────────────────
  {id:179,cat:'CHIFFRES',title:'2,4 milliards de chrétiens',fact:'Il y a environ 2,4 milliards de chrétiens dans le monde, soit environ 31% de la population mondiale.',src:''},
  {id:180,cat:'CHIFFRES',title:'1,3 milliard de catholiques',fact:'Le catholicisme est la plus grande branche chrétienne avec environ 1,3 milliard de fidèles.',src:''},
  {id:181,cat:'CHIFFRES',title:'900 millions de protestants',fact:'Le protestantisme compte quelque 900 millions de fidèles répartis en des milliers de dénominations.',src:''},
  {id:182,cat:'CHIFFRES',title:'45 000 dénominations',fact:'Il existe plus de 45 000 dénominations chrétiennes différentes dans le monde selon certaines études.',src:''},
  {id:183,cat:'CHIFFRES',title:'Le Brésil, premier catholique',fact:'Le Brésil est le pays catholique le plus peuplé au monde.',src:''},
  {id:184,cat:'CHIFFRES',title:'L\'Afrique, croissance record',fact:'L\'Afrique subsaharienne est la région à la croissance chrétienne la plus rapide au XXIe siècle.',src:''},
  {id:185,cat:'CHIFFRES',title:'L\'Éthiopie, IVe siècle',fact:'L\'Éthiopie abrite l\'une des plus anciennes Églises chrétiennes : l\'Église orthodoxe éthiopienne, fondée au IVe siècle.',src:''},
  // ── CURIOSITÉS ─────────────────────────────
  {id:186,cat:'CURIOSITES',title:'Amen et Alléluia',fact:'"Amen" vient de l\'hébreu et signifie "qu\'il en soit ainsi". "Alléluia" vient de hallelu Yah : "louez l\'Éternel".',src:''},
  {id:187,cat:'CURIOSITES',title:'Babel et la Pentecôte',fact:'La Pentecôte est souvent vue comme le renversement exact de Babel : confusion des langues → compréhension universelle.',src:'Genèse 11 / Actes 2'},
  {id:188,cat:'CURIOSITES',title:'Le voile du Temple déchiré',fact:'Lors de la mort de Jésus, le voile du Temple se déchira — symbole de l\'accès direct à Dieu désormais ouvert à tous.',src:'Matthieu 27:51'},
  {id:189,cat:'CURIOSITES',title:'Ecclésiaste 1:9',fact:'"Il n\'y a rien de nouveau sous le soleil" (Ecclésiaste 1:9) — peut-être la phrase de sagesse biblique la plus citée hors contexte.',src:'Ecclésiaste 1:9'},
  {id:190,cat:'CURIOSITES',title:'Les premières cloches',fact:'La tradition des cloches d\'église pour appeler à la prière remonte au VIe siècle en Occident.',src:''},
  {id:191,cat:'CURIOSITES',title:'Le dimanche, jour de résurrection',fact:'Les premiers chrétiens se réunissaient le dimanche (premier jour de la semaine) en mémoire de la résurrection.',src:''},
  {id:192,cat:'CURIOSITES',title:'Carême et Ramadan',fact:'Le jeûne du Ramadan a un équivalent dans le Carême chrétien — les deux traditions valorisent purification et prière.',src:''},
  {id:193,cat:'CURIOSITES',title:'Jean 1:1, incipit dense',fact:'"Au commencement était la Parole" (Jean 1:1) est l\'un des incipit les plus philosophiquement denses de toute la littérature.',src:'Jean 1:1'},
  {id:194,cat:'CURIOSITES',title:'La dernière promesse',fact:'La Bible se termine sur une promesse : "Je viens bientôt" (Apocalypse 22:20) — et sur la réponse humaine : "Viens, Seigneur Jésus."',src:'Apocalypse 22:20'},
  {id:195,cat:'CURIOSITES',title:'Trèfle et Trinité',fact:'Saint Patrick utilisa le trèfle à trois feuilles pour expliquer la Trinité aux Irlandais.',src:''},
  {id:196,cat:'CURIOSITES',title:'Charlemagne ne savait pas écrire',fact:'Charlemagne ne savait pas écrire mais plaçait la foi chrétienne au cœur de son projet politique.',src:''},
  {id:197,cat:'CURIOSITES',title:'La Couronne d\'Épines',fact:'La Couronne d\'Épines est conservée à Notre-Dame de Paris depuis 1239. Louis IX construisit la Sainte-Chapelle pour l\'abriter.',src:''},
  // ── ART & CULTURE ──────────────────────────
  {id:198,cat:'ART',title:'La Chapelle Sixtine',fact:'Michel-Ange peignit le plafond de la Chapelle Sixtine entre 1508 et 1512, représentant des scènes de la Genèse.',src:''},
  {id:199,cat:'ART',title:'La Pietà de Michel-Ange',fact:'La Pietà de Michel-Ange (1499) représente Marie tenant le corps du Christ — chef-d\'œuvre absolu de la sculpture.',src:''},
  {id:200,cat:'ART',title:'La Cène de Léonard',fact:'La Cène de Léonard de Vinci (1495-1498) est l\'une des peintures les plus reproduites au monde.',src:''},
  {id:201,cat:'ART',title:'Les cathédrales gothiques',fact:'Les cathédrales gothiques médiévales étaient conçues pour élever l\'âme vers Dieu par leur hauteur vertigineuse.',src:''},
  {id:202,cat:'ART',title:'Les vitraux, Bible des illettrés',fact:'Les vitraux des cathédrales illustraient des histoires bibliques pour les fidèles qui ne savaient pas lire.',src:''},
  {id:203,cat:'ART',title:'Bach, Soli Deo Gloria',fact:'La musique de Jean-Sébastien Bach est profondément imprégnée de foi luthérienne — il signait ses œuvres Soli Deo Gloria.',src:''},
  {id:204,cat:'ART',title:'Le Messie de Haendel',fact:'Le Messie de Haendel (1741) contient l\'Alléluia, l\'un des chœurs les plus célèbres de l\'histoire musicale.',src:''},
  {id:205,cat:'ART',title:'Dante et la théologie',fact:'Dante Alighieri s\'inspira profondément de la théologie chrétienne médiévale pour écrire La Divine Comédie.',src:''},
  {id:206,cat:'ART',title:'Dostoïevski, foi orthodoxe',fact:'Dostoïevski, profondément chrétien orthodoxe, plaça la foi au cœur de ses grands romans (L\'Idiot, Les Frères Karamazov).',src:''},
  {id:207,cat:'ART',title:'C.S. Lewis et Narnia',fact:'C.S. Lewis, auteur des Chroniques de Narnia, était un apologète chrétien fervent et auteur de Mere Christianity.',src:''},
  // ── CHRISTIANISME & SCIENCE ────────────────
  {id:208,cat:'SCIENCE',title:'Roger Bacon, méthode expérimentale',fact:'Roger Bacon, frère franciscain du XIIIe siècle, est l\'un des pionniers de la méthode expérimentale.',src:''},
  {id:209,cat:'SCIENCE',title:'Copernic, chanoine héliocentrique',fact:'Nicolas Copernic (1473-1543), chanoine catholique, développa la théorie héliocentrique.',src:''},
  {id:210,cat:'SCIENCE',title:'Mendel, moine et génétique',fact:'Gregor Mendel, moine augustinien, découvrit les lois de la génétique en cultivant des pois dans son monastère.',src:''},
  {id:211,cat:'SCIENCE',title:'Lemaître, père du Big Bang',fact:'Georges Lemaître, prêtre catholique belge, proposa en 1927 la théorie du Big Bang avant même Hubble.',src:''},
  {id:212,cat:'SCIENCE',title:'Pie XII et le Big Bang',fact:'Pie XII reconnut en 1951 que la théorie du Big Bang était compatible avec la création biblique.',src:''},
  {id:213,cat:'SCIENCE',title:'Pascal, catholique et mathématicien',fact:'Blaise Pascal, catholique fervent, fit des contributions majeures aux mathématiques, à la physique et à la philosophie.',src:''},
  {id:214,cat:'SCIENCE',title:'Newton et la théologie',fact:'Isaac Newton consacra plus de temps à la théologie et à l\'interprétation de la Bible qu\'à la physique.',src:''},
  {id:215,cat:'SCIENCE',title:'Faraday, chrétien dévot',fact:'Michael Faraday, grand physicien du XIXe siècle, était un chrétien dévot et membre d\'une Église protestante stricte.',src:''},
  {id:216,cat:'SCIENCE',title:'Francis Collins, génome humain',fact:'Francis Collins, directeur du Projet Génome Humain, est un chrétien évangélique et auteur de Le langage de Dieu.',src:''},
  {id:217,cat:'SCIENCE',title:'L\'Observatoire du Vatican',fact:'L\'Observatoire du Vatican existe depuis 1891 — l\'Église catholique a une tradition astronomique notable.',src:''},
  // ── PRIÈRES & SPIRITUALITÉ ─────────────────
  {id:218,cat:'PRIERES',title:'Psaume 23, le plus mémorisé',fact:'"L\'Éternel est mon berger" (Psaume 23) est le texte biblique le plus mémorisé au monde.',src:'Psaume 23'},
  {id:219,cat:'PRIERES',title:'Commandement central',fact:'"Aimez-vous les uns les autres comme je vous ai aimés" (Jean 13:34) est le commandement central de Jésus.',src:'Jean 13:34'},
  {id:220,cat:'PRIERES',title:'"La vérité vous rendra libres"',fact:'"La vérité vous rendra libres" (Jean 8:32) est l\'une des citations de Jésus les plus reprises hors contexte religieux.',src:'Jean 8:32'},
  {id:221,cat:'PRIERES',title:'Prière de Saint François',fact:'La prière de Saint François d\'Assise ("Seigneur, fais de moi un instrument de ta paix") est connue dans le monde entier.',src:''},
  {id:222,cat:'PRIERES',title:'Les Béatitudes',fact:'Les Béatitudes (Matthieu 5:3-12) forment le cœur de l\'éthique chrétienne — 8 bénédictions paradoxales.',src:'Matthieu 5:3-12'},
  {id:223,cat:'PRIERES',title:'"Aimez vos ennemis"',fact:'"Aimez vos ennemis" (Matthieu 5:44) est l\'un des enseignements les plus radicaux et distinctifs de Jésus.',src:'Matthieu 5:44'},
  {id:224,cat:'PRIERES',title:'1 Corinthiens 13 aux mariages',fact:'L\'Épître aux Corinthiens 13 ("L\'amour est patient…") est lue dans d\'innombrables mariages, même non pratiquants.',src:'1 Corinthiens 13'},
  {id:225,cat:'PRIERES',title:'La prière de Gethsémani',fact:'"Que ta volonté soit faite" — la prière de Gethsémani montre l\'humanité profonde de Jésus face à la mort imminente.',src:'Matthieu 26:39'},
  {id:226,cat:'PRIERES',title:'Kyrie Eleison',fact:'Le Kyrie Eleison ("Seigneur, prends pitié") est l\'une des plus vieilles invocations chrétiennes, venue du grec.',src:''},
  {id:227,cat:'PRIERES',title:'Proverbes 17:17',fact:'"L\'ami aime en tout temps, et le frère est né pour l\'adversité" — sagesse sociale intemporelle.',src:'Proverbes 17:17'},
  {id:228,cat:'PRIERES',title:'Jean 3:16, la petite Bible',fact:'"Dieu a tant aimé le monde…" — Luther appelait Jean 3:16 "la petite Bible", résumé de tout l\'Évangile.',src:'Jean 3:16'},
];

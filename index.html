  {id:438,text:"Quelle est la lettre la plus courte de Paul, adressée à un chrétien pour qu'il reprenne son esclave fugitif ?",options:["Tite","2 Jean","Philémon","Jude"],answer:"Philémon",explanation:"Philémon est une lettre personnelle d'une seule page — Paul intercède pour l'esclave Onésime et demande subtilement sa libération.",reference:"Philémon 1:10-16",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:439,text:"Dans la lettre aux Colossiens, comment Paul décrit-il le Christ par rapport à la création ?",options:["'Né avant tous les siècles'","'Premier-né de toute créature, en lui toutes choses ont été créées'","'Seigneur de la gloire'","'Agneau de Dieu'"],answer:"'Premier-né de toute créature, en lui toutes choses ont été créées'",explanation:"Colossiens 1:15-20 est le grand hymne cosmique paulinien — Christ est la tête de la création et de l'Église, en lui réside la plénitude (pleroma).",reference:"Colossiens 1:15",theme:"APOTRES",difficulty:"AVANCE"},
  {id:440,text:"Quelles sont les deux lettres de Paul dites 'pastorales' adressées à des chefs d'Église ?",options:["Éphésiens et Colossiens","Timothée et Tite","1 et 2 Thessaloniciens","Philippiens et Philémon"],answer:"Timothée et Tite",explanation:"1 et 2 Timothée et Tite (les trois 'pastorales') donnent des instructions sur l'organisation ecclésiastique, les ministères et la lutte contre les faux docteurs.",reference:"1 Timothée 1:1",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},

  // ─── APOCALYPSE ─────────────────────────────────────────────────────────
  {id:441,text:"À qui Jean adresse-t-il l'Apocalypse au début du livre ?",options:["Les 12 apôtres","Les sept Églises d'Asie","L'Église de Rome","Tous les chrétiens du monde"],answer:"Les sept Églises d'Asie",explanation:"Apocalypse 1:4 — sept lettres aux sept Églises (Éphèse, Smyrne, Pergame, Thyatire, Sardes, Philadelphie, Laodicée) ouvrent le livre.",reference:"Apocalypse 1:4",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
  {id:442,text:"Que signifie le nombre 666 dans l'Apocalypse ?",options:["Le nombre de l'antéchrist","Le nombre de la Bête, probablement un code (gématrie) pour Néron César","Le nombre des démons","Le nombre des années avant la fin"],answer:"Le nombre de la Bête, probablement un code (gématrie) pour Néron César",explanation:"Apocalypse 13:18 — en gématrie hébraïque, 'Nrwn Qsr' (Néron César) donne 666. C'est le principal candidat selon la plupart des exégètes contemporains.",reference:"Apocalypse 13:18",theme:"APOCALYPSE",difficulty:"AVANCE"},
  {id:443,text:"Quelle est la 'Babylone' de l'Apocalypse ?",options:["La ville de Babylone reconstruite","Rome impériale idolâtre","Jérusalem corrompue","Une ville de l'avenir"],answer:"Rome impériale idolâtre",explanation:"Apocalypse 17-18 décrit 'Babylone la Grande' — le contexte du 1er siècle et les allusions à Rome (sept collines, en 17:9) le confirment.",reference:"Apocalypse 17:9",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
  {id:444,text:"Combien de sceaux le Livre de l'Agneau contient-il dans l'Apocalypse ?",options:["4","6","7","12"],answer:"7",explanation:"Les sept sceaux (Ap 6-8) révèlent progressivement les jugements divins sur l'histoire — structure septiforme caractéristique de l'Apocalypse.",reference:"Apocalypse 5:1",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
  {id:445,text:"Quelle est la 'Jérusalem nouvelle' dans l'Apocalypse 21 ?",options:["La ville reconstruite par les Israélites","La cité céleste qui descend du ciel — la demeure définitive de Dieu avec les hommes","Le Temple eschatologique","La Terre promise éternelle"],answer:"La cité céleste qui descend du ciel — la demeure définitive de Dieu avec les hommes",explanation:"Apocalypse 21:2-3 : 'Voici le tabernacle de Dieu avec les hommes' — l'Emmanuel final, accomplissement de toute la révélation biblique.",reference:"Apocalypse 21:2",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
  {id:446,text:"Que signifie 'Alpha et Oméga' dans l'Apocalypse ?",options:["Les première et dernière lettres de l'alphabet grec, signifiant que Dieu est le commencement et la fin","Un titre angélique","Un symbole de la Trinité","Le nom secret de Dieu"],answer:"Les première et dernière lettres de l'alphabet grec, signifiant que Dieu est le commencement et la fin",explanation:"Apocalypse 1:8 et 21:6 — ce titre affirme la souveraineté divine sur toute l'histoire.",reference:"Apocalypse 1:8",theme:"APOCALYPSE",difficulty:"DEBUTANT"},
  {id:447,text:"Quel animal représente l'évangéliste Marc dans la symbolique de l'Apocalypse ?",options:["L'aigle","Le taureau","Le lion","L'homme"],answer:"Le lion",explanation:"Les quatre vivants d'Ézéchiel 1 et d'Apocalypse 4 ont été associés aux quatre évangélistes : Matthieu=homme, Marc=lion, Luc=taureau, Jean=aigle.",reference:"Apocalypse 4:7",theme:"APOCALYPSE",difficulty:"AVANCE"},
  {id:448,text:"Quel est le 'millénium' dans l'Apocalypse 20 ?",options:["Mille ans de règne du Christ sur la terre","La durée totale de l'histoire humaine","Mille ans de persécution","La période entre la résurrection et le Jugement final"],answer:"Mille ans de règne du Christ sur la terre",explanation:"Apocalypse 20:4-6 — trois grandes interprétations : prémillénarisme (règne terrestre littéral), amillénarisme (présent symbolique) et postmillénarisme.",reference:"Apocalypse 20:4",theme:"APOCALYPSE",difficulty:"AVANCE"},
  {id:449,text:"Que représentent les 'vingt-quatre anciens' devant le trône dans l'Apocalypse ?",options:["Les 12 apôtres et 12 patriarches — l'Israël et l'Église réunis","24 anges principaux","Les martyrs des premiers siècles","Les 24 livres de la Bible hébraïque"],answer:"Les 12 apôtres et 12 patriarches — l'Israël et l'Église réunis",explanation:"Apocalypse 4:4 — la représentation symbolique de la totalité du peuple de Dieu (AT + NT) adorant autour du trône.",reference:"Apocalypse 4:4",theme:"APOCALYPSE",difficulty:"AVANCE"},
  {id:450,text:"Quelle est la dernière parole de la Bible ?",options:["'Amen'","'Viens, Seigneur Jésus'","'La grâce du Seigneur Jésus soit avec tous'","'Maranatha'"],answer:"'La grâce du Seigneur Jésus soit avec tous'",explanation:"Apocalypse 22:21 — le livre se clôt par une bénédiction liturgique, cohérente avec le cadre de lecture communautaire de l'Apocalypse.",reference:"Apocalypse 22:21",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},

  // ─── APÔTRES — Actes et épîtres catholiques ─────────────────────────────
  {id:451,text:"Quel est le discours de Pierre lors de la Pentecôte qui convertit 3000 personnes ?",options:["Actes 1","Actes 2","Actes 3","Actes 4"],answer:"Actes 2",explanation:"Actes 2:14-41 — Pierre cite Joël 2 et Psaume 16 pour proclamer la résurrection du Christ. 3000 se font baptiser.",reference:"Actes 2:41",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:452,text:"Quel est le premier martyr chrétien mentionné dans le Nouveau Testament ?",options:["Jean","Jacques, fils de Zébédée","Étienne","Pierre"],answer:"Étienne",explanation:"Étienne (Actes 7) est lapidé après un long discours devant le Sanhédrin — Saül de Tarse assiste à son exécution.",reference:"Actes 7:59",theme:"APOTRES",difficulty:"DEBUTANT"},
  {id:453,text:"Où Paul reçoit-il sa révélation du Christ ressuscité ?",options:["À Jérusalem","Sur la route de Damas","À Antioche","Dans le désert d'Arabie"],answer:"Sur la route de Damas",explanation:"Actes 9:3-6 — une lumière aveuglante et une voix : 'Saul, Saul, pourquoi me persécutes-tu ?' C'est le retournement le plus célèbre de l'histoire religieuse.",reference:"Actes 9:3",theme:"APOTRES",difficulty:"DEBUTANT"},
  {id:454,text:"Lors du concile de Jérusalem (Actes 15), quelle décision est prise concernant les convertis d'entre les nations ?",options:["Ils doivent être circoncis","Ils doivent observer toute la Torah","Ils sont exemptés de la circoncision mais doivent éviter l'idolâtrie, la fornication et le sang","Ils sont pleinement libres de tout observance"],answer:"Ils sont exemptés de la circoncision mais doivent éviter l'idolâtrie, la fornication et le sang",explanation:"Actes 15:19-20 — compromis fondateur de la mission aux nations : pas de circoncision, mais une éthique minimale préserve la fraternité judéo-chrétienne.",reference:"Actes 15:19-20",theme:"APOTRES",difficulty:"AVANCE"},
  {id:455,text:"Devant quel tribunal Paul se défend-il à Athènes en citant un poète grec ?",options:["Le Sanhédrin","L'Aréopage","Le Sénat romain","La synagogue"],answer:"L'Aréopage",explanation:"Actes 17:22-31 — discours apologétique modèle : Paul part de l'autel 'Au dieu inconnu' et cite Aratos ('Nous sommes de sa race').",reference:"Actes 17:22",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:456,text:"Quel est le thème central de la lettre aux Hébreux ?",options:["La justification par la foi","Le Christ comme Grand Prêtre parfait et sa médiation supérieure à l'ancienne alliance","La parousie","La vie en communauté"],answer:"Le Christ comme Grand Prêtre parfait et sa médiation supérieure à l'ancienne alliance",explanation:"Hébreux argumente point par point que Jésus est supérieur aux anges, à Moïse, à Aaron — son sacrifice unique remplace tous les sacrifices lévitiques.",reference:"Hébreux 4:14",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:457,text:"Quel célèbre chapitre de l'épître aux Hébreux est consacré aux 'héros de la foi' de l'Ancien Testament ?",options:["Hébreux 9","Hébreux 10","Hébreux 11","Hébreux 12"],answer:"Hébreux 11",explanation:"'La foi, c'est la substance des choses qu'on espère' (He 11:1) — suivi d'un catalogue d'Abel à Abraham, Moïse et les prophètes, tous morts dans la foi sans voir l'accomplissement.",reference:"Hébreux 11:1",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:458,text:"Quelle est la thèse centrale de la lettre de Jacques ?",options:["La foi seule justifie","La foi sans les œuvres est morte","L'espérance dans la souffrance","La prière guérit"],answer:"La foi sans les œuvres est morte",explanation:"Jacques 2:17-20 — en tension apparente avec Paul (qui oppose foi et œuvres de la Loi), Jacques souligne que la foi authentique produit nécessairement des actes.",reference:"Jacques 2:17",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:459,text:"Quelle promesse Pierre cite-t-il dans sa deuxième épître sur l'origine des prophéties ?",options:["Les prophètes ont parlé sous inspiration humaine","Aucune prophétie n'est issue d'une interprétation personnelle — les hommes ont parlé de la part de Dieu, poussés par l'Esprit","Les apôtres ont amélioré les prophéties anciennes","Les prophéties s'accomplissent toutes dans le NT"],answer:"Aucune prophétie n'est issue d'une interprétation personnelle — les hommes ont parlé de la part de Dieu, poussés par l'Esprit",explanation:"2 Pierre 1:20-21 — l'une des affirmations les plus claires du NT sur l'inspiration biblique.",reference:"2 Pierre 1:20-21",theme:"APOTRES",difficulty:"AVANCE"},
  {id:460,text:"Quel est le message central de la première lettre de Jean ?",options:["La persévérance dans la tribulation","Dieu est amour — discerner les esprits et demeurer dans l'amour fraternel","Le retour imminent du Christ","La lutte contre la gnose"],answer:"Dieu est amour — discerner les esprits et demeurer dans l'amour fraternel",explanation:"1 Jean 4:8 — 'Dieu est amour' est l'une des définitions les plus condensées de la nature divine dans toute la Bible.",reference:"1 Jean 4:8",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},

  // ─── HISTOIRE supplémentaires ────────────────────────────────────────────
  {id:461,text:"Quelle reine perse d'origine juive sauve son peuple d'un génocide ?",options:["Ruth","Déborah","Esther","Judith"],answer:"Esther",explanation:"Esther risque sa vie en approchant le roi Assuérus sans y être invitée pour déjouer le complot d'Aman contre les Juifs.",reference:"Esther 4:16",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:462,text:"Quelle héroïne du livre deutérocanonique coupe la tête du général assyrien Holopherne ?",options:["Esther","Rahab","Déborah","Judith"],answer:"Judith",explanation:"Judith (livre deutérocanonique) s'introduit dans le camp assyrien, enivré Holopherne et le décapite, sauvant la ville de Béthulie.",reference:"Judith 13:8",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:463,text:"Quel livre de la Bible raconte la résistance des Maccabées contre l'hellénisation forcée ?",options:["Esdras","Néhémie","1 Maccabées","Daniel"],answer:"1 Maccabées",explanation:"1 Maccabées relate la révolte des Hasmonéens (167-160 av. J.-C.) contre Antiochus IV Épiphane qui avait profané le Temple.",reference:"1 Maccabées 1:41",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:464,text:"Quelle fête juive commémore la dédicace du Temple après sa profanation par Antiochus IV ?",options:["Souccot","Pourim","Hanoukka","Rosh Hashana"],answer:"Hanoukka",explanation:"La fête des Lumières (Hanoukka) célèbre la rededication du Temple en 164 av. J.-C. et le miracle de l'huile — contexte des 1 Maccabées.",reference:"1 Maccabées 4:56-59",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:465,text:"Qui est le père des Maccabées qui initie la révolte contre Antiochus IV ?",options:["Judas Maccabée","Mattathias","Jonathan","Simon"],answer:"Mattathias",explanation:"Mattathias refuse de sacrifier aux idoles et tue un officier grec — son acte déclenche la révolte. Ses cinq fils, dont Judas, poursuivent le combat.",reference:"1 Maccabées 2:24-26",theme:"HISTOIRE",difficulty:"AVANCE"},
  {id:466,text:"Quel personnage du NT est procurateur romain lors du procès de Jésus ?",options:["Tibère","Hérode","Ponce Pilate","Caïphe"],answer:"Ponce Pilate",explanation:"Ponce Pilate est procurateur de Judée de 26 à 36 ap. J.-C. Sa mention dans le Credo lui confère une permanence historique inattendue.",reference:"Jean 18:29",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:467,text:"En quelle année le Temple de Jérusalem est-il détruit par les Romains ?",options:["63 av. J.-C.","30 ap. J.-C.","70 ap. J.-C.","135 ap. J.-C."],answer:"70 ap. J.-C.",explanation:"Titus détruit le Temple lors de la première guerre judéo-romaine — événement prédit par Jésus en Marc 13:2 et vécu comme le jugement annoncé.",reference:"Marc 13:2",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:468,text:"Quel apôtre est décapité à Rome sous l'ordre de Néron selon la tradition ?",options:["Pierre","Jean","Paul","André"],answer:"Paul",explanation:"La tradition et Clément de Rome (vers 96) confirment le martyre de Paul à Rome — décapité car citoyen romain, contrairement à Pierre crucifié.",reference:"2 Timothée 4:6-8",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:469,text:"Quel est le nom de la mer que Jésus appelle parfois 'lac de Gennesareth' ?",options:["Mer Morte","Mer de Galilée / Lac de Tibériade","Mer Méditerranée","Lac Houlé"],answer:"Mer de Galilée / Lac de Tibériade",explanation:"Ce 'lac' est appelé mer de Galilée (Mt), lac de Gennesareth (Lc) ou mer de Tibériade (Jn) — théâtre principal du ministère de Jésus en Galilée.",reference:"Luc 5:1",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:470,text:"Combien d'évangiles compte le Nouveau Testament canonique ?",options:["2","3","4","5"],answer:"4",explanation:"Matthieu, Marc, Luc et Jean — les quatre évangiles canoniques reconnus par le concile de Carthage (397 ap. J.-C.).",reference:"Matthieu 1:1",theme:"HISTOIRE",difficulty:"DEBUTANT"},

  // ─── CRÉATION / THÉOLOGIE ────────────────────────────────────────────────
  {id:471,text:"Quelle est l'interprétation théologique du 'septième jour' dans la Genèse ?",options:["Un jour de travail réduit","Le jour où Dieu se repose et bénit — fondement du shabbat","Un jour de sacrifice","Le jour de la création de l'homme"],answer:"Le jour où Dieu se repose et bénit — fondement du shabbat",explanation:"Genèse 2:1-3 — Dieu ne se repose pas parce qu'il est fatigué mais sanctifie le repos comme rythme inscrit dans la création elle-même.",reference:"Genèse 2:3",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:472,text:"Quel est le sens théologique de la dénomination de l'homme et des animaux par Adam dans la Genèse ?",options:["Un acte magique de création","L'exercice d'une autorité et d'une intelligence données par Dieu","Un rite de passage initiatique","Une preuve de la supériorité humaine"],answer:"L'exercice d'une autorité et d'une intelligence données par Dieu",explanation:"Genèse 2:19-20 — nommer signifie connaître et ordonner. L'homme est le co-gérant de la création, pas son propriétaire absolu.",reference:"Genèse 2:19",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:473,text:"Que signifie 'imago Dei' dans le contexte de Genèse 1:26-27 ?",options:["L'homme est une copie physique de Dieu","L'homme est créé à l'image et ressemblance de Dieu — porteur de sa dignité et de sa capacité relationnelle","L'homme est divin par nature","L'homme est l'esclave de Dieu"],answer:"L'homme est créé à l'image et ressemblance de Dieu — porteur de sa dignité et de sa capacité relationnelle",explanation:"Imago Dei est le fondement de la dignité humaine dans la tradition judéo-chrétienne — base théologique des droits de l'homme.",reference:"Genèse 1:26-27",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:474,text:"Quel est le péché originel selon le récit de Genèse 3 ?",options:["La désobéissance à une règle arbitraire","Vouloir être 'comme Dieu' en se soustrayant à sa dépendance créaturelle","Manger de la viande","Construire des villes"],answer:"Vouloir être 'comme Dieu' en se soustrayant à sa dépendance créaturelle",explanation:"Genèse 3:5 — 'vous serez comme des dieux, connaissant le bien et le mal' : le serpent propose l'autonomie absolue, refus de la condition créée.",reference:"Genèse 3:5",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:475,text:"Quel est le signe de l'alliance de Dieu avec Abraham dans la Genèse ?",options:["L'arc-en-ciel","La circoncision","Le sacrifice de l'agneau","L'huile d'onction"],answer:"La circoncision",explanation:"Genèse 17:11 — la circoncision est le signe inscrit dans la chair de l'alliance abrahamique, distinct de l'arc-en-ciel (alliance noachique).",reference:"Genèse 17:11",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:476,text:"Quel est le nom divin révélé à Moïse au buisson ardent ?",options:["Elohim","Adonaï","YHWH ('Je suis celui qui suis')","El Shaddai"],answer:"YHWH ('Je suis celui qui suis')",explanation:"Exode 3:14 — le tétragramme YHWH révèle un Dieu qui se définit par son être même et sa présence fidèle : 'Je serai avec toi.'",reference:"Exode 3:14",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:477,text:"Quelle est la différence entre les deux récits de création dans la Genèse ?",options:["Il n'y en a qu'un","Genèse 1 est élohiste (cosmique, litanique) ; Genèse 2 est yahwiste (intime, l'homme au centre)","Genèse 1 est historique ; Genèse 2 est symbolique","Genèse 1 parle de la matière ; Genèse 2 de l'âme"],answer:"Genèse 1 est élohiste (cosmique, litanique) ; Genèse 2 est yahwiste (intime, l'homme au centre)",explanation:"Les exégètes distinguent deux traditions littéraires : le récit sacerdotal (P) de Gn 1 et le récit jahviste (J) de Gn 2 — complémentaires théologiquement.",reference:"Genèse 1-2",theme:"CREATION",difficulty:"AVANCE"},
  {id:478,text:"Quel est le nom de la première femme dans la Bible ?",options:["Lilith","Ève","Sara","Noa"],answer:"Ève",explanation:"Genèse 3:20 — Adam appelle sa femme Ève (Hava, 'la mère de tous les vivants') après la chute.",reference:"Genèse 3:20",theme:"CREATION",difficulty:"DEBUTANT"},
  {id:479,text:"Combien de générations séparent Adam de Noé selon la Genèse ?",options:["5","7","10","12"],answer:"10",explanation:"Genèse 5 liste dix générations d'Adam à Noé — ces longues généalogies marquent une époque primordiale hors du temps ordinaire.",reference:"Genèse 5",theme:"CREATION",difficulty:"AVANCE"},
  {id:480,text:"Qu'est-ce que l'Alliance mosaïque (de Sinaï) ajoute à l'Alliance abrahamique ?",options:["Un territoire nouveau","La Torah comme charte de vie pour le peuple sauvé — la Loi structure la vie de l'alliance déjà donnée","Un nouveau signe dans la chair","La promesse d'un roi"],answer:"La Torah comme charte de vie pour le peuple sauvé — la Loi structure la vie de l'alliance déjà donnée",explanation:"L'alliance du Sinaï n'annule pas Abraham — elle en précise la vie concrète : Dieu a sauvé, maintenant il enseigne comment vivre en liberté.",reference:"Exode 19:5-6",theme:"CREATION",difficulty:"AVANCE"},

  // ─── VIE DE JÉSUS compléments ────────────────────────────────────────────
  {id:481,text:"Dans quel évangile Jésus prononce-t-il les 'sept paroles de la croix' au nombre le plus élevé ?",options:["Matthieu","Luc et Jean combinés","Jean seul","Marc"],answer:"Luc et Jean combinés",explanation:"Les sept paroles sont réparties entre tous les évangiles — Luc donne 'Père, pardonne-leur', 'Aujourd'hui tu seras avec moi en paradis', et 'Père, en tes mains...' ; Jean en fournit quatre autres.",reference:"Luc 23:34",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
  {id:482,text:"Qu'est-ce que le 'Royaume de Dieu' dans la prédication de Jésus ?",options:["Un État politique juif indépendant","La règne de Dieu qui advient — déjà présent mais pas encore accompli","Le paradis après la mort","L'Église catholique"],answer:"La règne de Dieu qui advient — déjà présent mais pas encore accompli",explanation:"Le Royaume (basileia) est le fil conducteur de tout l'enseignement de Jésus — tension 'déjà là' (Lc 17:21) et 'pas encore' (Mt 6:10).",reference:"Marc 1:15",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:483,text:"Quel est le sens du mot 'Christ' ?",options:["Sauveur","Fils de Dieu","Oint (Messie en grec)","Maître"],answer:"Oint (Messie en grec)",explanation:"'Christ' est la translittération grecque de 'Mashiah' (Messie) — celui qui a reçu l'onction royale, prophétique ou sacerdotale de Dieu.",reference:"Jean 1:41",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
  {id:484,text:"Quel apôtre reconnaît Jésus comme 'le Christ, le Fils du Dieu vivant' à Césarée de Philippe ?",options:["Jean","André","Pierre","Philippe"],answer:"Pierre",explanation:"Matthieu 16:16 — Pierre reçoit en réponse la promesse : 'Tu es Pierre, et sur cette roche je bâtirai mon Église.'",reference:"Matthieu 16:16",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
  {id:485,text:"Combien de fois Pierre renie-t-il Jésus avant le chant du coq ?",options:["1","2","3","4"],answer:"3",explanation:"Les trois reniements de Pierre (Mt 26:69-75) répondent aux trois questions de Jésus ressuscité 'M'aimes-tu ?' (Jn 21) — une réhabilitation symétrique.",reference:"Matthieu 26:75",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},

  // ─── APÔTRES compléments ─────────────────────────────────────────────────
  {id:486,text:"Quelle est la profession initiale de Matthieu avant d'être appelé par Jésus ?",options:["Pêcheur","Collecteur d'impôts","Charpentier","Médecin"],answer:"Collecteur d'impôts",explanation:"Matthieu (Lévi) était publicain — collecteur collaborant avec Rome, méprisé des Juifs pieux. Son appel illustre la grâce qui choisit les exclus.",reference:"Matthieu 9:9",theme:"APOTRES",difficulty:"DEBUTANT"},
  {id:487,text:"Qui est l'auteur du livre des Actes des Apôtres ?",options:["Marc","Luc","Jean","Barnabas"],answer:"Luc",explanation:"Luc-Actes forme un diptyque — même dédicataire (Théophile), même style, continuité narrative. Luc est compagnon de Paul (Colossiens 4:14).",reference:"Actes 1:1",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:488,text:"Quelle est la signification du nom 'Barnabas' donné par les apôtres à Joseph de Chypre ?",options:["Homme de paix","Fils de consolation / d'encouragement","Serviteur de Dieu","Frère des nations"],answer:"Fils de consolation / d'encouragement",explanation:"Actes 4:36 — Barnabas vend un champ et en remet le prix aux apôtres. Il sera l'introducteur de Paul à Jérusalem et son compagnon de mission.",reference:"Actes 4:36",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:489,text:"Dans quel texte Paul dit-il avoir reçu l'Évangile non d'un homme mais par révélation de Jésus-Christ ?",options:["1 Corinthiens 15","Romains 1","Galates 1","Éphésiens 3"],answer:"Galates 1",explanation:"Galates 1:11-12 — Paul défend l'indépendance de son Évangile face aux judéo-chrétiens qui contestent son autorité apostolique.",reference:"Galates 1:11-12",theme:"APOTRES",difficulty:"AVANCE"},
  {id:490,text:"Quelle vision Pierre reçoit-il à Joppé qui l'amène à baptiser le centurion Corneille ?",options:["Une nappe descenant du ciel avec des animaux impurs","Un ange lui ordonnant de se rendre à Césarée","Un rêve de la croix","La voix de Jésus lui parlant"],answer:"Une nappe descenant du ciel avec des animaux impurs",explanation:"Actes 10:11-16 — 'Ce que Dieu a purifié, ne le dis pas impur' — la vision lève les barrières alimentaires et ouvre la mission aux nations.",reference:"Actes 10:11",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},

  // ─── LOI compléments ─────────────────────────────────────────────────────
  {id:491,text:"Quel est le sens du terme 'alliance' (berît) dans la théologie biblique ?",options:["Un contrat commercial","Un accord de paix entre égaux","Un lien solennel, souvent asymétrique, établi par Dieu avec un individu ou un peuple","Un traité militaire"],answer:"Un lien solennel, souvent asymétrique, établi par Dieu avec un individu ou un peuple",explanation:"Les grandes alliances bibliques (Noé, Abraham, Sinaï, David, Nouvelle Alliance) structurent toute la révélation comme une histoire de relations et de fidélité.",reference:"Genèse 15:18",theme:"LOI",difficulty:"AVANCE"},
  {id:492,text:"Qu'est-ce que le 'Décalogue' ?",options:["Les sept fêtes juives","Les dix commandements donnés à Moïse","Les douze tribus d'Israël","Les cinq livres de la Torah"],answer:"Les dix commandements donnés à Moïse",explanation:"Décalogue vient du grec deka (dix) et logos (parole) — les dix paroles fondamentales de l'alliance mosaïque.",reference:"Exode 20:1-17",theme:"LOI",difficulty:"DEBUTANT"},
  {id:493,text:"Quelle est la loi du talion et son sens originel dans la Torah ?",options:["Une loi de vengeance illimitée","Un principe de proportionnalité — la peine doit être équivalente au préjudice, ni plus, ni moins","Une règle sur les blessures animales","Un code de commerce"],answer:"Un principe de proportionnalité — la peine doit être équivalente au préjudice, ni plus, ni moins",explanation:"'Œil pour œil, dent pour dent' (Exode 21:24) limite la vengeance en la rendant proportionnée — un progrès éthique sur la vengeance illimitée.",reference:"Exode 21:24",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:494,text:"Quel est le tabernacle (Mishkân) dans le contexte de l'Exode ?",options:["Le Temple de Salomon","La Tente de la rencontre, demeure provisoire de Dieu avec Israël au désert","La tente des Lévites","La tente du roi"],answer:"La Tente de la rencontre, demeure provisoire de Dieu avec Israël au désert",explanation:"Exode 25-40 décrit en détail le tabernacle portable — espace sacré où Dieu habite au milieu de son peuple.",reference:"Exode 25:8",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:495,text:"Quelle est la différence entre la sainteté rituelle et la sainteté éthique dans la Torah ?",options:["Il n'y a pas de différence dans la Torah","La sainteté rituelle concerne les rites (pureté, sacrifices) ; la sainteté éthique concerne la conduite sociale et morale — les deux sont liées","La sainteté rituelle est supérieure","La sainteté éthique a été introduite par les prophètes seulement"],answer:"La sainteté rituelle concerne les rites (pureté, sacrifices) ; la sainteté éthique concerne la conduite sociale et morale — les deux sont liées",explanation:"Le 'code de sainteté' de Lévitique 17-26 mêle les deux — 'Soyez saints car je suis saint' (Lv 19:2) précède immédiatement des lois sociales.",reference:"Lévitique 19:2",theme:"LOI",difficulty:"AVANCE"},

  // ─── HISTOIRE compléments ────────────────────────────────────────────────
  {id:496,text:"Quelle période de l'histoire d'Israël précède la royauté ?",options:["La période patriarcale","La période des Juges","La période du désert","La période des prophètes"],answer:"La période des Juges",explanation:"Après la conquête sous Josué, Israel est gouverné par des juges charismatiques avant de réclamer un roi — période de cycles 'péché/punition/repentir/délivrance'.",reference:"Juges 2:16",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:497,text:"Quelle est la signification théologique du mot 'Exode' pour la foi d'Israël ?",options:["Une simple migration de population","L'acte fondateur par lequel Dieu se révèle comme libérateur — mémoire centrale de l'identité israélite","Un événement purement mythologique","La conquête d'un territoire"],answer:"L'acte fondateur par lequel Dieu se révèle comme libérateur — mémoire centrale de l'identité israélite",explanation:"Tout le credo d'Israël se structure autour de l'Exode — 'Je suis l'Éternel ton Dieu qui t'ai fait sortir d'Égypte' (Ex 20:2) précède les commandements.",reference:"Exode 20:2",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:498,text:"Quel est le terme hébreu désignant le retour d'exil de Babylone ?",options:["Aliyah","Gaalah","Shivat Tzion ('retour vers Sion')","Kippur"],answer:"Shivat Tzion ('retour vers Sion')",explanation:"Le retour des exilés (538 av. J.-C.) est chanté dans Psaume 126 — 'Quand l'Éternel ramena les captifs de Sion, nous étions comme ceux qui rêvent.'",reference:"Psaume 126:1",theme:"HISTOIRE",difficulty:"AVANCE"},
  {id:499,text:"Quel roi judéen est emmené en captivité à Babylone mais finalement gracié et honoré à la cour ?",options:["Sédécias","Joachaz","Joïakîn (Yoyakhîn)","Manassé"],answer:"Joïakîn (Yoyakhîn)",explanation:"2 Rois 25:27-30 — Joïakîn, emmené en exil en 597, est libéré et invité à la table du roi babylonien. Ce détail est corroboré par des tablettes babyloniennes.",reference:"2 Rois 25:27",theme:"HISTOIRE",difficulty:"AVANCE"},
  {id:500,text:"Dans quel contexte politique Jésus est-il né selon Luc 2 ?",options:["Pendant la révolte des Maccabées","Sous le recensement de Quirinius, gouverneur de Syrie, pendant le règne d'Auguste","Pendant la guerre judéo-romaine","Sous le règne de Néron"],answer:"Sous le recensement de Quirinius, gouverneur de Syrie, pendant le règne d'Auguste",explanation:"Luc 2:1-2 ancre la naissance de Jésus dans l'histoire universelle — l'Empire romain fournit le contexte de la venue du vrai Roi.",reference:"Luc 2:1-2",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},

  // ─── SAGESSE compléments ─────────────────────────────────────────────────
  {id:501,text:"Quelle vertu Job manifeste-t-il face aux épreuves selon le premier chapitre du livre ?",options:["La résignation passive","La patience et l'adoration : 'L'Éternel a donné, l'Éternel a repris'","La révolte contre Dieu","La sagesse philosophique"],answer:"La patience et l'adoration : 'L'Éternel a donné, l'Éternel a repris'",explanation:"Job 1:21 — cette réaction initiale est exemplaire. Par la suite, les lamentations de Job montrent que la foi authentique peut aussi questionner Dieu.",reference:"Job 1:21",theme:"SAGESSE",difficulty:"DEBUTANT"},
  {id:502,text:"Qui répond finalement à Job du sein de la tempête ?",options:["Un ange","Élihu le quatrième ami","Dieu lui-même (YHWH)","Moïse"],answer:"Dieu lui-même (YHWH)",explanation:"Job 38-41 — Dieu ne répond pas aux arguments de Job mais lui ouvre la grandeur de la création. Job reconnaît Dieu sans avoir reçu d'explication.",reference:"Job 38:1",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
  {id:503,text:"Quel livre de l'AT est le plus proche d'une philosophie du bonheur et de la mort ?",options:["Proverbes","Job","Qohéleth","Siracide"],answer:"Qohéleth",explanation:"Qohéleth interroge le sens de l'action, du savoir, du plaisir et de la mort avec une lucidité qui dépasse la simple 'sagesse pratique' des Proverbes.",reference:"Qohéleth 1:2",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
  {id:504,text:"Quelle est la conclusion finale de Qohéleth après toutes ses interrogations ?",options:["Tout est vanité, donc rien ne vaut","Crains Dieu et observe ses commandements, car c'est là le tout de l'homme","Le plaisir est le seul bien réel","La sagesse ne sert à rien"],answer:"Crains Dieu et observe ses commandements, car c'est là le tout de l'homme",explanation:"Qohéleth 12:13 — malgré toutes les contradictions observées, la conclusion est théologique : la relation à Dieu donne sens à l'existence.",reference:"Qohéleth 12:13",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
{id:505,text:"Dans les Proverbes, comment est personnifiée la Sagesse aux chapitres 1-9 ?",options:["Comme un roi puissant","Comme une femme qui crie sur les places et invite au banquet","Comme un juge céleste","Comme un berger"],answer:"Comme une femme qui crie sur les places et invite au banquet",explanation:"Proverbes 8-9 — la Sagesse personnifiée (Hokhma) invite les hommes à son banquet. Les Pères de l'Église y lisent une préfiguration du Christ logos.",reference:"Proverbes 8:1",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},

  // ─── APOCALYPSE compléments ──────────────────────────────────────────────
  {id:506,text:"Quelle est la première des sept lettres aux Églises dans l'Apocalypse ?",options:["Éphèse","Smyrne","Laodicée","Pergame"],answer:"Éphèse",explanation:"Apocalypse 2:1-7 — l'Église d'Éphèse est louée pour sa persévérance mais reprochée d'avoir abandonné son premier amour.",reference:"Apocalypse 2:1",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
  {id:507,text:"Quelle Église est reprochée d'être 'tiède' — ni chaude ni froide ?",options:["Sardes","Smyrne","Laodicée","Thyatire"],answer:"Laodicée",explanation:"Apocalypse 3:15-16 — 'Parce que tu es tiède, je te vomirai de ma bouche.' L'image est géographiquement précise : Laodicée avait des eaux tièdes sulfureuses.",reference:"Apocalypse 3:16",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
  {id:508,text:"Que représente l'image de l'Agneau immolé debout au centre du trône dans l'Apocalypse ?",options:["Le Christ mort et ressuscité, souverain par son sacrifice","L'agneau pascal de l'Exode","Un ange gardien d'Israël","Le symbole de l'Église souffrante"],answer:"Le Christ mort et ressuscité, souverain par son sacrifice",explanation:"Apocalypse 5:6 — 'debout' signifie la résurrection, 'immolé' signifie la crucifixion. La paradoxe théologique : la victoire passe par la mort.",reference:"Apocalypse 5:6",theme:"APOCALYPSE",difficulty:"AVANCE"},
  {id:509,text:"Qui est la 'femme revêtue du soleil' dans Apocalypse 12 ?",options:["Marie seule","Israël / l'Église — une figure symbolique collective avec des résonances mariales","Babylone","Ève"],answer:"Israël / l'Église — une figure symbolique collective avec des résonances mariales",explanation:"Apocalypse 12:1 — les exégètes voient en elle Israël qui enfante le Messie (AT), puis l'Église persécutée (NT), avec des traits de Marie.",reference:"Apocalypse 12:1",theme:"APOCALYPSE",difficulty:"AVANCE"},
  {id:510,text:"Quel est le 'livre de vie' mentionné dans l'Apocalypse ?",options:["Le livre des péchés de l'humanité","Le registre de ceux dont le nom est écrit devant Dieu — les sauvés","La Torah céleste","Le livre des prophéties non accomplies"],answer:"Le registre de ceux dont le nom est écrit devant Dieu — les sauvés",explanation:"Apocalypse 20:15 — ceux dont le nom n'est pas inscrit dans le livre de vie sont jetés dans l'étang de feu. L'image vient de l'AT (Exode 32:32, Daniel 12:1).",reference:"Apocalypse 20:15",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},

  // ─── VIE DE JÉSUS compléments finaux ────────────────────────────────────
  {id:511,text:"Dans quel évangile Jésus lave-t-il les pieds de ses disciples lors de la Cène ?",options:["Matthieu","Marc","Luc","Jean"],answer:"Jean",explanation:"Jean 13:1-17 — à la place de l'institution de l'Eucharistie (récit synoptique), Jean place le lavement des pieds comme le geste symbolique de l'amour servant.",reference:"Jean 13:5",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:512,text:"Quel est le 'nouveau commandement' que Jésus donne lors de la Cène selon Jean 13 ?",options:["Aimez vos ennemis","Aimez-vous les uns les autres comme je vous ai aimés","Priez sans cesse","Portez la croix chaque jour"],answer:"Aimez-vous les uns les autres comme je vous ai aimés",explanation:"Jean 13:34 — 'nouveau' non par le contenu (déjà dans Lv 19:18) mais par la mesure : 'comme je vous ai aimés', c'est-à-dire jusqu'au don de soi.",reference:"Jean 13:34",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
  {id:513,text:"Quel titre Jésus utilise-t-il pour se désigner lui-même le plus souvent dans les évangiles ?",options:["Fils de Dieu","Christ","Fils de l'homme","Maître"],answer:"Fils de l'homme",explanation:"'Fils de l'homme' (Ben Adam) est l'autodésignation préférée de Jésus — à la fois humble (mortel) et eschatologique (référence à Daniel 7:13).",reference:"Daniel 7:13 / Marc 2:10",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:514,text:"Quel est le sens de 'Gethsémani' dans la langue originale ?",options:["Jardin des fleurs","Presse à huile","Vallon des pierres","Lieu de prière"],answer:"Presse à huile",explanation:"Gethsémani en araméen signifie 'pressoir à huile' — l'olive pressée jusqu'à l'écrasement : image de l'agonie de Jésus qui 'sera pressé jusqu'au sang'.",reference:"Matthieu 26:36",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
  {id:515,text:"Quelle est la formule baptismale trinitaire donnée par Jésus en Matthieu 28 ?",options:["'Au nom de Jésus-Christ'","'Au nom du Père, du Fils et du Saint-Esprit'","'Par l'eau et l'Esprit'","'Au nom de Dieu unique'"],answer:"'Au nom du Père, du Fils et du Saint-Esprit'",explanation:"Matthieu 28:19 — formule trinitaire baptismale qui fonde la pratique de l'Église depuis les origines.",reference:"Matthieu 28:19",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},

  // ─── MIRACLES compléments ────────────────────────────────────────────────
  {id:516,text:"Quel miracle Jésus accomplit-il uniquement décrit dans Marc 8, en deux étapes ?",options:["La guérison d'un sourd-muet","La guérison progressive d'un aveugle à Bethsaïda","La résurrection d'une jeune fille","L'expulsion d'une légion de démons"],answer:"La guérison progressive d'un aveugle à Bethsaïda",explanation:"Marc 8:22-25 — unique miracle en deux étapes dans les évangiles. Théologiquement, il symbolise la compréhension graduelle des disciples.",reference:"Marc 8:24",theme:"MIRACLES",difficulty:"AVANCE"},
  {id:517,text:"Que signifie 'Talitha koum' prononcé par Jésus lors de la résurrection de la fille de Jaïrus ?",options:["'Lève-toi et marche'","'Petite fille, lève-toi'","'Sors de ce corps'","'Reviens à la vie'"],answer:"'Petite fille, lève-toi'",explanation:"Marc 5:41 conserve l'araméen original — un des rares cas de langue originale préservée, signe de la tradition directe des témoins oculaires.",reference:"Marc 5:41",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:518,text:"Quel miracle dans Actes 3 rappelle directement la guérison d'un paralytique par Jésus ?",options:["La guérison d'Énée par Pierre","La guérison d'un boiteux à la Belle Porte du Temple par Pierre et Jean","La guérison de la belle-mère de Pierre","La résurrection de Tabitha"],answer:"La guérison d'un boiteux à la Belle Porte du Temple par Pierre et Jean",explanation:"Actes 3:6 — 'Je n'ai ni or ni argent, mais ce que j'ai, je te le donne : au nom de Jésus-Christ, lève-toi et marche.' Pierre agit comme Jésus.",reference:"Actes 3:6",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:519,text:"Quelle femme Pierre ressuscite-t-il à Joppé (Actes 9) ?",options:["Lydie","Tabitha (Dorcas)","Marie de Magdala","Priscille"],answer:"Tabitha (Dorcas)",explanation:"Actes 9:40 — Pierre ordonne 'Tabitha, lève-toi' (écho de 'Talitha koum') — elle ouvre les yeux. Tabitha est décrite comme riche en bonnes œuvres.",reference:"Actes 9:40",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:520,text:"Dans quel texte johannique Jésus guérit-il un homme aveugle de naissance, suscitant une longue controverse avec les Pharisiens ?",options:["Jean 5","Jean 8","Jean 9","Jean 11"],answer:"Jean 9",explanation:"Jean 9 est un récit élaboré où l'aveugle-né passe de 'je ne sais pas' à 'il est prophète' à 'je crois, Seigneur' — crescendo symbolique de la foi.",reference:"Jean 9:1",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},

  // ─── PSAUMES compléments finaux ──────────────────────────────────────────
  {id:521,text:"Quel psaume s'ouvre par 'Bénis l'Éternel, ô mon âme !' et décrit la miséricorde divine ?",options:["Psaume 91","Psaume 100","Psaume 103","Psaume 148"],answer:"Psaume 103",explanation:"Psaume 103 est une action de grâce personnelle et universelle — 'Comme un père a compassion de ses enfants, l'Éternel a compassion de ceux qui le craignent.'",reference:"Psaume 103:13",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:522,text:"Quel psaume est utilisé pour les vêpres du dimanche dans la liturgie catholique ?",options:["Psaume 22","Psaume 110","Psaume 23","Psaume 51"],answer:"Psaume 110",explanation:"Psaume 110 ('L'Éternel a dit à mon Seigneur : Assieds-toi à ma droite') est le plus cité dans le NT — Jésus l'utilise pour questionner l'idée du Messie davidique.",reference:"Psaume 110:1",theme:"PSAUMES",difficulty:"AVANCE"},
  {id:523,text:"Quel psaume contient la phrase 'La pierre qu'ont rejetée les bâtisseurs est devenue la tête de l'angle' ?",options:["Psaume 22","Psaume 118","Psaume 69","Psaume 31"],answer:"Psaume 118",explanation:"Psaume 118:22 — cité par Jésus (Matthieu 21:42) pour annoncer son rejet par les chefs religieux et sa victoire finale.",reference:"Psaume 118:22",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:524,text:"Quel psaume commence par 'Dieu est notre refuge et notre force' ?",options:["Psaume 23","Psaume 46","Psaume 91","Psaume 121"],answer:"Psaume 46",explanation:"Psaume 46 — 'Dieu est notre refuge et notre force, un secours qui ne manque jamais dans la détresse.' Luther s'en inspire pour 'Ein feste Burg'.",reference:"Psaume 46:2",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:525,text:"Quel est le psaume d'entrée traditionnellement associé à la messe du dimanche de Pâques ?",options:["Psaume 23","Psaume 118","Psaume 22","Psaume 116"],answer:"Psaume 118",explanation:"'Voici le jour que l'Éternel a fait, réjouissons-nous et réjouissons-nous en lui' (Ps 118:24) est l'antienne de Pâques par excellence.",reference:"Psaume 118:24",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},

  // ─── COMPLÉMENT final APÔTRES ────────────────────────────────────────────
  {id:526,text:"Quelle est la signification du terme grec 'ekklèsia' traduit par 'Église' ?",options:["La maison de Dieu","L'assemblée de ceux qui sont appelés hors de","La communauté des baptisés","La hiérarchie religieuse"],answer:"L'assemblée de ceux qui sont appelés hors de",explanation:"Ekklèsia vient de ek-kaleo ('appeler hors de') — l'Église est le rassemblement de ceux que Dieu 'appelle hors' du monde pour former son peuple.",reference:"Matthieu 16:18",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:527,text:"Dans la lettre aux Romains, que signifie 'ne pas être conforme à ce siècle' ?",options:["Rejeter la culture grecque","Se laisser transformer par le renouvellement de l'intelligence","Quitter la société","Refuser l'Empire romain"],answer:"Se laisser transformer par le renouvellement de l'intelligence",explanation:"Romains 12:2 — Paul invite à une transformation (metamorphosis) de la pensée, opposée au 'conformisme' (syschematizesthe) au monde présent.",reference:"Romains 12:2",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:528,text:"Quelle est la formule centrale de la théologie de Colossiens résumant la vie chrétienne ?",options:["'Portez les fardeaux les uns des autres'","'Tout ce que vous faites, faites-le pour la gloire de Dieu'","'Christ en vous, l'espérance de la gloire'","'Je puis tout par celui qui me fortifie'"],answer:"'Christ en vous, l'espérance de la gloire'",explanation:"Colossiens 1:27 — le mystère caché aux siècles est maintenant révélé : Dieu habite en chaque croyant. C'est le cœur de la mystique paulinienne.",reference:"Colossiens 1:27",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:529,text:"Quelle est l'exhortation finale de Paul dans Philippiens 4:8 ?",options:["'Priez sans cesse'","'Pensez à tout ce qui est vrai, honnête, juste, pur, aimable'","'Prêchez la Parole en tout temps'","'Restez fermes dans la foi'"],answer:"'Pensez à tout ce qui est vrai, honnête, juste, pur, aimable'",explanation:"Philippiens 4:8 — une éthique de la pensée : la transformation morale commence par orienter l'esprit vers ce qui est beau et vrai.",reference:"Philippiens 4:8",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:530,text:"Quel livre de la Bible est une lettre adressée à une femme élue et à ses enfants ?",options:["1 Jean","2 Jean","3 Jean","Jude"],answer:"2 Jean",explanation:"2 Jean 1:1 — 'À la dame élue et à ses enfants' — soit une femme réelle, soit une image de l'Église locale.",reference:"2 Jean 1:1",theme:"APOTRES",difficulty:"AVANCE"},

  // ─── HISTOIRE finale ─────────────────────────────────────────────────────
  {id:531,text:"Quel psaume chante le retour des exilés en des termes quasi paradisiaques ?",options:["Psaume 46","Psaume 126","Psaume 137","Psaume 87"],answer:"Psaume 126",explanation:"Psaume 126 — 'Ceux qui sèment avec larmes moissonneront avec chants de joie.' Image de la déportation transformée en fête de la récolte.",reference:"Psaume 126:5",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:532,text:"Quel prophète est contemporain de la chute de Jérusalem en 587 av. J.-C. et témoin oculaire ?",options:["Ésaïe","Amos","Jérémie","Aggée"],answer:"Jérémie",explanation:"Jérémie vit la destruction de Jérusalem — il avait conseillé de se rendre à Babylone, interprété comme trahison, ce qui lui valut emprisonnement.",reference:"Jérémie 39:1",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:533,text:"Quelle est la durée traditionnelle de l'exil babylonien selon la prophétie de Jérémie ?",options:["40 ans","50 ans","70 ans","100 ans"],answer:"70 ans",explanation:"Jérémie 25:11-12 — 'soixante-dix ans' de servitude à Babylone. Daniel 9 réinterprète ce chiffre en 'soixante-dix semaines d'années'.",reference:"Jérémie 25:11",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:534,text:"Quel est le nom de la mer sur laquelle Jésus marche dans les évangiles synoptiques ?",options:["Mer Morte","Mer de Galilée","Mer Méditerranée","Lac d'Antioche"],answer:"Mer de Galilée",explanation:"Matthieu 14:25-26 — Jésus marche sur les eaux de la mer de Galilée vers 4 heures du matin. Pierre tente de marcher aussi.",reference:"Matthieu 14:25",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:535,text:"Quelle ville est détruite avec Sodome selon la Genèse ?",options:["Gomorrhe","Jéricho","Babel","Ur"],answer:"Gomorrhe",explanation:"Genèse 19 — Sodome et Gomorrhe sont détruites par le feu et le soufre. Seul Lot et ses filles s'échappent.",reference:"Genèse 19:24",theme:"HISTOIRE",difficulty:"DEBUTANT"},

  // ─── LOI finale ──────────────────────────────────────────────────────────
  {id:536,text:"Que signifie le mot 'Torah' au-delà de la simple traduction 'Loi' ?",options:["Règlement juridique","Enseignement, instruction — la révélation divine guidant la vie","Sacrifice et rituel","Alliance exclusive avec Israël"],answer:"Enseignement, instruction — la révélation divine guidant la vie",explanation:"'Loi' est une traduction réductrice — Torah vient de yarah ('enseigner'). C'est la révélation de Dieu qui enseigne comment vivre en alliance.",reference:"Deutéronome 31:12",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:537,text:"Quel est le nom du grand discours final de Moïse qui récapitule la Torah ?",options:["Le Lévitique","Le Deutéronome","Les Nombres","La Genèse"],answer:"Le Deutéronome",explanation:"Deutéronome signifie 'deuxième loi' (Deutero-nomos) — mais c'est une relecture kérygmatique (prédication) de la Torah avant l'entrée en Terre promise.",reference:"Deutéronome 1:1",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:538,text:"Comment Moïse meurt-il selon le Deutéronome ?",options:["Il est enlevé au ciel","Il meurt sur le mont Nebo après avoir vu la Terre promise mais sans y entrer","Il est tué par les Israélites","Il est enseveli en Égypte"],answer:"Il meurt sur le mont Nebo après avoir vu la Terre promise mais sans y entrer",explanation:"Deutéronome 34:5 — Moïse ne peut entrer en Canaan à cause de sa faute à Meriba (Nb 20:12). Dieu lui montre la Terre depuis le mont Nebo.",reference:"Deutéronome 34:5",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:539,text:"Quelle est la signification du nom 'Moïse' dans la tradition biblique ?",options:["'Libérateur du peuple'","'Tiré des eaux' (nom égyptien)'","'Envoyé de Dieu'","'Berger du désert'"],answer:"'Tiré des eaux' (nom égyptien)'",explanation:"Exode 2:10 — Pharaon's daughter says 'Je l'ai tiré des eaux' — son nom égyptien msy signifie 'enfant/fils', tiré des eaux du Nil.",reference:"Exode 2:10",theme:"LOI",difficulty:"AVANCE"},
  {id:540,text:"Quel est le sens spirituel du passage de la mer Rouge dans la tradition chrétienne ?",options:["Une préfiguration du baptême","Un miracle unique sans symbolique","Une leçon militaire","La libération politique d'Israël"],answer:"Une préfiguration du baptême",explanation:"1 Corinthiens 10:1-2 — Paul dit qu'Israël 'a été baptisé en Moïse dans la nuée et dans la mer'. Le passage est lu comme type du baptême chrétien.",reference:"1 Corinthiens 10:2",theme:"LOI",difficulty:"AVANCE"},

  // ─── PROPHÈTES compléments finaux ────────────────────────────────────────
  {id:541,text:"Quel prophète vit une vision du temple futur avec un fleuve qui guérit tout ce qu'il touche ?",options:["Ézéchiel","Jérémie","Zacharie","Daniel"],answer:"Ézéchiel",explanation:"Ézéchiel 47 — le fleuve qui coule du Temple vers la mer Morte et la rend douce est l'image eschatologique la plus puissante de guérison cosmique dans l'AT.",reference:"Ézéchiel 47:8-9",theme:"PROPHETES",difficulty:"AVANCE"},
  {id:542,text:"Quel petit prophète appelle Dieu 'jaloux' et annonce que ses ennemis seront détruits par jalousie pour son peuple ?",options:["Malachie","Nahum","Habaquq","Nahum"],answer:"Nahum",explanation:"Nahum 1:2 — 'L'Éternel est un Dieu jaloux et qui se venge' — sa jalousie est une forme d'amour protecteur envers son peuple.",reference:"Nahum 1:2",theme:"PROPHETES",difficulty:"AVANCE"},
  {id:543,text:"Quel prophète post-exilique encourage la reconstruction du Temple par ses oracles ?",options:["Malachie","Zacharie","Aggée","Joël"],answer:"Aggée",explanation:"Aggée 1:14 — ses quatre oracles (520 av. J.-C.) galvanisent Zorobabel et Josué le grand prêtre pour reprendre les travaux du Second Temple.",reference:"Aggée 1:8",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:544,text:"Quelle vision de Zacharie préfigure l'entrée de Jésus à Jérusalem sur un âne ?",options:["Zacharie 7:9","Zacharie 9:9","Zacharie 12:10","Zacharie 14:4"],answer:"Zacharie 9:9",explanation:"'Réjouis-toi, fille de Sion... ton roi vient à toi, juste et victorieux, humble et monté sur un âne.' Cité dans Matthieu 21:5.",reference:"Zacharie 9:9",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:545,text:"Quel prophète dit : 'Malachie signifie mon messager' — quelle est la promesse finale du livre ?",options:["L'annonce d'un nouveau Temple","Le retour d'Élie avant le jour du Seigneur","La restauration du royaume davidique","Un nouveau sacrifice expiatoire"],answer:"Le retour d'Élie avant le jour du Seigneur",explanation:"Malachie 3:23 — annonce du retour d'Élie. Jésus identifie Jean-Baptiste à cet Élie (Matthieu 11:14). Clôt l'AT en ouvrant vers le NT.",reference:"Malachie 3:23",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},

  // ─── SAGESSE finale ──────────────────────────────────────────────────────
  {id:546,text:"Quel livre biblique contient la phrase 'Vanité des vanités, tout est vanité' ?",options:["Proverbes","Job","Siracide","Qohéleth"],answer:"Qohéleth",explanation:"Qohéleth 1:2 — en hébreu 'hebel' (vanité) signifie 'souffle, vapeur' — l'inconsistance des choses passagères.",reference:"Qohéleth 1:2",theme:"SAGESSE",difficulty:"DEBUTANT"},
  {id:547,text:"Dans les Proverbes, quelle valeur est comparée à des rubis et dépasse toute richesse ?",options:["La beauté","La sagesse","La force","La longévité"],answer:"La sagesse",explanation:"Proverbes 3:15 et 8:11 — 'Elle vaut mieux que les perles, et tous vos biens ne l'égalent pas.'",reference:"Proverbes 3:15",theme:"SAGESSE",difficulty:"DEBUTANT"},
  {id:548,text:"Quelle femme est décrite dans le dernier chapitre des Proverbes comme le modèle de la femme vaillante ?",options:["Eshet Hayil ('femme de valeur')","La Sulamite du Cantique","La Sagesse personnifiée","Marie, mère de Jésus"],answer:"Eshet Hayil ('femme de valeur')",explanation:"Proverbes 31:10-31 — le poème acrostiche décrit une femme active, sage, généreuse. Récité le soir du Shabbat en l'honneur de l'épouse.",reference:"Proverbes 31:10",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
  {id:549,text:"Quel livre deutérocanonique contient la prière de Tobie et de Sara, exaucée par l'ange Raphaël ?",options:["Judith","Tobie","Siracide","Sagesse"],answer:"Tobie",explanation:"Tobie est un récit de foi et de fidélité — Raphaël guide Tobie fils pour guérir son père aveugle et libérer Sara des démons.",reference:"Tobie 3:16-17",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
  {id:550,text:"Quelle est la définition de la foi dans l'épître aux Hébreux ?",options:["'La foi est une conviction personnelle'","'La foi est la substance des choses qu'on espère, la démonstration de celles qu'on ne voit pas'","'La foi est l'adhésion aux vérités révélées'","'La foi est confiance en Dieu dans les épreuves'"],answer:"'La foi est la substance des choses qu'on espère, la démonstration de celles qu'on ne voit pas'",explanation:"Hébreux 11:1 — 'hypostasis' (substance) et 'elenchos' (démonstration, preuve) — la foi a une consistance réelle, elle n'est pas illusion.",reference:"Hébreux 11:1",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},

  // ─── COMPLÉMENT MIRACLES ────────────────────────────────────────────────
  {id:551,text:"Quel est le premier signe de Jésus dans l'évangile de Jean ?",options:["La multiplication des pains","La guérison d'un aveugle","Les noces de Cana — l'eau changée en vin","La résurrection de Lazare"],answer:"Les noces de Cana — l'eau changée en vin",explanation:"Jean 2:11 — premier 'signe' (semeion) qui manifeste la gloire du Christ. Le vin nouveau symbolise la nouvelle alliance qui dépasse la purification ancienne.",reference:"Jean 2:11",theme:"MIRACLES",difficulty:"DEBUTANT"},
  {id:552,text:"Quelle est la seule guérison par un objet physique (salive et terre) décrite en Jean ?",options:["La guérison du paralytique de Bethesda","La guérison de l'hémorragisse","La guérison de l'aveugle-né en Jean 9","La guérison du fils de l'officier royal"],answer:"La guérison de l'aveugle-né en Jean 9",explanation:"Jean 9:6-7 — Jésus fait de la boue avec de la salive et de la terre, rappelant la création d'Adam (Gn 2:7). L'aveugle lave dans la piscine de Siloé.",reference:"Jean 9:6",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:553,text:"Quel prophète de l'AT multiplie lui aussi de l'huile pour une veuve ?",options:["Élie","Élisée","Ézéchiel","Amos"],answer:"Élisée",explanation:"2 Rois 4:1-7 — Élisée multiplie l'huile d'une veuve jusqu'à remplir tous ses récipients. Ce miracle préfigure la multiplication des pains par Jésus.",reference:"2 Rois 4:6",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},

  // ─── PARABOLES compléments ──────────────────────────────────────────────
  {id:554,text:"Quelle est la parabole des 'dix vierges' et sa leçon ?",options:["L'universalité du salut","La nécessité d'être prêt au retour du Seigneur — cinq vierges prudentes ont de l'huile, cinq insensées n'en ont pas","Le pardon des péchés","La prière persévérante"],answer:"La nécessité d'être prêt au retour du Seigneur — cinq vierges prudentes ont de l'huile, cinq insensées n'en ont pas",explanation:"Matthieu 25:1-13 — 'Veillez donc, car vous ne savez ni le jour ni l'heure.' La vigilance eschatologique est la leçon de la parabole.",reference:"Matthieu 25:13",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
  {id:555,text:"Que signifie la parabole de l'ivraie et du bon grain ?",options:["Le bien et le mal coexistent dans le monde jusqu'au jugement final","Il faut éliminer les pécheurs de l'Église","La conversion est toujours possible","Dieu abandonne les méchants"],answer:"Le bien et le mal coexistent dans le monde jusqu'au jugement final",explanation:"Matthieu 13:24-30 — le maître interdit d'arracher l'ivraie pour ne pas risquer d'arracher le bon grain. La séparation est réservée à la moisson finale.",reference:"Matthieu 13:30",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
  {id:556,text:"Quelle parabole illustre le pardon illimité par une dette colossale remise puis non transmise ?",options:["Le créancier impitoyable","Le fils prodigue","Les ouvriers de la dernière heure","Les deux fils"],answer:"Le créancier impitoyable",explanation:"Matthieu 18:23-35 — un serviteur dont une dette de 10 000 talents est remise refuse de remettre 100 deniers. Parabole sur la gratitude et le pardon reçu.",reference:"Matthieu 18:32-33",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
  {id:557,text:"Dans la parabole des ouvriers de la dernière heure, quelle est la réponse du maître aux premiers ouvriers qui se plaignent ?",options:["Il augmente leur salaire","'N'ai-je pas le droit de faire ce que je veux de mon bien ? Ou ton œil est-il mauvais parce que je suis bon ?'","Il les renvoie sans paiement","Il leur promet un meilleur salaire demain"],answer:"'N'ai-je pas le droit de faire ce que je veux de mon bien ? Ou ton œil est-il mauvais parce que je suis bon ?'",explanation:"Matthieu 20:15 — la parabole illustre la grâce divine qui n'est pas soumise à la logique méritocratique humaine.",reference:"Matthieu 20:15",theme:"PARABOLES",difficulty:"AVANCE"},

  // ─── VIE DE JÉSUS finale ────────────────────────────────────────────────
  {id:558,text:"Quelle est la signification théologique de l'Incarnation dans la tradition chrétienne ?",options:["Dieu prend une forme temporaire pour enseigner","Le Fils de Dieu assume pleinement la nature humaine sans cesser d'être Dieu — hypostase unique","Jésus est un homme adopté par Dieu au baptême","Dieu s'est manifesté comme un ange"],answer:"Le Fils de Dieu assume pleinement la nature humaine sans cesser d'être Dieu — hypostase unique",explanation:"Le dogme de Chalcédoine (451) : 'vrai Dieu et vrai homme, deux natures en une personne'. Fondement de la christologie chrétienne.",reference:"Jean 1:14",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
  {id:559,text:"Que signifie 'Maranatha' dans les premières communautés chrétiennes ?",options:["Louange au Seigneur","Viens, Seigneur (prière eschatologique)","Dieu avec nous","Amen"],answer:"Viens, Seigneur (prière eschatologique)",explanation:"1 Corinthiens 16:22 et Apocalypse 22:20 — l'araméen 'Maran atha' est l'une des plus anciennes prières chrétiennes, exprimant l'attente ardente du retour du Christ.",reference:"1 Corinthiens 16:22",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
  {id:560,text:"Quel événement Luc seul décrit comme précédant immédiatement l'ascension de Jésus ?",options:["L'institution de l'Eucharistie","La bénédiction à Béthanie — Jésus les bénit en s'élevant au ciel","L'envoi en mission des soixante-douze","La promesse de l'Esprit"],answer:"La bénédiction à Béthanie — Jésus les bénit en s'élevant au ciel",explanation:"Luc 24:50-51 — Jésus lève les mains et les bénit au moment même où il est enlevé. Image sacerdotale : le grand prêtre bénit en quittant le sanctuaire.",reference:"Luc 24:50",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},

  // ─── APÔTRES finale ──────────────────────────────────────────────────────
  {id:561,text:"Quelle est l'épître la plus ancienne du NT selon la plupart des exégètes ?",options:["Galates","Romains","1 Thessaloniciens","1 Corinthiens"],answer:"1 Thessaloniciens",explanation:"1 Thessaloniciens (~50-51 ap. J.-C.) est généralement considérée comme la première lettre de Paul conservée — et peut-être le premier écrit du NT.",reference:"1 Thessaloniciens 1:1",theme:"APOTRES",difficulty:"AVANCE"},
  {id:562,text:"Dans l'épître aux Hébreux, quel personnage mystérieux est présenté comme préfigurant le sacerdoce du Christ ?",options:["Aaron","Élie","Melchisédek","Samuel"],answer:"Melchisédek",explanation:"Hébreux 5-7 — Melchisédek (roi de Salem, prêtre du Dieu Très-Haut, Gn 14) est 'sans père ni mère, sans généalogie' — préfigure un sacerdoce éternel non lévitique.",reference:"Hébreux 7:3",theme:"APOTRES",difficulty:"AVANCE"},
  {id:563,text:"Quel apôtre, frère de Pierre, est le premier appelé selon l'évangile de Jean ?",options:["Jacques","Jean","André","Philippe"],answer:"André",explanation:"Jean 1:40-42 — André rencontre Jésus en premier, puis va chercher son frère Simon Pierre. D'où son titre de 'Protoclète' (premier appelé) dans la tradition orthodoxe.",reference:"Jean 1:40",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:564,text:"Quelle femme est qualifiée de 'diaconesse' (diakonos) par Paul dans Romains 16:1 ?",options:["Lydie","Phébé","Priscille","Marie de Rome"],answer:"Phébé",explanation:"Romains 16:1-2 — Phébé est diakonos de l'Église de Cenchrées et prostatis (patronne) de beaucoup. C'est probablement elle qui a remis la lettre aux Romains.",reference:"Romains 16:1",theme:"APOTRES",difficulty:"AVANCE"},
  {id:565,text:"Quelle est la prière que Jésus enseigne à ses disciples, appelée 'Pater' ?",options:["Le Shema Israël","Le Notre Père","Le Kyrie eleison","Le Magnificat"],answer:"Le Notre Père",explanation:"Matthieu 6:9-13 et Luc 11:2-4 — la prière modèle de Jésus, récitée depuis les origines dans la liturgie chrétienne.",reference:"Matthieu 6:9",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},

  // ─── HISTOIRE & GÉOGRAPHIE ───────────────────────────────────────────────
  {id:566,text:"Quelle ville est la capitale politique et religieuse d'Israël sous David et Salomon ?",options:["Hébron","Silo","Jérusalem","Samarie"],answer:"Jérusalem",explanation:"David conquiert Jérusalem (2 Sm 5) et en fait sa capitale, centre politique et religieux — 'ville de David', puis ville du Temple.",reference:"2 Samuel 5:7",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:567,text:"Quelle ville devient la capitale du royaume du Nord après le schisme ?",options:["Béthel","Silo","Dan","Samarie"],answer:"Samarie",explanation:"Omri fonde Samarie vers 880 av. J.-C. comme capitale du royaume d'Israël (Nord) — elle est détruite par les Assyriens en 722 av. J.-C.",reference:"1 Rois 16:24",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:568,text:"Dans quelle ville Jésus est-il crucifié ?",options:["Bethléem","Capharnaüm","Nazareth","Jérusalem"],answer:"Jérusalem",explanation:"La crucifixion a lieu sur le Golgotha (Crâne), hors des murs de Jérusalem. Le Temple visible depuis la croix se déchire lors de la mort de Jésus.",reference:"Jean 19:17",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:569,text:"Sur quel mont Moïse voit-il la Terre promise juste avant de mourir ?",options:["Mont Sinaï","Mont Carmel","Mont Nebo","Mont Tabor"],answer:"Mont Nebo",explanation:"Deutéronome 34:1 — Dieu montre à Moïse tout le pays depuis le Pisga, sommet du Nebo, puis il meurt là. Son tombeau est inconnu.",reference:"Deutéronome 34:1",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:570,text:"Quelle ville Paul visite en Macédoine et dont les habitants sont 'plus nobles' car ils vérifient les Écritures ?",options:["Philippes","Thessalonique","Bérée","Athènes"],answer:"Bérée",explanation:"Actes 17:11 — 'Ils reçurent la Parole avec beaucoup d'empressement et examinaient chaque jour les Écritures, pour voir si ce qu'on leur disait était exact.' Modèle d'étude biblique.",reference:"Actes 17:11",theme:"HISTOIRE",difficulty:"AVANCE"},

  // ─── CRÉATION & THÉOLOGIE finale ────────────────────────────────────────
  {id:571,text:"Quel est le sens du terme 'apocalypse' en grec ?",options:["Catastrophe finale","Révélation, dévoilement","Jugement dernier","Fin du monde"],answer:"Révélation, dévoilement",explanation:"Apokalupsis signifie 'lever le voile' — l'Apocalypse est un genre littéraire qui dévoile la réalité cachée derrière les événements historiques.",reference:"Apocalypse 1:1",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:572,text:"Quelle est la signification du mot 'Alléluia' ?",options:["Gloire à Dieu","Louez l'Éternel (Hallel + Yah)","Amen, qu'il en soit ainsi","Béni soit Dieu"],answer:"Louez l'Éternel (Hallel + Yah)",explanation:"Hallel = louez, Yah = forme courte de YHWH. L'Alléluia passe directement de l'hébreu au grec au latin sans être traduit.",reference:"Psaume 113:1",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:573,text:"Quel est le sens du mot 'Amen' d'origine hébraïque ?",options:["Qu'il en soit ainsi / vérité, solidité","Gloire","Loué soit Dieu","C'est décidé"],answer:"Qu'il en soit ainsi / vérité, solidité",explanation:"'Amen' vient de la racine 'mn (firmitas, fidélité, vérité). Jésus l'utilise de façon unique en disant 'Amen, je vous le dis' pour introduire ses enseignements.",reference:"Matthieu 5:18",theme:"CREATION",difficulty:"DEBUTANT"},
  {id:574,text:"Qu'est-ce que le 'Canon' biblique ?",options:["L'ordre des livres dans la Bible","La liste officielle des livres reconnus comme inspirés par l'Église","La traduction officielle de la Bible","Le commentaire autorisé de la Bible"],answer:"La liste officielle des livres reconnus comme inspirés par l'Église",explanation:"Canon vient du grec kanon (règle, mesure). Le canon catholique (73 livres) diffère du canon protestant (66) et du canon hébreu (TaNaKh, 39 livres).",reference:"Concile de Carthage, 397",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:575,text:"Quelle est la première traduction de la Bible en grec, utilisée au temps de Jésus ?",options:["La Vulgate","La Peshitta","La Septante (LXX)","La Targoum"],answer:"La Septante (LXX)",explanation:"La Septante (IIIe-IIe s. av. J.-C.) est la traduction grecque de l'AT — elle inclut les deutérocanoniques et est citée par le NT et les Pères de l'Église.",reference:"Prologue de Ben Sira",theme:"CREATION",difficulty:"INTERMEDIAIRE"},

  // ─── COMPLÉMENTS FINAUX divers ───────────────────────────────────────────
  {id:576,text:"Quel est le nom hébreu de l'AT qui se compose de trois parties (Torah, Neviim, Ketouvim) ?",options:["Pentateuque","TaNaKh","Mishna","Talmud"],answer:"TaNaKh",explanation:"TaNaKh est l'acronyme de Torah (Loi), Neviim (Prophètes) et Ketouvim (Écrits) — les trois sections de la Bible hébraïque.",reference:"Luc 24:44",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:577,text:"Quelle est la langue originale du Nouveau Testament ?",options:["Latin","Hébreu","Araméen","Grec (koinè)"],answer:"Grec (koinè)",explanation:"Le grec koinè ('commun') était la lingua franca du monde méditerranéen au 1er siècle — choix stratégique pour atteindre un maximum de lecteurs.",reference:"Jean 1:1",theme:"CREATION",difficulty:"DEBUTANT"},
  {id:578,text:"Quelle est la langue du texte original de la plupart de l'Ancien Testament ?",options:["Grec","Araméen","Hébreu","Syriaque"],answer:"Hébreu",explanation:"L'AT est principalement en hébreu, avec quelques sections en araméen (Daniel 2-7, Esdras 4-7, Jérémie 10:11).",reference:"Genèse 1:1",theme:"CREATION",difficulty:"DEBUTANT"},
  {id:579,text:"Quel est le nom de la traduction latine de la Bible faite par Jérôme au IVe siècle ?",options:["La Septante","La Vulgate","La Peshitta","La Complutense"],answer:"La Vulgate",explanation:"La Vulgate (de vulgata editio, 'édition commune') est la traduction latine de Jérôme (fin IVe s.) — Bible officielle de l'Église catholique pendant 15 siècles.",reference:"Concile de Trente, 1546",theme:"CREATION",difficulty:"INTERMEDIAIRE"},
  {id:580,text:"Quel est le sens du mot 'Évangile' ?",options:["Témoignage oculaire","Bonne nouvelle (euangelion)","Parole de Dieu","Enseignement de Jésus"],answer:"Bonne nouvelle (euangelion)",explanation:"Euangelion en grec = bonne annonce. Dans l'Empire romain, ce mot désignait la proclamation d'une victoire ou d'un événement heureux — Paul le reprend pour désigner la proclamation de la résurrection.",reference:"Marc 1:1",theme:"CREATION",difficulty:"DEBUTANT"},

  // ─── HISTOIRE finale ─────────────────────────────────────────────────────
  {id:581,text:"Quel patriarche vend sa primogéniture pour un plat de lentilles ?",options:["Jacob","Isaac","Ésaü","Joseph"],answer:"Ésaü",explanation:"Genèse 25:29-34 — Ésaü revient affamé et vend son droit d'aîné à Jacob pour un plat de lentilles. L'auteur commente : 'Il méprisa son droit d'aîné.'",reference:"Genèse 25:33",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:582,text:"Combien de fils Jacob a-t-il, ancêtres des douze tribus d'Israël ?",options:["10","11","12","13"],answer:"12",explanation:"Les 12 fils de Jacob (Ruben, Siméon, Lévi, Juda, Dan, Nephtali, Gad, Aser, Issacar, Zabulon, Joseph, Benjamin) sont les pères des 12 tribus.",reference:"Genèse 35:22-26",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:583,text:"Quel fils de Jacob est vendu comme esclave en Égypte par ses frères jaloux ?",options:["Benjamin","Ruben","Joseph","Juda"],answer:"Joseph",explanation:"Genèse 37 — Joseph, le préféré de Jacob, est vendu pour vingt sicles d'argent. Son parcours jusqu'au poste de vice-roi d'Égypte est l'un des plus longs récits de la Genèse.",reference:"Genèse 37:28",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:584,text:"Quelle est la particularité du livre de Ruth dans le canon biblique ?",options:["C'est le seul livre sans mention de Dieu","C'est l'histoire d'une étrangère (Moabite) qui entre dans le peuple d'Israël et dans la généalogie de Jésus","C'est le livre le plus court de l'AT","C'est le seul livre écrit par une femme"],answer:"C'est l'histoire d'une étrangère (Moabite) qui entre dans le peuple d'Israël et dans la généalogie de Jésus",explanation:"Ruth 4:17-22 et Matthieu 1:5 — Ruth la Moabite est arrière-grand-mère de David et ancêtre de Jésus. L'universalisme de l'élection s'y exprime.",reference:"Ruth 4:17",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:585,text:"Quelle est la question que Dieu pose à Caïn après le meurtre d'Abel ?",options:["'Qu'as-tu fait ?'","'Où est ton frère Abel ?'","'Pourquoi as-tu tué ton frère ?'","'Que répondras-tu au Jugement ?'"],answer:"'Où est ton frère Abel ?'",explanation:"Genèse 4:9 — Caïn répond 'Suis-je le gardien de mon frère ?' La question divine inverse : oui, tu es responsable de ton frère.",reference:"Genèse 4:9",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},

  // ─── LOI & PROPHÈTES finaux ─────────────────────────────────────────────
  {id:586,text:"Quel est le sens du terme 'naziréat' dans la Torah ?",options:["Être originaire de Nazareth","Consécration volontaire à Dieu impliquant abstinence de vin, de rasoir et d'impureté","Un grade de prêtrise","Un vœu de silence"],answer:"Consécration volontaire à Dieu impliquant abstinence de vin, de rasoir et d'impureté",explanation:"Nombres 6 — le naziréen (nazir) se consacre à Dieu pour une période déterminée ou à vie (Samson, Samuel). Le mot vient de nazir ('séparé, consacré').",reference:"Nombres 6:2-5",theme:"LOI",difficulty:"AVANCE"},
  {id:587,text:"Quelle est la dernière parole de Jésus sur la croix selon l'évangile de Jean ?",options:["'Père, pardonne-leur'","'Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné'","'C'est accompli'","'Père, entre tes mains je remets mon esprit'"],answer:"'C'est accompli'",explanation:"Jean 19:30 — 'Tetelestai' en grec (parfait passif) : accompli, achevé. Jésus n'est pas vaincu mais accomplit délibérément sa mission.",reference:"Jean 19:30",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:588,text:"Quelle est la dernière parole de Jésus sur la croix selon l'évangile de Luc ?",options:["'C'est accompli'","'Père, entre tes mains je remets mon esprit'","'Mon Dieu, pourquoi m'as-tu abandonné'","'Voici ta mère'"],answer:"'Père, entre tes mains je remets mon esprit'",explanation:"Luc 23:46 — citation du Psaume 31:6. Luc présente une mort sereine et confiante — Jésus remet activement sa vie au Père.",reference:"Luc 23:46",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:589,text:"Quel est le péché contre le Saint-Esprit que Jésus déclare irrémissible ?",options:["Le blasphème contre Dieu","L'apostasie","Attribuer à Béelzébul (Satan) l'œuvre de l'Esprit Saint","Le meurtre"],answer:"Attribuer à Béelzébul (Satan) l'œuvre de l'Esprit Saint",explanation:"Matthieu 12:31-32 — ce péché est irrémissible non parce que Dieu refuse de pardonner, mais parce qu'il ferme la porte à toute conversion.",reference:"Matthieu 12:31",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
  {id:590,text:"Quelle est la signification théologique du voile du Temple qui se déchire à la mort de Jésus ?",options:["La destruction du Temple est annoncée","L'accès direct à Dieu (Saint des Saints) est ouvert à tous par le Christ grand prêtre","Un tremblement de terre a causé la déchirure","Le sacrifice du Temple est aboli"],answer:"L'accès direct à Dieu (Saint des Saints) est ouvert à tous par le Christ grand prêtre",explanation:"Matthieu 27:51 et Hébreux 10:19-20 — le voile séparait le Saint des Saints (présence divine) du reste. Sa déchirure signifie l'accès universel au Père.",reference:"Matthieu 27:51",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},

  // ─── APÔTRES finaux ──────────────────────────────────────────────────────
  {id:591,text:"Quel est le premier concile de l'histoire de l'Église dont les Actes rapportent les débats ?",options:["Le concile de Nicée","Le concile de Jérusalem","Le concile de Carthage","Le synode d'Antioche"],answer:"Le concile de Jérusalem",explanation:"Actes 15 — vers 49 ap. J.-C., le premier concile ecclésial règle la question de la circoncision des convertis d'entre les nations.",reference:"Actes 15:6",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:592,text:"Quelle est la formule paulinienne centrale sur la réconciliation en 2 Corinthiens 5 ?",options:["Nous sommes ambassadeurs du Christ","Dieu était en Christ, réconciliant le monde avec lui-même","Le Christ est mort pour tous","Vous êtes la lettre de Christ"],answer:"Dieu était en Christ, réconciliant le monde avec lui-même",explanation:"2 Corinthiens 5:19 — cette formule concentre la théologie de la réconciliation : initiative divine, universalité, médiation christologique.",reference:"2 Corinthiens 5:19",theme:"APOTRES",difficulty:"AVANCE"},
{id:593,text:"Quelle épître paulinienne appelle les chrétiens à 'revêtir l'homme nouveau' ?",options:["Romains","Galates","Éphésiens","Philippiens"],answer:"Éphésiens",explanation:"Éphésiens 4:24 — 'revêtez l'homme nouveau, créé à l'image de Dieu dans la justice et la sainteté de la vérité.' Contraste avec le 'vieil homme' de la vie passée.",reference:"Éphésiens 4:24",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:594,text:"Dans l'épître aux Romains, que signifie 'ne pas se glorifier dans les tribulations' mais les accueillir ?",options:["Masochisme religieux","La tribulation produit la persévérance, la persévérance l'expérience, l'expérience l'espérance","L'acceptation fataliste de la souffrance","Le rejet de la souffrance au nom de la foi"],answer:"La tribulation produit la persévérance, la persévérance l'expérience, l'expérience l'espérance",explanation:"Romains 5:3-4 — chaîne de croissance spirituelle. Paul ne glorifie pas la souffrance pour elle-même mais pour ce qu'elle produit dans le croyant.",reference:"Romains 5:3-4",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:595,text:"Quelle est la doxologie finale de la lettre aux Romains ?",options:["'À lui soit la gloire aux siècles des siècles'","'Que le Dieu de l'espérance vous comble de joie'","'À celui qui peut vous affermir... la gloire en éternité'","'La grâce de Notre Seigneur Jésus-Christ soit avec vous'"],answer:"'À celui qui peut vous affermir... la gloire en éternité'",explanation:"Romains 16:25-27 — une des plus belles doxologies pauliniennes, centrant la gloire sur Dieu seul, révélé en Christ selon le mystère caché depuis les siècles.",reference:"Romains 16:25",theme:"APOTRES",difficulty:"AVANCE"},

  // ─── ULTIMES questions variées ───────────────────────────────────────────
  {id:596,text:"Quel est le 'discours eschatologique' de Jésus dans les évangiles synoptiques ?",options:["Le Sermon sur la montagne","Le discours des chapitres 24-25 de Matthieu sur la fin des temps et le retour du Fils de l'homme","Le discours d'adieu en Jean 14-17","Le discours en barque en Marc 4"],answer:"Le discours des chapitres 24-25 de Matthieu sur la fin des temps et le retour du Fils de l'homme",explanation:"Matthieu 24-25 — sur le mont des Oliviers, Jésus parle de la destruction du Temple, de la tribulation, de son retour et du jugement dernier.",reference:"Matthieu 24:1",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
  {id:597,text:"Quelle est la prière de Jésus au Père en Jean 17, souvent appelée 'prière sacerdotale' ?",options:["Prière pour la santé des disciples","Prière pour l'unité des disciples et de tous les croyants — 'Que tous soient un'","Prière pour la conversion d'Israël","Prière pour la destruction de Rome"],answer:"Prière pour l'unité des disciples et de tous les croyants — 'Que tous soient un'",explanation:"Jean 17:21 — 'Que tous soient un, comme toi Père tu es en moi et moi en toi, afin que le monde croie que tu m'as envoyé.' Fondement biblique de l'œcuménisme.",reference:"Jean 17:21",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:598,text:"Quelle figure de l'AT est présentée dans Hébreux 11 comme ayant 'endura comme voyant l'Invisible' ?",options:["Abraham","Moïse","Noé","Enoch"],answer:"Moïse",explanation:"Hébreux 11:27 — 'Par la foi il quitta l'Égypte, sans craindre la colère du roi, car il tint ferme, comme s'il voyait l'Invisible.' Modèle de foi persévérante.",reference:"Hébreux 11:27",theme:"SAGESSE",difficulty:"AVANCE"},
  {id:599,text:"Quelle épître de Pierre compare le baptême au déluge de Noé ?",options:["1 Pierre 1","1 Pierre 3","2 Pierre 1","2 Pierre 3"],answer:"1 Pierre 3",explanation:"1 Pierre 3:20-21 — 'Quelques personnes, huit en tout, furent sauvées à travers l'eau. Cette eau était une figure du baptême qui vous sauve maintenant.'",reference:"1 Pierre 3:21",theme:"APOTRES",difficulty:"AVANCE"},
  {id:600,text:"Quelle est la dernière prophétie messianique de l'AT selon la tradition chrétienne ?",options:["Ésaïe 53","Malachie 3:23 — l'envoi d'Élie avant le Jour du Seigneur","Michée 5:1","Zacharie 12:10"],answer:"Malachie 3:23 — l'envoi d'Élie avant le Jour du Seigneur",explanation:"Malachie est le dernier livre de l'AT — sa dernière prophétie crée un pont délibéré vers Jean-Baptiste et l'annonce du Messie au début des évangiles.",reference:"Malachie 3:23",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"}
  ],

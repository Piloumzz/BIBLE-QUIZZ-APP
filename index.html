    {id:34,type:"CHRONOLOGIE",theme:"HISTOIRE",data:{question:"Remets dans l'ordre chronologique ces étapes de la vie de Moïse :",items:["Naissance dans le Nil", "Fuite au pays de Madian", "Le Buisson ardent", "Les dix plaies", "Traversée de la mer Rouge", "Mort sur le mont Nébo"],reference:"Exode 2-34 / Deutéronome 34",explanation:"La vie de Moïse couvre l'Exode entier : enfance, fuite, vocation, libération, errance, mort avant l'entrée en Canaan."}},
    {id:35,type:"CHRONOLOGIE",theme:"VIE_DE_JESUS",data:{question:"Remets dans l'ordre chronologique ces événements de la Passion :",items:["La Cène", "Gethsémani", "L'arrestation", "Le jugement devant Pilate", "La crucifixion", "La résurrection"],reference:"Matthieu 26-28",explanation:"La Semaine Sainte se déroule du Jeudi Saint (Cène, Gethsémani, arrestation) au Vendredi (jugement, crucifixion) et au Dimanche (résurrection)."}},
    {id:36,type:"CHRONOLOGIE",theme:"CREATION",data:{question:"Remets dans l'ordre les sept jours de la création selon la Genèse :",items:["Lumière", "Firmament et eaux", "Terre sèche et végétaux", "Astres et saisons", "Poissons et oiseaux", "Animaux et l'homme", "Repos de Dieu"],reference:"Genèse 1:1-2:3",explanation:"La structure des 7 jours forme deux triptyques : jours 1-3 créent les espaces, jours 4-6 les peuplent."}},
    {id:37,type:"CHRONOLOGIE",theme:"HISTOIRE",data:{question:"Remets dans l'ordre chronologique les rois suivants d'Israël et de Juda :",items:["Saül", "David", "Salomon", "Roboam (division du royaume)", "Élie sous Achab", "Chute de Samarie (722)"],reference:"1 Samuel 10 — 2 Rois 17",explanation:"De l'instauration de la royauté (Saül, v. 1020) à la chute du royaume du Nord (722 av. J.-C.), 3 siècles d'histoire royale."}},
    {id:38,type:"CHRONOLOGIE",theme:"APOTRES",data:{question:"Remets dans l'ordre chronologique ces événements du livre des Actes :",items:["Pentecôte", "Lapidation d'Étienne", "Conversion de Paul", "1er voyage missionnaire", "Concile de Jérusalem", "Paul à Rome"],reference:"Actes 2-28",explanation:"Les Actes couvrent ~30 ans : de la Pentecôte (v. 30) à l'arrivée de Paul à Rome (v. 60)."}},
    {id:39,type:"CHRONOLOGIE",theme:"PROPHETES",data:{question:"Classe ces grands prophètes dans leur ordre chronologique approximatif :",items:["Élie (IXe s.)", "Amos (VIIIe s.)", "Ésaïe (VIIIe s.)", "Jérémie (VIIe-VIe s.)", "Ézéchiel (exil babylonien)", "Daniel (exil babylonien)"],reference:"1 Rois 18 — Daniel 1",explanation:"Les grands prophètes s'échelonnent du IXe au Ve siècle av. J.-C., de l'époque des royaumes divisés à la restauration post-exilique."}},
    {id:40,type:"CHRONOLOGIE",theme:"VIE_DE_JESUS",data:{question:"Remets dans l'ordre chronologique ces étapes du ministère de Jésus :",items:["Baptême dans le Jourdain", "Tentation au désert", "Noces de Cana (1er miracle)", "Sermon sur la montagne", "Transfiguration", "Entrée à Jérusalem"],reference:"Matthieu 3-21",explanation:"Du baptême (début du ministère) à l'entrée à Jérusalem, le ministère de Jésus dura environ 3 ans."}},
    {id:41,type:"CHRONOLOGIE",theme:"HISTOIRE",data:{question:"Remets dans l'ordre ces patriarches de la Genèse :",items:["Adam", "Noé", "Abraham", "Isaac", "Jacob", "Joseph"],reference:"Genèse 1-50",explanation:"Les patriarches s'étendent de la création au début de l'Exode. La Genèse couvre ~2000 ans d'histoire primordiale et patriarcale."}},
    {id:42,type:"CHRONOLOGIE",theme:"APOTRES",data:{question:"Remets dans l'ordre chronologique ces événements bibliques majeurs :",items:["Création et chute", "Déluge de Noé", "Appel d'Abraham", "Sortie d'Égypte", "Construction du Temple", "Naissance de Jésus"],reference:"Genèse 1 — Luc 2",explanation:"La grande chronologie biblique s'étend de la création (indéterminée) à la naissance de Jésus (v. 4 av. J.-C.) sur des millénaires."}},
    {id:43,type:"ASSOCIATION",theme:"HISTOIRE",data:{question:"Associe chaque personnage à son livre biblique principal :",pairs:[{left:"Moïse",right:"Exode"},{left:"Ruth",right:"Livre de Ruth"},{left:"Job",right:"Livre de Job"},{left:"Esther",right:"Livre d'Esther"},{left:"Daniel",right:"Livre de Daniel"}],reference:"AT — Livres historiques et poétiques",explanation:"Chaque livre porte le nom ou met en scène un personnage central."}},
    {id:44,type:"ASSOCIATION",theme:"VIE_DE_JESUS",data:{question:"Associe chaque déclaration de Jésus ('Je suis...') à sa référence :",pairs:[{left:"Je suis le pain de vie",right:"Jean 6:35"},{left:"Je suis la lumière du monde",right:"Jean 8:12"},{left:"Je suis la porte",right:"Jean 10:9"},{left:"Je suis la résurrection",right:"Jean 11:25"},{left:"Je suis le chemin",right:"Jean 14:6"}],reference:"Jean 6-14",explanation:"Les 7 'Je suis' de l'Évangile de Jean révèlent progressivement l'identité de Jésus."}},
    {id:45,type:"ASSOCIATION",theme:"APOTRES",data:{question:"Associe chaque épître à son destinataire :",pairs:[{left:"Aux Romains",right:"L'Église de Rome"},{left:"Aux Galates",right:"Les Églises de Galatie"},{left:"À Philémon",right:"Un maître d'esclave"},{left:"À Timothée",right:"Un jeune pasteur"},{left:"Aux Hébreux",right:"Des judéo-chrétiens"}],reference:"Épîtres pauliniennes",explanation:"Chaque épître est adaptée à son contexte : théologie pour Rome, liberté pour la Galatie, pastoral pour Timothée."}},
    {id:46,type:"ASSOCIATION",theme:"PROPHETES",data:{question:"Associe chaque prophète à sa période historique :",pairs:[{left:"Amos",right:"VIIIe siècle av. J.-C."},{left:"Jérémie",right:"Avant et pendant l'exil babylonien"},{left:"Ézéchiel",right:"Pendant l'exil à Babylone"},{left:"Aggée",right:"Après le retour d'exil"},{left:"Jean-Baptiste",right:"Ier siècle ap. J.-C."}],reference:"Prophètes AT-NT",explanation:"Connaître la période d'un prophète permet de comprendre son message de crise ou d'espérance."}},
    {id:47,type:"ASSOCIATION",theme:"PARABOLES",data:{question:"Associe chaque parabole à son enseignement principal :",pairs:[{left:"Le fils prodigue",right:"L'amour paternel de Dieu"},{left:"Le bon Samaritain",right:"L'amour du prochain sans frontière"},{left:"Les talents",right:"La responsabilité des dons reçus"},{left:"Le semeur",right:"Les quatre façons de recevoir la Parole"},{left:"Les ouvriers de la vigne",right:"La générosité gratuite de Dieu"}],reference:"Luc 15 / 10 — Matthieu 25 / 13 / 20",explanation:"Chaque parabole révèle un aspect du Royaume : la grâce, l'éthique, la responsabilité, la réception, la générosité."}},
    {id:48,type:"ASSOCIATION",theme:"CREATION",data:{question:"Associe chaque personnage de la Genèse à sa caractéristique principale :",pairs:[{left:"Adam",right:"Premier homme, gardien du jardin"},{left:"Noé",right:"Constructeur de l'arche, juste parmi les siens"},{left:"Abraham",right:"Père des croyants, ami de Dieu"},{left:"Jacob",right:"Lutte avec l'ange, devient Israël"},{left:"Joseph",right:"Vendu par ses frères, vice-roi d'Égypte"}],reference:"Genèse 1-50",explanation:"Chaque patriarche incarne une étape de la relation entre Dieu et l'humanité."}},
    {id:49,type:"ASSOCIATION",theme:"VIE_DE_JESUS",data:{question:"Associe chaque apôtre à sa caractéristique connue :",pairs:[{left:"Pierre",right:"Pêcheur, renia Jésus, première Église de Rome"},{left:"Thomas",right:"Demanda de toucher les plaies"},{left:"Matthieu",right:"Collecteur d'impôts"},{left:"Jean",right:"Disciple bien-aimé, auteur du 4e Évangile"},{left:"Paul",right:"Persécuteur converti sur le chemin de Damas"}],reference:"Évangiles — Actes",explanation:"Chaque apôtre a une personnalité distincte et un rôle unique dans la naissance de l'Église."}},
    {id:50,type:"ASSOCIATION",theme:"HISTOIRE",data:{question:"Associe chaque miracle à son auteur :",pairs:[{left:"Séparation de la mer Rouge",right:"Moïse"},{left:"Soleil arrêté à Gabaon",right:"Josué"},{left:"Feu du ciel sur le Carmel",right:"Élie"},{left:"Résurrection de Lazare",right:"Jésus"},{left:"Guérison d'Énée le paralysé",right:"Pierre"}],reference:"Exode 14 / Josué 10 / 1 Rois 18 / Jean 11 / Actes 9",explanation:"Les miracles bibliques s'inscrivent dans une continuité : Dieu agit par ses serviteurs à travers les âges."}},
    {id:51,type:"INTRUS",theme:"LOI",data:{question:"Quel est l'intrus parmi les Dix Commandements ?",items:["Tu n'auras pas d'autres dieux", "Tu ne tueras point", "Tu aimeras ton ennemi", "Tu ne voleras point"],intrus:"Tu aimeras ton ennemi",reference:"Exode 20 / Matthieu 5:44",explanation:"'Aimer ses ennemis' est un commandement de Jésus dans le Sermon sur la montagne — pas l'un des Dix Commandements du Décalogue."}},
    {id:52,type:"INTRUS",theme:"VIE_DE_JESUS",data:{question:"Quel est l'intrus parmi les noms des douze apôtres ?",items:["Simon Pierre", "Jacques fils de Zébédée", "Barnabas", "André"],intrus:"Barnabas",reference:"Matthieu 10:2-4 / Actes 13:2",explanation:"Barnabas était un disciple important mais pas l'un des douze apôtres originels. Il accompagna Paul dans ses voyages missionnaires."}},
    {id:53,type:"INTRUS",theme:"CREATION",data:{question:"Quel élément n'appartient pas aux créations du premier jour selon la Genèse ?",items:["La lumière", "Les ténèbres", "Le firmament", "Le soir et le matin"],intrus:"Le firmament",reference:"Genèse 1:3-8",explanation:"Le firmament (séparation des eaux) est créé au deuxième jour. Le premier jour : lumière, distinction jour/nuit."}},
    {id:54,type:"INTRUS",theme:"PROPHETES",data:{question:"Quel livre n'est PAS un livre prophétique de l'Ancien Testament ?",items:["Amos", "Osée", "Néhémie", "Malachie"],intrus:"Néhémie",reference:"Canon AT",explanation:"Néhémie est un livre historique relatant la reconstruction de Jérusalem. Ce n'est pas un livre prophétique."}},
    {id:55,type:"INTRUS",theme:"PARABOLES",data:{question:"Quelle parabole n'est PAS racontée par Jésus ?",items:["Le fils prodigue", "La brebis perdue", "Jonas et la baleine", "Les dix vierges"],intrus:"Jonas et la baleine",reference:"Jonas 1:17 / Matthieu 12:40",explanation:"Jonas et le grand poisson est un récit de l'Ancien Testament, pas une parabole de Jésus. Jésus y fait allusion mais ne la 'raconte' pas comme parabole."}},
    {id:56,type:"INTRUS",theme:"APOTRES",data:{question:"Quel élément n'appartient pas aux fruits de l'Esprit selon Paul (Galates 5) ?",items:["Amour", "Foi", "Courage", "Paix"],intrus:"Courage",reference:"Galates 5:22-23",explanation:"Les fruits de l'Esprit sont : amour, joie, paix, patience, bonté, bénignité, fidélité, douceur, tempérance. Le courage n'en fait pas partie."}},
    {id:57,type:"INTRUS",theme:"VIE_DE_JESUS",data:{question:"Lequel de ces événements n'eut PAS lieu lors de la crucifixion selon les Évangiles ?",items:["Les ténèbres sur toute la terre", "Le voile du Temple déchiré", "Jésus descend de la croix", "La terre trembla"],intrus:"Jésus descend de la croix",reference:"Matthieu 27:45-54",explanation:"Jésus ne descendit pas de la croix — il y mourut. C'est Joseph d'Arimathée qui reçut son corps et l'enterra."}},
    {id:58,type:"INTRUS",theme:"HISTOIRE",data:{question:"Quel roi n'a PAS été roi d'Israël (avant la division du royaume) ?",items:["Saül", "David", "Salomon", "Jéroboam"],intrus:"Jéroboam",reference:"1 Rois 12:20",explanation:"Jéroboam fut le premier roi du royaume du Nord après la division — pas roi d'Israël uni. Les trois rois de l'unité furent Saül, David et Salomon."}},
    {id:59,type:"INTRUS",theme:"PSAUMES",data:{question:"Quelle expression ne se trouve PAS dans le Psaume 23 ?",items:["Je ne manquerai de rien", "La vallée de l'ombre", "Mon âme se languit vers toi", "Ta houlette me rassure"],intrus:"Mon âme se languit vers toi",reference:"Psaume 23 / Psaume 84:2",explanation:"'Mon âme se languit et soupire après les parvis de l'Éternel' vient du Psaume 84, pas du Psaume 23."}},
    {id:60,type:"VERSET_COMPLETE",theme:"APOCALYPSE",data:{template:"Je suis l'___ et l'___, le commencement et la fin.",blanks:["Alpha","Oméga"],reference:"Apocalypse 21:6",hint:"La première et la dernière lettre de l'alphabet grec."}},

    {id:98,type:"ASSOCIATION",theme:"HISTOIRE",data:{question:"Associe chaque femme de l'Ancien Testament à son identité :",pairs:[{left:"Sarah",right:"Épouse d'Abraham"}, {left:"Rébecca",right:"Épouse d'Isaac"}, {left:"Rachel",right:"L'épouse préférée de Jacob"}, {left:"Miriam",right:"Sœur de Moïse"}, {left:"Rahab",right:"Celle qui cacha les espions"}],reference:"Ancien Testament",explanation:"Des figures féminines clés de l'histoire sainte."}},
    {id:99,type:"ASSOCIATION",theme:"HISTOIRE",data:{question:"Associe ces rois à leurs actes :",pairs:[{left:"Saül",right:"Le premier roi d'Israël"}, {left:"David",right:"A pris Jérusalem comme capitale"}, {left:"Salomon",right:"A construit le premier Temple"}, {left:"Josias",right:"Le jeune roi réformateur"}, {left:"Ézéchias",right:"A fait creuser un tunnel pour l'eau"}],reference:"Livres des Rois",explanation:"Les rois marquants de Juda."}},
    {id:100,type:"ASSOCIATION",theme:"HISTOIRE",data:{question:"Associe la citation à son auteur :",pairs:[{left:"'Où est ton frère Abel ?'",right:"Dieu"}, {left:"'Je ne te lâcherai point, que tu ne m'aies béni.'",right:"Jacob"}, {left:"'Me voici, envoie-moi.'",right:"Ésaïe"}, {left:"'Voici la servante du Seigneur.'",right:"Marie"}],reference:"Textes divers",explanation:"Des paroles mémorables."}},

    {id:106,type:"INTRUS",theme:"LOI",data:{question:"Quel est l'intrus parmi ces livres du Pentateuque ?",items:["Genèse", "Exode", "Josué", "Lévitique"],intrus:"Josué",reference:"Pentateuque",explanation:"Josué est le premier livre historique, il ne fait pas partie des 5 livres de Moïse (la Torah)."}},
    {id:107,type:"INTRUS",theme:"HISTOIRE",data:{question:"Quel est l'intrus parmi ces fleuves bibliques ?",items:["Jourdain", "Nil", "Euphrate", "Tamise"],intrus:"Tamise",reference:"Géographie",explanation:"La Tamise est à Londres, pas au Proche-Orient !"}},
    {id:108,type:"INTRUS",theme:"HISTOIRE",data:{question:"Quel est l'intrus parmi ces tribus d'Israël ?",items:["Juda", "Benjamin", "Lévi", "Paul"],intrus:"Paul",reference:"Tribus d'Israël",explanation:"Paul n'est pas une tribu, c'est un apôtre (qui était d'ailleurs de la tribu de Benjamin)."}},
    {id:109,type:"INTRUS",theme:"HISTOIRE",data:{question:"Lequel de ces personnages n'était pas un juge d'Israël ?",items:["Gédéon", "Samson", "Débora", "Josias"],intrus:"Josias",reference:"Livre des Juges",explanation:"Josias était un grand roi réformateur de Juda, des siècles après l'époque des Juges."}},
    {id:110,type:"INTRUS",theme:"VIE_DE_JESUS",data:{question:"Lequel de ces apôtres n'était pas pêcheur ?",items:["Pierre", "André", "Matthieu", "Jean"],intrus:"Matthieu",reference:"Les Évangiles",explanation:"Matthieu était collecteur d'impôts (publicain) avant d'être appelé par Jésus."}},
    {id:111,type:"INTRUS",theme:"HISTOIRE",data:{question:"Lequel de ces rois n'a pas régné sur tout Israël (royaume uni) ?",items:["Saül", "David", "Salomon", "Achab"],intrus:"Achab",reference:"Livres des Rois",explanation:"Achab a régné seulement sur le royaume du Nord (Israël) après le grand schisme."}},
    {id:112,type:"INTRUS",theme:"LOI",data:{question:"Quelle n'est pas une plaie d'Égypte ?",items:["L'eau changée en sang", "Les grenouilles", "Les sauterelles", "Le tremblement de terre"],intrus:"Le tremblement de terre",reference:"Exode 7-12",explanation:"Il n'y a pas eu de tremblement de terre parmi les 10 plaies."}},
    {id:113,type:"INTRUS",theme:"APOTRES",data:{question:"Lequel de ces livres n'est pas une épître de Paul ?",items:["Romains", "Galates", "Jacques", "Éphésiens"],intrus:"Jacques",reference:"Nouveau Testament",explanation:"L'épître de Jacques est une épître 'catholique' (universelle), non paulinienne."}},
    {id:114,type:"INTRUS",theme:"PROPHETES",data:{question:"Lequel de ces prophètes n'est pas considéré comme un grand prophète (majeur) ?",items:["Ésaïe", "Jérémie", "Ézéchiel", "Osée"],intrus:"Osée",reference:"Classification biblique",explanation:"Osée est le premier des 12 'petits prophètes', appelés ainsi en raison de la brièveté de leurs livres."}},

  ]
};

const LECTURES=[{id:1,section:"TORAH",crossRefs:["Jean 1:1-3","Romains 8:22","Apocalypse 21:1"],title:"La Création",reference:"Genèse 1:1-5",theme:"CREATION",passage:"Au commencement, Dieu créa les cieux et la terre. Or la terre était informe et vide ; les ténèbres couvraient l'abîme, et l'Esprit de Dieu planait au-dessus des eaux. Dieu dit : Que la lumière soit ! Et la lumière fut.",context:"Ce texte ouvre toute la Bible avec une affirmation radicale : Dieu est à l'origine de tout ce qui existe.",keyPoints:["La création est un acte libre et souverain de Dieu","L'ordre émerge du chaos par la simple Parole divine","La lumière précède le soleil — Dieu est la source ultime"],theology:"Les chrétiens lisent ce passage à la lumière du prologue de Jean : 'Au commencement était le Verbe' (Jean 1:1)."},{id:2,section:"TORAH",crossRefs:["Romains 4:3","Hébreux 11:8-10","Galates 3:8"],title:"L'Appel d'Abraham",reference:"Genèse 12:1-4",theme:"HISTOIRE",passage:"L'Éternel dit à Abram : Va-t'en de ton pays, de ta patrie et de la maison de ton père, dans le pays que je te montrerai. Je ferai de toi une grande nation, je te bénirai, et je rendrai ton nom grand.",context:"Cet appel est le point de départ de l'histoire du salut biblique.",keyPoints:["La foi implique un départ et un risque concret","La promesse est à la fois personnelle et universelle","Abraham obéit sans condition visible"],theology:"Paul dans Galates 3 voit dans Abraham le modèle de la justification par la foi."},{id:3,section:"POETIQUES",crossRefs:["Jean 10:11","Ézéchiel 34:11-16","Luc 15:4-6"],title:"Le Psaume 23",reference:"Psaume 23",theme:"PSAUMES",passage:"L'Éternel est mon berger : je ne manquerai de rien. Il me fait reposer dans de verts pâturages, il me dirige près des eaux paisibles. Il restaure mon âme.",context:"Ce psaume de David est l'un des textes les plus connus et aimés de toute la Bible.",keyPoints:["L'image du berger souligne le soin personnel de Dieu","La 'vallée de l'ombre' est traversée avec Dieu, pas contournée"],theology:"Jésus reprend cette image en Jean 10 : 'Je suis le bon berger'."},{id:4,section:"EVANGILES",crossRefs:["Luc 6:20-23","Ésaïe 61:1-3","Psaume 1:1"],title:"Les Béatitudes",reference:"Matthieu 5:3-10",theme:"VIE_DE_JESUS",passage:"Heureux les pauvres en esprit, car le royaume des cieux est à eux. Heureux les affligés, car ils seront consolés. Heureux les débonnaires, car ils hériteront la terre.",context:"Les Béatitudes ouvrent le Sermon sur la montagne, la grande charte éthique de Jésus.",keyPoints:["Chaque béatitude décrit une réalité présente et une promesse future","Elles dessinent le portrait du citoyen du Royaume"],theology:"Plusieurs Pères de l'Église lisent les Béatitudes comme une progression spirituelle."},{id:5,section:"EVANGILES",crossRefs:["Romains 5:8","1 Jean 4:9","Ésaïe 53:5"],title:"Jean 3:16",reference:"Jean 3:14-17",theme:"VIE_DE_JESUS",passage:"Car Dieu a tant aimé le monde qu'il a donné son Fils unique, afin que quiconque croit en lui ne périsse point, mais qu'il ait la vie éternelle.",context:"Ce passage est souvent appelé 'le résumé de l'Évangile'.",keyPoints:["L'amour de Dieu est universel : 'le monde'","Le don est radical : le Fils unique","La condition est simple : croire"],theology:"Luther appelait Jean 3:16 'la petite Bible'."},{id:6,section:"EPITRES",crossRefs:["Joël 2:28","Genèse 11:9","1 Corinthiens 12:13"],title:"La Pentecôte",reference:"Actes 2:1-11",theme:"APOTRES",passage:"Tout à coup il vint du ciel un bruit comme celui d'un vent impétueux, et il remplit toute la maison. Des langues semblables à des langues de feu se posèrent sur chacun d'eux. Et ils furent tous remplis du Saint-Esprit.",context:"La Pentecôte est le cinquantième jour après Pâques, jour de naissance de l'Église.",keyPoints:["Le vent et le feu symbolisent la présence divine","Les langues renversent symboliquement la confusion de Babel"],theology:"La Pentecôte marque le passage d'un groupe d'apeurés à une communauté missionnaire."},
  {id:7,section:"TORAH",title:"La chute — le péché originel",reference:"Genèse 3:1-24",theme:"CREATION",passage:"Le serpent était le plus rusé de tous les animaux. Il dit à la femme : 'Dieu a-t-il réellement dit : Vous ne mangerez pas de tous les arbres du jardin ?' La femme répondit : 'Nous mangeons du fruit des arbres du jardin. Mais quant au fruit de l'arbre qui est au milieu du jardin, Dieu a dit : Vous n'en mangerez pas et vous n'y toucherez pas, de peur que vous ne mouriez.'",context:"La chute suit immédiatement le récit de la création. Le serpent ne ment pas directement — il questionne et déforme. La femme répond mais exagère l'interdit ('vous n'y toucherez pas'), signe d'une représentation déjà altérée de Dieu. Le fruit ouvre les yeux mais apporte la honte, non la sagesse promise.",keyPoints:["Le péché commence par le doute sur la parole de Dieu","La désobéissance entraîne honte, rupture relationnelle et mort","Dieu cherche l'homme ('Où es-tu ?') avant de le juger","La promesse du verset 15 (Proto-Évangile) annonce une victoire future sur le serpent"],theology:"Augustin y voit l'origine du péché originel transmis à toute l'humanité. Paul (Romains 5) fait le parallèle Adam/Christ : 'comme par un seul homme le péché est entré dans le monde... de même par un seul homme la justice.' Jean 3:16 est la réponse divine à la Genèse 3.",crossRefs:["Romains 5:12-21","Jean 3:16","Apocalypse 12:9","Ésaïe 53:5"]},
  {id:8,section:"TORAH",title:"Le sacrifice d'Isaac — l'Akéda",reference:"Genèse 22:1-18",theme:"HISTOIRE",passage:"Il dit : 'Prends ton fils, ton unique, celui que tu aimes, Isaac, et va dans le pays de Morija, et là offre-le en holocauste sur l'une des montagnes que je te dirai.' Abraham se leva de bon matin... Il prit le bois de l'holocauste, le chargea sur Isaac son fils, prit en main le feu et le couteau, et ils marchèrent tous deux ensemble.",context:"L'Akéda (ligature d'Isaac) est le test ultime de la foi d'Abraham. 'Ils marchèrent tous deux ensemble' — cette répétition exprime une unité troublante entre père et fils. Isaac pose LA question ('Où est l'agneau ?') à laquelle Abraham répond prophétiquement sans le savoir. Au dernier moment, Dieu arrête le geste et substitue un bélier.",keyPoints:["La foi obéissante peut aller jusqu'au paradoxe absolu","'Dieu pourvoira' — le nom Yahweh-Jiré nait de cet épisode","Isaac porte lui-même le bois du sacrifice — image du portement de croix","Ce texte est lu comme type de l'offrande du Fils par le Père"],theology:"Le christianisme voit dans l'Akéda la préfiguration du sacrifice du Christ : le Fils unique, le bois, la montagne (traditionnellement identifiée à Golgotha), la substitution. Jean 3:16 ('il a donné son Fils unique') résonne directement avec 'ton fils, ton unique'. Hébreux 11:17-19 dit qu'Abraham croyait que Dieu pouvait ressusciter Isaac.",crossRefs:["Jean 3:16","Hébreux 11:17-19","Romains 8:32","Jean 1:29"]},
  {id:9,section:"TORAH",title:"La rencontre du Buisson ardent",reference:"Exode 3:1-15",theme:"LOI",passage:"L'ange de l'Éternel lui apparut dans une flamme de feu, du milieu d'un buisson. Moïse regarda : le buisson était en feu et le buisson ne se consumait pas. Dieu appela à lui du milieu du buisson et dit : 'Je suis le Dieu de ton père, le Dieu d'Abraham, le Dieu d'Isaac, et le Dieu de Jacob.'",context:"Moïse a fui l'Égypte après avoir tué un Égyptien. À 80 ans, berger dans le désert, il gardait le troupeau de son beau-père. La rencontre est unilatérale : c'est Dieu qui prend l'initiative. Le buisson brûle mais ne se consume pas — paradoxe de la présence divine qui transforme sans détruire. La révélation du nom 'Je suis qui je suis' (Ehyeh asher Ehyeh) est fondatrice.",keyPoints:["Dieu prend l'initiative de la rencontre — non Moïse","'Je suis' (YHWH) révèle un Dieu présent, actif, indéfinissable par catégories humaines","Moïse hésite et objecte cinq fois — Dieu répond à chaque objection","La réponse divine aux souffrances n'est pas une explication mais une présence"],theology:"Le Nom divin YHWH (traduit 'l'Éternel' ou 'le SEIGNEUR') est au cœur de toute la théologie biblique. Jésus reprendra ce 'Je suis' dans l'Évangile de Jean pour s'identifier ('Avant Abraham, Je suis'). Les Pères voient dans le buisson ardent une image de Marie : portant le divin sans se consumer.",crossRefs:["Jean 8:58","Exode 6:2-8","Jean 1:14","Apocalypse 1:8"]},
  {id:10,section:"TORAH",title:"Le Décalogue — les Dix Commandements",reference:"Exode 20:1-17",theme:"LOI",passage:"Dieu prononça toutes ces paroles : 'Je suis l'Éternel, ton Dieu, qui t'ai fait sortir du pays d'Égypte, de la maison de servitude. Tu n'auras pas d'autres dieux devant ma face. Tu ne te feras point d'image taillée... Tu ne prendras point le nom de l'Éternel ton Dieu en vain... Souviens-toi du jour du sabbat pour le sanctifier.'",context:"Le Décalogue est précédé d'un préambule révélateur : 'Je suis l'Éternel... qui t'ai fait sortir'. La Loi n'est pas donnée pour mériter la libération — elle est donnée à un peuple déjà libéré. Les commandements structurent la relation verticale (Dieu, 1-4) et horizontale (prochain, 5-10). Ils seront gravés sur deux tables de pierre par le doigt de Dieu.",keyPoints:["La Loi est un cadeau fait à un peuple déjà sauvé, non une condition du salut","Les 4 premiers commandements concernent la relation à Dieu, les 6 suivants la relation au prochain","Jésus résumera la Loi entière en deux commandements (Dt 6:5 + Lv 19:18)","Le sabbat est au cœur de la Loi comme temps de la ressemblance à Dieu"],theology:"Paul distingue la Loi comme pédagogue menant au Christ (Galates 3:24) et comme accablant le pécheur incapable de la tenir (Romains 7). Jésus dit qu'il n'est pas venu abolir mais accomplir. La nouvelle alliance (Jr 31) inscrit la Loi dans les cœurs plutôt que sur des tables de pierre.",crossRefs:["Matthieu 22:37-40","Jérémie 31:31-34","Romains 7:7-12","Galates 3:24"]},
  {id:11,section:"TORAH",title:"Le Shema Israël — confession de foi",reference:"Deutéronome 6:4-9",theme:"LOI",passage:"Écoute, Israël ! L'Éternel notre Dieu est le seul Éternel. Tu aimeras l'Éternel ton Dieu de tout ton cœur, de toute ton âme et de toute ta force. Et ces commandements que je te donne aujourd'hui seront dans ton cœur. Tu les répéteras à tes enfants.",context:"Le Shema ('écoute' en hébreu) est la prière fondamentale du judaïsme, récitée deux fois par jour depuis des millénaires. Ce passage suit le rappel du Décalogue au chapitre 5. L'amour de Dieu n'est pas un sentiment mais un engagement total de l'être — cœur, âme, force. La transmission aux enfants ('Tu les répéteras') fait partie de la Loi elle-même.",keyPoints:["'Écoute' (shema) implique une obéissance active, pas seulement intellectuelle","L'unicité de Dieu fonde l'amour total — l'un entraîne l'autre","La Loi doit être dans le cœur avant d'être dans les pratiques extérieures","Jésus cite ce texte comme 'le premier et le plus grand commandement'"],theology:"Jésus cite le Shema (Matthieu 22:37) et y ajoute Lévitique 19:18 pour résumer toute la Loi. Paul reprend la dimension du cœur dans Romains 2:29 (circoncision du cœur). L'Apocalypse décrit les élus comme ayant le nom de Dieu écrit sur le front — accomplissement ultime du 'tu les lieras sur ta main.'",crossRefs:["Matthieu 22:37-40","Marc 12:29-31","Romains 2:29","Deutéronome 30:6"]},
  {id:12,section:"TORAH",title:"La bénédiction sacerdotale d'Aaron",reference:"Nombres 6:22-27",theme:"LOI",passage:"L'Éternel parla à Moïse et dit : 'Parle à Aaron et à ses fils, et dis-leur : Vous bénirez ainsi les enfants d'Israël, vous leur direz : L'Éternel te bénisse et te garde ! L'Éternel fasse briller sa face sur toi, et qu'il t'accorde sa grâce ! L'Éternel tourne sa face vers toi, et qu'il te donne la paix !'",context:"Cette bénédiction tripartite (3, 5, 7 mots en hébreu — structure croissante) est l'une des formules liturgiques les plus anciennes de la Bible. Elle a été retrouvée sur deux petites lames d'argent à Jérusalem datant du VIIe siècle av. J.-C. — les plus anciens textes bibliques connus. Elle structure toujours la liturgie chrétienne et juive.",keyPoints:["Structure ascendante : bénédiction → grâce → paix (shalom)","La 'face de Dieu' qui brille exprime la bienveillance et la présence personnelle","Shalom (paix) est le fruit de la relation restaurée avec Dieu","Cette bénédiction est encore utilisée dans les liturgies chrétiennes et juives"],theology:"Les Pères de l'Église voient dans les trois formules une référence aux trois personnes de la Trinité. Paul conclut plusieurs épîtres par une bénédiction trinitaire (2 Corinthiens 13:13). En Numbers Rabbah, 'que sa face brille' est interprété comme la lumière de la Torah. Dans le christianisme, elle annonce la bénédiction finale en Jésus-Christ.",crossRefs:["2 Corinthiens 13:13","Psaume 67:1-2","Jean 14:27","Apocalypse 22:4"]},
  {id:13,section:"TORAH",title:"Les Béatitudes de la Loi — Psaume 1",reference:"Psaume 1:1-6",theme:"PSAUMES",passage:"Heureux l'homme qui ne marche pas selon le conseil des méchants, qui ne s'arrête pas sur la voie des pécheurs, et qui ne s'assied pas en compagnie des moqueurs, mais qui trouve son plaisir dans la loi de l'Éternel, et qui la médite jour et nuit !",context:"Le Psaume 1 fonctionne comme portail d'entrée dans tout le Psautier. Ce n'est pas une prière mais une contemplation des deux voies — le juste et le méchant. L'image de l'arbre planté au bord des cours d'eau est celle d'une vie enracinée et féconde. Trois verbes décrivent la descente du méchant : marcher, s'arrêter, s'asseoir.",keyPoints:["La béatitude (ashré = heureux) est une constatation, non une promesse conditionnelle","Trois stades de la compromission : fréquenter, stationner, siéger parmi les méchants","La méditation de la Loi (nuit et jour) est un acte d'amour, non de contrainte","Les deux voies et leur destin opposé structurent tout le message prophétique"],theology:"Ce psaume est lu comme introduction christologique par les Pères : Jésus est l'arbre planté au bord des eaux, le Juste parfait dont la voie ne périt pas. Les Béatitudes du Sermon sur la montagne (Mt 5:3-12) commencent aussi par 'Heureux' (makarios) — écho direct du Psaume 1.",crossRefs:["Matthieu 5:3-12","Jérémie 17:7-8","Jean 15:4-5","Psaume 37:1-11"]},
  {id:14,section:"TORAH",title:"La promesse du Serviteur — Ésaïe 42",reference:"Ésaïe 42:1-7",theme:"PROPHETES",passage:"Voici mon serviteur que je soutiendrai, mon élu en qui mon âme prend plaisir. J'ai mis mon Esprit sur lui ; il annoncera la justice aux nations. Il ne criera ni n'élèvera la voix, il ne la fera point entendre dans les rues. Il ne brisera pas le roseau froissé, il n'éteindra pas le lumignon qui faiblit.",context:"Premier des quatre 'Chants du Serviteur' (42, 49, 50, 52-53). Ce Serviteur mystérieux — Israël collectif ou individu ? — est investi de l'Esprit pour une mission universelle. Sa méthode contraste radicalement avec les puissants de ce monde : pas de violence, douceur avec les fragiles. Matthieu l'applique explicitement à Jésus.",keyPoints:["Le Serviteur reçoit l'Esprit pour une mission de justice universelle","Sa douceur ('roseau froissé', 'lumignon qui faiblit') caractérise sa méthode","Sa mission dépasse Israël : 'lumière des nations'","Matthieu 12:17-21 voit dans la guérison des malades par Jésus l'accomplissement de ce texte"],theology:"Les quatre chants du Serviteur (42, 49, 50, 52-53) forment une progression : investiture → mission → souffrance → mort expiatoire et glorification. Le Nouveau Testament les applique massivement à Jésus. Le Baptême de Jésus ('celui-ci est mon Fils bien-aimé en qui j'ai mis ma complaisance') est une citation directe d'Ésaïe 42:1.",crossRefs:["Matthieu 3:17","Matthieu 12:17-21","Ésaïe 49:6","Ésaïe 52:13-53:12"]},
  {id:15,section:"HISTORIQUES",title:"La vocation de Josué — sois fort et courageux",reference:"Josué 1:1-9",theme:"HISTOIRE",passage:"Après la mort de Moïse, serviteur de l'Éternel, l'Éternel dit à Josué, fils de Nun, serviteur de Moïse : 'Moïse mon serviteur est mort. Maintenant, lève-toi, passe ce Jourdain, toi et tout ce peuple. Sois fort et courageux... n'aie pas peur et ne t'effraie pas, car l'Éternel ton Dieu sera avec toi partout où tu iras.'",context:"Josué prend la suite de Moïse devant une tâche impossible : conquérir un pays occupé par des nations puissantes. La répétition de 'sois fort et courageux' (trois fois dans ce texte) est caractéristique du style hébreu pour souligner l'urgence. La promesse divine 'partout où tu iras' est inconditionnelle. La méditation de la Loi est liée à la réussite militaire.",keyPoints:["Le courage commandé n'est pas l'absence de peur mais l'action malgré la peur","La méditation de la Loi de jour et de nuit est une condition de réussite, non une option","'Partout où tu iras' — la présence divine est géographiquement universelle","Josué (Yehoshua) porte le même nom que Jésus (Yeshua) en araméen"],theology:"Josué est une figure typologique de Jésus : même nom, mène le peuple dans la Terre Promise après Moïse (la Loi), comme Jésus mène les croyants dans le repos promis (Hébreux 4). La lettre aux Hébreux développe explicitement ce parallèle. 'Sois fort et courageux' devient chez Paul : 'je puis tout par celui qui me fortifie' (Ph 4:13).",crossRefs:["Hébreux 4:8-9","Philippiens 4:13","Matthieu 28:20","2 Timothée 1:7"]},
  {id:16,section:"HISTORIQUES",title:"La fidélité de Ruth — amour loyal",reference:"Ruth 1:14-18",theme:"HISTOIRE",passage:"Orpa embrassa sa belle-mère et s'en retourna vers son peuple. Mais Ruth s'attacha à elle. Naomi lui dit : 'Voici, ta belle-sœur est retournée vers son peuple et vers ses dieux ; retourne après ta belle-sœur.' Ruth répondit : 'Ne me demande pas de te quitter et de m'en retourner loin de toi, car où tu iras j'irai, où tu t'arrêteras je m'arrêterai ; ton peuple sera mon peuple, et ton Dieu sera mon Dieu.'",context:"Ruth est une Moabite — une étrangère, d'un peuple considéré comme ennemi d'Israël. Sa fidélité à Naomi après la mort de leurs maris respectifs est un acte de hesed (amour loyal) remarquable. Elle abandonne tout — patrie, famille, dieux — pour rester avec une belle-mère âgée et démunie. Cette décision changera le cours de l'histoire d'Israël.",keyPoints:["Le hesed (amour fidèle) de Ruth dépasse toutes les obligations légales","Une étrangère devient modèle de fidélité dans la Bible hébraïque","La conversion n'est pas explicite mais incluse dans 'ton Dieu sera mon Dieu'","Ruth deviendra l'arrière-grand-mère du roi David — et ancêtre de Jésus"],theology:"Le livre de Ruth montre que l'alliance divine n'est pas réservée à Israël par naissance. Boaz, le 'go'el' (rédempteur/racheteur), est une figure typologique du Christ qui rachète l'humanité. Matthieu inclut Ruth dans la généalogie de Jésus (Mt 1:5) — acte théologique délibéré incluant les nations dans l'histoire du salut.",crossRefs:["Matthieu 1:5","Galates 3:28","Jean 10:16","Éphésiens 2:12-13"]},
  {id:17,section:"HISTORIQUES",title:"La prière de Salomon — l'inauguration du Temple",reference:"1 Rois 8:27-30",theme:"HISTOIRE",passage:"Mais quoi ! Dieu habiterait-il vraiment sur la terre ? Voici, les cieux et les cieux des cieux ne peuvent te contenir : combien moins cette maison que j'ai bâtie ! Cependant, Éternel mon Dieu, sois attentif à la prière de ton serviteur et à sa supplication, pour écouter le cri et la prière que ton serviteur t'adresse aujourd'hui.",context:"Salomon vient d'achever le Temple après 7 ans de construction. Sa prière d'inauguration est un chef-d'œuvre théologique : il construit le Temple mais affirme aussitôt que Dieu ne peut y être enfermé. 'Les cieux des cieux ne peuvent te contenir' — formule de transcendance absolue. Il demande à Dieu d'entendre les prières 'depuis les cieux où tu habites.'",keyPoints:["Paradoxe central : on construit une maison pour Dieu mais Dieu est incontenable","La prière oriente vers le lieu (Jérusalem/le Temple) mais Dieu reste au ciel","Salomon intercède non seulement pour Israël mais aussi pour les étrangers (v.41)","Le Temple est moins une demeure de Dieu qu'un lieu de prière et de rencontre"],theology:"Étienne (Actes 7:48) et Paul (Actes 17:24) reprennent cette théologie : 'Le Très-Haut n'habite pas dans des maisons faites de main d'homme.' Jean 2:19-21 et 1 Corinthiens 6:19 annoncent que le vrai Temple est le corps du Christ et le corps des croyants.",crossRefs:["Actes 7:48","Jean 2:19-21","1 Corinthiens 6:19","Ésaïe 66:1-2"]},
  {id:18,section:"HISTORIQUES",title:"Élie au mont Horeb — la voix douce et subtile",reference:"1 Rois 19:9-13",theme:"HISTOIRE",passage:"Il arriva là une caverne, et y passa la nuit. Et voici, la parole de l'Éternel lui fut adressée. L'Éternel lui dit : 'Qu'as-tu à faire ici, Élie ?' Il répondit : 'J'ai été animé d'un zèle ardent pour l'Éternel.' Après le feu, une voix douce et subtile se fit entendre.",context:"Élie vient de remporter la victoire spectaculaire du Carmel, mais s'est ensuite enfui devant les menaces de Jézabel. Épuisé, désirant mourir, il a marché 40 jours vers le Sinaï — même montagne que Moïse. La question 'qu'as-tu à faire ici ?' est posée deux fois. Vent violent, tremblement de terre, feu — Dieu n'est dans aucun. Puis la 'voix douce et subtile' (qol demamah daqah).",keyPoints:["Dieu n'est pas dans la puissance spectaculaire mais dans le murmure","La dépression d'Élie est traitée avec soin : nourriture, sommeil, présence — avant la mission","La question divine répétée met en lumière le burnout spirituel d'Élie","Le retour au Sinaï (Horeb) relie Élie à Moïse dans la continuité prophétique"],theology:"Ce passage est l'anti-thèse du Carmel : après le feu du ciel et la victoire éclatante, le silence. Les mystiques chrétiens (Jean de la Croix, Thérèse) y voient l'image de la contemplation et de la nuit obscure. La 'voix douce et subtile' devient paradigme de l'expérience mystique : Dieu se révèle dans le dépouillement, non la performance.",crossRefs:["Matthieu 11:28-30","Ésaïe 42:2-3","1 Rois 18:38","2 Rois 2:11"]},
  {id:19,section:"HISTORIQUES",title:"La vision du trône de Dieu — Ésaïe 6",reference:"Ésaïe 6:1-8",theme:"PROPHETES",passage:"L'année de la mort du roi Ozias, je vis le Seigneur assis sur un trône très élevé, et les pans de sa robe remplissaient le Temple. Des séraphins se tenaient au-dessus de lui ; chacun avait six ailes. Ils se criaient l'un à l'autre : 'Saint, saint, saint est l'Éternel des armées ! Toute la terre est pleine de sa gloire !'",context:"Ésaïe reçoit sa vocation lors d'une vision du Temple céleste. La répétition triple de 'saint' (qadosh, qadosh, qadosh) est le Sanctus — formule liturgique unique dans la Bible. L'expression de l'impureté d'Ésaïe face au saint (v.5) est suivie de la purification par le charbon ardent, puis de la vocation. Le modèle est : vision → aveu d'indignité → purification → mission.",keyPoints:["Le Sanctus (Saint, saint, saint) deviendra la prière centrale de la liturgie chrétienne","La réponse d'Ésaïe 'Me voici, envoie-moi' est le modèle de la disponibilité prophétique","La purification précède la mission — on ne peut annoncer ce qu'on n'a pas reçu","'Toute la terre est pleine de sa gloire' — la sainteté de Dieu déborde le Temple"],theology:"Jean 12:41 dit qu'Ésaïe a vu la gloire du Christ. Apocalypse 4:8 reprend le Sanctus autour du trône céleste. La liturgie chrétienne (messe, liturgie orthodoxe, culte protestant) chante le Sanctus directement issu de ce texte. L'appel 'Me voici, envoie-moi' structure la vocation missionnaire de l'Église.",crossRefs:["Jean 12:41","Apocalypse 4:8","Matthieu 28:19","Romains 10:15"]},
  {id:20,section:"HISTORIQUES",title:"Daniel dans la fosse aux lions",reference:"Daniel 6:16-23",theme:"HISTOIRE",passage:"Le roi dit à Daniel : 'Que ton Dieu, que tu sers avec persévérance, te délivre !' On apporta une pierre et on la plaça sur l'ouverture de la fosse. Le roi scella la pierre avec son cachet et avec le cachet de ses grands, afin qu'on ne changeât rien à ce qui concernait Daniel. Dès l'aurore, le roi se leva précipitamment.",context:"Daniel refuse d'obéir à un décret interdisant toute prière à d'autres dieux que le roi Darius, sous peine d'être jeté aux lions. Il continue à prier trois fois par jour, fenêtres ouvertes vers Jérusalem. Son intégrité est totale. La scène du roi qui ne peut dormir et court au matin rappelle le retournement dramatique des récits de délivrance bibliques.",keyPoints:["La fidélité de Daniel au milieu d'un empire hostile est un modèle de résistance douce","L'ironie du récit : c'est le roi païen qui affirme la puissance du Dieu de Daniel","La délivrance miraculeuse ne récompense pas une foi parfaite mais une fidélité constante","Les lions muselés préfigurent la victoire sur la mort dans la symbolique chrétienne"],theology:"L'Église primitive, persécutée par Rome, s'identifiait à Daniel. Pierre (1 Pierre 5:8) utilise l'image du lion pour le diable — que Daniel a vaincu. Hébreux 11:33 cite 'ceux qui ont fermé la gueule des lions'. La pierre scellée sur la fosse puis enlevée au matin a été lue comme figure du tombeau de Jésus.",crossRefs:["1 Pierre 5:8","Hébreux 11:33","Matthieu 27:60","Daniel 3:17-18"]},
  {id:21,section:"HISTORIQUES",title:"Esther — 'Si je dois périr, je périrai'",reference:"Esther 4:12-16",theme:"HISTOIRE",passage:"Mardochée dit à rapporter à Esther : 'Ne t'imagine pas que tu échapperas seule d'entre tous les Juifs, parce que tu es dans la maison du roi. Car si tu te tais maintenant, le secours et la délivrance viendront d'un autre endroit pour les Juifs. Et qui sait si ce n'est pas pour un temps comme celui-ci que tu es parvenue à la royauté ?'",context:"Mardochée demande à Esther d'intercéder auprès du roi pour sauver les Juifs du complot d'Haman. Esther risque sa vie : entrer sans invitation chez le roi peut être puni de mort. La phrase de Mardochée 'qui sait si...' est remarquable : ni certitude ni fatalisme, mais conviction que la Providence agit à travers les positions et les choix humains.",keyPoints:["Le livre d'Esther ne mentionne jamais le nom de Dieu — mais sa providence est partout","La position sociale n'est pas un privilège mais une responsabilité","'Pour un temps comme celui-ci' — chaque génération a sa mission","Le courage d'Esther est l'archétype de l'intercession au péril de sa vie"],theology:"L'absence du nom de Dieu dans Esther a intrigué les rabbins. Le Talmud débat de son inclusion dans le canon. Les chrétiens y voient une méditation sur la providence cachée. L'intercession d'Esther est parfois comparée à celle du Christ qui intercède pour les siens (Romains 8:34, Hébreux 7:25). La fête de Pourim commémore cet épisode.",crossRefs:["Romains 8:34","Hébreux 7:25","Romains 8:28","1 Pierre 2:9"]},
  {id:22,section:"HISTORIQUES",title:"Néhémie — construire et se défendre",reference:"Néhémie 4:17-18",theme:"HISTOIRE",passage:"Ceux qui portaient les matériaux travaillaient d'une main à l'ouvrage, et tenaient de l'autre main un javelot. Les bâtisseurs avaient chacun leur épée ceinte sur les reins pendant qu'ils bâtissaient.",context:"Néhémie rebâtit les murs de Jérusalem en 52 jours malgré l'opposition de Sanballat et Tobija qui organisent des raids. Sa réponse est pratique et spirituelle : travailler et se défendre simultanément. 'Nous fîmes la prière à notre Dieu, et nous mîmes des gardes' (4:9). Ce double geste deviendra paradigme de l'action dans l'adversité.",keyPoints:["Prier ET agir — la foi n'exclut pas la prudence humaine","La reconstruction de Jérusalem est un projet collectif : chaque famille rebâtit devant sa maison","L'opposition vient précisément quand l'œuvre devient visible et efficace","Néhémie dirige par l'exemple : il ne dorme pas, ne se nourrit pas normalement"],theology:"Les Pères voient dans Néhémie une figure du ministère chrétien : annoncer et défendre, construire et veiller. Martin Luther King citait Néhémie comme modèle de transformation sociale. Paul use de la même métaphore en 2 Corinthiens 10:4 : 'les armes de notre milice ne sont pas charnelles mais puissantes en Dieu.'",crossRefs:["2 Corinthiens 10:4","Éphésiens 6:10-18","Actes 20:28-31","1 Timothée 6:12"]},
  {id:23,section:"POETIQUES",title:"Psaume 22 — le cri du juste souffrant",reference:"Psaume 22:1-21",theme:"PSAUMES",passage:"Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné ? Tu es loin de ma délivrance, loin des paroles que je pousse en gémissant. Mon Dieu, j'appelle de jour et tu n'exauces pas ; j'appelle de nuit et je n'ai pas de repos.",context:"Jésus cite le premier verset depuis la croix (Mt 27:46). Ce psaume commence par le cri de l'abandon et se termine (v.22-31) par la louange et la confiance. La structure est délibérée : le désespoir porte en lui la foi qui traversera. Les versets 17-18 décrivent avec précision ce qui ressemble à une crucifixion ('percé mes mains et mes pieds', 'ils se partagent mes vêtements').",keyPoints:["Jésus fait sien le cri du Psaume 22 depuis la croix — il accomplit le texte en le vivant","La structure cri/louange montre que la prière authentique peut contenir le désespoir","Les détails du Psaume 22 anticipent avec précision les circonstances de la Passion","Ce psaume enseigne que l'abandon ressenti n'est pas l'abandon réel"],theology:"Les Pères de l'Église voient dans tout le Psaume 22 une prophétie détaillée de la Passion. Jean 19:24 cite v.18 sur le partage des vêtements. Le tournant de v.22 ('il n'a pas méprisé, il n'a pas eu en abomination la misère du pauvre') annonce la résurrection. Le psaume entier forme un arc dramatique Passion→Résurrection→Mission universelle.",crossRefs:["Matthieu 27:46","Jean 19:24","Hébreux 2:12","Philippiens 2:10-11"]},
  {id:24,section:"POETIQUES",title:"Psaume 51 — le Miserere, prière de pénitence",reference:"Psaume 51:1-17",theme:"PSAUMES",passage:"Aie pitié de moi, ô Dieu, selon ta bonté ; selon ta grande miséricorde, efface mes transgressions. Lave-moi complètement de mon iniquité, et purifie-moi de mon péché. Car je reconnais mes transgressions, et mon péché est constamment devant moi.",context:"Attribué à David après sa faute avec Bethsabée (2 Samuel 11-12). Le psaume demande trois choses : pardon (effacer, laver, purifier), renouveau intérieur (cœur pur, esprit constant), et restauration dans la mission (enseigner les autres). Ce n'est pas une prière de négociation avec Dieu mais un abandon total à sa miséricorde.",keyPoints:["Trois mots hébreux distincts pour le péché : transgression (pasha), iniquité (avon), péché (hata)","L'aveu sans minimisation est la première condition de la réconciliation","'Crée en moi un cœur pur' — seul Dieu peut opérer ce changement, pas une résolution humaine","La restauration du pécheur a une finalité missionnaire : 'j'enseignerai tes voies aux pécheurs'"],theology:"Ce psaume est le plus utilisé dans la liturgie pénitentielle chrétienne (Carême, confession). Augustin le fit écrire en grand sur le mur de sa chambre avant de mourir. Paul (Romains 3:10-18) cite des psaumes de pénitence pour démontrer l'universalité du péché. La demande 'ne me retire pas ton Esprit Saint' (v.11) est reprise dans la théologie pneumatologique.",crossRefs:["2 Samuel 12:7","Romains 3:23","Jean 3:3","Ézéchiel 36:26"]},
  {id:25,section:"POETIQUES",title:"Psaume 139 — l'omniprésence de Dieu",reference:"Psaume 139:1-18",theme:"PSAUMES",passage:"Éternel, tu me sondes et tu me connais. Tu sais quand je m'assieds et quand je me lève ; tu pénètres de loin mes pensées. Tu surveilles ma marche et mon repos, tu es instruit de toutes mes voies. Car la parole n'est pas sur ma langue, et déjà, Éternel, tu la connais entièrement.",context:"Ce psaume explore deux attributs divins : l'omniscience (Dieu connaît chaque pensée et parole) et l'omniprésence (aucun lieu ne peut le fuir). Les versets 7-10 ('si je monte aux cieux... si je prends les ailes de l'aurore...') sont une méditation sur l'impossibilité de fuir Dieu. Ce n'est pas une menace mais une consolation : la présence de Dieu est totale.",keyPoints:["L'omniscience de Dieu n'est pas surveillance mais relation — il me 'sonde' pour m'accompagner","L'omniprésence est décrite comme une protection, non une prison","Les versets 13-16 sur la formation dans le ventre maternel fondent la dignité de la vie prénatale","La prière finale (v.23-24) renverse le paradoxe : le psalmiste invite Dieu à 'sonder' ce qu'il vient de dire"],theology:"Ce psaume est fondamental pour la théologie de la dignité humaine (formé dans le ventre maternel par Dieu). Il interroge la prédestination et la providence. Les versets 7-10 ont influencé la mystique chrétienne sur l'omniprésence divine. Paul (Romains 8:38-39) déclare qu'aucune puissance ne peut séparer de l'amour de Dieu — extension du Psaume 139.",crossRefs:["Romains 8:38-39","Jérémie 1:5","Luc 1:44","Hébreux 4:13"]},
  {id:26,section:"POETIQUES",title:"Job 38 — Dieu répond du sein de la tempête",reference:"Job 38:1-18",theme:"SAGESSE",passage:"L'Éternel répondit à Job du sein de la tempête et dit : 'Qui est celui qui obscurcit mes desseins par des discours sans lumière ? Ceins maintenant tes reins comme un vaillant homme ; je t'interrogerai, et tu me répondras. Où étais-tu quand j'ai posé les fondements de la terre ?'",context:"Après 37 chapitres de souffrance et de débat, Dieu ne répond pas aux questions de Job mais les retourne. Il n'explique pas la souffrance — il révèle la transcendance. La série de questions rhétoriques ('où étais-tu ?', 'as-tu commandé au matin ?', 'connais-tu les lois des cieux ?') n'est pas une humiliation mais une invitation à la juste proportion.",keyPoints:["Dieu ne justifie pas la souffrance — il se révèle comme celui qui transcende toutes les explications","Les questions de Job reçoivent d'autres questions — la foi n'est pas un système d'explications","La rencontre avec le Dieu vivant transforme Job plus que n'importe quelle réponse","Job 'se repent dans la poussière' non pour ses péchés mais pour avoir mal parlé de Dieu"],theology:"Ce passage est paradigmatique pour la théologie de la souffrance : Dieu ne répond pas 'pourquoi' mais 'qui'. La rencontre transforme sans expliquer. Kierkegaard y voit l'image du saut de la foi. Les Pères voient en Job une figure du Christ souffrant. Le discours de Dieu depuis la tempête est le plus long discours divin de la Bible — et ne contient aucune réponse directe.",crossRefs:["Romains 11:33-36","1 Corinthiens 1:25","Ésaïe 55:8-9","Jacques 5:11"]},
  {id:27,section:"POETIQUES",title:"Proverbes 8 — la Sagesse personnifiée",reference:"Proverbes 8:22-36",theme:"SAGESSE",passage:"L'Éternel m'a créée la première de ses œuvres, avant ses travaux d'autrefois. J'ai été établie depuis l'éternité, depuis le commencement, avant que la terre fût. Quand il n'y avait point d'abîmes, j'ai été enfantée... j'étais à l'œuvre à ses côtés, j'étais son delight jour après jour, me réjouissant sans cesse devant lui.",context:"La Sagesse (Hokmah) parle à la première personne depuis le début du chapitre 8. Elle était présente à la création, 'à l'œuvre à ses côtés' — ce terme ('amon') peut signifier artisan, enfant chéri ou confident. Elle invite ensuite les hommes à la chercher. Ce texte a nourri des siècles de réflexion sur la relation entre Dieu et la création.",keyPoints:["La Sagesse est personnifiée comme présente avant la création — hypostase divine","'Je me réjouissais dans son univers habitable' — la joie est au cœur de la création","Chercher la Sagesse c'est chercher la vie — 'Qui me trouve trouve la vie'","Ce texte pose la question : la Sagesse est-elle une créature ou un attribut divin ?"],theology:"Ce passage est l'un des plus importants pour la christologie biblique. Jean 1:1-14 ('Au commencement était le Verbe') s'écrit dans l'horizon de Proverbes 8. Paul appelle Christ 'sagesse de Dieu' (1 Cor 1:24). Origène, Athanase, et le Concile de Nicée ont débattu de ce texte pour définir la relation entre le Père et le Fils.",crossRefs:["Jean 1:1-14","1 Corinthiens 1:24","Colossiens 1:15-17","Hébreux 1:2-3"]},
  {id:28,section:"POETIQUES",title:"Cantique des Cantiques — l'amour comme flamme divine",reference:"Cantique 8:6-7",theme:"SAGESSE",passage:"Mets-moi comme un sceau sur ton cœur, comme un sceau sur ton bras ; car l'amour est fort comme la mort, la jalousie est inflexible comme le séjour des morts ; ses ardeurs sont des ardeurs de feu, une flamme de l'Éternel.",context:"Ces deux versets sont le climax du Cantique. 'Flamme divine' (shalhevetyah) contient le nom de Dieu (Yah) — l'un des deux endroits dans ce livre où Dieu apparaît, et le seul dans un contexte théologique fort. L'amour y est comparé à la mort et au shéol dans leur caractère irréversible et absolu. Aucune eau ne peut l'éteindre, aucun prix ne peut l'acheter.",keyPoints:["L'amour humain conjugal reflète quelque chose de l'amour même de Dieu","L'intensité de l'amour est décrite en termes de mort — il est tout aussi définitif","'Flamme de Dieu' (shalhevetyah) — seul endroit où le Cantique nomme Dieu explicitement","La jalousie (qin'ah) est ici un synonyme de l'amour exclusif, non de l'envie"],theology:"Origène et Bernard de Clairvaux ont écrit des commentaires entiers du Cantique comme allegorie de l'amour du Christ pour l'âme/l'Église. Jean de la Croix en fait le fondement de sa mystique. La lecture littérale et allégorique ne s'excluent pas : l'amour humain fidèle reflète et révèle quelque chose de l'amour de Dieu.",crossRefs:["Éphésiens 5:25-32","Romains 8:38-39","Osée 2:19-20","Jean 15:9"]},
  {id:29,section:"POETIQUES",title:"Psaume 46 — Dieu est notre refuge",reference:"Psaume 46:1-11",theme:"PSAUMES",passage:"Dieu est pour nous un refuge et un appui, un secours qui ne fait pas défaut dans la détresse. C'est pourquoi nous sommes sans crainte quand la terre est bouleversée, quand les montagnes chancellent au cœur des mers. Ses flots mugissent et écument ; les montagnes tremblent au milieu de sa majesté.",context:"Ce psaume des fils de Coré est chanté en situation de chaos cosmique et politique. Les images de la terre qui chancelle, des eaux qui mugissent, des royaumes qui s'agitent sont des métaphores de l'insécurité radicale. Face à cela : 'L'Éternel des armées est avec nous.' La répétition du refrain (v.7, v.11) encadre la vision du fleuve qui réjouit la cité de Dieu.",keyPoints:["La confiance n'est pas l'absence de catastrophe mais la présence de Dieu dans la catastrophe","'Soyez tranquilles' (v.10) — invitation à lâcher prise sur le contrôle","Le 'fleuve' (v.4) qui réjouit la cité de Dieu est absent de la géographie de Jérusalem — image eschatologique","Luther s'inspira de ce psaume pour composer 'Ein feste Burg' (C'est un rempart que notre Dieu)"],theology:"Ce psaume a nourri la théologie de la confiance en Dieu au cœur des catastrophes. Les chrétiens l'ont lu lors des persécutions romaines, de la Réforme, des guerres mondiales. 'La cité de Dieu' (v.4) est le titre du grand ouvrage d'Augustin. L'Apocalypse reprend l'image du fleuve (Ap 22:1-2) pour la Nouvelle Jérusalem.",crossRefs:["Apocalypse 22:1-2","Jean 7:38","Ésaïe 26:3","Philippiens 4:6-7"]},
  {id:30,section:"PROPHETES_MAJ",title:"Ésaïe 40 — Consolez mon peuple",reference:"Ésaïe 40:1-11",theme:"PROPHETES",passage:"Consolez, consolez mon peuple, dit votre Dieu. Parlez au cœur de Jérusalem, et criez-lui que son temps de service est accompli, que sa faute est expiée... Une voix crie : Dans le désert, préparez le chemin de l'Éternel, aplanissez dans les lieux arides une route pour notre Dieu.",context:"Le chapitre 40 marque un tournant dans le livre d'Ésaïe. Après 39 chapitres de jugement, le ton change radicalement : consolation, promesse de retour, affirmation de la grandeur de Dieu face aux nations et aux idoles. 'Une voix crie dans le désert' sera citée par les quatre Évangiles comme annonce de Jean-Baptiste.",keyPoints:["Le double 'consolez' (nahamou nahamou) exprime l'urgence et l'intensité de la consolation divine","'Préparer le chemin' — thème du retour d'exil transformé en annonce du Christ","'La parole de notre Dieu demeure éternellement' — contre la fragilité de toute réalité humaine","La comparaison Dieu/nations/idoles prépare le monothéisme radical des chapitres suivants"],theology:"Les quatre Évangiles citent Ésaïe 40:3 pour présenter Jean-Baptiste comme la 'voix dans le désert'. L'universalisme d'Ésaïe 40-55 (le 'Deutéro-Ésaïe') nourrit la mission chrétienne vers toutes les nations. Le verset 31 ('ceux qui espèrent en l'Éternel renouvellent leur force') est l'un des plus cités dans les épreuves.",crossRefs:["Marc 1:3","Jean 1:23","Romains 10:15","2 Corinthiens 1:3-4"]},
  {id:31,section:"PROPHETES_MAJ",title:"Ésaïe 53 — le Serviteur souffrant",reference:"Ésaïe 53:1-12",theme:"PROPHETES",passage:"Il était méprisé et abandonné des hommes, homme de douleur et habitué à la souffrance... Mais c'est nos souffrances qu'il portait, c'est de nos douleurs qu'il était chargé... Il a été blessé pour nos péchés, brisé pour nos iniquités ; le châtiment qui nous donne la paix est tombé sur lui.",context:"Quatrième et dernier 'Chant du Serviteur'. Ce texte est peut-être le plus cité du Nouveau Testament — une douzaine de citations directes ou allusions. Le Serviteur souffre de manière vicaire (pour les autres). 'Nos souffrances', 'nos douleurs', 'nos péchés' — le 'nous' revient 10 fois. Le passage va jusqu'à la mort ('mis au nombre des malfaiteurs') et à la glorification post-mortem.",keyPoints:["La souffrance vicaire (pour les autres) est le cœur du passage — révolution dans la théologie du sacrifice","'Par ses meurtrissures nous sommes guéris' — l'expiation est au cœur","L'innocence du Serviteur est affirmée explicitement ('il n'avait point commis de violence')","Le passage va jusqu'à la mort et à une vie au-delà ('il verra une postérité')"],theology:"C'est le texte qui a le plus structuré la christologie des premiers chrétiens pour interpréter la mort de Jésus. Philippe explique Jésus à l'eunuque éthiopien depuis ce passage (Actes 8:32-35). Paul en cite les grandes lignes (1 Corinthiens 15:3 : 'mort pour nos péchés selon les Écritures'). L'eucharistie reprend les catégories d'expiation et de substitution.",crossRefs:["Actes 8:32-35","1 Corinthiens 15:3","1 Pierre 2:24","Jean 1:29"]},
  {id:32,section:"PROPHETES_MAJ",title:"Jérémie 31 — la Nouvelle Alliance",reference:"Jérémie 31:31-34",theme:"PROPHETES",passage:"Voici, les jours viennent, dit l'Éternel, où je ferai avec la maison d'Israël et la maison de Juda une alliance nouvelle, non comme l'alliance que j'ai faite avec leurs pères... Je mettrai ma loi au-dedans d'eux, je l'écrirai dans leur cœur ; je serai leur Dieu, et ils seront mon peuple.",context:"Au cœur de la pire catastrophe de l'histoire d'Israël (la destruction de Jérusalem), Jérémie annonce une alliance future radicalement nouvelle. Pas sur des tables de pierre mais dans les cœurs. Pas une connaissance enseignée mais une relation immédiate ('ils me connaîtront tous'). Pas conditionnelle mais gratuite ('je leur pardonnerai leur iniquité').",keyPoints:["La nouveauté n'est pas dans les termes de l'alliance mais dans son siège : le cœur","'Ils me connaîtront tous' — accès direct à Dieu sans intermédiaire obligatoire","Le pardon est la fondation, non la récompense : 'je leur pardonnerai d'abord'","C'est le seul passage de l'AT qui utilise le terme 'nouvelle alliance' (berith hadashah)"],theology:"L'épître aux Hébreux (chapitres 8-10) cite ce texte au complet pour démontrer que Jésus est médiateur d'une meilleure alliance. La Cène ('cette coupe est la nouvelle alliance en mon sang', Luc 22:20) s'y réfère directement. La Pentecôte (Actes 2) accomplit l'intériorisation : l'Esprit écrit la Loi dans les cœurs. Le terme 'Nouveau Testament' vient de ce passage.",crossRefs:["Luc 22:20","Hébreux 8:8-12","Actes 2:17","Ézéchiel 36:26-27"]},
  {id:33,section:"PROPHETES_MAJ",title:"Ézéchiel 37 — la vallée des ossements secs",reference:"Ézéchiel 37:1-14",theme:"PROPHETES",passage:"La main de l'Éternel fut sur moi. Il me transporta en esprit et me déposa dans une vallée pleine d'ossements. Il me fit passer autour d'eux. Voici, ils étaient très nombreux sur la surface de la vallée, et voici, ils étaient très secs. Il me dit : 'Fils de l'homme, ces ossements peuvent-ils revivre ?'",context:"Vision au cœur de l'exil babylonien. Les ossements secs représentent Israël qui dit : 'Nos os sont desséchés, notre espoir est perdu, nous sommes entièrement détruits' (v.11). Dieu demande à Ézéchiel de prophétiser — acte de foi absurde en apparence. À la parole, les os se recouvrent de muscles et de peau, puis le souffle (ruah) les anime.",keyPoints:["La question divine 'ces ossements peuvent-ils revivre ?' est une invitation à une foi qui transcende l'évidence","Prophétiser sur des ossements secs est l'acte de foi le plus radical demandé à un prophète","La double action : d'abord la structure (os, muscles), puis le souffle — corps sans esprit, puis vie","Le souffle (ruah) = vent, esprit, Esprit — même mot que dans Genèse 2:7"],theology:"Ce texte est lu à la fois comme promesse de restauration nationale d'Israël et comme vision de la résurrection universelle. Paul (Romains 8:11 : 'l'Esprit qui a ressuscité Jésus') s'inscrit dans cette théologie du souffle créateur. Jean 20:22 (Jésus soufflant sur ses disciples) reprend délibérément le geste d'Ézéchiel 37 et de Genèse 2.",crossRefs:["Jean 20:22","Romains 8:11","Genèse 2:7","1 Corinthiens 15:45"]},
  {id:34,section:"PROPHETES_MAJ",title:"Daniel 7 — le Fils de l'homme sur les nuées",reference:"Daniel 7:13-14",theme:"PROPHETES",passage:"Je regardais dans les visions de la nuit, et voici, sur les nuées des cieux arrivait quelqu'un de semblable à un fils d'homme ; il s'avança jusqu'à l'Ancien des jours, et on le fit approcher devant lui. On lui donna la domination, la gloire et le règne ; et tous les peuples, les nations, et les hommes de toutes langues le servirent.",context:"Au milieu de la vision des quatre bêtes représentant les empires successifs, une figure humaine s'approche du trône divin. Contrairement aux bêtes (symbolisant la puissance animale/brutale), le Fils de l'homme représente la royauté humaine et divine. Ce titre sera le préféré de Jésus pour se désigner — reprenant délibérément cette vision.",keyPoints:["'Fils de l'homme' contraste avec les bêtes — humanité contre brutalité des empires","La domination est reçue, non conquise — elle vient de l'Ancien des jours","'Tous les peuples et nations' — royauté universelle et éternelle","Jésus reprend ce titre au moins 80 fois dans les Évangiles"],theology:"Lors de son procès, Jésus cite Daniel 7:13 en réponse à la question 'Es-tu le Christ ?' : 'vous verrez le Fils de l'homme assis à la droite du Tout-Puissant et venant sur les nuées' (Mt 26:64). Le Grand prêtre déchire ses vêtements — il comprend la revendication divine. Apocalypse 1:7 et 14:14 reprennent cette vision pour la Parousie.",crossRefs:["Matthieu 26:64","Apocalypse 1:7","Actes 7:56","Hébreux 2:5-9"]},
  {id:35,section:"PROPHETES_MAJ",title:"Ésaïe 55 — Venez, achetez sans argent",reference:"Ésaïe 55:1-11",theme:"PROPHETES",passage:"Vous tous qui avez soif, venez aux eaux, et vous qui n'avez pas d'argent, venez, achetez et mangez ; venez, achetez sans argent et sans rien payer du vin et du lait. Pourquoi dépensez-vous de l'argent pour ce qui ne nourrit pas, votre salaire pour ce qui ne rassasie pas ?",context:"Invitation universelle et gratuite — la grâce ne s'achète pas. Ce chapitre développe une théologie de la gratuité absolue du salut. Les versets 8-9 ('mes pensées ne sont pas vos pensées') contrebalancent toute tentative de réduire Dieu à une logique humaine. Le verset 11 sur la parole qui 'ne retourne pas à vide' est fondateur de la théologie de la Parole.",keyPoints:["La grâce est strictement gratuite — 'sans argent, sans rien payer'","La critique implicite : dépenser pour ce qui ne nourrit pas (les idoles, le péché)","'Mes pensées ne sont pas vos pensées' — la transcendance divine interdit tout calcul","La Parole de Dieu est décrite comme une force productive qui 'accomplit ce qu'il lui plaît'"],theology:"Jean 7:37 ('si quelqu'un a soif, qu'il vienne à moi') cite explicitement Ésaïe 55:1. Apocalypse 22:17 conclut la Bible sur la même invitation. Paul (Romains 10:8) cite v.11 sur la Parole proche. La gratuité du salut d'Ésaïe 55 est au cœur de la doctrine protestante de la grâce seule (sola gratia).",crossRefs:["Jean 7:37","Apocalypse 22:17","Romains 10:8","Jean 4:13-14"]},
  {id:36,section:"PROPHETES_MAJ",title:"Michée 5 — Bethléem berceau du Messie",reference:"Michée 5:1-4",theme:"PROPHETES",passage:"Et toi, Bethléem Éphrata, le moindre des milliers de Juda, de toi sortira pour moi celui qui dominera sur Israël, et dont les origines remontent aux temps anciens, aux jours de l'éternité. Aussi, il les livrera jusqu'au temps où celle qui doit enfanter aura enfanté.",context:"Michée prophétise vers 700 av. J.-C. sous le règne d'Ézéchias. Bethléem est la ville de David — choisir cette ville pour le Messie est choisir la continuité davidique mais aussi la modestie (le 'moindre des milliers'). L'expression 'origines anciennes, jours de l'éternité' est remarquable : le Messie a une origine temporelle ET éternelle.",keyPoints:["Bethléem était trop petite pour figurer dans les recensements de villes importantes","'Origines anciennes, jours de l'éternité' — pré-existence du Messie suggérée","'Celui qui enfante' au v.2 est lu comme référence à la conception virginale","La mission du Messie : 'il les fera paître dans la force de l'Éternel' — berger-roi"],theology:"Matthieu 2:5-6 cite ce texte explicitement pour la naissance à Bethléem. Jean 7:42 montre que les Juifs connaissaient cette prophétie. Irénée de Lyon et Justin Martyr en font l'une de leurs preuves de la messianité de Jésus. La coïncidence géographique (Jésus né à Bethléem) est soit historique soit théologique — dans les deux cas, le texte est accompli.",crossRefs:["Matthieu 2:1-6","Luc 2:4-7","Jean 7:42","1 Samuel 16:1"]},
  {id:37,section:"PROPHETES_MIN",title:"Osée 11 — L'amour paternel de Dieu",reference:"Osée 11:1-9",theme:"PROPHETES",passage:"Quand Israël était jeune, je l'aimais, et d'Égypte j'ai appelé mon fils. Mais plus je les appelais, plus ils s'éloignaient de moi... C'est moi qui apprenais à marcher à Éphraïm, qui le soutenais par les bras ; et ils ne surent pas que c'est moi qui prenais soin d'eux.",context:"Ce chapitre est l'un des plus émouvants de tout l'AT. Dieu parle comme un père qui a élevé un enfant rebelle. Les images sont celles de l'éducation parentale la plus quotidienne : 'j'apprenais à marcher', 'je le soutenais par les bras', 'je le portais dans mes bras'. La question au v.8 ('Comment t'abandonnerais-je ?') révèle un Dieu qui ne peut pas ne pas aimer.",keyPoints:["Dieu comme père-mère aimant — langue parentale rare dans l'AT","'Comment t'abandonnerais-je ?' — Dieu lutte avec lui-même avant d'agir en grâce","Le repentir divin (v.8) ne signifie pas un changement d'avis mais une émotion réelle","Matthieu 2:15 cite v.1 ('j'ai appelé mon fils d'Égypte') pour la fuite en Égypte de Jésus"],theology:"Matthieu cite v.1 pour Jésus revenant d'Égypte — Jésus récapitule l'histoire d'Israël. Paul (Romains 9:25-26) cite Osée pour l'intégration des nations dans le peuple de Dieu. Ce chapitre inspire la théologie de l'amour inconditionnel ('agape') — Dieu aime non pas parce qu'on le mérite mais parce qu'il ne peut pas ne pas aimer.",crossRefs:["Matthieu 2:15","Romains 9:25-26","Jean 3:16","Luc 15:20"]},
  {id:38,section:"PROPHETES_MIN",title:"Joël 2 — l'Esprit sur toute chair",reference:"Joël 2:28-32",theme:"PROPHETES",passage:"Après cela, je répandrai mon Esprit sur toute chair. Vos fils et vos filles prophétiseront, vos vieillards auront des songes, vos jeunes gens auront des visions. Même sur les serviteurs et sur les servantes, dans ces jours-là, je répandrai mon Esprit.",context:"Joël prophétise une effusion de l'Esprit abolissant les distinctions habituelles : âges (vieillards/jeunes), sexes (fils/filles), statuts sociaux (serviteurs/servantes). Cette démocratisation de l'Esprit est radicale pour l'Antiquité. Le contexte est celui du 'jour de l'Éternel' — moment eschatologique de transformation totale.",keyPoints:["L'Esprit est pour tous — suppression des distinctions d'âge, de sexe, de statut","La prophétie, les songes et les visions deviennent accessibles à tous — fin du monopole prophétique","'Quiconque invoquera le nom de l'Éternel sera sauvé' — ouverture universelle du salut","La Pentecôte de Actes 2 est explicitement lue comme accomplissement de ce passage"],theology:"Pierre cite ce texte au complet lors de la Pentecôte (Actes 2:17-21) : 'ceci, c'est ce qui a été dit par le prophète Joël'. L'effusion de l'Esprit à Pentecôte accomplit Joël 2. Paul (Galates 3:28) reprend les abolitions de distinctions : 'il n'y a plus ni Juif ni Grec, ni esclave ni libre, ni homme ni femme'. Jean 3:8 sur le vent de l'Esprit s'inscrit dans le même horizon.",crossRefs:["Actes 2:17-21","Galates 3:28","Jean 3:8","Romains 10:13"]},
  {id:39,section:"PROPHETES_MIN",title:"Zacharie 9 — le Roi humble sur un âne",reference:"Zacharie 9:9-10",theme:"PROPHETES",passage:"Sois dans l'allégresse, fille de Sion ! Pousse des cris de joie, fille de Jérusalem ! Voici, ton roi s'avance vers toi ; il est juste et victorieux, il est humble et monté sur un âne, sur un âne, le petit d'une ânesse.",context:"Zacharie prophétise vers 520 av. J.-C. après le retour d'exil. Ce roi messianique contraste radicalement avec les conquérants de l'époque : il arrive sur un âne (monture de paix) non sur un cheval (monture de guerre). Il est 'juste' (tsadiq), 'sauvé' ou 'victorieux' (nosha), 'humble' (ani). Sa domination s'étendra 'd'une mer à l'autre'.",keyPoints:["L'âne est la monture du peuple ordinaire et de la paix — opposition délibérée au cheval de guerre","'Humble' (ani) désigne aussi 'pauvre' — un Messie d'une nature inattendue","La paix universelle (v.10) sera le résultat de cette royauté paradoxale","Les quatre Évangiles citent ce texte pour l'entrée de Jésus à Jérusalem"],theology:"Matthieu 21:4-5 et Jean 12:15 citent ce texte pour l'entrée triomphale de Jésus. C'est l'un des 'accomplissements' les plus documentés des Évangiles. La théologie de la kénose (abaissement du Christ, Ph 2:6-8) s'enracine ici : le Messie vient dans l'humilité, non la puissance. Jean n'a pas d'armée — il a une croix.",crossRefs:["Matthieu 21:4-5","Jean 12:15","Philippiens 2:6-8","Luc 19:38"]},
  {id:40,section:"PROPHETES_MIN",title:"Malachie 3 — le messager de l'alliance",reference:"Malachie 3:1-4",theme:"PROPHETES",passage:"Voici, j'enverrai mon messager, et il préparera le chemin devant moi. Et soudainement il entrera dans son Temple, le Seigneur que vous cherchez ; et le messager de l'alliance que vous désirez, voici, il vient, dit l'Éternel des armées.",context:"Dernier des douze prophètes, Malachie clôt l'AT en annonçant un messager précurseur et la venue soudaine de 'l'Éternel dans son Temple'. La formule 'voici, j'enverrai' (hinneni sholah) est une formule de vocation prophétique. Le 'messager de l'alliance' opère une purification ('il est comme le feu du fondeur') avant la présentation.",keyPoints:["Ce texte crée un horizon d'attente entre les deux Testaments — 400 ans de silence prophétique","Le 'messager' précurseur = Jean-Baptiste selon les trois Évangiles synoptiques","'Le Seigneur que vous cherchez' entrant dans le Temple = Jésus qui purifie le Temple","La purification par le feu du fondeur relie au Baptême de l'Esprit de Jean-Baptiste"],theology:"Marc 1:2 et Matthieu 11:10 citent ce texte pour Jean-Baptiste. L'entrée de Jésus dans le Temple et son expulsion des marchands (Jn 2:13-16) est la réalisation de 'soudainement il entrera dans son Temple'. Malachie 4:5 annonce 'Élie' avant le grand jour — appliqué à Jean-Baptiste par Jésus (Mt 11:14). L'AT se ferme sur une promesse qui ouvre le NT.",crossRefs:["Marc 1:2","Matthieu 11:10","Luc 1:17","Jean 2:13-17"]},
  {id:41,section:"EVANGILES",title:"Le Prologue de Jean — Au commencement était le Verbe",reference:"Jean 1:1-18",theme:"VIE_DE_JESUS",passage:"Au commencement était la Parole, et la Parole était avec Dieu, et la Parole était Dieu. Elle était au commencement avec Dieu. Toutes choses ont été faites par elle, et sans elle rien de ce qui a été fait n'a été fait... Et la Parole a été faite chair, et elle a habité parmi nous.",context:"Jean ne commence pas par la naissance de Jésus mais par l'avant-temps. 'Au commencement' (en archê) reprend délibérément l'ouverture de la Genèse. Le Logos (Parole/Raison/Verbe) est à la fois distinct du Père ('avec Dieu') et identique à lui ('était Dieu'). L'incarnation ('la Parole s'est faite chair') est le pivot de tout le prologue et de tout l'Évangile.",keyPoints:["'Au commencement' — Jean répond à Genèse 1:1 en remontant encore plus loin","Le Logos : terme à double résonance, hébraïque (dabar = parole créatrice) et grecque (logos = raison universelle)","'Fait chair' (sarx egeneto) — l'incarnation est radicale, pas une apparition ou illusion","'Nous avons vu sa gloire' — témoignage oculaire, fondement du Quatrième Évangile"],theology:"Ce prologue est le texte christologique le plus dense de la Bible. Nicée (325) l'utilise pour définir la consubstantialité : 'Dieu de Dieu, lumière de lumière.' La christologie haute (préexistence, incarnation, divinité) y est explicitement posée. Luther disait que si on perdait toute la Bible sauf Jean, on pourrait retrouver la foi chrétienne.",crossRefs:["Genèse 1:1","Proverbes 8:22-31","Colossiens 1:15-17","Hébreux 1:1-3"]},
  {id:42,section:"EVANGILES",title:"Le Sermon sur la montagne — Les Béatitudes complètes",reference:"Matthieu 5:3-12",theme:"VIE_DE_JESUS",passage:"Heureux les pauvres en esprit, car le royaume des cieux est à eux. Heureux les affligés, car ils seront consolés. Heureux les débonnaires, car ils hériteront la terre. Heureux ceux qui ont faim et soif de la justice, car ils seront rassasiés.",context:"Les Béatitudes ouvrent le Sermon sur la montagne qui dure trois chapitres (Mt 5-7). Chaque béatitude a une structure binaire : état présent (souvent vulnérable) + promesse future. La montagne rappelle le Sinaï — Jésus nouveau Moïse qui donne une Loi plus profonde. Il ne dit pas 'vous devriez être' mais 'heureux ceux qui sont' — description, non prescription.",keyPoints:["Huit béatitudes formant un tout, avec la première et la huitième finissant par 'le Royaume des cieux'","Les 'pauvres en esprit' ne sont pas des gens stupides mais ceux qui reconnaissent leur dépendance de Dieu","La structure 'heureux... car' lie un état présent à une réalité eschatologique future","La 9e béatitude (v.11-12) est personnelle : 'Heureux serez-vous quand on vous persécutera à cause de moi'"],theology:"Augustin voit les huit béatitudes comme les degrés de la vie spirituelle. Luther les voit comme des promesses de consolation. Les théologiens de la libération (Gutierrez) y lisent une option préférentielle pour les pauvres. L'ensemble du Sermon sur la montagne (Mt 5-7) est la charte éthique du Royaume — plus exigeante que la Loi (Mt 5:20 : 'si votre justice ne surpasse pas...').",crossRefs:["Psaume 1:1","Ésaïe 61:1-3","Luc 6:20-26","Romains 8:18"]},
  {id:43,section:"EVANGILES",title:"La Transfiguration — révélation de la gloire",reference:"Matthieu 17:1-9",theme:"VIE_DE_JESUS",passage:"Il fut transfiguré devant eux : son visage resplendit comme le soleil, et ses vêtements devinrent blancs comme la lumière. Et voici, Moïse et Élie leur apparurent, s'entretenant avec lui... Et voici une nuée lumineuse les couvrit et une voix fit entendre de la nuée : 'Celui-ci est mon Fils bien-aimé, en qui j'ai mis toute mon affection. Écoutez-le !'",context:"La Transfiguration se situe au tournant du récit de Matthieu, juste après la première annonce de la Passion. Elle révèle l'identité glorieuse de Jésus avant sa mort. Moïse (la Loi) et Élie (les Prophètes) lui parlent — leur présence signifie que Jésus accomplit les deux. La nuée lumineuse (shekinah) et la voix divine rappellent le Sinaï.",keyPoints:["Position centrale dans l'Évangile : révélation de gloire avant l'annonce de la souffrance","Moïse + Élie = Loi + Prophètes : Jésus les accomplit tous deux","La voix du Père reprend les mots du Baptême mais ajoute : 'Écoutez-le !'","Pierre veut construire trois tentes — tentation de rester dans la gloire, pas encore le chemin de la croix"],theology:"Pierre (2 Pierre 1:16-18) y fait référence comme témoin oculaire de la majesté divine. L'Église orthodoxe en fait une fête majeure (6 août) et y voit la révélation de la lumière incréée (doctrine de Grégoire Palamas). La gloire visible de Jésus anticipe la résurrection et la Parousie. Jean de la Croix part de ce texte pour sa théologie de la contemplation.",crossRefs:["2 Pierre 1:16-18","Matthieu 3:17","Jean 1:14","Apocalypse 1:16"]},
  {id:44,section:"EVANGILES",title:"La multiplication des pains — signe du don de Dieu",reference:"Jean 6:1-15",theme:"MIRACLES",passage:"Jésus prit les pains, rendit grâces et les distribua à ceux qui étaient assis ; il leur donna de même des poissons, autant qu'ils en voulurent. Quand ils furent rassasiés, il dit à ses disciples : 'Ramassez les morceaux qui restent, afin que rien ne se perde.' Ils les ramassèrent donc, et remplirent douze corbeilles.",context:"Seul miracle présent dans les quatre Évangiles (hormis la résurrection). Jean le situe près de Pâques et le suit du discours sur le 'pain de vie' (Jn 6:22-59). Les 5000 hommes (plus femmes et enfants) sont nourris par 5 pains et 2 poissons. Les 12 corbeilles de restes symbolisent l'abondance divine et les 12 tribus d'Israël.",keyPoints:["L'action de grâces (eucharistia) avant la distribution — geste eucharistique délibéré","'Rien ne se perde' — la providence divine ne gaspille pas","12 corbeilles = les 12 tribus = l'Israël entier nourri par le Messie","La foule veut faire Jésus roi — il se retire, refusant la royauté politique"],theology:"Jean 6 enchaîne avec le discours sur le Pain de vie ('Je suis le pain de vie') — lecture eucharistique explicite. 'Celui qui mange ma chair et boit mon sang a la vie éternelle' (6:54) deviendra le cœur de la théologie eucharistique catholique et orthodoxe. Le miracle préfigure la Cène. La multiplication rappelle la manne au désert (Ex 16).",crossRefs:["Jean 6:35-58","Exode 16:4","1 Rois 17:16","Matthieu 26:26"]},

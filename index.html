      <select onchange="S.mg.filter=this.value;S.mg.idx=0;resetMGState();save()" style="background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:8px; font-size:.86rem; cursor:pointer; flex:1; min-width: 140px;">
        <option value="">Tous les types</option>
        ${Object.keys(MG_TYPE_LABELS).map(t => `<option value="${t}" ${S.mg.filter===t?'selected':''}>${MG_TYPE_LABELS[t]}</option>`).join('')}
      </select>
      <select onchange="S.mg.themeFilter=this.value;S.mg.idx=0;resetMGState();save()" style="background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:8px; font-size:.86rem; cursor:pointer; flex:1; min-width: 140px;">
        <option value="">Tous les thèmes</option>
        ${Object.entries(TH).map(([k, v]) => `<option value="${k}" ${S.mg.themeFilter===k?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
  `;

  if(!list.length) return `<main><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 class="page-title" style="margin:0">🎮 Mini-jeux</h2></div>${filterSelect}<p class="empty-state">Aucun mini-jeu pour ces filtres.</p></main>`;

  const mg=list[idx],total=list.length;
  const typeLabel=MG_TYPE_LABELS[mg.type]||mg.type;
  let body='';
  if(mg.type==='VERSET_COMPLETE')body=renderVC(mg);
  else if(mg.type==='QUI_A_DIT')body=renderQAD(mg);
  else if(mg.type==='CHRONOLOGIE')body=renderCHRONO(mg);
  else if(mg.type==='ASSOCIATION')body=renderASSOC(mg);
  else if(mg.type==='INTRUS')body=renderINTRUS(mg);
  return`<main>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h2 class="page-title" style="margin:0">🎮 Mini-jeux</h2>
      <span style="color:var(--text2);font-size:.82rem">${idx+1} / ${total}</span>
    </div>
    ${filterSelect}
    <div class="mg-card">
      <div class="mg-type">${typeLabel} · ${TH[mg.theme]||mg.theme}</div>
      ${body}
    </div>
    <div class="mg-nav">
      <button onclick="prevMG()" ${idx===0?'disabled':''}>← Précédent</button>
      <button onclick="resetMGState()">🔄 Reset</button>
      <button onclick="nextMG()" ${idx===total-1?'disabled':''}>Suivant →</button>
    </div>
  </main>`;
}

// ── VERSET COMPLET ─────────────────────────────────────
function renderVC(mg){
  const d=mg.data,parts=d.template.split('___');
  let h='<p class="mg-text">';
  parts.forEach((p,i)=>{
    h+=esc(p);
    if(i<d.blanks.length){
      const a=S.mg.answers[i],rev=S.mg.revealed;
      let c='blank';
      if(rev)c+=a&&a.toLowerCase()===d.blanks[i].toLowerCase()?' correct-ans':' wrong-ans';
      h+=`<span class="${c}"><input type="text" value="${esc(rev?d.blanks[i]:(a||''))}" ${rev?'disabled':''} oninput="S.mg.answers[${i}]=this.value" placeholder="${'_'.repeat(d.blanks[i].length)}"></span>`;
    }
  });
  h+='</p>';
  if(d.hint)h+=`<p style="font-size:.8rem;color:var(--text2);margin-bottom:14px">💡 ${esc(d.hint)}</p>`;
  if(!S.mg.revealed)h+=`<button class="mg-submit" onclick="S.mg.revealed=true;addXP(XP.mg_correct);trackMGScore('VERSET_COMPLETE',true);render()">Valider</button>`;
  else h+=`<p style="color:var(--accent);font-size:.82rem;margin-top:10px">📖 ${esc(d.reference)}</p>`;
  return h;
}

// ── QUI A DIT ──────────────────────────────────────────
function renderQAD(mg){
  const d=mg.data;
  return`<p class="mg-text" style="font-style:italic">"${esc(d.quote)}"</p>
  <div class="mg-options">${d.options.map(opt=>{
    let c='mg-opt';
    if(S.mg.revealed){if(opt===d.answer)c+=' correct-ans';else if(S.mg.answers[0]===opt&&opt!==d.answer)c+=' wrong-ans';}
    return`<button class="${c}" onclick="selectQAD('${esc(opt)}')" ${S.mg.revealed?'disabled':''}>${esc(opt)}</button>`;
  }).join('')}</div>
  ${S.mg.revealed?`<p style="color:var(--accent);font-size:.82rem;margin-top:8px">📖 ${esc(d.reference)}</p>`:''}`;
}
function selectQAD(opt){
  S.mg.answers[0]=opt;S.mg.revealed=true;
  const _qadOk=opt===getFilteredMG()[S.mg.idx].data.answer;
  addXP(_qadOk?XP.mg_correct:XP.mg_wrong);
  trackMGScore('QUI_A_DIT',_qadOk);
  render();
}

// ── CHRONOLOGIE ────────────────────────────────────────
// S.mg.answers = {order:[...indices shuffled by user], submitted:bool}
function renderCHRONO(mg){
  const d=mg.data;
  // Init: on stocke l'ordre courant dans answers.order (indices de d.items)
  if(!S.mg.answers.order){
    // Shuffle initial pour ne pas présenter l'ordre correct d'entrée
    const idx=[...d.items.keys()];
    for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    S.mg.answers.order=idx;
    S.mg.answers.submitted=false;
  }
  const order=S.mg.answers.order;
  const submitted=S.mg.answers.submitted;
  let h=`<p style="color:var(--text2);font-size:.88rem;margin-bottom:14px">${esc(d.question)}</p>`;
  h+=`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">`;
  order.forEach((itemIdx,pos)=>{
    const item=d.items[itemIdx];
    const isCorrect=submitted&&itemIdx===pos;
    const isWrong=submitted&&itemIdx!==pos;
    const bg=submitted?(isCorrect?'rgba(34,197,94,.13)':'rgba(239,68,68,.1)'):'var(--surface2)';
    const border=submitted?(isCorrect?'var(--correct)':'var(--wrong)'):'var(--border)';
    const icon=submitted?(isCorrect?'✅':'❌'):`<span style="color:var(--accent);font-weight:700">${pos+1}</span>`;
    const upBtn=(!submitted&&pos>0)?`<button onclick="moveChrono(${pos},-1)" style="background:none;border:1px solid var(--border);color:var(--text2);padding:2px 8px;border-radius:5px;cursor:pointer;font-size:.8rem">↑</button>`:'';
    const dnBtn=(!submitted&&pos<order.length-1)?`<button onclick="moveChrono(${pos},1)" style="background:none;border:1px solid var(--border);color:var(--text2);padding:2px 8px;border-radius:5px;cursor:pointer;font-size:.8rem">↓</button>`:'';
    h+=`<div style="display:flex;align-items:center;gap:10px;background:${bg};border:1px solid ${border};border-radius:8px;padding:10px 13px">
      <span style="min-width:28px;text-align:center">${icon}</span>
      <span style="flex:1;font-size:.88rem;color:var(--text)">${esc(item)}</span>
      <div style="display:flex;gap:4px">${upBtn}${dnBtn}</div>
    </div>`;
  });
  h+='</div>';
  if(!submitted){
    h+=`<button class="mg-submit" onclick="submitChrono()">Valider l'ordre</button>`;
  }else{
    const correct=order.every((v,i)=>v===i);
    if(correct)h+=`<p style="color:var(--correct);font-weight:600;margin-bottom:8px">✅ Ordre parfait !</p>`;
    else h+=`<p style="color:var(--wrong);font-weight:600;margin-bottom:8px">❌ Pas tout à fait — voici le bon ordre ci-dessous.</p>
      <div style="font-size:.83rem;color:var(--text2);margin-bottom:8px">${d.items.map((it,i)=>`<div>${i+1}. ${esc(it)}</div>`).join('')}</div>`;
    h+=`<p style="font-size:.82rem;color:var(--text2);margin-bottom:4px">${esc(d.explanation)}</p>`;
    h+=`<p style="color:var(--accent);font-size:.8rem">📖 ${esc(d.reference)}</p>`;
  }
  return h;
}
function moveChrono(pos,dir){
  const order=[...S.mg.answers.order];
  const target=pos+dir;
  if(target<0||target>=order.length)return;
  [order[pos],order[target]]=[order[target],order[pos]];
  S.mg.answers.order=order;render();
}
function submitChrono(){
  const order=S.mg.answers.order;
  const correct=order.every((v,i)=>v===i);
  S.mg.answers.submitted=true;
  addXP(correct?XP.mg_correct:XP.mg_wrong);
  trackMGScore('CHRONOLOGIE',correct);
  render();
}

// ── ASSOCIATION ────────────────────────────────────────
// S.mg.answers = {selected:null, matched:{left->right}, submitted:bool}
function renderASSOC(mg){
  const d=mg.data;
  if(!S.mg.answers.matched){S.mg.answers.matched={};S.mg.answers.selected=null;S.mg.answers.submitted=false;}
  const {selected,matched,submitted}=S.mg.answers;
  // Shuffle rights once and store
  if(!S.mg.answers.rights){
    const r=d.pairs.map(p=>p.right);
    for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
    S.mg.answers.rights=r;
  }
  const rights=S.mg.answers.rights;
  const correctMap={};d.pairs.forEach(p=>{correctMap[p.left]=p.right;});
  const matchedRights=Object.values(matched);
  let h=`<p style="color:var(--text2);font-size:.88rem;margin-bottom:14px">${esc(d.question)}</p>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">`;
  h+=`<div><p style="font-size:.74rem;color:var(--accent);text-transform:uppercase;margin-bottom:6px">Gauche</p>`;
  d.pairs.forEach(p=>{
    const isMatched=matched[p.left]!==undefined;
    const isSelected=selected===p.left;
    const isCorrect=submitted&&matched[p.left]===correctMap[p.left];
    const isWrong=submitted&&matched[p.left]!==correctMap[p.left];
    const bg=submitted?(isCorrect?'rgba(34,197,94,.13)':'rgba(239,68,68,.1)'):(isSelected?'rgba(201,168,76,.18)':isMatched?'rgba(201,168,76,.07)':'var(--surface2)');
    const border=submitted?(isCorrect?'var(--correct)':'var(--wrong)'):(isSelected?'var(--accent)':isMatched?'rgba(201,168,76,.3)':'var(--border)');
    h+=`<div onclick="${!submitted?`selectAssocLeft('${p.left.replace(/'/g,"\'")}')`:''}" style="background:${bg};border:1px solid ${border};border-radius:8px;padding:9px 12px;cursor:${submitted?'default':'pointer'};font-size:.85rem;margin-bottom:6px;color:var(--text)">
      ${esc(p.left)} ${isMatched&&!submitted?`<span style="font-size:.72rem;color:var(--text2)">→ ${esc(matched[p.left])}</span>`:''}
      ${submitted&&matched[p.left]?`<span style="font-size:.72rem;color:${isCorrect?'var(--correct)':'var(--wrong)'}">${isCorrect?'✅':'❌'} ${esc(matched[p.left])}</span>`:''}
    </div>`;
  });
  h+=`</div><div><p style="font-size:.74rem;color:var(--accent);text-transform:uppercase;margin-bottom:6px">Droite</p>`;
  rights.forEach(r=>{
    const isUsed=matchedRights.includes(r);
    const isTarget=selected!==null&&!submitted;
    const bg=isUsed?'rgba(201,168,76,.07)':'var(--surface2)';
    const border=isUsed?'rgba(201,168,76,.3)':'var(--border)';
    h+=`<div onclick="${!submitted&&selected&&!isUsed?`selectAssocRight('${r.replace(/'/g,"\'")}')`:''}" style="background:${bg};border:1px solid ${border};border-radius:8px;padding:9px 12px;cursor:${(!submitted&&selected&&!isUsed)?'pointer':'default'};font-size:.85rem;margin-bottom:6px;color:${isUsed?'var(--text2)':'var(--text)'}">
      ${esc(r)}
    </div>`;
  });
  h+=`</div></div>`;
  if(!submitted){
    if(Object.keys(matched).length===d.pairs.length){
      h+=`<button class="mg-submit" onclick="submitAssoc()">Valider les associations</button>`;
    }else{
      h+=`<p style="font-size:.8rem;color:var(--text2)">${selected?`Clique sur un élément de droite pour associer à <strong style="color:var(--accent)">${esc(selected)}</strong>`:'Clique sur un élément de gauche pour commencer'}</p>`;
    }
  }else{
    const correct=d.pairs.every(p=>matched[p.left]===correctMap[p.left]);
    if(correct)h+=`<p style="color:var(--correct);font-weight:600;margin-bottom:8px">✅ Toutes les associations sont correctes !</p>`;
    else{
      h+=`<p style="color:var(--wrong);font-weight:600;margin-bottom:8px">❌ Quelques erreurs — voici les bonnes associations :</p>`;
      h+=`<div style="font-size:.82rem;color:var(--text2);margin-bottom:8px">${d.pairs.map(p=>`<div>${esc(p.left)} → ${esc(p.right)}</div>`).join('')}</div>`;
    }
    h+=`<p style="font-size:.82rem;color:var(--text2);margin-bottom:4px">${esc(d.explanation)}</p>`;
    h+=`<p style="color:var(--accent);font-size:.8rem">📖 ${esc(d.reference)}</p>`;
  }
  return h;
}
function selectAssocLeft(left){S.mg.answers.selected=left;render();}
function selectAssocRight(right){
  if(!S.mg.answers.selected)return;
  S.mg.answers.matched[S.mg.answers.selected]=right;
  S.mg.answers.selected=null;render();
}
function submitAssoc(){
  const mg=getFilteredMG()[S.mg.idx];
  const d=mg.data,matched=S.mg.answers.matched;
  const correct=d.pairs.every(p=>matched[p.left]===p.right);
  S.mg.answers.submitted=true;
  addXP(correct?XP.mg_correct:XP.mg_wrong);trackMGScore('ASSOCIATION',correct);
  render();
}

// ── INTRUS ─────────────────────────────────────────────
function renderINTRUS(mg){
  const d=mg.data;
  return`<p class="mg-text">${esc(d.question)}</p>
  <div class="mg-options">${d.items.map(item=>{
    let c='mg-opt';
    if(S.mg.revealed){
      if(item===d.intrus)c+=' correct-ans';
      else if(S.mg.answers[0]===item&&item!==d.intrus)c+=' wrong-ans';
    }
    return`<button class="${c}" onclick="selectINTRUS('${item.replace(/'/g,"\'")}')" ${S.mg.revealed?'disabled':''}>${esc(item)}</button>`;
  }).join('')}</div>
  ${S.mg.revealed?`
    <div style="background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:12px;margin-top:12px">
      <p style="color:var(--correct);font-size:.86rem;font-weight:600;margin-bottom:5px">L'intrus : ${esc(d.intrus)}</p>
      <p style="color:var(--text2);font-size:.83rem;margin-bottom:6px">${esc(d.explanation)}</p>
      <p style="color:var(--accent);font-size:.79rem">📖 ${esc(d.reference)}</p>
    </div>`:''}`;
}
function selectINTRUS(item){
  const mg=getFilteredMG()[S.mg.idx];
  S.mg.answers[0]=item;S.mg.revealed=true;
  const _intrusCorrect=item===mg.data.intrus;
  addXP(_intrusCorrect?XP.mg_correct:XP.mg_wrong);trackMGScore('INTRUS',_intrusCorrect);render();
}

function prevMG(){S.mg.idx=Math.max(0,S.mg.idx-1);resetMGState();}
function nextMG(){S.mg.idx=Math.min(getFilteredMG().length-1,S.mg.idx+1);resetMGState();}
function resetMGScore(type,correct){
  const st=stats();
  if(!st.mgScores)st.mgScores={};
  if(!st.mgScores[type])st.mgScores[type]={correct:0,total:0};
  st.mgScores[type].total++;
  if(correct)st.mgScores[type].correct++;
  save();
}
function trackMGScore(type,correct){resetMGScore(type,correct);}
function resetMGState(){S.mg.answers={};S.mg.revealed=false;render();}

// ── BIBLIOTHÈQUE ───────────────────────────────────────

function openLecture(id){
  const st=stats();
  if(!st.lectureRead)st.lectureRead=[];
  if(!st.lectureRead.includes(id)){
    st.lectureRead.push(id);
    save();
  }
  S.lecture.detail=id;render();
}
function renderLecture(){
  if(S.lecture.detail!==null) return renderLectureDetail();
  const sec = S.lecture.section||'';
  const srch = S.lecture.search||'';
  let list = LECTURES;
  if(sec) list = list.filter(l=>l.section===sec);
  if(srch) list = list.filter(l=>l.title.toLowerCase().includes(srch.toLowerCase())||l.reference.toLowerCase().includes(srch.toLowerCase())||l.passage.toLowerCase().includes(srch.toLowerCase())||String(l.theme||'').toLowerCase().includes(srch.toLowerCase()));
  const readIds=stats().lectureRead||[];
  const readPct=Math.round(readIds.length/LECTURES.length*100);
  const sectionSelect = `<select class="sf-cat-select" onchange="S.lecture.section=this.value;S.lecture.search='';render()"><option value="">Toutes les sections (${LECTURES.length})</option>${Object.entries(LIB_SECTIONS).map(([k,v])=>{const n=LECTURES.filter(l=>l.section===k).length;return `<option value="${k}"${sec===k?' selected':''}>${v.icon} ${v.label} (${n})</option>`;}).join('')}</select>`;
  return `<main>
    <section class="lecture-hero"><div class="hero-kicker">Bibliothèque guidée</div><h2>📕 Bibliothèque</h2><p>Lis les passages essentiels avec contexte, points clés, liens croisés et progression personnelle.</p></section>
    <div class="read-progress-card"><div class="row"><strong style="color:var(--accent2)">Progression de lecture</strong><span>${readIds.length}/${LECTURES.length} · ${readPct}%</span></div><div class="progress-track"><div class="progress-fill" style="width:${readPct}%"></div></div></div>
    <div class="lecture-toolbar"><input class="lecture-search" type="text" placeholder="Rechercher un passage, une référence, un thème…" value="${esc(srch)}" oninput="debounceSearch('lecture',this.value)"><div>${sectionSelect}</div></div>
    <p style="color:var(--text2);font-size:.78rem;margin:0 0 12px">${list.length} passage${list.length>1?'s':''}${sec?' — '+(LIB_SECTIONS[sec]?.desc||''):''}</p>
    ${!list.length?'<p class="empty-state">Aucun passage trouvé.</p>':''}
    <div class="lecture-grid">
      ${list.map((l,i)=>{const info=LIB_SECTIONS[l.section]||{};const isRead=readIds.includes(l.id);const tags=[TH[l.theme]||l.theme,info.label].filter(Boolean).slice(0,2);return `
        <div class="lecture-card" data-letter="${esc((l.title||'P').trim()[0]||'P')}" onclick="openLecture(${l.id})" style="animation-delay:${Math.min(i,8)*35}ms">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px"><span class="lc-chip">${info.icon||'📖'} ${esc(info.label||l.section||'Section')}</span>${isRead?'<span class="lc-read">✓ Lu</span>':''}</div>
          <h3>${esc(l.title)}</h3>
          <p class="lc-ref">${esc(l.reference)}</p>
          <p>${esc(l.passage.substring(0,128))}…</p>
          <div class="lc-tags">${tags.map(t=>`<span>${esc(t)}</span>`).join('')}${(l.crossRefs&&l.crossRefs.length)?`<span>${l.crossRefs.length} liens</span>`:''}</div>
        </div>`;}).join('')}
    </div>
  </main>`;
}

function renderLectureDetail(){
  const l = LECTURES.find(x=>x.id===S.lecture.detail);
  if(!l) return renderLecture();
  const crHtml = (l.crossRefs&&l.crossRefs.length) ? (() => {
    const links = l.crossRefs.map(ref => {
      const linked = LECTURES.find(x=>x.reference.toLowerCase().includes(ref.toLowerCase().split(':')[0].toLowerCase()) || ref.toLowerCase().includes(x.reference.toLowerCase().split(':')[0].toLowerCase()));
      if(linked && linked.id!==l.id) return `<button onclick="openLecture(${linked.id})" class="hero-secondary" style="min-width:0;padding:7px 12px;font-size:.78rem">${esc(ref)} →</button>`;
      return `<span class="reader-pill">${esc(ref)}</span>`;
    });
    return `<div class="context-block" style="margin-top:16px"><h4>Liens croisés</h4><div style="display:flex;flex-wrap:wrap;gap:8px">${links.join('')}</div></div>`;
  })() : '';
  const secInfo = l.section ? LIB_SECTIONS[l.section] : null;
  const breadcrumb = secInfo ? `<button onclick="S.lecture.detail=null;S.lecture.section='${l.section}';render()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:.82rem;padding:0 0 10px;display:block">← ${secInfo.icon} ${secInfo.label}</button>` : '';
  const sectionList = l.section ? LECTURES.filter(x=>x.section===l.section) : LECTURES;
  const idx = sectionList.findIndex(x=>x.id===l.id);
  const prev = idx>0 ? sectionList[idx-1] : null;
  const next = idx<sectionList.length-1 ? sectionList[idx+1] : null;
  const navHtml = `<div class="nav-reading" style="display:flex;gap:8px;margin-top:22px;flex-wrap:wrap">${prev?`<button onclick="openLecture(${prev.id})" style="flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:11px 12px;border-radius:10px;cursor:pointer;font-size:.8rem;text-align:left">← ${esc(prev.title)}</button>`:''}${next?`<button onclick="openLecture(${next.id})" style="flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:11px 12px;border-radius:10px;cursor:pointer;font-size:.8rem;text-align:right">${esc(next.title)} →</button>`:''}</div>`;
  return `<main>
    <button class="back-btn" onclick="S.lecture.detail=null;render()">← Retour</button>
    ${breadcrumb}
    <article class="lecture-detail">
      <div class="hero-kicker">${esc(secInfo?.label||l.section||'Passage')}</div>
      <h2>${esc(l.title)}</h2>
      <p class="ld-ref">${esc(l.reference)} · <span style="color:var(--text2)">${esc(TH[l.theme]||l.theme||'')}</span></p>
      <div class="reader-actions"><span class="reader-pill">✓ Marqué comme lu</span>${l.crossRefs?.length?`<span class="reader-pill">${l.crossRefs.length} liens croisés</span>`:''}<span class="reader-pill">Section ${idx+1}/${sectionList.length}</span></div>
      <div class="passage">${esc(l.passage)}</div>
      <div class="context-block">
        <h4>Contexte</h4><p>${esc(l.context)}</p>
        <h4>Points clés</h4><ul>${l.keyPoints.map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
        <div class="theology-box"><strong>Lecture théologique :</strong> ${esc(l.theology)}</div>
      </div>
      ${crHtml}
      ${navHtml}
    </article>
  </main>`;
}

function renderFtGrouped(ftRead){
  // En mode groupé, on pagine par catégories entières pour garder les groupes cohérents
  const usedCats=[...new Set(FINGERTIPS.map(f=>f.cat))];
  const page=S.ft.page||0;
  // On groupe d'abord, puis on pagine les groupes par blocs de VIRT_PAGE_SIZE fiches cumulées
  let rendered=0,html='',catCount=0;
  const maxItems=VIRT_PAGE_SIZE*(page+1);
  const skipItems=VIRT_PAGE_SIZE*page;
  for(const cat of usedCats){
    const items=FINGERTIPS.filter(f=>f.cat===cat);
    const end=rendered+items.length;
    if(end<=skipItems){rendered+=items.length;continue;}
    const icon=FT_CATS[cat]?.split(' ')[0]||'';
    const label=(FT_CATS[cat]||cat).replace(/^\S+\s/,'');
    html+=`<div style="margin-bottom:24px">
      <div class="ft-section-header"><span style="font-size:1.1rem">${icon}</span><h3>${label}</h3><span class="ft-count-badge">${items.length} fiches</span></div>
      <div class="ft-grid">${items.map(f=>renderFtCard(f,ftRead)).join('')}</div>
    </div>`;
    rendered+=items.length;
    catCount++;
    if(rendered>=maxItems)break;
  }
  const totalPages=Math.ceil(FINGERTIPS.length/VIRT_PAGE_SIZE);
  const prevBtn=page>0?`<button onclick="S.ft.page=${page-1};render();scrollTo(0,0)" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.84rem">← Précédent</button>`:'';
  const nextBtn=rendered<FINGERTIPS.length?`<button onclick="S.ft.page=${page+1};render();scrollTo(0,0)" style="background:var(--accent);color:#0f0e17;font-weight:700;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.84rem">Suivant →</button>`:'';
  const pager=totalPages>1?`<div style="display:flex;gap:9px;justify-content:center;margin-top:18px;flex-wrap:wrap">${prevBtn}${nextBtn}</div>`:'';
  return html+pager;
}

function yearLabel(item){
  if(item.year!=null) return item.year<0?`${Math.abs(item.year)} av. J.-C.`:(item.year===0?'v. an 0':`${item.year} ap. J.-C.`);
  if(item.start!=null){

function spawnXPParticles(x, y, amount){

    el.className='xp-particle';
    el.textContent=`+${amount} XP`;
    el.style.left=(x+(Math.random()-.5)*60)+'px';
    el.style.top=(y-10+(Math.random()-.5)*20)+'px';
    el.style.animationDelay=(i*0.09)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1600);
  }
}

// ── VÉRIFICATION COMPLÉTION D'ÈRE ────────────────────────
function checkEraCompletion(eraKey, discovered){
  const st=stats();
  if((st.eraArtefacts||[]).includes(eraKey)) return; // déjà obtenu
  const era=FR_ERAS.find(e=>e.key===eraKey); if(!era) return;
  const eraItems=TL_DATA.filter(d=>{
    const y=d.year!=null?d.year:(d.start!=null?(d.start+d.end)/2:0);
    return y>=era.range[0]&&y<=era.range[1];
  });
  const allDiscovered=eraItems.every(d=>discovered.includes(d.id));
  if(allDiscovered&&eraItems.length>0){
    if(!st.eraArtefacts) st.eraArtefacts=[];
    st.eraArtefacts.push(eraKey);
    addXP(XP.tl_era_complete);
    showToast(`${ERA_ARTEFACTS[eraKey]?.icon||'✦'} Ère complétée ! +${XP.tl_era_complete} XP`);
    showArtefactPopup(eraKey);
    save();
  }
}

const FRESCO_PALIERS=[

  {threshold:15, label:'Historien d\'Israël', icon:'📜', quizBonus:'1 joker 50/50 gratuit/session'},

  {threshold:47, label:'Lumière des Temps',   icon:'✨', quizBonus:'+5 XP/bonne réponse'},
];
function checkFrescoPalier(count){
  const st=stats();
  const current=st.frescoPalier||0;
  for(let i=current;i<FRESCO_PALIERS.length;i++){
    if(count>=FRESCO_PALIERS[i].threshold){

      save();
      showToast(`${FRESCO_PALIERS[i].icon} Palier débloqué : « ${FRESCO_PALIERS[i].label} » !`);

  }
}

// ── Mapping ERA → x range en px ───────────────────────────────
function tlXfromYear(year) {
  // Maps year (e.g. -2100 to 120) → px offset
  const offset = year - TL_MIN;
  return Math.round(offset * TL_W_PER_YEAR);
}
function tlTotalWidth() {
  return Math.round(TL_SPAN * TL_W_PER_YEAR) + 160;
}

// ── Tooltip ────────────────────────────────────────────────────
let _tlTipTimer = null;
function tlShowTooltip(label, year, cx, cy) {
  clearTimeout(_tlTipTimer);
  let tt = document.getElementById('tl-tooltip');
  if (!tt) { tt = document.createElement('div'); tt.id = 'tl-tooltip'; document.body.appendChild(tt); }
  const yr = year < 0 ? `${Math.abs(year)} av. J.-C.` : (year === 0 ? 'an 0' : `${year} ap. J.-C.`);
  tt.innerHTML = `<div style="font-weight:600;color:var(--text)">${esc(label)}</div><div class="tl-tt-year">${yr}</div>`;
  tt.style.left = Math.min(cx + 12, window.innerWidth - 210) + 'px';
  tt.style.top  = Math.max(cy - 52, 8) + 'px';
  tt.classList.add('visible');
}
function tlHideTooltip() {
  clearTimeout(_tlTipTimer);
  _tlTipTimer = setTimeout(() => {
    const tt = document.getElementById('tl-tooltip');
    if (tt) tt.classList.remove('visible');
  }, 100);
}

// ── Focus card ────────────────────────────────────────────────
function tlOpenFocus(id, isNew) {
  const item = TL_DATA.find(d => d.id === id);
  if (!item) return;

  const color   = TL_BAND_COLORS[item.type] || 'var(--accent)';
  const vig     = TL_VIGNETTES[id] || { emoji: '📌', bg: '#2a2a3a' };
  const era     = FR_ERAS.find(e => {
    const y = item.year != null ? item.year : (item.start + item.end) / 2;
    return y >= e.range[0] && y <= e.range[1];
  });
  const yr = item.year != null
    ? (item.year < 0 ? `${Math.abs(item.year)} av. J.-C.` : (item.year === 0 ? 'an 0' : `${item.year} ap. J.-C.`))
    : (item.start != null ? `${Math.abs(item.start)} av. → ${Math.abs(item.end)} av. J.-C.` : '');

  let overlay = document.getElementById('tl-focus-overlay');

// ── Discover ──────────────────────────────────────────────────
function tlDiscover(id, evt) {
  const st = stats();
  if (!st.discoveredEvents) st.discoveredEvents = [];
  const isNew = !st.discoveredEvents.includes(id);
  if (isNew) {
    st.discoveredEvents.push(id);
    addXP(XP.tl_discover);
    if (evt) spawnXPParticles(evt.clientX || window.innerWidth / 2, evt.clientY || 200, XP.tl_discover);
    save();
    checkFrescoPalier(st.discoveredEvents.length);
    const item = TL_DATA.find(d => d.id === id);
    if (item) {
      const y = item.year != null ? item.year : (item.start != null ? (item.start + item.end) / 2 : 0);
      const era = FR_ERAS.find(e => y >= e.range[0] && y <= e.range[1]);
      if (era) checkEraCompletion(era.key, st.discoveredEvents);
    }
  }
  tlOpenFocus(id, isNew);
}

// ── Build single band content ──────────────────────────────────
function buildBandContent(type, discovered, filterType) {
  const W = tlTotalWidth();
  const bandH = TL_BAND_H[type];
  const items = TL_DATA.filter(d => d.type === type && (filterType === 'all' || filterType === type));

  // Era background stripes
  const eraBgs = FR_ERAS.map(e => {
    const x1 = tlXfromYear(e.range[0]);
    const x2 = tlXfromYear(e.range[1]);
    return `<div class="tl-era-bg" style="left:${x1}px;width:${x2-x1}px;background:${e.color};opacity:0.06"></div>`;
  }).join('');

  // Era vertical separators
  const eraSeps = FR_ERAS.map(e => {
    const x1 = tlXfromYear(e.range[0]);
    return `<div style="position:absolute;left:${x1}px;top:0;bottom:0;width:1px;background:${e.color};opacity:0.2;pointer-events:none"></div>`;
  }).join('');

  let itemsHtml = '';

  if (type === 'empire') {
    items.forEach((d, idx) => {
      const x1 = tlXfromYear(d.start);
      const x2 = tlXfromYear(d.end);
      const w  = Math.max(x2 - x1, 30);
      const isDisco = discovered.includes(d.id);
      const color = TL_BAND_COLORS.empire;
      const vig = TL_VIGNETTES[d.id] || { emoji:'🌍' };
      const top = 12 + (idx % 2) * 14;
      itemsHtml += `<div class="tl-empire-bar"
        onclick="tlDiscover('${d.id}',event)"
        onmouseenter="tlShowTooltip('${esc(d.label)}',${d.start},event.clientX,event.clientY)"
        onmouseleave="tlHideTooltip()"
        style="left:${x1}px;width:${w}px;top:${top}px;
          background:${isDisco ? color+'cc' : color+'44'};
          border:1.5px solid ${isDisco ? color : color+'66'};
          ${isDisco ? 'box-shadow:0 2px 8px '+color+'44' : ''}">
        <span class="tl-empire-label" style="color:${isDisco ? '#fff' : color}">${vig.emoji} ${esc(d.label)}</span>
        ${!isDisco ? `<span style="position:absolute;top:2px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse-dot 1.8s infinite"></span>` : ''}
      </div>`;
    });
  } else {
    // Events, people, books → pins avec anti-collision simple
    const placed = [];
    const PIN_GAP = 52;
    items.forEach(d => {
      const cx = tlXfromYear(d.year != null ? d.year : (d.start + d.end) / 2);
      const isDisco = discovered.includes(d.id);
      const color = TL_BAND_COLORS[type];
      const vig = TL_VIGNETTES[d.id] || { emoji: '📌' };
      // Find vertical slot (up/down alternation based on proximity)
      let offset = 8;
      for (const p of placed) {
        if (Math.abs(p.cx - cx) < PIN_GAP) { offset = p.offset === 8 ? 36 : 8; break; }
      }
      placed.push({ cx, offset });
      const lbl = d.label.length > 16 ? d.label.substring(0, 14) + '…' : d.label;
      itemsHtml += `<div class="tl-pin"
        onclick="tlDiscover('${d.id}',event)"
        onmouseenter="tlShowTooltip('${esc(d.label)}',${d.year ?? d.start},event.clientX,event.clientY)"
        onmouseleave="tlHideTooltip()"
        style="left:${cx}px;top:${offset}px">
        <div class="tl-pin-dot ${isDisco ? 'discovered' : 'undiscovered'}"
          style="border-color:${color};${isDisco ? 'box-shadow:0 0 6px '+color+'66' : ''}">
          <span>${vig.emoji}</span>
        </div>
        <div class="tl-pin-name" style="color:${isDisco ? color : 'rgba(144,144,168,.45)'};margin-top:3px">${esc(lbl)}</div>
      </div>`;
    });
  }

  return `<div class="tl-band-content" style="width:${W}px;height:${bandH}px;position:relative">
    ${eraBgs}${eraSeps}${itemsHtml}
  </div>`;
}

// ── Build axis row ────────────────────────────────────────────
function buildAxisRow() {
  const W = tlTotalWidth();
  let ticks = '';
  for (let y = -2000; y <= 100; y += 100) {
    const x = tlXfromYear(y);
    const major = y % 500 === 0 || y === 0;
    const lbl = y === 0 ? 'an 0' : (y < 0 ? `${Math.abs(y)} av.` : `${y} ap.`);
    ticks += `<div style="position:absolute;left:${x}px;top:0;bottom:0;width:${major?1.5:1}px;background:rgba(201,148,58,${major?.6:.15});pointer-events:none"></div>`;
    if (major) {
      ticks += `<div style="position:absolute;left:${x}px;top:50%;transform:translate(-50%,-50%);font-size:8.5px;color:rgba(144,144,168,.75);white-space:nowrap;pointer-events:none">${lbl}</div>`;
    }
  }
  return `<div class="tl-axis-row">
    <div class="tl-axis-sticky"></div>
    <div class="tl-axis-content" style="width:${W}px;position:relative">${ticks}</div>
  </div>`;
}

// ── Init drag scroll ──────────────────────────────────────────
function initTLDrag() {
  const host = document.getElementById('tl-scroll-host');
  if (!host) return;
  let isDown = false, startX, scrollLeft;
  host.addEventListener('mousedown', e => {
    isDown = true; startX = e.pageX - host.offsetLeft; scrollLeft = host.scrollLeft; host.style.cursor = 'grabbing';
  });
  host.addEventListener('mouseleave', () => { isDown = false; host.style.cursor = 'grab'; });
  host.addEventListener('mouseup', () => { isDown = false; host.style.cursor = 'grab'; });
  host.addEventListener('mousemove', e => {
    if (!isDown) return; e.preventDefault();
    host.scrollLeft = scrollLeft - (e.pageX - host.offsetLeft - startX) * 1.3;
  });
  // Minimap sync
  host.addEventListener('scroll', () => {
    const ratio = host.scrollLeft / (host.scrollWidth - host.clientWidth);
    const eraIdx = Math.min(Math.floor(ratio * FR_ERAS.length), FR_ERAS.length - 1);
    const pills = document.querySelectorAll('.tl-era-pill');
    pills.forEach((p, i) => {
      const era = FR_ERAS[i];
      const isA = i === eraIdx;
      p.classList.toggle('active', isA);
      p.style.background = isA ? era.color : 'transparent';
      p.style.color = isA ? '#0c0b10' : era.color;
    });
  }, { passive: true });
}

    return `<div class="tl-era-tile${complete ? ' complete' : ''}" style="${complete ? 'border-color:'+era.color+'66' : ''}">
      <div class="tl-era-tile-name" style="color:${era.color}">${era.icon} ${era.label}</div>
      <div class="tl-era-tile-bar"><div class="tl-era-tile-fill" style="width:${eraPct}%;background:${era.color}"></div></div>
      <div class="tl-era-tile-sub">${eraDone}/${eraItems.length}${hasArt ? ' · ' + art.icon : ''}</div>
    </div>`;
  }).join('');

  // Progress bar global
  const progressBar = `<div class="tl-progress-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:.8rem;font-weight:600;color:var(--text2)">Savoir historique</span>
      <span style="font-size:.78rem;color:var(--accent2);font-weight:700">${done}/${total} · ${pct}%${nextPalier ? ' · Prochain : '+nextPalier.icon+' à '+nextPalier.threshold : ''}</span>
    </div>
    <div style="background:var(--surface3);border-radius:99px;height:5px;overflow:hidden">
      <div style="background:linear-gradient(90deg,var(--accent),var(--accent2));width:${pct}%;height:5px;border-radius:99px;box-shadow:0 0 8px rgba(201,148,58,.4)"></div>
    </div>
  </div>`;

  // Build bands HTML (visible bands based on filter)
  const activeBands = filter === 'all' ? TL_BANDS : [filter];
  const bandsHtml = activeBands.map(type => `
    <div class="tl-band-row">
      <div class="tl-band-label" style="color:${TL_BAND_COLORS[type]}">${TL_BAND_LABELS[type]}</div>
      ${buildBandContent(type, discovered, filter)}
    </div>`).join('');

  const out = `<main style="padding-bottom:40px;padding-top:0">
    <div id="tl-minimap">${buildMinimap('')}</div>
    <div style="padding:18px 0 4px">
      <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:12px">
        <h2 style="color:var(--accent2);font-size:1.3rem;font-family:'Cinzel',serif">Fresque Sacrée</h2>
        <span style="font-size:.78rem;color:var(--text2)">−2100 av. J.-C. → 100 ap. J.-C.</span>
      </div>
      ${palierBlock}
      ${progressBar}
      <div class="tl-era-tiles">${eraTiles}</div>
      <div class="tl-filter-band">${filterBtns}</div>
      <p style="font-size:.72rem;color:var(--text2);margin-bottom:10px">
        Cliquez un élément pour l'explorer · Drag ou scroll horizontal · <span style="color:var(--accent2)">●</span> colorés = découverts
      </p>
    </div>
    <div id="tl-scroll-host" style="cursor:grab">
      ${buildAxisRow()}
      ${bandsHtml}
    </div>
  </main>`;

  setTimeout(initTLDrag, 0);
  return out;
}



// ── GLOSSAIRE ──────────────────────────────────────────
function renderGlossary(){
  const srch = S.glossary.search.toLowerCase();
  const list = GLOSSARY.filter(g => g.term.toLowerCase().includes(srch) || g.def.toLowerCase().includes(srch));
  let h=`<main>
    <div style="margin-bottom:14px">
      <h2 style="color:var(--accent);font-size:1.4rem;margin-bottom:3px;font-family:'Cinzel',serif">🔤 Glossaire Biblique</h2>
      <p style="color:var(--text2);font-size:.82rem">Définitions des termes théologiques et bibliques complexes.</p>
    </div>
    <input type="text" placeholder="Rechercher un terme..." value="${esc(S.glossary.search)}" oninput="debounceSearch('glossary',this.value)" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.9rem;outline:none;margin-bottom:20px;font-family:'DM Sans',sans-serif">
    <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(260px,1fr));gap:14px">`;
  if(!list.length) h+=`<p class="empty-state">Aucun terme trouvé.</p>`;
  list.forEach(g => {
     h+=`<div style="background:var(--surface);border:1px solid var(--border);padding:18px;border-radius:12px;transition:border-color .2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
       <h3 style="color:var(--accent2);margin-bottom:8px;font-size:1.05rem;font-family:'DM Sans',sans-serif">${esc(g.term)}</h3>
       <p style="font-size:.88rem;color:var(--text);margin-bottom:12px;line-height:1.6">${esc(g.def)}</p>
       <div style="font-size:.78rem;color:var(--text2);font-style:italic">📖 Réf. : <span style="color:var(--accent)">${esc(g.ref)}</span></div>
     </div>`;
  });
  return h+`</div></main>`;
}

// ── LITURGIE ───────────────────────────────────────────
function renderLiturgy(){
  let h=`<main>
    <div style="margin-bottom:20px">
      <h2 style="color:var(--accent);font-size:1.4rem;margin-bottom:3px;font-family:'Cinzel',serif">🕯️ Calendrier Liturgique</h2>
      <p style="color:var(--text2);font-size:.82rem">L'année liturgique fait revivre les mystères du Christ au fil du temps.</p>
    </div>
    
    <div class="section-card" style="border-left:4px solid var(--accent);margin-bottom:24px">
      <h3 style="color:var(--accent2);margin-bottom:12px;font-size:1.1rem">🧭 La Logique d'Ensemble</h3>
      <ul style="color:var(--text2);font-size:.9rem;line-height:1.7;padding-left:18px;display:flex;flex-direction:column;gap:8px;margin:0">
        <li><strong>Décalage civil :</strong> L'année liturgique ne suit pas l'année civile. Elle commence le 1er dimanche de l'Avent (fin nov. / début déc.).</li>
        <li><strong>Trois cycles annuels (A, B, C) :</strong> Centrés chacun sur un évangéliste principal : Matthieu (A), Marc (B), Luc (C). L'Évangile de Jean est distribué sur les temps forts.</li>
        <li><strong>Objectif pastoral :</strong> Faire parcourir l'intégralité du mystère du Christ en 12 mois, et pas seulement lors des moments forts.</li>
        <li><strong>Principe d'anamnèse :</strong> Principe théologique central. Les célébrations ne sont pas de simples commémorations historiques, elles rendent présent et "actualisent" le mystère célébré.</li>
      </ul>
    </div>
    
    <div style="display:flex;flex-direction:column;gap:14px">`;
  LITURGY.forEach(l => {
     h+=`<div style="display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)">
       <div style="width:14px;background:${l.color};flex-shrink:0;box-shadow:inset -3px 0 10px rgba(0,0,0,.2)"></div>
       <div style="padding:20px;flex:1">
         <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
           <h3 style="margin:0;font-size:1.15rem;color:var(--text);font-family:'DM Sans',sans-serif">${esc(l.season)}</h3>
           <span style="font-size:.75rem;color:var(--text);border:1px solid var(--border);padding:3px 10px;border-radius:20px;background:var(--surface2);font-weight:600">${esc(l.time)}</span>
         </div>
         <p style="font-size:.9rem;color:var(--text2);margin-bottom:12px;line-height:1.6">${l.meaning}</p>
         <div style="font-size:.82rem;color:var(--text3);background:var(--surface2);padding:10px 14px;border-radius:8px">
           📖 <strong style="color:var(--text)">Textes clés :</strong> <span style="color:var(--accent2)">${esc(l.texts)}</span>
         </div>
       </div>
     </div>`;
  });
  h+=`</div>
  
  <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:16px;margin-top:24px">
    <div class="section-card">
      <h3 style="color:var(--accent2);margin-bottom:12px;font-size:1.05rem">🎨 Le système des couleurs</h3>
      <ul style="color:var(--text2);font-size:.86rem;line-height:1.6;padding-left:16px;margin:0;display:flex;flex-direction:column;gap:6px">
        <li><span style="color:#a855f7;font-weight:bold">Violet :</span> Avent, Carême, offices des défunts (pénitence et attente).</li>
        <li><span style="color:#e8c97a;font-weight:bold">Blanc / Or :</span> Noël, Pâques, Jeudi Saint, fêtes du Seigneur et de la Vierge (joie, pureté, lumière).</li>
        <li><span style="color:#ef4444;font-weight:bold">Rouge :</span> Pentecôte, Vendredi Saint, fêtes des martyrs (Esprit, sang, Passion).</li>
        <li><span style="color:#22c55e;font-weight:bold">Vert :</span> Temps ordinaire (espérance, croissance ordinaire).</li>
        <li><span style="color:#f472b6;font-weight:bold">Rose :</span> Dimanches <em>Gaudete</em> (3e Avent) et <em>Laetare</em> (4e Carême).</li>
      </ul>
    </div>
    <div class="section-card" style="border-left:4px solid var(--accent)">
      <h3 style="color:var(--accent2);margin-bottom:12px;font-size:1.05rem">🏛️ Les Rangs Liturgiques</h3>
      <p style="color:var(--text2);font-size:.86rem;line-height:1.6;margin-bottom:8px">Chaque célébration de l'année liturgique est classée selon un rang qui détermine sa priorité sur le calendrier. En cas de conflit entre deux célébrations le même jour, le rang le plus élevé prime toujours.</p>
      <ul style="color:var(--text2);font-size:.86rem;line-height:1.6;padding-left:16px;margin:0;display:flex;flex-direction:column;gap:4px">
        <li><strong>Solennité :</strong> Rang le plus élevé. Comprend les fêtes du Seigneur, de la Vierge et des grands saints. Propre complet (lectures, préface spécifique, Gloria, Credo).</li>
        <li><strong>Fête :</strong> Rang intermédiaire. Fêtes des apôtres, évangélistes, archanges.</li>
        <li><strong>Mémoire obligatoire :</strong> Célébrée partout, elle ne peut pas être omise.</li>
        <li><strong>Mémoire facultative :</strong> Laissée au choix du célébrant selon le contexte pastoral.</li>
        <li><strong>Férie :</strong> Jour ordinaire sans fête propre — la messe du temps s'applique.</li>
      </ul>
      <p style="font-size:.78rem;color:var(--accent);margin-top:10px;font-style:italic">📖 Réf. : Présentation Générale du Missel Romain (PGMR), normes de 1969.</p>
    </div>
    <div class="section-card" style="border-left:4px solid #3b82f6">
      <h3 style="color:#bfdbfe;margin-bottom:12px;font-size:1.05rem">🌹 La Vierge Marie dans l'Année</h3>
      <p style="color:var(--text2);font-size:.86rem;line-height:1.6;margin-bottom:8px">Marie est présente à travers toute l'année liturgique, non comme figure parallèle, mais comme celle qui vit en premier les mystères du Christ.</p>
      <ul style="color:var(--text2);font-size:.86rem;line-height:1.6;padding-left:16px;margin:0;display:flex;flex-direction:column;gap:4px">
        <li><strong>Avent :</strong> Immaculée Conception (8 déc., Solennité), Annonciation (si non déplacée).</li>
        <li><strong>Noël :</strong> Marie Mère de Dieu (1er jan., Solennité) — premier titre marial de l'année.</li>
        <li><strong>Carême :</strong> Annonciation (25 mars, Solennité) — si hors de la Semaine Sainte.</li>
        <li><strong>Temps Pascal :</strong> Implicitement présente (Jean 19:25-27, Actes 1:14).</li>
        <li><strong>Temps Ordinaire :</strong> Assomption (15 août, Solennité), Notre-Dame du Rosaire (oct.).</li>
        <li><strong>Mois de Marie :</strong> Mai et octobre sont des mois traditionnellement mariaux (dévotion populaire, non liturgique officielle).</li>
      </ul>
      <div style="font-size:.82rem;color:var(--text3);background:var(--surface2);padding:10px 14px;border-radius:8px;margin-top:12px">
        ✝ <strong>Note théologique :</strong> Marie est <em>"Typus Ecclesiae"</em> — figure de l'Église. Elle représente la réponse parfaite de l'humanité à Dieu.
      </div>
    </div>
    <div class="section-card">
      <h3 style="color:var(--accent2);margin-bottom:12px;font-size:1.05rem">🕊️ Le Sanctoral</h3>
      <p style="color:var(--text2);font-size:.86rem;line-height:1.6;margin-bottom:8px">En parallèle du cycle du Christ (Propre du temps), la liturgie célèbre le <strong>Propre des saints</strong>, structuré par rangs :</p>
      <ul style="color:var(--text2);font-size:.86rem;line-height:1.6;padding-left:16px;margin:0;display:flex;flex-direction:column;gap:4px">
        <li><strong>Solennités :</strong> Rang suprême (Toussaint, Assomption, Nativité de Jean-Baptiste).</li>
        <li><strong>Fêtes :</strong> Rang intermédiaire (apôtres, archanges).</li>
        <li><strong>Mémoires :</strong> Obligatoires ou facultatives (martyrs, docteurs de l'Église).</li>
      </ul>
    </div>
    <div class="section-card">
      <h3 style="color:var(--accent2);margin-bottom:12px;font-size:1.05rem">⏱️ La Liturgie des Heures</h3>
      <p style="color:var(--text2);font-size:.86rem;line-height:1.6;margin:0">
        Le calendrier ne se limite pas à la messe dominicale. La <strong>Liturgie des Heures</strong> structure chaque journée : <em>Laudes</em> (matin), <em>Vêpres</em> (soir), <em>Complies</em> (nuit), et <em>Office des lectures</em>. C'est la prière officielle de l'Église, rythmée par un cycle de psaumes en rotation sur 4 semaines.
      </p>
    </div>
    <div class="section-card">
      <h3 style="color:var(--accent2);margin-bottom:12px;font-size:1.05rem">🌍 Histoire & Œcuménisme</h3>
      <p style="color:var(--text2);font-size:.86rem;line-height:1.6;margin-bottom:8px">
        <strong>Origine :</strong> Le cycle s'est constitué du IIe au Ve siècle (Pâques est la fête originelle dès le IIe s., Noël apparaît au IVe s.). Vatican II (1969) a rationalisé le Lectionnaire.
      </p>
      <p style="color:var(--text2);font-size:.86rem;line-height:1.6;margin:0">
        <strong>Œcuménisme :</strong> Catholiques, Orthodoxes (calendrier julien, Pâques décalée), Anglicans et Luthériens ont des versions proches. Certaines communautés évangéliques préfèrent la <em>lectio continua</em>, et l'Avent/Carême sont parfois absents dans les traditions réformées.
      </p>
    </div>
  </div>
  </main>`;
  return h;
}



// ── ADMIN ──────────────────────────────────────────────
function renderAdmin(){
  if(S.user?.role!=='ADMIN')return`<main><p style="color:var(--wrong)">Accès refusé.</p></main>`;
  const tab=S.admin.tab;
  return`<main>
    <div class="admin-header"><h2>⚙️ Administration</h2></div>
    <div class="admin-tabs">
      <button class="${tab==='questions'?'active':''}" onclick="S.admin.tab='questions';render()">Quiz (${DATA.questions.length})</button>
      <button class="${tab==='minigames'?'active':''}" onclick="S.admin.tab='minigames';render()">Mini-jeux (${DATA.minigames.length})</button>
      <button class="${tab==='science'?'active':''}" onclick="S.admin.tab='science';render()">Science & Foi (${SF_TOTAL})</button>
      <button class="${tab==='ft'?'active':''}" onclick="S.admin.tab='ft';render()">Flash Savoir (${FT_TOTAL})</button>
    </div>
    ${tab==='questions'?`<div style="overflow-x:auto"><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Question</th><th>Thème</th><th>Diff.</th></tr></thead><tbody>${DATA.questions.map(q=>`<tr><td title="${esc(q.text)}">${esc(q.text.substring(0,60))}…</td><td>${TH[q.theme]||q.theme}</td><td>${DF[q.difficulty]||q.difficulty}</td></tr>`).join('')}</tbody></table></div>`:''}
    ${tab==='minigames'?`<div style="overflow-x:auto"><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Type</th><th>Thème</th><th>Aperçu</th></tr></thead><tbody>${DATA.minigames.map(m=>`<tr><td style="color:var(--accent)">${(MG_TYPE_LABELS[m.type]||m.type).replace(/^.+ /,'')}</td><td>${TH[m.theme]||m.theme}</td><td>${esc((m.data.question||m.data.template||m.data.quote||'').substring(0,50))}…</td></tr>`).join('')}</tbody></table></div>`:''}
    ${tab==='science'?`<div style="overflow-x:auto"><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>#</th><th>Référence</th><th>Titre</th><th>Cat.</th></tr></thead><tbody>${SCIENCE_FOI.map(f=>`<tr><td>${f.id}</td><td style="color:var(--accent)">${esc(f.ref)}</td><td>${esc(f.title)}</td><td>${(SF_CATS[f.cat]||f.cat)}</td></tr>`).join('')}</tbody></table></div>`:''}
    ${tab==='ft'?`<div style="overflow-x:auto"><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>#</th><th>Catégorie</th><th>Titre</th></tr></thead><tbody>${FINGERTIPS.map(f=>`<tr><td>${f.id}</td><td>${FT_CATS[f.cat]||f.cat}</td><td>${esc(f.title)}</td></tr>`).join('')}</tbody></table></div>`:''}
  </main>`;
}

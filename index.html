    {id:250,text:"Quel compagnon de Paul est décrit comme son 'enfant dans la foi' et reçoit deux épîtres ?",options:["Barnabas","Silas","Timothée","Apollos"],answer:"Timothée",explanation:"Timothée, fils d'une Juive et d'un Grec, devint le représentant de Paul dans plusieurs Églises. Il reçut 1 et 2 Timothée — les épîtres pastorales.",reference:"1 Timothée 1:2",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:251,text:"Quel est l'hymne aux armes spirituelles du chrétien dans l'épître aux Éphésiens ?",options:["Éphésiens 2:8-9","Éphésiens 4:4-6","Éphésiens 6:10-18","Éphésiens 5:25-27"],answer:"Éphésiens 6:10-18",explanation:"'Revêtez-vous de toutes les armes de Dieu' — ceinture de vérité, cuirasse de justice, bouclier de la foi, casque du salut, épée de l'Esprit.",reference:"Éphésiens 6:10-18",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:252,text:"Dans quelle épître Paul écrit-il 'Je puis tout par celui qui me fortifie' ?",options:["Romains","1 Corinthiens","Philippiens","Colossiens"],answer:"Philippiens",explanation:"Philippiens 4:13 est l'une des citations pauliniennes les plus connues. Contexte : Paul apprend la suffisance en toutes circonstances.",reference:"Philippiens 4:13",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:253,text:"Quel apôtre, frère de Pierre, fut le premier à suivre Jésus et l'amena à son frère ?",options:["Jean","Jacques","André","Philippe"],answer:"André",explanation:"André, pêcheur comme Pierre, entendit Jean-Baptiste désigner Jésus comme 'Agneau de Dieu'. Il chercha aussitôt son frère Simon : 'Nous avons trouvé le Messie.'",reference:"Jean 1:40-42",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:254,text:"Quelle communauté reçut la fameuse lettre de Paul sur le corps du Christ comme métaphore de l'Église ?",options:["Rome","Galates","Corinthe","Éphèse"],answer:"Corinthe",explanation:"1 Corinthiens 12 développe la métaphore du corps — chaque membre a son rôle, la diversité des dons sert l'unité du tout.",reference:"1 Corinthiens 12:12",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:255,text:"Quel apôtre fut le premier à porter l'Évangile aux non-Juifs suite à la vision de la nappe céleste ?",options:["Paul","Barnabas","Pierre","Étienne"],answer:"Pierre",explanation:"Pierre reçut la vision d'une nappe contenant des animaux impurs. Voix divine : 'Ce que Dieu a purifié, ne le dis pas impur.' Il alla alors chez Corneille.",reference:"Actes 10:9-28",theme:"APOTRES",difficulty:"AVANCE"},
    {id:256,text:"Que prédit Agabus le prophète sur Paul à Césarée selon les Actes ?",options:["Qu'il mourrait à Rome","Qu'il serait lié et livré aux Romains à Jérusalem","Qu'il ferait naufrage","Qu'il serait libéré par un ange"],answer:"Qu'il serait lié et livré aux Romains à Jérusalem",explanation:"Agabus prit la ceinture de Paul, se lia les mains et les pieds : 'Ainsi sera lié l'homme à qui appartient cette ceinture.' Paul décida quand même d'y aller.",reference:"Actes 21:10-13",theme:"APOTRES",difficulty:"AVANCE"},
    {id:257,text:"Quelle nation conquit le royaume du Nord d'Israël (Samarie) en 722 av. J.-C. ?",options:["Babylone","L'Égypte","L'Assyrie","La Perse"],answer:"L'Assyrie",explanation:"Sargon II d'Assyrie prit Samarie et déporta les habitants des dix tribus — les 'tribus perdues d'Israël' dans la diaspora assyrienne.",reference:"2 Rois 17:6",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:258,text:"Quel prophète dénonce le commerce des esclaves et les crimes de guerre des nations voisines d'Israël ?",options:["Osée","Joël","Amos","Michée"],answer:"Amos",explanation:"Amos commence par condamner les nations environnantes avant de s'en prendre à Israël lui-même — structure rhétorique qui piège son auditoire.",reference:"Amos 1-2",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:259,text:"Quel signe donné par Dieu à Ézéchias consistait en un ombre solaire reculant de 10 degrés ?",options:["Un arc-en-ciel","L'ombre du cadran d'Achaz reculant","Une étoile apparaissant à midi","Une éclipse totale"],answer:"L'ombre du cadran d'Achaz reculant",explanation:"Ézéchias demanda un signe de sa guérison. Ésaïe proposa que l'ombre avance ou recule de 10 degrés — elle recula de 10 degrés.",reference:"2 Rois 20:10-11",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:260,text:"Quel prophète reçut l'ordre de Dieu de manger un rouleau contenant des lamentations ?",options:["Jérémie","Ézéchiel","Zacharie","Jean (Apocalypse)"],answer:"Ézéchiel",explanation:"Ézéchiel mangea le rouleau qui était doux comme du miel — image de l'intériorisation de la Parole divine avant de la transmettre.",reference:"Ézéchiel 3:1-3",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:261,text:"Quelle phrase célèbre de Michée résume ce que Dieu exige de l'homme ?",options:["'Soyez saints car je suis saint'","'Pratiquer la justice, aimer la bonté, et marcher humblement avec ton Dieu'","'Tu aimeras ton prochain comme toi-même'","'Revenez à moi et je reviendrai à vous'"],answer:"'Pratiquer la justice, aimer la bonté, et marcher humblement avec ton Dieu'",explanation:"Michée 6:8 est l'un des résumés les plus sublimes de la religion biblique — éthique sociale, affection et humilité devant Dieu.",reference:"Michée 6:8",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:262,text:"Quel prophète fut jeté dans une citerne pleine de boue par les princes de Juda ?",options:["Ésaïe","Ézéchiel","Jérémie","Daniel"],answer:"Jérémie",explanation:"Jérémie fut jeté dans une citerne boueuse pour ses prophéties de capitulation. Un eunuque éthiopien, Ébed-Mélek, le sauva.",reference:"Jérémie 38:6",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:263,text:"Quel prophète annonça que l'Éternel rachèterait Israël 'comme un mari' après l'avoir répudiée ?",options:["Jérémie","Osée","Ézéchiel","Ésaïe"],answer:"Osée",explanation:"Osée 2 annonce la réconciliation de Dieu avec Israël — 'Je te fiancerai à moi pour toujours, dans la justice et dans l'amour.'",reference:"Osée 2:19",theme:"PROPHETES",difficulty:"AVANCE"},
    {id:264,text:"Quelle est la première fête liturgique du calendrier hébreu ?",options:["Le Sabbat","La Pâque","La Pentecôte","Les Tabernacles"],answer:"La Pâque",explanation:"La Pâque (Nisan 14) est la première fête du calendrier liturgique hébreu — commémorant la sortie d'Égypte.",reference:"Lévitique 23:5",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:265,text:"Quel commandement défend de 'convoiter' les biens d'autrui ?",options:["8e commandement","9e commandement","10e commandement","7e commandement"],answer:"10e commandement",explanation:"Le 10e commandement porte sur le désir intérieur, pas seulement l'acte extérieur — une anticipation de la loi du cœur.",reference:"Exode 20:17",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:266,text:"Qu'est-ce que la 'circoncision du cœur' mentionnée dans le Deutéronome et reprise par Paul ?",options:["Un rituel de purification externe","Une transformation intérieure radicale, au-delà du rite extérieur","Un jeûne prolongé","Une cérémonie de consécration"],answer:"Une transformation intérieure radicale, au-delà du rite extérieur",explanation:"Deutéronome 10:16 et 30:6 appellent à une transformation du cœur. Paul développe que la vraie circoncision est celle du cœur par l'Esprit.",reference:"Deutéronome 10:16 / Romains 2:29",theme:"LOI",difficulty:"AVANCE"},
    {id:267,text:"Quelle institution biblique prévoyait la libération des esclaves hébreux après 7 ans de service ?",options:["Le Jubilé","L'Année sabbatique","La Loi du talion","La Loi de rachat"],answer:"L'Année sabbatique",explanation:"Tout esclave hébreu devait être libéré la 7e année, avec des provisions pour son départ. Le Jubilé (50e année) étendait ce principe à toutes les terres.",reference:"Exode 21:2",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:268,text:"Quel est le 'Lévitique de sainteté' ou Code de sainteté dans le livre du Lévitique ?",options:["Lévitique 1-7","Lévitique 11-15","Lévitique 17-26","Lévitique 27"],answer:"Lévitique 17-26",explanation:"Le Code de sainteté (Lévitique 17-26) rassemble les lois éthiques et rituelles autour du principe central : 'Soyez saints, car je suis saint.'",reference:"Lévitique 19:2",theme:"LOI",difficulty:"AVANCE"},
    {id:269,text:"Que commandait la Loi concernant le coin des champs lors de la moisson ?",options:["Le brûler comme offrande","Le laisser aux pauvres et aux étrangers","Le mettre dans le Trésor du Temple","Le partager équitablement entre voisins"],answer:"Le laisser aux pauvres et aux étrangers",explanation:"Le coin du champ ('pe'ah') et les glanures devaient être laissés pour les pauvres et les étrangers. Ruth exerça ce droit chez Boaz.",reference:"Lévitique 19:9-10",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:270,text:"Quelle est la peine prévue dans la Loi pour quiconque maudirait son père ou sa mère ?",options:["L'exil","Une amende","La mort","La flagellation"],answer:"La mort",explanation:"La sévérité de cette loi (Exode 21:17) reflète l'importance de l'ordre familial et de l'autorité parentale dans la société israélite antique.",reference:"Exode 21:17",theme:"LOI",difficulty:"AVANCE"},
    {id:271,text:"Dans la parabole des mines (Luc 19), combien de mines le premier serviteur fait-il fructifier ?",options:["Il en gagne 5","Il en gagne 10","Il les double","Il les perd"],answer:"Il en gagne 10",explanation:"Luc 19 présente une version différente des talents : un serviteur fait fructifier une mine en dix. Il reçoit l'autorité sur dix villes.",reference:"Luc 19:16",theme:"PARABOLES",difficulty:"AVANCE"},
    {id:272,text:"Quelle est la leçon principale de la parabole du filet qui ramasse toutes sortes de poissons ?",options:["Il faut choisir ses disciples avec soin","Le jugement final séparera les justes des méchants","L'Église doit rejeter les pécheurs maintenant","Les pharisiens sont comme les mauvais poissons"],answer:"Le jugement final séparera les justes des méchants",explanation:"Le filet rassemble tout — bons et mauvais. La séparation se fera à la fin des temps, non maintenant. Image du sursis accordé avant le jugement.",reference:"Matthieu 13:47-50",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:273,text:"Dans la parabole des deux fils envoyés travailler à la vigne, lequel représente les collecteurs d'impôts et les pécheurs ?",options:["Celui qui dit non puis y va","Celui qui dit oui mais n'y va pas","Aucun des deux","Les deux représentent les pharisiens"],answer:"Celui qui dit non puis y va",explanation:"Le fils qui refuse d'abord puis obéit représente les pécheurs qui se repentent. Celui qui promet mais ne fait rien représente les chefs religieux.",reference:"Matthieu 21:28-31",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
    {id:274,text:"Quelle parabole Jésus raconte-t-il pour enseigner qu'on ne met pas du vin nouveau dans de vieilles outres ?",options:["Une parabole nommée","Une image courte sans nom de parabole","La parabole du vigneron","La parabole du dépositaire"],answer:"Une image courte sans nom de parabole",explanation:"Luc 5:37-38 — vieilles outres et nouveau vin. Image du contraste entre l'ancienne et la nouvelle alliance. La nouveauté du Royaume ne tient pas dans les formes anciennes.",reference:"Luc 5:37-38",theme:"PARABOLES",difficulty:"AVANCE"},
    {id:275,text:"Dans la parabole de la pièce d'argent perdue, quelle est la réaction de la femme qui la retrouve ?",options:["Elle remercie Dieu en silence","Elle appelle ses amis et voisines pour se réjouir","Elle l'offre au Temple","Elle la partage avec les pauvres"],answer:"Elle appelle ses amis et voisines pour se réjouir",explanation:"La femme qui retrouve sa drachme appelle ses voisines pour partager sa joie — image de la joie de Dieu et des anges pour un pécheur repenti.",reference:"Luc 15:9",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:276,text:"Quelle est la signification du nom 'Moïse' selon la Genèse ?",options:["'Sauvé des eaux'","'Serviteur de Dieu'","'Tiré de l'eau'","'Fils du Pharaon'"],answer:"'Tiré de l'eau'",explanation:"La fille de Pharaon le nomma Moïse (Moshé) car elle l'avait tiré des eaux du Nil. Un jeu de mots hébreu sur 'mashah' (tirer/sauver).",reference:"Exode 2:10",theme:"LOI",difficulty:"INTERMEDIAIRE"},
    {id:277,text:"Quel est le premier miracle que Dieu accomplit par l'intermédiaire de Moïse devant Pharaon ?",options:["Les grenouilles","Le Nil changé en sang","Les ténèbres","Les sauterelles"],answer:"Le Nil changé en sang",explanation:"Le Nil changé en sang est la première des dix plaies d'Égypte. L'eau sacrée des Égyptiens devient mort — confrontation des dieux.",reference:"Exode 7:20",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:278,text:"Quelle était la dernière des dix plaies d'Égypte qui convainquit Pharaon de laisser partir Israël ?",options:["Les ténèbres","La mort du bétail","Les ulcères","La mort des premiers-nés"],answer:"La mort des premiers-nés",explanation:"La 10e plaie — mort de tous les premiers-nés d'Égypte — frappa même le fils de Pharaon. C'est ce qui donna naissance à la fête de la Pâque.",reference:"Exode 12:29",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:279,text:"Quel mot hébreu décrit le concept d'amour fidèle et loyal de Dieu envers son peuple ?",options:["Shalom","Hesed","Berith","Emet"],answer:"Hesed",explanation:"Hesed (bienveillance fidèle, amour loyal) est l'un des attributs les plus fondamentaux de Dieu dans l'AT. Traduit par 'grâce', 'miséricorde', 'bonté'.",reference:"Exode 34:6",theme:"LOI",difficulty:"AVANCE"},
    {id:280,text:"Quel animal Dieu utilisa-t-il pour parler à Balaam, prophète engagé pour maudire Israël ?",options:["Un serpent","Une colombe","Une ânesse","Un bélier"],answer:"Une ânesse",explanation:"L'ânesse de Balaam vit l'ange de l'Éternel et refusa d'avancer. Dieu ouvrit sa bouche pour qu'elle parle à Balaam — épisode comique aux enjeux sérieux.",reference:"Nombres 22:28",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:281,text:"Que signifie le terme 'Selah' qui apparaît fréquemment dans les Psaumes ?",options:["Loué soit l'Éternel","Un terme musical indiquant une pause ou une élévation","La fin d'un strophe","Un cri de joie"],answer:"Un terme musical indiquant une pause ou une élévation",explanation:"Selah apparaît 71 fois dans les Psaumes. Son sens exact est incertain — possiblement une indication musicale pour une pause, un interlude ou un crescendo.",reference:"Psaume 3:2",theme:"PSAUMES",difficulty:"AVANCE"},
    {id:282,text:"Quel personnage de l'AT est décrit comme 'ami de Dieu' ('khalil Allah' en arabe) ?",options:["Moïse","David","Abraham","Énoch"],answer:"Abraham",explanation:"Abraham est appelé 'ami de Dieu' en Ésaïe 41:8, Jacques 2:23 et dans la tradition islamique. Expression unique de l'intimité avec Dieu.",reference:"Jacques 2:23",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:283,text:"Quelle montagne était le lieu saint du culte samaritain, concurrent du Temple de Jérusalem ?",options:["Le mont Carmel","Le mont Garizim","Le mont Thabor","Le mont Hermon"],answer:"Le mont Garizim",explanation:"Les Samaritains adoraient sur le Garizim. La Samaritaine demanda à Jésus 'Où faut-il adorer ?' Jésus répondit que ni Garizim ni Jérusalem ne serait le lieu définitif.",reference:"Jean 4:20",theme:"HISTOIRE",difficulty:"AVANCE"},
    {id:284,text:"Quel est le sens du terme 'Alléluia' en hébreu ?",options:["Gloire à Dieu","Louez l'Éternel","Que Dieu règne","Dieu est avec nous"],answer:"Louez l'Éternel",explanation:"Alléluia (Hallelu Yah) = 'Louez Yah (l'Éternel)'. L'un des mots les plus universels, chanté dans toutes les traditions chrétiennes depuis 2000 ans.",reference:"Psaume 150:1",theme:"PSAUMES",difficulty:"DEBUTANT"},
    {id:285,text:"Quel roi d'Israël fut choisi notamment parce qu'il était 'de tête plus grand que tout le peuple' ?",options:["David","Salomon","Saül","Jéroboam"],answer:"Saül",explanation:"Saül était imposant physiquement — premier roi d'Israël, choisi en partie pour son apparence impressionnante. Dieu avertira plus tard Samuel : 'L'homme regarde ce qui frappe les yeux.'",reference:"1 Samuel 9:2",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:286,text:"Dans quelle circonstance Jésus guérit-il dix lépreux en chemin vers Jérusalem ?",options:["Lors de la Pâque à Jérusalem","Sur la route entre Samarie et Galilée","Dans la synagogue de Capharnaüm","Près du lac de Génésareth"],answer:"Sur la route entre Samarie et Galilée",explanation:"Dix lépreux crient à Jésus de loin. Il les envoie aux prêtres — ils sont guéris en chemin. Seul un, Samaritain, revient glorifier Dieu.",reference:"Luc 17:11-19",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
    {id:287,text:"Quelle femme contribua au soutien matériel du ministère de Jésus selon Luc 8 ?",options:["Marie de Béthanie","Lydie de Philippes","Joanna femme de Chuza","Suzanne"],answer:"Joanna femme de Chuza",explanation:"Luc 8:3 mentionne Joanna (femme du régisseur d'Hérode), Suzanne et Marie-Madeleine parmi les femmes qui 'assistaient Jésus de leurs biens'.",reference:"Luc 8:3",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:288,text:"Quel apôtre écrivit 'La foi sans les œuvres est morte' en opposition apparente à Paul ?",options:["Pierre","Jean","Jacques","Jude"],answer:"Jacques",explanation:"Jacques 2:17 semble contredire Romains. Luther disait que l'épître de Jacques était 'une épître de paille'. En réalité, Jacques et Paul parlent de contextes différents.",reference:"Jacques 2:17",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:289,text:"Quel est le seul Évangile qui n'a pas été écrit par l'un des douze apôtres ?",options:["Matthieu","Marc","Luc","Jean"],answer:"Luc",explanation:"Luc était un médecin, compagnon de Paul. Marc était le disciple de Pierre. Seul Luc, comme Marc, était un 'second cercle' — mais pas l'un des Douze.",reference:"Colossiens 4:14",theme:"APOTRES",difficulty:"AVANCE"},
    {id:290,text:"Que signifie le terme 'Évangile' (euangelion en grec) ?",options:["Le livre de Jésus","Bonne nouvelle","Parole de Dieu","Enseignement sacré"],answer:"Bonne nouvelle",explanation:"Euangelion = 'bonne nouvelle'. Dans l'Empire romain, ce terme désignait une annonce victorieuse. Les chrétiens l'appliquèrent à la mort et résurrection de Jésus.",reference:"Marc 1:1",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:291,text:"Dans quelle épître Paul développe-t-il le concept de résurrection du corps contre ceux qui niaient la résurrection ?",options:["Romains","Galates","1 Corinthiens","Philippiens"],answer:"1 Corinthiens",explanation:"1 Corinthiens 15 est le plus grand texte paulinien sur la résurrection. 'Si le Christ n'est pas ressuscité, votre foi est vaine et vous êtes encore dans vos péchés.'",reference:"1 Corinthiens 15:17",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:292,text:"Quel apôtre fut crucifié la tête en bas selon la tradition, s'estimant indigne de mourir comme Jésus ?",options:["Paul","Jean","Pierre","André"],answer:"Pierre",explanation:"La tradition affirme que Pierre, lors de sa crucifixion à Rome sous Néron, demanda à être crucifié la tête en bas. La basilique Saint-Pierre est construite sur sa tombe présumée.",reference:"Jean 21:18-19",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
    {id:293,text:"Quel titre Jésus donne-t-il à l'Esprit Saint dans l'Évangile de Jean comme 'avocat' ou 'consolateur' ?",options:["Pneuma","Logos","Parakletos","Kyrios"],answer:"Parakletos",explanation:"Parakletos (Paraclet) signifie 'celui qui est appelé auprès' — avocat, consolateur, intercesseur. Jésus promet d'envoyer un autre Paraclet après son départ.",reference:"Jean 14:16",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
    {id:294,text:"Quel pays fut la destination de la fuite de la Sainte Famille après la naissance de Jésus ?",options:["Syrie","Jordanie","Égypte","Grèce"],answer:"Égypte",explanation:"Joseph reçut en songe l'ordre de fuir en Égypte pour échapper au massacre des Innocents ordonné par Hérode. Matthieu y voit l'accomplissement d'Osée 11:1.",reference:"Matthieu 2:13-14",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:295,text:"Quel était le métier de Joseph, père adoptif de Jésus ?",options:["Berger","Charpentier","Pêcheur","Forgeron"],answer:"Charpentier",explanation:"Joseph est désigné comme tektôn (artisan du bois ou de la construction) — Jésus sera lui-même appelé ainsi dans l'Évangile de Marc.",reference:"Matthieu 13:55",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:296,text:"Quelle épître de Paul contient le fameux 'hymne à la charité' commençant par 'L'amour est patient, l'amour est serviable' ?",options:["Romains 8","Galates 5","1 Corinthiens 13","Éphésiens 3"],answer:"1 Corinthiens 13",explanation:"1 Corinthiens 13 décrit l'agape — amour inconditionnel. Paul le place au-dessus de tous les dons spirituels : 'Si je n'ai pas l'amour, je ne suis rien.'",reference:"1 Corinthiens 13:4",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:297,text:"Dans quelle ville Paul fut-il lapidé et laissé pour mort avant de se relever ?",options:["Antioche","Iconium","Lystre","Derbe"],answer:"Lystre",explanation:"À Lystre, Paul et Barnabas furent d'abord pris pour des dieux (Hermès et Zeus), puis la foule retournée lapida Paul et le tira hors de la ville le croyant mort.",reference:"Actes 14:19",theme:"APOTRES",difficulty:"AVANCE"},
    {id:298,text:"Quel prophète dit 'Ramenez-moi tes dîmes... et éprouve-moi maintenant ainsi' ?",options:["Ésaïe","Ézéchiel","Malachie","Aggée"],answer:"Malachie",explanation:"Malachie 3:10 est le seul passage où Dieu invite l'homme à le 'mettre à l'épreuve' — en matière de dîme et de générosité.",reference:"Malachie 3:10",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:299,text:"Quel est le dernier mot de l'Ancien Testament dans la traduction française de la Bible (Louis Segond) ?",options:["Destruction","Malédiction","Anathème","Réconciliation"],answer:"Anathème",explanation:"Malachie 4:6 se termine par 'de peur que je ne vienne frapper le pays d'interdit (anathème, hérèm)'. L'AT se ferme sur une mise en garde — l'Évangile apportera la réponse.",reference:"Malachie 4:6",theme:"PROPHETES",difficulty:"AVANCE"},
  {id:300,text:"Quel verset du Nouveau Testament est souvent appelé 'le plus grand commandement' selon Jésus ?",options:["Jean 3:16","Matthieu 22:37","Jean 13:34","Matthieu 5:3"],answer:"Matthieu 22:37",explanation:"'Tu aimeras le Seigneur ton Dieu de tout ton cœur... et ton prochain comme toi-même.' Jésus dit que toute la Loi et les Prophètes dépendent de ces deux commandements.",reference:"Matthieu 22:37-40",theme:"LOI",difficulty:"DEBUTANT"},
    {id:301,text:"Quel est le nom hébreu des cinq premiers livres de la Bible ?",options:["Prophètes","Torah","Hagiographes","Pentateuque latin"],answer:"Torah",explanation:"Torah signifie 'enseignement' ou 'loi' en hébreu et désigne l'ensemble des cinq livres de Moïse.",reference:"Deutéronome 1:1",theme:"LOI",difficulty:"DEBUTANT"},
  {id:302,text:"Combien de plaies Dieu envoya-t-il sur l'Égypte ?",options:["7","10","12","40"],answer:"10",explanation:"Les dix plaies sont les jugements divins sur l'Égypte pour libérer Israël, culminant avec la mort des premiers-nés.",reference:"Exode 7–12",theme:"LOI",difficulty:"DEBUTANT"},
  {id:303,text:"Comment s'appelle la fête qui commémore la sortie d'Égypte ?",options:["Pentecôte","Shabbat","Pâque","Souccot"],answer:"Pâque",explanation:"La Pâque (Pesach) commémore le 'passage' de Dieu qui épargnait les maisons marquées du sang de l'agneau.",reference:"Exode 12:14",theme:"LOI",difficulty:"DEBUTANT"},
  {id:304,text:"Sur quel mont Moïse reçoit-il les Tables de la Loi ?",options:["Mont Carmel","Mont Sinaï","Mont Nebo","Mont Sion"],answer:"Mont Sinaï",explanation:"Le Sinaï est le lieu de la révélation de la Torah, cœur de l'alliance entre Dieu et Israël.",reference:"Exode 19:20",theme:"LOI",difficulty:"DEBUTANT"},
  {id:305,text:"Quel est le premier des dix commandements ?",options:["Tu ne tueras point","Tu n'auras pas d'autres dieux devant moi","Tu ne mentiras pas","Tu honoreras tes parents"],answer:"Tu n'auras pas d'autres dieux devant moi",explanation:"Le premier commandement affirme l'unicité de Dieu et fonde tous les autres.",reference:"Exode 20:3",theme:"LOI",difficulty:"DEBUTANT"},
  {id:306,text:"Quel métal les Israélites utilisent-ils pour fabriquer un veau idolâtre au désert ?",options:["Argent","Bronze","Or","Cuivre"],answer:"Or",explanation:"Pendant l'absence de Moïse sur le Sinaï, le peuple fond ses bijoux en or pour fabriquer un veau, rupture grave de l'alliance.",reference:"Exode 32:4",theme:"LOI",difficulty:"DEBUTANT"},
  {id:307,text:"Quel est le livre biblique qui traite principalement des règles sacrificielles et de la pureté ?",options:["Nombres","Deutéronome","Lévitique","Josué"],answer:"Lévitique",explanation:"Le Lévitique, centré sur la tribu de Lévi, détaille les sacrifices, la pureté rituelle et le code de sainteté.",reference:"Lévitique 1:1",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:308,text:"Qu'est-ce que le Jubilé dans la loi mosaïque ?",options:["Une fête des moissons tous les 7 ans","Une année de libération et de restitution tous les 50 ans","Un sacrifice annuel pour les péchés","Le début de l'année liturgique"],answer:"Une année de libération et de restitution tous les 50 ans",explanation:"Le Jubilé (Yovel) libérait les esclaves, annulait les dettes et restituait les terres tous les cinquante ans.",reference:"Lévitique 25:10",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:309,text:"Quel est le 'Grand Pardon' dans le calendrier juif ?",options:["Rosh Hashana","Yom Kippour","Shavouot","Pourim"],answer:"Yom Kippour",explanation:"Yom Kippour est le Jour de l'Expiation où le grand prêtre entrait dans le Saint des Saints pour offrir des sacrifices pour tous les péchés d'Israël.",reference:"Lévitique 16",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:310,text:"Dans le livre des Nombres, combien d'années Israël erre-t-il dans le désert ?",options:["20","30","40","50"],answer:"40",explanation:"Les quarante ans symbolisent une génération entière qui disparaît à cause de l'incrédulité, avant l'entrée en Canaan.",reference:"Nombres 14:33",theme:"LOI",difficulty:"DEBUTANT"},
  {id:311,text:"Qui sont les seuls deux espions de la première génération à entrer en terre promise ?",options:["Moïse et Aaron","Caleb et Josué","Phinées et Éléazar","Reuben et Gad"],answer:"Caleb et Josué",explanation:"Caleb et Josué furent les seuls à rester fidèles lorsque les espions rapportèrent la difficulté de la conquête.",reference:"Nombres 14:30",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:312,text:"Que signifie 'manne' selon l'étymologie hébraïque ?",options:["Pain du ciel","Qu'est-ce que c'est ?","Nourriture divine","Rosée sacrée"],answer:"Qu'est-ce que c'est ?",explanation:"'Man hou ?' en hébreu signifie 'Qu'est-ce que c'est ?' — la question des Israélites face à cette nourriture inconnue.",reference:"Exode 16:15",theme:"LOI",difficulty:"AVANCE"},
  {id:313,text:"Quel commandement du Deutéronome est appelé le 'Shema Israël' ?",options:["Aime ton prochain comme toi-même","Écoute, Israël : l'Éternel est notre Dieu, l'Éternel est un","Tu ne tueras pas","Je suis l'Éternel ton Dieu"],answer:"Écoute, Israël : l'Éternel est notre Dieu, l'Éternel est un",explanation:"Le Shema (Deutéronome 6:4) est la confession de foi fondamentale du judaïsme, récitée chaque jour.",reference:"Deutéronome 6:4",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:314,text:"Dans quel livre trouve-t-on l'expression 'Tu aimeras ton prochain comme toi-même' pour la première fois ?",options:["Matthieu","Deutéronome","Lévitique","Genèse"],answer:"Lévitique",explanation:"Cette injonction précède Jésus qui la cite et l'élève au rang de second grand commandement.",reference:"Lévitique 19:18",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:315,text:"Quelle est la fonction du 'bouc émissaire' lors de Yom Kippour ?",options:["Être sacrifié sur l'autel","Porter symboliquement les péchés du peuple dans le désert","Être offert aux prêtres","Marquer la fin du Jubilé"],answer:"Porter symboliquement les péchés du peuple dans le désert",explanation:"Le grand prêtre posait les mains sur le bouc, confessait les péchés d'Israël, puis le bête était chassée dans le désert.",reference:"Lévitique 16:21-22",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:316,text:"Combien de livres compose le Pentateuque ?",options:["3","4","5","7"],answer:"5",explanation:"Genèse, Exode, Lévitique, Nombres et Deutéronome forment les cinq livres de la Torah.",reference:"Deutéronome 34",theme:"LOI",difficulty:"DEBUTANT"},
  {id:317,text:"Quelle tribu d'Israël est chargée du service du sanctuaire et n'a pas de territoire en Canaan ?",options:["Juda","Benjamin","Lévi","Éphraïm"],answer:"Lévi",explanation:"Les Lévites reçoivent Dieu lui-même pour héritage — ils vivent des dîmes et sont dispersés parmi les autres tribus.",reference:"Nombres 18:20",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:318,text:"Qu'est-ce que l'Arche d'Alliance contient selon la Bible ?",options:["La manne seulement","Les Tables de la Loi, la manne et le bâton d'Aaron","Les Tables de la Loi seulement","Les rouleaux de la Torah"],answer:"Les Tables de la Loi, la manne et le bâton d'Aaron",explanation:"Hébreux 9:4 confirme ce triple contenu : les tables, le vase de manne et le bâton d'Aaron qui avait bourgeonné.",reference:"Hébreux 9:4",theme:"LOI",difficulty:"AVANCE"},
  {id:319,text:"Quelle est la peine prévue dans la Loi pour le meurtre volontaire, selon l'Exode ?",options:["L'exil","La mort","La servitude","40 coups de fouet"],answer:"La mort",explanation:"'Œil pour œil, dent pour dent' (talion) instaure une justice proportionnelle, et le meurtre intentionnel entraîne la peine capitale.",reference:"Exode 21:12",theme:"LOI",difficulty:"INTERMEDIAIRE"},
  {id:320,text:"Quel personnage prophétise malgré lui sur Israël après avoir été mandaté pour le maudire ?",options:["Balaam","Balak","Achab","Amaleq"],answer:"Balaam",explanation:"Balaam, payé par Balak pour maudire Israël, ne peut que bénir — sa bouche est contrôlée par Dieu.",reference:"Nombres 22–24",theme:"LOI",difficulty:"INTERMEDIAIRE"},

  // ─── HISTOIRE (Josué, Juges, Samuel, Rois, Chroniques, Esdras, Néhémie) ──
  {id:321,text:"Qui succède à Moïse pour conduire Israël en Terre promise ?",options:["Caleb","Samuel","Josué","Aaron"],answer:"Josué",explanation:"Josué, dont le nom signifie 'Dieu sauve', est la figure préfiguratrice de Jésus (même nom en grec).",reference:"Josué 1:1-2",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:322,text:"Quelle ville tombe en premier lors de la conquête de Canaan ?",options:["Gabaon","Aï","Jéricho","Hébron"],answer:"Jéricho",explanation:"Les murailles de Jéricho s'effondrent après sept tours de la ville en sept jours, signant la victoire divine sur la résistance humaine.",reference:"Josué 6:20",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:323,text:"Quelle femme cache les espions israélites à Jéricho et est épargnée lors de la conquête ?",options:["Déborah","Rahab","Ruth","Abigaïl"],answer:"Rahab",explanation:"Rahab accroche un fil écarlate à sa fenêtre — signe qui la préserve. Elle entre dans la généalogie de Jésus (Matthieu 1:5).",reference:"Josué 2:1",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:324,text:"Qui est la seule femme juge en Israël mentionnée dans le livre des Juges ?",options:["Rahab","Ruth","Déborah","Yaël"],answer:"Déborah",explanation:"Déborah est à la fois prophétesse et juge, elle conduit Israël à la victoire aux côtés de Baraq.",reference:"Juges 4:4",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:325,text:"Quel juge détruit l'autel de Baal de son propre père avant de combattre les Madianites ?",options:["Samson","Jephté","Gédéon","Baraq"],answer:"Gédéon",explanation:"Gédéon ('le guerrier') commence par purifier son propre foyer avant de libérer Israël avec seulement 300 hommes.",reference:"Juges 6:25",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:326,text:"Par quelle ruse Gédéon déroute-t-il l'armée madianite avec 300 hommes ?",options:["En allumant des torches cachées dans des cruches","En faisant sonner des trompettes la nuit","En criant tous ensemble en brisant des cruches et en montrant des flambeaux","Toutes ces réponses"],answer:"Toutes ces réponses",explanation:"Gédéon utilise simultanément trompettes, cruches brisées et flambeaux — la terreur nocturne provoque la débandade ennemie.",reference:"Juges 7:19-22",theme:"HISTOIRE",difficulty:"AVANCE"},
  {id:327,text:"Quel vœu imprudent de Jephté lui coûte sa fille ?",options:["Offrir le premier être qui sortirait de sa maison","Sacrifier cent animaux","Jeûner quarante jours","Brûler sa maison"],answer:"Offrir le premier être qui sortirait de sa maison",explanation:"Jephté voue à Dieu le premier qui sortirait à sa rencontre — c'est sa fille unique. Ce texte est l'un des plus tragiques des Juges.",reference:"Juges 11:30-39",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:328,text:"Quelle était la source de la force prodigieuse de Samson ?",options:["Sa foi en Dieu","Son vœu de naziréat et ses cheveux non coupés","Une armure divine","Un anneau magique"],answer:"Son vœu de naziréat et ses cheveux non coupés",explanation:"Samson est naziréat depuis sa naissance — ses cheveux symbolisent son consécration totale à Dieu.",reference:"Juges 16:17",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:329,text:"Quelle femme trahit Samson en livrant le secret de sa force ?",options:["Dalila","Rahab","Myriam","Bethsabée"],answer:"Dalila",explanation:"Dalila, soudoyée par les chefs philistins, insiste jusqu'à ce que Samson révèle son secret. Son nom est devenu synonyme de trahison séductrice.",reference:"Juges 16:4-19",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:330,text:"Dans quel livre de la Bible Ruth dit-elle 'Là où tu iras, j'irai' ?",options:["Ruth","Esther","Samuel","Juges"],answer:"Ruth",explanation:"Ce verset (Ruth 1:16) est l'une des plus belles déclarations de fidélité de toute la Bible, entre une belle-fille et sa belle-mère.",reference:"Ruth 1:16",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:331,text:"De quelle ville est originaire Ruth la Moabite ?",options:["Bethléem","Jéricho","Moab","Silo"],answer:"Moab",explanation:"Ruth vient du pays de Moab — son inclusion dans la généalogie de Jésus souligne l'universalité du salut dès l'AT.",reference:"Ruth 1:4",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:332,text:"Qui est le prêtre qui élève Samuel au sanctuaire de Silo ?",options:["Élie le prophète","Éli le prêtre","Aaron","Phinées"],answer:"Éli le prêtre",explanation:"Éli reconnaît l'appel de Dieu sur le jeune Samuel et lui dit : 'Parle, Seigneur, car ton serviteur écoute.'",reference:"1 Samuel 3:9",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:333,text:"Pourquoi le peuple d'Israël demande-t-il un roi à Samuel ?",options:["Pour construire le Temple","Pour être comme les autres nations","Pour unifier les tribus","Pour combattre les Philistins"],answer:"Pour être comme les autres nations",explanation:"Cette demande est perçue par Dieu comme un rejet de sa propre royauté — Samuel le lui confirme.",reference:"1 Samuel 8:5",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:334,text:"Quel est le premier roi d'Israël ?",options:["David","Salomon","Saül","Jéroboam"],answer:"Saül",explanation:"Saül est choisi parmi la tribu de Benjamin, le plus petit clan d'Israël — Dieu renverse les calculs humains.",reference:"1 Samuel 10:1",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:335,text:"Comment David tue-t-il le géant Goliath ?",options:["Avec une épée volée","Avec une lance","Avec une fronde et une pierre","Avec un arc"],answer:"Avec une fronde et une pierre",explanation:"La victoire de David illustre que la force divine l'emporte sur la puissance humaine — thème central du règne davidique.",reference:"1 Samuel 17:50",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:336,text:"Quelle femme d'une grande sagesse empêche David de se venger de son mari Nabal ?",options:["Bethsabée","Mical","Abigaïl","Tamar"],answer:"Abigaïl",explanation:"Abigaïl intercède avec des vivres et des arguments sages, évitant un bain de sang. Elle épousera David après la mort de Nabal.",reference:"1 Samuel 25",theme:"HISTOIRE",difficulty:"AVANCE"},
  {id:337,text:"Quel prophète reproche à David son adultère avec Bethsabée et le meurtre d'Urie ?",options:["Élie","Élisée","Nathan","Ésaïe"],answer:"Nathan",explanation:"Nathan use d'une parabole habile — le riche qui prend la brebis du pauvre — pour amener David à se condamner lui-même.",reference:"2 Samuel 12:1-7",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:338,text:"Quel fils de David se révolte contre son père et est tué suspendu par les cheveux à un arbre ?",options:["Salomon","Amnon","Adonias","Absalom"],answer:"Absalom",explanation:"Absalom — dont la beauté et la chevelure étaient légendaires — meurt de sa propre gloire physique, ironie tragique du récit.",reference:"2 Samuel 18:9-15",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
    {id:339,text:"Quel psaume David compose-t-il après le pardon de sa faute avec Bethsabée ?",options:["Psaume 23","Psaume 51","Psaume 22","Psaume 32"],answer:"Psaume 51",explanation:"Le Psaume 51 (Miserere) est traditionnellement attribué à David après que Nathan l'eut repris — 'Crée en moi un cœur pur, ô Dieu.'",reference:"Psaume 51:12",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
{id:340,text:"Qui est le fils de David qui construit le Temple de Jérusalem ?",options:["Salomon","Absalom","Adonias","Roboam"],answer:"Salomon",explanation:"David avait voulu construire le Temple mais Dieu lui dit que c'est son fils, 'un homme de paix', qui le ferait.",reference:"1 Rois 6:1",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:341,text:"Quelle est la décision célèbre de Salomon qui démontre sa sagesse ?",options:["Construire le Temple","Partager un enfant en deux pour révéler sa vraie mère","Réconcilier deux tribus en guerre","Interpréter le songe de Pharaon"],answer:"Partager un enfant en deux pour révéler sa vraie mère",explanation:"Face à deux femmes réclamant le même enfant, Salomon ordonne de le couper — la vraie mère préfère renoncer plutôt que tuer son fils.",reference:"1 Rois 3:16-28",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:342,text:"Après la mort de Salomon, le royaume se divise en combien de parties ?",options:["2","3","4","12"],answer:"2",explanation:"Israël (nord, 10 tribus) et Juda (sud, 2 tribus) se séparent sous Roboam et Jéroboam, rupture irréversible.",reference:"1 Rois 12:19-20",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:343,text:"Quel roi d'Israël introduit le culte de Baal avec l'aide de sa femme Jézabel ?",options:["Omri","Achab","Jéhu","Achazia"],answer:"Achab",explanation:"Achab épouse la phénicienne Jézabel qui persécute les prophètes de Yhwh et impose le culte de Baal à tout Israël.",reference:"1 Rois 16:31-33",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:344,text:"Quel prophète défie les 450 prophètes de Baal sur le mont Carmel ?",options:["Élisée","Amos","Élie","Michée"],answer:"Élie",explanation:"L'épreuve du feu sur le Carmel est l'un des sommets dramatiques de l'AT — Dieu répond par le feu, Baal reste muet.",reference:"1 Rois 18:20-40",theme:"HISTOIRE",difficulty:"DEBUTANT"},
  {id:345,text:"Comment Élie monte-t-il au ciel sans mourir ?",options:["Il disparaît dans un nuage","Dans un char de feu emporté par un tourbillon","Il s'endort et est enlevé","Il marche sur les eaux"],answer:"Dans un char de feu emporté par un tourbillon",explanation:"L'ascension d'Élie est l'un des deux enlèvements bodily dans l'AT avec Hénoch — il devient figure du retour attendu avant le Messie.",reference:"2 Rois 2:11",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:346,text:"Quel roi de Juda détruit les idoles et réforme le culte en s'appuyant sur le 'livre de la Loi' retrouvé ?",options:["Ézéchias","Josias","Achaz","Manassé"],answer:"Josias",explanation:"La découverte du 'livre de la Loi' (probablement le Deutéronome) déclenche une réforme religieuse majeure sous Josias.",reference:"2 Rois 22:8",theme:"HISTOIRE",difficulty:"AVANCE"},
  {id:347,text:"Quelle puissance conquiert le royaume du Nord (Israël) en 722 av. J.-C. ?",options:["Babylone","Assyrie","Perse","Égypte"],answer:"Assyrie",explanation:"Sargon II d'Assyrie conquiert Samarie et déporte les élites israélites — les 'dix tribus perdues' d'Israël.",reference:"2 Rois 17:6",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:348,text:"Quelle puissance détruit le Temple de Jérusalem en 587 av. J.-C. ?",options:["Assyrie","Perse","Babylone","Rome"],answer:"Babylone",explanation:"Nabuchodonosor II détruit le Temple de Salomon, déporte l'élite juive à Babylone — l'Exil, trauma fondateur du judaïsme.",reference:"2 Rois 25:9",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:349,text:"Quel roi perse autorise le retour des exilés juifs et la reconstruction du Temple ?",options:["Darius","Artaxerxès","Cyrus","Xerxès"],answer:"Cyrus",explanation:"L'édit de Cyrus en 538 av. J.-C. est cité en Esdras 1:1-4 — Cyrus est même appelé 'messie' (oint) par Ésaïe.",reference:"Esdras 1:1-4",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},
  {id:350,text:"Qui reconstruit les murailles de Jérusalem après le retour d'exil ?",options:["Esdras","Zorobabel","Néhémie","Malachie"],answer:"Néhémie",explanation:"Néhémie, échanson du roi Artaxerxès, obtient la permission de rebâtir les murailles et accomplit cette tâche en 52 jours.",reference:"Néhémie 6:15",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},

  // ─── PROPHÈTES ──────────────────────────────────────────────────────────
  {id:351,text:"Quelle vision inaugure la vocation prophétique d'Ésaïe ?",options:["Un buisson ardent","Le trône céleste entouré de séraphins","Une roue dans les cieux","Un vent puissant"],answer:"Le trône céleste entouré de séraphins",explanation:"Ésaïe 6 décrit le trône céleste, les séraphins criant 'Saint, saint, saint' et les lèvres d'Ésaïe purifiées par la braise.",reference:"Ésaïe 6:1-8",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:352,text:"Combien de 'Chants du Serviteur Souffrant' compte le livre d'Ésaïe ?",options:["2","3","4","7"],answer:"4",explanation:"Les quatre chants (Es 42, 49, 50, 52-53) décrivent un serviteur mystérieux qui souffre pour les péchés d'autrui — la tradition chrétienne y lit une prophétie du Christ.",reference:"Ésaïe 52:13–53:12",theme:"PROPHETES",difficulty:"AVANCE"},
  {id:353,text:"Quelle prophétie d'Ésaïe annonce une naissance virginale et un enfant appelé Emmanuel ?",options:["Ésaïe 7:14","Ésaïe 9:6","Ésaïe 11:1","Ésaïe 40:3"],answer:"Ésaïe 7:14",explanation:"'Une jeune femme concevra et enfantera un fils qu'elle appellera Emmanuel' — cité dans Matthieu 1:23 pour la nativité de Jésus.",reference:"Ésaïe 7:14",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:354,text:"Quel prophète est connu pour ses 'Lamentations' sur la destruction de Jérusalem ?",options:["Ésaïe","Ézéchiel","Jérémie","Daniel"],answer:"Jérémie",explanation:"Le livre des Lamentations, attribué à Jérémie, est un deuil poétique sur la destruction de Jérusalem par Babylone.",reference:"Lamentations 1:1",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:355,text:"Quelle image Jérémie utilise-t-il pour Dieu qui cherche son peuple ?",options:["Un lion rugissant","Un berger qui cherche","Un potier qui façonne l'argile","Un père qui court"],answer:"Un potier qui façonne l'argile",explanation:"Jérémie 18 montre Dieu comme un potier — l'argile (Israël) peut être remodelée si le peuple se convertit.",reference:"Jérémie 18:1-6",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:356,text:"Quelle est la 'nouvelle alliance' annoncée par Jérémie ?",options:["Une loi gravée dans le cœur","Un nouveau Temple","Une nouvelle traversée de la mer","Un roi parfait"],answer:"Une loi gravée dans le cœur",explanation:"Jérémie 31:31-34 annonce une alliance non plus sur des tables de pierre mais dans les cœurs — citée par Hébreux 8 pour décrire la Nouvelle Alliance en Christ.",reference:"Jérémie 31:31-34",theme:"PROPHETES",difficulty:"AVANCE"},
  {id:357,text:"Quelle vision étrange inaugure le livre d'Ézéchiel ?",options:["Un buisson ardent","Des ossements dans la vallée","Un char céleste avec des créatures ailées","Un ange à l'épée de feu"],answer:"Un char céleste avec des créatures ailées",explanation:"La 'merkavah' (char céleste) avec quatre vivants aux quatre visages devient le symbole des évangélistes dans la tradition chrétienne.",reference:"Ézéchiel 1",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:358,text:"Dans quelle vision Ézéchiel voit-il des ossements se recouvrir de chair et revivre ?",options:["La vision du Temple futur","La vision de la vallée des ossements secs","La vision du char céleste","La vision du fleuve"],answer:"La vision de la vallée des ossements secs",explanation:"Ézéchiel 37 préfigure la résurrection — les ossements représentent Israël en exil qui revivra grâce au souffle divin.",reference:"Ézéchiel 37:1-14",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:359,text:"Quelle nation Daniel refuse-t-il de cesser d'honorer, même sous peine de mort ?",options:["Babylone","Israël","Perse","Son Dieu"],answer:"Son Dieu",explanation:"Daniel prie Dieu trois fois par jour malgré l'édit de Darius, acceptant d'être jeté aux lions plutôt que de cesser.",reference:"Daniel 6:10",theme:"PROPHETES",difficulty:"DEBUTANT"},
  {id:360,text:"Qui interprète l'écriture mystérieuse 'Mané, Mané, Téqel, Oupharsin' dans le livre de Daniel ?",options:["Nébucadnetsar","Balthasar lui-même","Daniel","Un prêtre babylonien"],answer:"Daniel",explanation:"Cette inscription signifie que le règne de Balthasar est pesé et jugé — Babylone tombe cette nuit-là.",reference:"Daniel 5:25-28",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:361,text:"Quel prophète est avalé par un grand poisson ?",options:["Amos","Nahum","Jonas","Osée"],answer:"Jonas",explanation:"Jonas est avalé après avoir fui sa mission vers Ninive — trois jours dans le ventre du poisson, typus de la mort et résurrection du Christ selon Matthieu 12:40.",reference:"Jonas 1:17",theme:"PROPHETES",difficulty:"DEBUTANT"},
  {id:362,text:"Quel prophète utilise son mariage avec une femme infidèle comme métaphore de l'infidélité d'Israël envers Dieu ?",options:["Osée","Amos","Joël","Michée"],answer:"Osée",explanation:"Osée épouse Gomer qui le trompe — son amour persistant symbolise l'amour indéfectible de Dieu pour Israël malgré l'idolâtrie.",reference:"Osée 1–3",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:363,text:"Quel prophète annonce le 'Jour du Seigneur' comme un jour de ténèbres et non de lumière ?",options:["Joël","Osée","Amos","Abdias"],answer:"Amos",explanation:"Amos retourne l'espoir populaire : ceux qui attendent le 'Jour du Seigneur' comme une victoire se trompent — ce sera un jugement sur les péchés sociaux d'Israël.",reference:"Amos 5:18",theme:"PROPHETES",difficulty:"AVANCE"},
  {id:364,text:"Quelle prophétie du livre de Michée annonce que le Messie naîtra à Bethléem ?",options:["Michée 3:1","Michée 5:1","Michée 7:6","Michée 4:3"],answer:"Michée 5:1",explanation:"'Et toi, Bethléem Éphrata... de toi sortira pour moi celui qui dominera sur Israël' — cité par les grands prêtres à Hérode en Matthieu 2:6.",reference:"Michée 5:1",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:365,text:"Quel prophète voit la gloire de Dieu quitter le Temple avant la destruction de Jérusalem ?",options:["Jérémie","Daniel","Ézéchiel","Habaquq"],answer:"Ézéchiel",explanation:"Ézéchiel 10-11 décrit la gloire divine (shekhina) qui se lève du Temple et part vers l'orient — signal de l'abandon divin avant le jugement.",reference:"Ézéchiel 10:18-19",theme:"PROPHETES",difficulty:"AVANCE"},
  {id:366,text:"Quelle est la profession d'Amos avant de devenir prophète ?",options:["Prêtre","Berger et cueilleur de sycomores","Scribe","Serviteur royal"],answer:"Berger et cueilleur de sycomores",explanation:"Amos est un homme du peuple, sans formation prophétique officielle — Dieu choisit les humbles pour prophétiser aux puissants.",reference:"Amos 7:14",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:367,text:"Quel prophète annonce : 'Repentez-vous, car le Royaume des Cieux est proche' avant Jésus ?",options:["Ésaïe","Élie","Jean-Baptiste","Malachie"],answer:"Jean-Baptiste",explanation:"Jean-Baptiste reprend le message prophétique de l'AT — il est la 'voix qui crie dans le désert' d'Ésaïe 40:3.",reference:"Matthieu 3:2",theme:"PROPHETES",difficulty:"DEBUTANT"},
  {id:368,text:"Quel livre prophétique annonce le don de l'Esprit sur 'toute chair' ?",options:["Ézéchiel","Joël","Amos","Habaquq"],answer:"Joël",explanation:"Joël 2:28 ('Je répandrai mon Esprit sur toute chair') est la prophétie citée par Pierre le jour de la Pentecôte en Actes 2:17.",reference:"Joël 2:28",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:369,text:"Quel est le dernier livre de l'Ancien Testament dans le canon catholique ?",options:["Zacharie","Malachie","Aggée","Ézéchiel"],answer:"Malachie",explanation:"Malachie se clôt sur l'annonce du retour d'Élie avant le 'Jour du Seigneur' — un pont délibéré vers le NT.",reference:"Malachie 3:23",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
  {id:370,text:"Quel prophète annonce que Dieu utilisera Cyrus, roi étranger, comme son 'oint' ?",options:["Jérémie","Ézéchiel","Ésaïe","Amos"],answer:"Ésaïe",explanation:"Ésaïe 45:1 appelle Cyrus 'son oint' (messie), unique cas dans la Bible où un non-Israélite reçoit ce titre — prophétisé 150 ans à l'avance.",reference:"Ésaïe 45:1",theme:"PROPHETES",difficulty:"AVANCE"},

  // ─── SAGESSE (Job, Psaumes complémentaires, Proverbes, Qohéleth, Cantique, Siracide) ──
  {id:371,text:"Quel est le thème central du livre de Job ?",options:["La punition des pécheurs","La souffrance du juste et la justice divine","La sagesse pratique","La royauté de Dieu"],answer:"La souffrance du juste et la justice divine",explanation:"Job remet en cause la théologie de la rétribution — souffrir n'implique pas avoir péché, et Dieu répond du sein de la tempête, non par des explications rationnelles.",reference:"Job 1:1",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
  {id:372,text:"Combien d'amis viennent remettre en cause la vertu de Job ?",options:["2","3","4","7"],answer:"3",explanation:"Éliphaz, Bildad et Tsophar représentent la théologie traditionnelle de la rétribution — leurs discours sont condamnés par Dieu à la fin.",reference:"Job 2:11",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
  {id:373,text:"Quelle déclaration de Job est devenue une profession de foi sur la résurrection ?",options:["'Le Seigneur a donné, le Seigneur a repris'","'Je sais que mon Rédempteur est vivant'","'Pourquoi m'as-tu abandonné ?'","'Mes jours sont plus rapides qu'une navette'"],answer:"'Je sais que mon Rédempteur est vivant'",explanation:"Job 19:25 ('Je sais que mon Rédempteur est vivant') est l'une des affirmations les plus profondes de la foi dans la résurrection de l'AT.",reference:"Job 19:25",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
  {id:374,text:"Quel psaume commence par 'Les cieux racontent la gloire de Dieu' ?",options:["Psaume 1","Psaume 19","Psaume 22","Psaume 51"],answer:"Psaume 19",explanation:"Le Psaume 19 décrit la création comme révélation naturelle de Dieu, puis la Torah comme révélation parfaite — deux chemins vers la connaissance divine.",reference:"Psaume 19:2",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:375,text:"Quel psaume Jésus récite-t-il sur la croix selon Marc 15:34 ?",options:["Psaume 22","Psaume 23","Psaume 51","Psaume 91"],answer:"Psaume 22",explanation:"'Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné ?' (Ps 22:2) — ce psaume décrit la souffrance du juste et sa délivrance, lu comme prophétie christologique.",reference:"Psaume 22:2",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:376,text:"Quel psaume est appelé le 'Miserere' et est associé à la repentance de David après sa faute avec Bethsabée ?",options:["Psaume 32","Psaume 51","Psaume 130","Psaume 143"],answer:"Psaume 51",explanation:"'Pitié pour moi, ô Dieu, selon ta grâce' — le Miserere est le modèle de la prière pénitentielle dans toute la tradition biblique.",reference:"Psaume 51:3",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:377,text:"Combien de psaumes compte le Psautier ?",options:["100","120","150","180"],answer:"150",explanation:"Les 150 psaumes couvrent toutes les gammes de l'expérience humaine : louange, lamentation, sagesse, action de grâce — une 'Bible dans la Bible'.",reference:"Psaume 150",theme:"PSAUMES",difficulty:"DEBUTANT"},
  {id:378,text:"Quel psaume commence par 'Du fond de l'abîme je t'invoque, Seigneur' ?",options:["Psaume 23","Psaume 91","Psaume 130","Psaume 139"],answer:"Psaume 130",explanation:"Le De Profundis (Ps 130) est récité dans les offices des morts — il exprime l'espérance au cœur du désespoir le plus profond.",reference:"Psaume 130:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:379,text:"Quel psaume declare : 'Je te loue de ce que je suis une créature si merveilleuse' ?",options:["Psaume 8","Psaume 100","Psaume 139","Psaume 148"],answer:"Psaume 139",explanation:"Le Psaume 139 est une méditation sur l'omniscience divine et la dignité de l'être humain connu de Dieu depuis sa formation dans le ventre maternel.",reference:"Psaume 139:14",theme:"PSAUMES",difficulty:"AVANCE"},
  {id:380,text:"Quelle est la thèse principale du livre de Qohéleth (l'Ecclésiaste) ?",options:["La sagesse mène au bonheur","Tout est vanité sous le soleil","La peur de Dieu suffit","La richesse est une bénédiction"],answer:"Tout est vanité sous le soleil",explanation:"'Vanité des vanités, tout est vanité' — Qohéleth (le Rassembleur) interroge le sens de l'existence sans illusion.",reference:"Qohéleth 1:2",theme:"SAGESSE",difficulty:"DEBUTANT"},
  {id:381,text:"Quel livre biblique décrit l'amour humain de façon poétique et sensuelle ?",options:["Psaumes","Proverbes","Cantique des Cantiques","Qohéleth"],answer:"Cantique des Cantiques",explanation:"Le Cantique célèbre l'amour entre l'aimé et l'aimée — la tradition y lit également l'amour de Dieu pour son peuple ou pour l'âme.",reference:"Cantique 1:1",theme:"SAGESSE",difficulty:"DEBUTANT"},
  {id:382,text:"Quelle phrase des Proverbes définit le début de la sagesse ?",options:["La richesse est une bénédiction","La crainte du Seigneur est le commencement de la sagesse","Cherche et tu trouveras","Le cœur connaît ses propres amertumes"],answer:"La crainte du Seigneur est le commencement de la sagesse",explanation:"Proverbes 9:10 — 'crainte' ne signifie pas terreur mais révérence, orientation fondamentale de la vie vers Dieu.",reference:"Proverbes 9:10",theme:"SAGESSE",difficulty:"DEBUTANT"},
  {id:383,text:"Quel passage du Siracide (Ben Sira) est une hymne à la sagesse personnifiée ?",options:["Siracide 1","Siracide 24","Siracide 44","Siracide 50"],answer:"Siracide 24",explanation:"Siracide 24 présente la Sagesse comme préexistante, assise sur le trône et faisant sa demeure en Israël — proche du prologue de Jean.",reference:"Siracide 24:1",theme:"SAGESSE",difficulty:"AVANCE"},
  {id:384,text:"Combien de livres compte la Bible catholique de plus que la Bible protestante ?",options:["3","5","7","10"],answer:"7",explanation:"Les 7 deutérocanoniques (Tobie, Judith, 1-2 Maccabées, Sagesse, Siracide, Baruch) sont rejetés par les protestants qui suivent le canon hébreu.",reference:"Concile de Trente, 1546",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
  {id:385,text:"Dans le livre de la Sagesse, comment la mort est-elle décrite pour les justes ?",options:["Comme un sommeil","Comme un passage vers la lumière","Comme une victoire sur la jalousie du diable","Toutes ces réponses"],answer:"Toutes ces réponses",explanation:"Sagesse 3 : 'Les âmes des justes sont dans la main de Dieu' — leur mort apparente n'est qu'un passage.",reference:"Sagesse 3:1-9",theme:"SAGESSE",difficulty:"AVANCE"},
  {id:386,text:"Quel livre de sagesse de l'AT enseigne : 'Il y a un temps pour tout' ?",options:["Proverbes","Job","Qohéleth","Siracide"],answer:"Qohéleth",explanation:"Qohéleth 3:1-8 dresse le célèbre poème 'Il y a un temps pour naître et un temps pour mourir...' — méditation sur la temporalité humaine.",reference:"Qohéleth 3:1",theme:"SAGESSE",difficulty:"DEBUTANT"},

  // ─── PSAUMES (complémentaires) ──────────────────────────────────────────
  {id:387,text:"Quel psaume est appelé 'psaume alphabétique' le plus long de la Bible ?",options:["Psaume 103","Psaume 119","Psaume 118","Psaume 148"],answer:"Psaume 119",explanation:"Le Psaume 119 compte 176 versets organisés selon les 22 lettres de l'alphabet hébreu — une méditation exhaustive sur la Torah.",reference:"Psaume 119",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:388,text:"Quelle expression désigne un groupe de psaumes chantés lors des pèlerinages à Jérusalem ?",options:["Psaumes royaux","Psaumes de montée","Psaumes d'Asaph","Psaumes d'Alléluia"],answer:"Psaumes de montée",explanation:"Les Psaumes 120–134, appelés 'cantiques des degrés', étaient chantés par les pèlerins qui 'montaient' à Jérusalem pour les fêtes.",reference:"Psaume 120:1",theme:"PSAUMES",difficulty:"AVANCE"},
  {id:389,text:"Quel psaume exprime la nostalgie de l'exilé en décrivant les fleuves de Babylone ?",options:["Psaume 127","Psaume 137","Psaume 147","Psaume 149"],answer:"Psaume 137",explanation:"'Au bord des fleuves de Babylone, nous étions assis et nous pleurions' — ce psaume est l'un des plus poignants de la Bible.",reference:"Psaume 137:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
  {id:390,text:"Quel psaume commence par 'L'Éternel règne, il est revêtu de majesté' ?",options:["Psaume 93","Psaume 95","Psaume 97","Psaume 99"],answer:"Psaume 93",explanation:"Le Psaume 93 est le premier des 'psaumes de la royauté divine' qui célèbrent Dieu comme roi cosmique.",reference:"Psaume 93:1",theme:"PSAUMES",difficulty:"AVANCE"},

  // ─── MIRACLES ───────────────────────────────────────────────────────────
  {id:391,text:"Quel miracle Élie accomplit-il pour une veuve de Sarepta ?",options:["Il ressuscite son fils et multiplie sa farine et son huile","Il divise une rivière","Il fait tomber la pluie","Il guérit une lèpre"],answer:"Il ressuscite son fils et multiplie sa farine et son huile",explanation:"Élie multiplie la farine et l'huile pour qu'elles ne s'épuisent pas, puis ressuscite le fils de la veuve — deux miracles qui anticipent ceux de Jésus.",reference:"1 Rois 17:14-24",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:392,text:"Quel général syrien Élisée guérit-il de la lèpre ?",options:["Naaman","Benhadad","Hazaël","Rezin"],answer:"Naaman",explanation:"Naaman se plonge sept fois dans le Jourdain — sa guérison illustre que la grâce de Dieu s'étend aux nations.",reference:"2 Rois 5",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:393,text:"Par quel moyen Moïse divise-t-il la mer Rouge ?",options:["En frappant l'eau de son bâton","En étendant la main sur la mer","En priant toute la nuit","En jetant du sel dans l'eau"],answer:"En étendant la main sur la mer",explanation:"Exode 14:21 — Moïse étend la main et Dieu fait souffler un vent fort toute la nuit pour diviser les eaux.",reference:"Exode 14:21",theme:"MIRACLES",difficulty:"DEBUTANT"},
  {id:394,text:"Quel miracle accomplit Josué pour prolonger la journée de combat ?",options:["Il arrête le soleil et la lune","Il fait pleuvoir des grêlons","Il divise le Jourdain","Il fait tomber les murailles"],answer:"Il arrête le soleil et la lune",explanation:"Josué 10:13 — 'Le soleil s'arrêta et la lune se tint immobile' est l'un des passages les plus discutés de l'AT.",reference:"Josué 10:13",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:395,text:"Comment les trois amis de Daniel survivent-ils à la fournaise ardente ?",options:["Ils sont sauvés par un ange qui rafraîchit la fournaise","Leur vêtement est ignifugé","Dieu éteint le feu","Une quatrième figure les protège dans les flammes"],answer:"Une quatrième figure les protège dans les flammes",explanation:"Nabuchodonosor voit une quatrième figure 'semblable à un fils des dieux' dans la fournaise — la tradition chrétienne y voit une théophanie du Christ.",reference:"Daniel 3:25",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:396,text:"Quel miracle de Jésus est raconté dans les quatre évangiles ?",options:["La marche sur les eaux","La résurrection de Lazare","La multiplication des pains","La transfiguration"],answer:"La multiplication des pains",explanation:"La multiplication des pains (5 pains et 2 poissons pour 5000 hommes) est le seul miracle présent dans les quatre évangiles.",reference:"Matthieu 14:19-21",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:397,text:"Dans quel évangile se trouve le miracle des noces de Cana ?",options:["Matthieu","Marc","Luc","Jean"],answer:"Jean",explanation:"Le premier signe de Jésus dans Jean 2 — l'eau changée en vin — manifeste sa gloire et scelle la foi de ses disciples.",reference:"Jean 2:11",theme:"MIRACLES",difficulty:"DEBUTANT"},
  {id:398,text:"Quel est le dernier des sept signes de l'évangile de Jean ?",options:["La multiplication des pains","La marche sur les eaux","La résurrection de Lazare","La guérison d'un aveugle-né"],answer:"La résurrection de Lazare",explanation:"La résurrection de Lazare (Jean 11) est le signe culminant qui provoque directement la décision du Sanhédrin de mettre Jésus à mort.",reference:"Jean 11:43-44",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:399,text:"Quelle femme touche le vêtement de Jésus et est guérie instantanément ?",options:["Marie-Madeleine","La belle-mère de Pierre","Une hémorragisse depuis 12 ans","La fille de Jaïrus"],answer:"Une hémorragisse depuis 12 ans",explanation:"Elle touche le bord du manteau de Jésus en se disant 'Si je touche seulement ses vêtements, je serai guérie' — sa foi la sauve.",reference:"Marc 5:28-29",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},
  {id:400,text:"Quel miracle Paul accomplit-il à Lystre qui amène les habitants à le confondre avec Hermès ?",options:["Il ressuscite un mort","Il guérit un homme boiteux de naissance","Il fait pleuvoir","Il survit à une morsure de serpent"],answer:"Il guérit un homme boiteux de naissance",explanation:"La guérison du boiteux de Lystre (Actes 14:8-10) reproduit celle accomplie par Pierre en Actes 3 — les deux apôtres agissent au nom de Jésus.",reference:"Actes 14:10",theme:"MIRACLES",difficulty:"INTERMEDIAIRE"},

  // ─── VIE DE JÉSUS ───────────────────────────────────────────────────────
  {id:401,text:"Quel est le nom de l'ange qui annonce la naissance de Jésus à Marie ?",options:["Michel","Raphaël","Gabriel","Uriel"],answer:"Gabriel",explanation:"Gabriel signifie 'force de Dieu' — il apparaît aussi à Daniel (8:16) et à Zacharie (Luc 1:19).",reference:"Luc 1:26",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
  {id:402,text:"Dans quel évangile Jésus nait-il selon le récit de la crèche avec les bergers ?",options:["Matthieu","Marc","Luc","Jean"],answer:"Luc",explanation:"La crèche, les bergers et les anges sont propres à Luc — Matthieu met en scène les mages, Marc et Jean n'ont pas de récit de nativité.",reference:"Luc 2:7",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
  {id:403,text:"Quel épisode se produit quand Jésus a 12 ans dans le Temple ?",options:["Sa présentation au Temple","Il est retrouvé parmi les docteurs","Son baptême","La fuite en Égypte"],answer:"Il est retrouvé parmi les docteurs",explanation:"Luc 2:46-47 — Jésus discute avec les docteurs qui sont stupéfaits de sa compréhension. Il répond à Marie : 'Je dois être aux affaires de mon Père.'",reference:"Luc 2:46",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
  {id:404,text:"Combien de temps Jésus jeûne-t-il dans le désert avant les tentations ?",options:["3 jours","7 jours","20 jours","40 jours"],answer:"40 jours",explanation:"Les 40 jours reprennent les 40 ans d'Israël au désert et les 40 jours de Moïse sur le Sinaï — Jésus récapitule l'histoire d'Israël.",reference:"Matthieu 4:2",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
  {id:405,text:"Quelle est la première des trois tentations que Satan présente à Jésus dans le désert ?",options:["Se jeter du pinacle du Temple","Adorer Satan pour obtenir les royaumes du monde","Changer les pierres en pain","Appeler des légions d'anges"],answer:"Changer les pierres en pain",explanation:"Jésus répond par Deutéronome 8:3 : 'L'homme ne vivra pas de pain seulement.' Il refuse d'user de son pouvoir pour lui-même.",reference:"Matthieu 4:3-4",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:406,text:"Dans quelle ville Jésus fait-il l'essentiel de son ministère en Galilée ?",options:["Nazareth","Bethsaïda","Capharnaüm","Tibériade"],answer:"Capharnaüm",explanation:"Capharnaüm devient la 'ville de Jésus' en Matthieu 9:1 — là sont guéris l'officier royal, le paralytique, Pierre et bien d'autres.",reference:"Matthieu 4:13",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:407,text:"Sur quelle montagne la Transfiguration de Jésus a-t-elle probablement lieu ?",options:["Mont des Oliviers","Mont Carmel","Mont Thabor","Mont Hermon"],answer:"Mont Thabor",explanation:"La tradition localisela Transfiguration sur le Thabor en Galilée, où Jésus apparaît en lumière avec Moïse et Élie — une anticipation de la résurrection.",reference:"Matthieu 17:1-2",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:408,text:"Quelle femme pécheresse oint les pieds de Jésus chez Simon le Pharisien ?",options:["Marie de Béthanie","Marie-Madeleine","La Samaritaine","Marthe"],answer:"Marie de Béthanie",explanation:"Luc 7:38 et Jean 12:3 décrivent deux scènes semblables — la tradition occidentale les a fusionnées avec Marie-Madeleine, mais les textes sont distincts.",reference:"Luc 7:38",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
  {id:409,text:"Quel est le montant des trente pièces d'argent reçues par Judas pour trahir Jésus ?",options:["Trente sicles d'argent","Trente pièces de bronze","Trente deniers","Trente statères"],answer:"Trente sicles d'argent",explanation:"Matthieu 26:15 — trente sicles est aussi le prix d'un esclave dans Exode 21:32, ce qui souligne l'humiliation de la trahison.",reference:"Matthieu 26:15",theme:"VIE_DE_JESUS",difficulty:"AVANCE"},
  {id:410,text:"Qui aide Jésus à porter sa croix sur le chemin du Calvaire ?",options:["Pierre","Jean","Simon de Cyrène","Nicodème"],answer:"Simon de Cyrène",explanation:"Simon de Cyrène (Marc 15:21) est réquisitionné par les soldats — ses fils Alexandre et Rufus sont connus de la communauté à qui Marc écrit.",reference:"Marc 15:21",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:411,text:"Qui est le premier personnage à qui Jésus ressuscité apparaît selon Jean 20 ?",options:["Pierre","Jean","Marie-Madeleine","Les onze apôtres"],answer:"Marie-Madeleine",explanation:"Jean 20:14-18 — Marie-Madeleine le prend d'abord pour le jardinier. 'Ne me touche pas' (Noli me tangere) — sa mission : 'Va dire à mes frères.'",reference:"Jean 20:14",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:412,text:"Quel apôtre est absent lors de la première apparition du ressuscité et refuse de croire ?",options:["Philippe","Barthélemy","Thomas","André"],answer:"Thomas",explanation:"Thomas dit : 'Si je ne vois pas les marques des clous, je ne croirai pas.' Huit jours plus tard, Jésus lui dit : 'Sois sans incrédulité, mais crois.'",reference:"Jean 20:24-25",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
  {id:413,text:"Pendant combien de jours Jésus apparaît-il à ses disciples après sa résurrection ?",options:["3","7","40","50"],answer:"40",explanation:"Actes 1:3 — pendant quarante jours Jésus parle du Royaume de Dieu avant son ascension.",reference:"Actes 1:3",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:414,text:"Que dit Jésus sur la croix à sa mère et au 'disciple bien-aimé' ?",options:["'Je vous laisse ma paix'","'Voici ta mère' et 'Voici ton fils'","'Père, pardonne-leur'","'Je reviendrai bientôt'"],answer:"'Voici ta mère' et 'Voici ton fils'",explanation:"Jean 19:26-27 — Jésus confie Marie à Jean et Jean à Marie. La tradition y voit une adoption symbolique de l'Église entière à la mère du Christ.",reference:"Jean 19:26-27",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},
  {id:415,text:"Quelle est la 'grande commission' donnée par Jésus à ses disciples avant l'Ascension ?",options:["'Aimez-vous les uns les autres'","'Allez, faites de toutes les nations des disciples, baptisant...'","'Priez sans cesse'","'Vendez vos biens et donnez aux pauvres'"],answer:"'Allez, faites de toutes les nations des disciples, baptisant...'",explanation:"Matthieu 28:19-20 — la grande commission est le fondement de la mission universelle de l'Église.",reference:"Matthieu 28:19",theme:"VIE_DE_JESUS",difficulty:"INTERMEDIAIRE"},

  // ─── PARABOLES ─────────────────────────────────────────────────────────
  {id:416,text:"Dans la parabole du fils prodigue, que fait le père en voyant revenir son fils de loin ?",options:["Il attend sur le seuil","Il court, se jette à son cou et l'embrasse","Il envoie un serviteur à sa rencontre","Il ferme la porte"],answer:"Il court, se jette à son cou et l'embrasse",explanation:"Cette image du père qui court (Luc 15:20) est la révolution théologique de la parabole — Dieu ne reste pas passif à attendre la conversion.",reference:"Luc 15:20",theme:"PARABOLES",difficulty:"DEBUTANT"},
  {id:417,text:"Dans la parabole des talents, que fait le serviteur qui reçoit un seul talent ?",options:["Il le double","Il le prête à intérêt","Il l'enterre dans la terre","Il le donne aux pauvres"],answer:"Il l'enterre dans la terre",explanation:"La peur de l'échec paralyse — Jésus condamne l'inaction par peur, symbolisant le refus de faire fructifier les dons reçus de Dieu.",reference:"Matthieu 25:18",theme:"PARABOLES",difficulty:"DEBUTANT"},
  {id:418,text:"Dans la parabole des vignerons meurtriers, qui représentent les vignerons ?",options:["Les Romains","Les chefs religieux d'Israël","Les disciples de Jésus","Les nations païennes"],answer:"Les chefs religieux d'Israël",explanation:"Les vignerons tuent les serviteurs envoyés (les prophètes) puis le fils (Jésus) — la parabole est une mise en accusation directe du Sanhédrin.",reference:"Matthieu 21:33-46",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},
  {id:419,text:"Quelle parabole répond à la question 'Qui est mon prochain ?' ?",options:["Le bon samaritain","Le fils prodigue","Les dix vierges","Le bon grain et l'ivraie"],answer:"Le bon samaritain",explanation:"Jésus renverse la question : il ne s'agit pas de définir qui mérite d'être aidé, mais de décider d'être soi-même proche de quiconque est dans le besoin.",reference:"Luc 10:30-37",theme:"PARABOLES",difficulty:"DEBUTANT"},
  {id:420,text:"Dans la parabole du semeur, que représentent les épines qui étouffent le grain ?",options:["Les persécutions","Les soucis du monde et la séduction des richesses","L'incompréhension du message","Le diable"],answer:"Les soucis du monde et la séduction des richesses",explanation:"Matthieu 13:22 — les épines symbolisent les préoccupations matérielles qui étouffent la Parole avant qu'elle ne porte du fruit.",reference:"Matthieu 13:22",theme:"PARABOLES",difficulty:"INTERMEDIAIRE"},

  // ─── APÔTRES & ÉPÎTRES pauliniennes ─────────────────────────────────────
  {id:421,text:"Combien de lettres pauliniennes compte le Nouveau Testament ?",options:["7","11","13","14"],answer:"13",explanation:"13 épîtres portent le nom de Paul (Romains à Philémon). L'Hébreux est anonyme — attribué à Paul par la tradition ancienne mais rejeté par la critique moderne.",reference:"Romains 1:1",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:422,text:"Quelle est la lettre la plus longue et la plus doctrinale de Paul ?",options:["Galates","Corinthiens","Romains","Éphésiens"],answer:"Romains",explanation:"Romains est l'exposé systématique le plus complet de la théologie paulinienne — justification, péché, grâce, élection, éthique.",reference:"Romains 1:1",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:423,text:"Quelle est la thèse centrale de la lettre aux Romains ?",options:["La résurrection corporelle","L'Évangile est puissance de Dieu pour le salut de tout croyant","Le retour imminent du Christ","L'unité de l'Église"],answer:"L'Évangile est puissance de Dieu pour le salut de tout croyant",explanation:"Romains 1:16-17 énonce la thèse : la justice de Dieu est révélée par la foi — 'le juste vivra par la foi', citation d'Habaquq 2:4.",reference:"Romains 1:16-17",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:424,text:"Que signifie 'justification par la foi' chez Paul ?",options:["Être déclaré juste par Dieu par la grâce, reçue par la foi, indépendamment des œuvres de la Loi","Faire de bonnes œuvres pour mériter le salut","Observer les commandements de la Torah","Se soumettre au baptême seul"],answer:"Être déclaré juste par Dieu par la grâce, reçue par la foi, indépendamment des œuvres de la Loi",explanation:"Romains 3:28 — 'l'homme est justifié par la foi, sans les œuvres de la Loi.' Cette affirmation est le cœur de la théologie de la Réforme.",reference:"Romains 3:28",theme:"APOTRES",difficulty:"AVANCE"},
  {id:425,text:"Quel personnage Paul utilise-t-il comme exemple de justification par la foi avant la circoncision ?",options:["Moïse","Noé","Abraham","David"],answer:"Abraham",explanation:"Romains 4 et Galates 3 — Abraham est cru en Dieu et cela lui est imputé à justice (Gn 15:6) avant l'institution de la circoncision.",reference:"Romains 4:3",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:426,text:"Quelle est la 'loi de l'Esprit' que Paul oppose à la 'loi du péché et de la mort' en Romains 8 ?",options:["La Torah réformée","La liberté intérieure donnée par l'Esprit Saint qui accomplit la Loi","Les commandements de Jésus","La nouvelle loi de l'Église"],answer:"La liberté intérieure donnée par l'Esprit Saint qui accomplit la Loi",explanation:"Romains 8 est le chapitre de l'Esprit — l'Esprit filial qui crie 'Abba, Père' et co-intercède pour les saints.",reference:"Romains 8:2",theme:"APOTRES",difficulty:"AVANCE"},
  {id:427,text:"Dans quelle ville Paul fonde-t-il sa première communauté en Europe ?",options:["Éphèse","Corinthe","Philippes","Athènes"],answer:"Philippes",explanation:"Actes 16 — à Philippes Paul baptise Lydie, exorcise une servante, est emprisonné puis libéré miraculeusement.",reference:"Actes 16:12",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:428,text:"Quel est le ton général de la lettre aux Philippiens ?",options:["Polémique contre des faux docteurs","Joie et action de grâce malgré l'emprisonnement","Appel à l'unité après un schisme","Défense de l'autorité apostolique"],answer:"Joie et action de grâce malgré l'emprisonnement",explanation:"'Réjouissez-vous toujours dans le Seigneur' (Ph 4:4) — Paul écrit depuis la prison avec une sérénité remarquable, signe de la joie chrétienne indépendante des circonstances.",reference:"Philippiens 4:4",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:429,text:"Quel hymne christologique est cité dans Philippiens 2 et décrit l'abaissement du Christ ?",options:["L'hymne à la charité","Le Magnificat","L'hymne du Serviteur souffrant","L'hymne de la kénose"],answer:"L'hymne de la kénose",explanation:"Ph 2:6-11 — 'Lui qui était dans la forme de Dieu... s'est anéanti (kénose)... prenant la forme d'un esclave.' C'est le passage christologique le plus dense de Paul.",reference:"Philippiens 2:6-8",theme:"APOTRES",difficulty:"AVANCE"},
  {id:430,text:"Quelle est la problématique principale des deux lettres aux Corinthiens ?",options:["Les faux enseignements sur la résurrection","Les divisions, l'immoralité, les dons spirituels et l'autorité apostolique","La circoncision des non-Juifs","Le retour imminent du Christ"],answer:"Les divisions, l'immoralité, les dons spirituels et l'autorité apostolique",explanation:"Corinthe est une communauté fractionnée et moralement relâchée — Paul y traite de presque tous les problèmes pratiques de la vie ecclésiale.",reference:"1 Corinthiens 1:10",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:431,text:"Dans quel chapitre Paul donne-t-il sa grande description de la charité ?",options:["1 Corinthiens 12","1 Corinthiens 13","1 Corinthiens 15","Romains 12"],answer:"1 Corinthiens 13",explanation:"'Si je parle les langues des hommes et des anges, mais que je n'ai pas la charité, je suis un airain sonnant' — l'hymne à l'amour est le sommet de la parénèse paulinienne.",reference:"1 Corinthiens 13:1",theme:"APOTRES",difficulty:"DEBUTANT"},
  {id:432,text:"Quel chapitre de 1 Corinthiens contient le plus ancien texte sur la résurrection du Christ ?",options:["1 Corinthiens 11","1 Corinthiens 12","1 Corinthiens 15","1 Corinthiens 16"],answer:"1 Corinthiens 15",explanation:"1 Co 15:3-8 est la plus ancienne formulation de foi chrétienne conservée, antérieure aux évangiles : 'Christ est mort pour nos péchés... il est ressuscité le troisième jour... il est apparu à Céphas, puis aux douze.'",reference:"1 Corinthiens 15:3-8",theme:"APOTRES",difficulty:"AVANCE"},
  {id:433,text:"Contre quelle hérésie Paul combat-il principalement dans la lettre aux Galates ?",options:["Le gnosticisme","Le judaïsme légaliste qui impose la circoncision aux convertis","Le polythéisme grec","Le docétisme"],answer:"Le judaïsme légaliste qui impose la circoncision aux convertis",explanation:"Des judéo-chrétiens ('judaïsants') insistaient pour que les convertis d'entre les nations soient circoncis. Paul réfute cela comme une perversion de l'Évangile.",reference:"Galates 1:6-9",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:434,text:"Quelle est la liste des 'fruits de l'Esprit' selon Galates 5 ?",options:["Foi, espérance, charité","Amour, joie, paix, patience, bonté, bénignité, fidélité, douceur, maîtrise de soi","Sagesse, intelligence, conseil, force, science, piété, crainte de Dieu","Prophétie, langues, guérison, miracles, discernement"],answer:"Amour, joie, paix, patience, bonté, bénignité, fidélité, douceur, maîtrise de soi",explanation:"Galates 5:22-23 — neuf fruits qui caractérisent la vie selon l'Esprit, opposés aux 'œuvres de la chair' du verset 19.",reference:"Galates 5:22-23",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:435,text:"Dans quelle épître Paul développe le plus sa théologie de l'Église comme 'Corps du Christ' ?",options:["Romains","Galates","Éphésiens","Colossiens"],answer:"Éphésiens",explanation:"Éphésiens développe la vision cosmique de l'Église — corps dont le Christ est la tête, récapitulation de toutes choses (1:10).",reference:"Éphésiens 1:22-23",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:436,text:"Qu'est-ce que l''armure de Dieu' citée dans Éphésiens 6 ?",options:["Une métaphore de la prière","La ceinture de vérité, la cuirasse de justice, les chaussures de la paix, le bouclier de la foi, le casque du salut et l'épée de l'Esprit","Les sacrements de l'Église","Les commandements de la Loi"],answer:"La ceinture de vérité, la cuirasse de justice, les chaussures de la paix, le bouclier de la foi, le casque du salut et l'épée de l'Esprit",explanation:"Éphésiens 6:14-17 — chaque élément de l'armure romaine est réinterprété spirituellement. L'unique arme offensive est la Parole de Dieu.",reference:"Éphésiens 6:14-17",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},
  {id:437,text:"Quelle lettre de Paul traite du retour du Christ ('Parousie') et rassure sur le sort des morts ?",options:["Philippiens","1 Thessaloniciens","2 Corinthiens","Galates"],answer:"1 Thessaloniciens",explanation:"1 Thessaloniciens 4:13-18 rassure ceux qui craignent que les morts chrétiens soient exclus de la résurrection au retour du Christ.",reference:"1 Thessaloniciens 4:13",theme:"APOTRES",difficulty:"INTERMEDIAIRE"},

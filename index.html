const PEOPLE=[
  {id:1,name:'Jésus-Christ',icon:'✝️',dates:'v. 4 av. J.-C. – v. 30 ap. J.-C.',era:'Ier siècle',category:'Figure centrale',bio:'Né vers 4 av. J.-C. à Bethléem, Jésus de Nazareth est la figure centrale du christianisme. Fils de Marie et, selon la foi catholique, Fils de Dieu incarné, il grandit en Galilée dans une famille juive modeste. Vers 30 ans, il commence une vie itinérante de prédication, annonçant le "Royaume de Dieu", guérissant des malades et entouré de douze apôtres. Ses enseignements — amour du prochain, pardon, humilité — bouleversent l\'ordre religieux établi. Il est arrêté à Jérusalem, jugé par Ponce Pilate, et crucifié vers le 30 ap. J.-C. Sa résurrection trois jours après constitue le cœur de la foi. Ses paroles sont consignées dans les quatre Évangiles, écrits quelques décennies après sa mort.',keyFacts:['Naissance miraculeuse à Bethléem, annoncée par l\'ange Gabriel','Baptisé dans le Jourdain par Jean-Baptiste','12 apôtres choisis, symbolisant les 12 tribus d\'Israël','Crucifié sous Ponce Pilate, ressuscité le 3e jour','Ses enseignements fondent la foi de 2,4 milliards de chrétiens']},
  {id:2,name:'Marie, Mère de Jésus',icon:'🌹',dates:'Ier siècle av./ap. J.-C.',era:'Ier siècle',category:'Figure centrale',bio:'Jeune femme juive de Nazareth, Marie est, selon les Évangiles, choisie par Dieu pour être la mère de Jésus — l\'Annonciation. Épouse de Joseph, elle accompagne son fils tout au long de sa vie, jusqu\'au pied de la croix. Dans la théologie catholique, elle occupe une place unique : déclarée "Mère de Dieu" (Theotokos) au Concile d\'Éphèse en 431, puis proclamée "Immaculée Conception" en 1854 et assumée au Ciel en corps et âme en 1950. Elle est la sainte la plus priée du catholicisme, intercédant entre les fidèles et Dieu.',keyFacts:['Annonciation par l\'archange Gabriel : elle accepte librement','Présente à la croix alors que la plupart des apôtres ont fui','Theotokos (Mère de Dieu) défini au Concile d\'Éphèse (431)','Apparitions reconnues : Lourdes (1858), Fatima (1917), Guadalupe (1531)','Dogme de l\'Assomption proclamé par Pie XII en 1950']},
  {id:3,name:'Saint Pierre',icon:'⚓',dates:'v. 1 – v. 64-68 ap. J.-C.',era:'Ier siècle',category:'Apôtre',bio:'Pêcheur de Galilée, Simon Pierre est l\'un des premiers disciples appelés par Jésus, qui lui donne le surnom "Pierre" (la roche). Il devient le chef des douze apôtres et le premier à confesser publiquement que Jésus est le Christ. Malgré son reniement lors de l\'arrestation de Jésus, il se rachète après la résurrection. Il prêche à Jérusalem puis voyage jusqu\'à Rome, où il fonde la première communauté chrétienne. Martyrisé sous Néron vers 64-68 ap. J.-C., il est crucifié la tête en bas à sa demande, s\'estimant indigne de mourir comme son Seigneur. Les papes se considèrent ses successeurs directs.',keyFacts:['Pêcheur renommé Pierre ("roche") par Jésus','Premier à confesser : "Tu es le Christ, le Fils du Dieu vivant"','Renia Jésus trois fois puis pleura amèrement','Fondateur de la communauté chrétienne de Rome','Martyrisé tête en bas sous Néron']},
  {id:4,name:'Saint Paul',icon:'✉️',dates:'v. 5 – v. 67 ap. J.-C.',era:'Ier siècle',category:'Apôtre',bio:'Né à Tarse (actuelle Turquie), Saul est d\'abord un farouche persécuteur des chrétiens. Sur la route de Damas, vers 34 ap. J.-C., il est foudroyé par une vision du Christ ressuscité : conversion radicale, il prend le nom de Paul. Il devient le plus grand missionnaire du christianisme, parcourant l\'Asie Mineure, la Grèce et Rome lors de trois voyages missionnaires. Ses Épîtres constituent une large partie du Nouveau Testament et fondent la théologie chrétienne : grâce, foi, Église comme corps du Christ. Il est décapité à Rome vers 67 ap. J.-C.',keyFacts:['D\'abord Saul, persécuteur acharné des chrétiens','Conversion foudroyante sur la route de Damas (v. 34 ap. J.-C.)','Trois grands voyages missionnaires : Asie Mineure, Grèce, Rome','13 épîtres lui sont attribuées dans le NT','Décapité à Rome sous Néron, v. 67 ap. J.-C.']},
  {id:5,name:'Saint Jean',icon:'📖',dates:'v. 6 – v. 100 ap. J.-C.',era:'Ier siècle',category:'Apôtre',bio:'Frère de Jacques et fils de Zébédée, Jean est le plus jeune des apôtres et le seul à ne pas avoir fui lors de la crucifixion. Surnommé "le disciple bien-aimé", il recueille Marie chez lui sur demande de Jésus mourant. On lui attribue le quatrième Évangile, trois lettres et l\'Apocalypse. Exilé à Patmos sous l\'Empire romain, il y aurait écrit l\'Apocalypse. Il est le seul apôtre à être mort de vieillesse, à Éphèse, vers 100 ap. J.-C., sans subir le martyre.',keyFacts:['Seul apôtre resté au pied de la croix','Recueille Marie chez lui sur demande expresse de Jésus mourant','Auteur présumé du 4e Évangile, de 3 lettres et de l\'Apocalypse','Exilé à Patmos sous Domitien','Seul apôtre mort de vieillesse, vers 100 ap. J.-C. à Éphèse']},
  {id:6,name:'Saint Augustin',icon:'📚',dates:'354 – 430',era:'Antiquité tardive',category:"Père de l'Église",bio:'Né en 354 à Thagaste (Algérie actuelle), Augustin mène une jeunesse dissolue entre aventures amoureuses et quête intellectuelle, passant par le manichéisme puis le néoplatonisme. C\'est à Milan, sous l\'influence de l\'évêque Ambroise, qu\'il se convertit au christianisme en 387. Devenu évêque d\'Hippone, il produit une œuvre colossale : Les Confessions (première autobiographie occidentale), La Cité de Dieu, des traités contre les hérésies. Il forge des concepts fondamentaux : péché originel, grâce divine, prédestination. Il meurt en 430 pendant le siège d\'Hippone par les Vandales.',keyFacts:['Jeunesse dissolue : concubine, fils illégitime, quête intellectuelle','Converti en 387 à Milan sous l\'influence d\'Ambroise','Les Confessions : première autobiographie de la littérature occidentale','A forgé les concepts de péché originel et de grâce divine','Meurt en 430 lors du siège d\'Hippone par les Vandales']},
  {id:7,name:"Saint Thomas d'Aquin",icon:'🏛️',dates:'v. 1225 – 1274',era:'Moyen Âge',category:"Docteur de l'Église",bio:'Né vers 1225 en Italie dans une famille noble, Thomas rejoint l\'ordre des Dominicains contre la volonté de sa famille qui l\'emprisonne un an pour l\'en dissuader. Il étudie à Cologne avec Albert le Grand puis enseigne à Paris et Rome. Sa Somme Théologique tente de réconcilier la foi chrétienne et la philosophie aristotélicienne. Il développe les "cinq voies" pour démontrer l\'existence de Dieu par la raison. Son thomisme devient la philosophie officielle de l\'Église catholique. Il meurt en 1274, à 49 ans, épuisé par son travail intellectuel.',keyFacts:['Sa famille l\'emprisonna un an pour l\'empêcher d\'être moine','Surnommé "bœuf muet" — son maître prédit qu\'il "remplirait le monde de ses mugissements"','Somme Théologique : réconciliation de la foi et d\'Aristote','Élabore les "cinq voies" pour prouver l\'existence de Dieu','Thomisme adopté comme philosophie officielle de l\'Église']},
  {id:8,name:'Saint Jean Chrysostome',icon:'🗣️',dates:'v. 347 – 407',era:'Antiquité tardive',category:"Père de l'Église",bio:'Né vers 347 à Antioche, Jean reçoit une formation rhétorique d\'excellence et renonce à une carrière brillante pour se faire moine. Son talent d\'orateur est tel qu\'il reçoit le surnom "Chrysostome" — "bouche d\'or". Évêque de Constantinople en 398, il mène une réforme radicale : il vend les biens du palais épiscopal pour nourrir les pauvres et dénonce ouvertement la corruption des élites, y compris de l\'impératrice Eudoxie. Deux fois exilé pour avoir déplu à la cour impériale, il meurt épuisé lors de son second exil en 407. Ses homélies commentent l\'intégralité du Nouveau Testament.',keyFacts:['Surnom "Chrysostome" = "bouche d\'or" pour son talent oratoire','Vend les biens du palais épiscopal pour nourrir les pauvres','Dénonce publiquement la corruption de l\'impératrice Eudoxie','Exilé deux fois, meurt épuisé lors de son second exil en 407','Ses homélies sont des chefs-d\'œuvre de la littérature patristique']},
  {id:9,name:'Saint Grégoire de Nazianze',icon:'✍️',dates:'v. 329 – v. 390',era:'Antiquité tardive',category:"Père de l'Église",bio:'Né vers 329 en Cappadoce (Turquie actuelle), Grégoire est l\'un des trois "Pères Cappadociens" avec Basile le Grand et Grégoire de Nysse. Théologien de premier plan, il précise la doctrine trinitaire lors du Concile de Constantinople en 381. Nommé évêque de Constantinople, il démissionne rapidement, épuisé par les intrigues politiques et ecclésiastiques, préférant la vie contemplative. Ses discours théologiques sont d\'une telle précision qu\'il est surnommé "le Théologien" — titre réservé à très peu de saints. Il meurt vers 390 dans sa Cappadoce natale.',keyFacts:['L\'un des trois "Pères Cappadociens"','Précise la doctrine trinitaire au Concile de Constantinople (381)','Surnommé "le Théologien" — titre réservé à très peu de saints','Démissionne de l\'évêché de Constantinople, épuisé par les intrigues','Préfère la vie contemplative à la carrière ecclésiastique']},
  {id:10,name:'Saint Benoît de Nursie',icon:'🏔️',dates:'v. 480 – v. 547',era:'Haut Moyen Âge',category:"Fondateur d'ordre",bio:'Né vers 480 à Nursie (Italie), Benoît abandonne ses études à Rome, choqué par la décadence de la ville, pour vivre en ermite dans une grotte à Subiaco. Sa réputation de sainteté attire des disciples, et il fonde le monastère du Mont-Cassin vers 529. C\'est là qu\'il rédige sa célèbre Règle, un texte de 73 chapitres organisant la vie monastique autour de la devise Ora et Labora (prie et travaille). Sa règle devient la norme de tout le monachisme occidental. Il est proclamé patron de l\'Europe par Paul VI en 1964.',keyFacts:['Abandon de Rome et vie d\'ermite dans une grotte à Subiaco','Fonde le monastère du Mont-Cassin vers 529','La Règle de saint Benoît : 73 chapitres, devise Ora et Labora','Norme de tout le monachisme occidental pendant des siècles','Proclamé patron de l\'Europe par Paul VI en 1964']},
  {id:11,name:'Saint Bernard de Clairvaux',icon:'🌿',dates:'1090 – 1153',era:'Moyen Âge',category:"Docteur de l'Église",bio:'Né en 1090 en Bourgogne dans une famille noble, Bernard entre à l\'abbaye de Cîteaux à 22 ans, entraînant avec lui une trentaine de parents et amis. En 1115, il fonde l\'abbaye de Clairvaux. Son influence dépasse largement le monastère : il arbitre des conflits entre papes, prêche la Deuxième Croisade en 1147, combat les hérésies et fait condamner Abélard. Théologien et mystique, il défend une théologie du cœur face à la raison scolastique. Ses écrits sur la Vierge Marie ont profondément marqué la dévotion mariale catholique.',keyFacts:['Entraîne une trentaine de proches dans la vie monastique à 22 ans','Fonde Clairvaux, l\'une des abbayes les plus influentes d\'Europe','Prêche la Deuxième Croisade (1147)','Fait condamner Abélard : foi du cœur contre raison scolastique','Ses écrits mariaux ont profondément marqué la dévotion catholique']},
  {id:12,name:'Saint Dominique',icon:'📢',dates:'v. 1170 – 1221',era:'Moyen Âge',category:"Fondateur d'ordre",bio:'Né vers 1170 en Castille (Espagne), Dominique est un chanoine qui, lors d\'un voyage en France, découvre l\'hérésie cathare ravageant le Languedoc. Convaincu que la prédication intellectuelle et le témoignage de pauvreté sont les seules armes efficaces, il fonde en 1216 l\'Ordre des Frères Prêcheurs (les Dominicains). Contrairement aux moines sédentaires, ses frères parcourent le monde pour prêcher et enseigner. L\'ordre produit rapidement les plus grands intellectuels de l\'Église, dont Thomas d\'Aquin. Il est également associé à la vulgarisation du Rosaire. Il meurt à Bologne en 1221.',keyFacts:['Rencontre l\'hérésie cathare lors d\'un voyage en France','Fonde les Dominicains (Frères Prêcheurs) en 1216','Révolution monastique : des frères qui prêchent dans le monde','Son ordre produit Thomas d\'Aquin et Albert le Grand','Associé à la vulgarisation du Rosaire']},
  {id:13,name:"Saint François d'Assise",icon:'🕊️',dates:'v. 1181 – 1226',era:'Moyen Âge',category:"Fondateur d'ordre",bio:'Né vers 1181 à Assise, fils d\'un riche marchand, François mène une vie insouciante jusqu\'à une grave maladie et une captivité lors d\'une guerre. En 1206, il renonce publiquement à l\'héritage paternel et embrasse une pauvreté radicale. Il fonde l\'Ordre des Frères Mineurs (les Franciscains) en 1209. Amoureux de la création, il compose le Cantique des Créatures, premier texte littéraire en langue italienne. En 1224, il reçoit les stigmates. Il meurt en 1226, à 44 ans. Jean-Paul II le proclame patron de l\'écologie en 1979.',keyFacts:['Renonce publiquement à son héritage devant l\'évêque en 1206','Fonde les Franciscains (Frères Mineurs) en 1209','Cantique des Créatures : premier texte littéraire en langue italienne','Reçoit les stigmates en 1224 — premier cas attesté','Proclamé patron de l\'écologie par Jean-Paul II en 1979']},
  {id:14,name:"Sainte Claire d'Assise",icon:'💫',dates:'1193 – 1253',era:'Moyen Âge',category:"Fondatrice d'ordre",bio:'Née en 1193 à Assise dans une riche famille noble, Claire est fascinée par la prédication de François. À 18 ans, elle s\'enfuit de chez elle en pleine nuit pour le rejoindre et recevoir l\'habit religieux. Elle fonde l\'Ordre des Pauvres Dames (les Clarisses) et obtient du pape le privilège paupertatis — le droit unique de ne rien posséder, même collectivement. Elle dirige son couvent pendant 40 ans depuis son lit de malade. On lui attribue le miracle d\'avoir repoussé une armée en portant le saint sacrement sur les remparts d\'Assise.',keyFacts:['S\'enfuit de chez elle la nuit à 18 ans pour suivre François','Obtient le "privilège de pauvreté" : aucune possession collective','Dirige son couvent 40 ans depuis son lit de malade','Repousse selon la tradition une armée en portant le saint sacrement','Fondatrice des Clarisses, ordre féminin franciscain']},
  {id:15,name:'Saint Ignace de Loyola',icon:'⚔️',dates:'1491 – 1556',era:'Renaissance',category:"Fondateur d'ordre",bio:'Né en 1491 au Pays Basque espagnol, Ignace est un gentilhomme et militaire ambitieux jusqu\'à ce qu\'un boulet de canon lui fracasse la jambe lors du siège de Pampelune en 1521. Pendant sa longue convalescence, il lit des vies de saints et connaît une conversion profonde. Il passe une année à Manrèse où il écrit les Exercices Spirituels. Il fonde en 1540 la Compagnie de Jésus (les Jésuites), ordre entièrement voué au pape et à l\'éducation. Les Jésuites deviennent l\'avant-garde de la Contre-Réforme catholique et fondent des centaines d\'universités.',keyFacts:['Blessé par un boulet de canon à Pampelune (1521) — tournant de sa vie','Rédige les Exercices Spirituels à Manrèse','Fonde la Compagnie de Jésus (Jésuites) en 1540','Les Jésuites fondent des centaines d\'universités dans le monde','Avant-garde de la Contre-Réforme catholique']},
  {id:16,name:"Sainte Thérèse d'Ávila",icon:'🏰',dates:'1515 – 1582',era:'Renaissance',category:"Docteur de l'Église",bio:'Née en 1515 à Avila (Espagne), Thérèse entre au Carmel à 20 ans mais vit longtemps une vie religieuse tiède. À 40 ans, une vision du Christ la transforme radicalement. Elle entreprend une réforme profonde du Carmel, fondant des couvents plus stricts — les Carmélites déchaussées. Elle écrit des œuvres mystiques majeures : Le Château intérieur, Le Livre de sa vie, Le Chemin de la perfection. Elle décrit ses expériences mystiques avec une précision psychologique saisissante. Elle est la première femme déclarée Docteur de l\'Église (1970). Elle meurt en 1582.',keyFacts:['Vie religieuse tiède jusqu\'à une conversion profonde à 40 ans','Réforme le Carmel : création des Carmélites déchaussées','Décrit la lévitation et les extases avec une précision psychologique unique','Le Château intérieur : chef-d\'œuvre de la littérature mystique','Première femme déclarée Docteur de l\'Église (1970)']},
  {id:17,name:'Saint Jean de la Croix',icon:'🌑',dates:'1542 – 1591',era:'Renaissance',category:"Docteur de l'Église",bio:'Né en 1542 en Castille dans une famille pauvre, Juan entre chez les Carmes et rencontre Thérèse d\'Avila qui le convainc de rejoindre la réforme. Ses supérieurs l\'emprisonnent neuf mois dans une cellule minuscule à Tolède. C\'est dans cette obscurité qu\'il compose ses plus grands poèmes mystiques, dont La Nuit obscure de l\'âme. Son œuvre décrit le chemin vers l\'union avec Dieu comme un dépouillement total de soi. Sa poésie est considérée comme le sommet de la littérature mystique hispanique. Il meurt en 1591, rejeté par ses propres supérieurs.',keyFacts:['Emprisonné 9 mois par ses supérieurs dans une cellule obscure à Tolède','Compose La Nuit obscure de l\'âme durant sa captivité','Chemin vers Dieu = dépouillement total de soi (la "nuit obscure")','Sa poésie est le sommet de la littérature mystique espagnole','Docteur de l\'Église en 1926']},
  {id:18,name:'Sainte Catherine de Sienne',icon:'✍️',dates:'1347 – 1380',era:'Moyen Âge tardif',category:"Docteur de l'Église",bio:'Née en 1347 à Sienne, 23e enfant d\'une famille de teinturier, Catherine a sa première vision du Christ à 6 ans. Elle refuse le mariage, jeûne de façon extrême et consacre sa vie au soin des malades et des lépreux. À 33 ans, elle reçoit les stigmates. Son engagement politique est extraordinaire : elle écrit des centaines de lettres aux princes et aux papes avec une autorité qui stupéfie ses contemporains. C\'est elle qui convainc le pape Grégoire XI de quitter Avignon pour rentrer à Rome (1377). Elle meurt à Rome en 1380, à 33 ans.',keyFacts:['23e enfant d\'une famille de teinturier de Sienne','Première vision du Christ à l\'âge de 6 ans','Convainc le pape Grégoire XI de quitter Avignon pour Rome (1377)','Reçoit les stigmates à 33 ans','Docteur de l\'Église en 1970, meurt à 33 ans']},
  {id:19,name:'Sainte Thérèse de Lisieux',icon:'🌸',dates:'1873 – 1897',era:'XIXe siècle',category:"Docteur de l'Église",bio:'Née en 1873 à Alençon dans une famille très pieuse, Thérèse entre au Carmel de Lisieux à seulement 15 ans après une dérogation spéciale du pape. Elle développe sa "Petite Voie" — faire de petits actes ordinaires avec un amour extraordinaire. Elle meurt de la tuberculose en 1897, à 24 ans. Son autobiographie Histoire d\'une âme devient un best-seller mondial. Sa renommée dépasse en quelques années celle de saints vénérés depuis des siècles. Elle est nommée Docteur de l\'Église en 1997 par Jean-Paul II.',keyFacts:['Entre au Carmel à 15 ans avec une dérogation papale','Développe la "Petite Voie" : amour dans les petits actes ordinaires','Meurt de la tuberculose à 24 ans en 1897','Histoire d\'une âme : best-seller mondial traduit en dizaines de langues','Docteur de l\'Église en 1997 — la plus jeune de l\'histoire']},
  {id:20,name:'Saint Martin de Tours',icon:'🗡️',dates:'v. 316 – 397',era:'Antiquité tardive',category:'Évêque & Missionnaire',bio:'Né vers 316 en Pannonie (Hongrie actuelle) dans une famille de soldats romains, Martin est enrôlé de force dans l\'armée à 15 ans. La scène la plus célèbre de sa vie : à Amiens, par temps froid, il partage son manteau avec un mendiant nu. La nuit suivante, il rêve du Christ vêtu de ce manteau. Converti, il quitte l\'armée et devient disciple de l\'évêque Hilaire de Poitiers. Il fonde le premier monastère de Gaule à Ligugé. Nommé évêque de Tours en 371, il évangélise les campagnes gauloises. Il est l\'un des saints les plus populaires de France.',keyFacts:['Enrôlé de force dans l\'armée romaine à 15 ans','Partage son manteau avec un mendiant à Amiens — scène iconique','Rêve du Christ vêtu de son manteau : il se convertit','Fonde le premier monastère de Gaule à Ligugé','Évêque de Tours, évangélisateur des campagnes gauloises']},
  {id:21,name:'Saint Antoine de Padoue',icon:'🐟',dates:'1195 – 1231',era:'Moyen Âge',category:"Docteur de l'Église",bio:'Né en 1195 à Lisbonne dans une famille noble portugaise, Ferdinand (son vrai prénom) entre chez les Augustiniens puis rejoint les Franciscains. Un incident révèle son talent d\'orateur lors d\'une ordination : faute de prédicateur, on lui demande d\'improviser — il stupéfie l\'assemblée. François d\'Assise lui confie l\'enseignement de la théologie. Il prêche en Italie du Nord avec un succès foudroyant. On lui attribue de nombreux miracles, notamment celui de retrouver des objets perdus. Il meurt à Padoue en 1231, à 35 ans.',keyFacts:['Vrai prénom : Ferdinand — né à Lisbonne dans une famille noble','Rejoint les Franciscains après le martyre de frères au Maroc','François d\'Assise lui confie l\'enseignement de la théologie','Prédicateur star : des milliers de personnes à ses sermons','Patron des objets perdus, meurt à 35 ans']},
  {id:22,name:'Saint Vincent de Paul',icon:'❤️',dates:'1581 – 1660',era:'XVIIe siècle',category:'Apôtre de la charité',bio:'Né en 1581 dans une famille paysanne des Landes, Vincent est ordonné prêtre à 19 ans. Sa vie bascule quand il est capturé par des pirates barbaresques et vendu comme esclave en Tunisie pendant deux ans. De retour en France, il prend conscience de la misère extrême du peuple. Il fonde en 1625 la Congrégation de la Mission (les Lazaristes) pour évangéliser les campagnes, puis en 1633 — avec Louise de Marillac — les Filles de la Charité, premier ordre religieux féminin dédié aux pauvres. Il meurt en 1660, son nom synonyme de charité sociale.',keyFacts:['Capturé par des pirates et esclave en Tunisie pendant deux ans','Fonde les Lazaristes (1625) pour évangéliser les campagnes','Crée les Filles de la Charité (1633), premier ordre féminin tourné vers les pauvres','Organise des collectes massives, nourrit des régions entières','Son nom est synonyme universel de charité sociale']},
  {id:23,name:'Saint François-Xavier',icon:'🌏',dates:'1506 – 1552',era:'XVIe siècle',category:'Missionnaire',bio:'Né en 1506 en Navarre (Espagne), François Xavier est un brillant étudiant à Paris, ami d\'Ignace de Loyola et cofondateur des Jésuites. En 1541, il part pour les Indes portugaises. Il évangélise Goa, les pêcheurs de la côte, le Japon (1549), apprenant les langues locales. Il est le premier à rédiger des textes chrétiens en japonais. Il meurt en 1552 sur l\'île de Shangchuan, aux portes de la Chine qu\'il n\'aura jamais pu pénétrer. On lui attribue des dizaines de milliers de baptêmes.',keyFacts:['Cofondateur des Jésuites avec Ignace de Loyola','Part pour les Indes en 1541 — voyage de 13 mois','Évangélise Goa, le Sri Lanka et le Japon','Premier à rédiger des textes chrétiens en japonais','Meurt aux portes de la Chine en 1552, jamais pu y entrer']},
  {id:24,name:'Don Bosco',icon:'🎓',dates:'1815 – 1888',era:'XIXe siècle',category:"Éducateur & Fondateur",bio:'Né en 1815 dans une famille paysanne pauvre du Piémont (Italie), Jean Bosco perd son père à 2 ans. Un rêve récurrent à 9 ans — dans lequel Jésus lui demande de s\'occuper des enfants des rues — oriente toute sa vie. Prêtre à Turin en pleine révolution industrielle, il invente une pédagogie révolutionnaire basée sur la raison, la religion et l\'amour — le "système préventif" — au lieu de la punition. Il fonde en 1859 la Société Salésienne. Ses écoles et ateliers professionnels se multiplient en Europe puis dans le monde entier. Il meurt en 1888, après avoir fondé 250 maisons.',keyFacts:['Rêve à 9 ans : Jésus lui demande de s\'occuper des enfants des rues','Invente le "système préventif" : amour plutôt que punition','Fonde la Société Salésienne en 1859','250 maisons fondées avant sa mort en 1888','Ses écoles professionnelles accueillent des milliers de jeunes pauvres']},
  {id:25,name:'Saint Jean-Marie Vianney',icon:'⛪',dates:'1786 – 1859',era:'XIXe siècle',category:'Curé de paroisse',bio:'Né en 1786 en Dombes (France), Jean-Marie Vianney est un élève médiocre. Nommé curé du petit village d\'Ars-sur-Formans en 1818, il transforme cette bourgade en lieu de pèlerinage mondial. Des dizaines de milliers de personnes viennent chaque année se confesser à lui, convaincues qu\'il lit dans les âmes. Il dort 3 heures par nuit, jeûne de façon extrême et affronte selon lui des attaques physiques du diable. Il passe jusqu\'à 16 heures par jour au confessionnal. Il meurt en 1859, patron universel des curés de paroisse depuis 1929.',keyFacts:['Élève médiocre qui a failli ne jamais être ordonné prêtre','Curé du village d\'Ars : le transforme en pèlerinage mondial','Jusqu\'à 16 heures par jour au confessionnal','Dort 3 heures par nuit, jeûne extrême toute sa vie','Patron universel des curés de paroisse depuis 1929']},
  {id:26,name:'Sainte Bernadette Soubirous',icon:'💧',dates:'1844 – 1879',era:'XIXe siècle',category:'Mystique & Visionnaire',bio:'Née en 1844 à Lourdes dans une famille très pauvre, Bernadette est une fillette chétive et asthmatique, quasi illettrée. En février 1858, elle affirme voir apparaître une "Dame" dans la grotte de Massabielle, à 18 reprises. La Dame se présente comme "l\'Immaculée Conception" — une formule théologique que Bernadette ne connaît pas. Elle indique l\'emplacement d\'une source réputée miraculeuse. Soumise à des interrogatoires intenses, elle ne se contredit jamais. Elle entre chez les Sœurs de la Charité à Nevers, vivant dans l\'humilité totale. Elle meurt en 1879 à 35 ans.',keyFacts:['Famille pauvre, fillette quasi illettrée et asthmatique','18 apparitions dans la grotte de Massabielle (1858)','La Dame se dit "l\'Immaculée Conception" — terme que Bernadette ignorait','Source de Lourdes, réputée miraculeuse depuis lors','Meurt à 35 ans à Nevers, dans l\'humilité totale']},
  {id:27,name:'Padre Pio',icon:'🙏',dates:'1887 – 1968',era:'XXe siècle',category:'Mystique',bio:'Né en 1887 dans une famille paysanne de Pietrelcina (Italie du Sud), Francesco Forgione entre chez les Capucins à 15 ans. En 1918, il reçoit les stigmates permanents qu\'il portera 50 ans jusqu\'à sa mort. Des centaines de milliers de pèlerins affluent à San Giovanni Rotondo pour le voir célébrer la messe, qui dure parfois deux heures. On lui attribue des dons de bilocation, de lecture des consciences, de guérison et de prophétie. L\'Église le contraint un temps à cesser ses activités pastorales. Il fonde la "Maison pour le soulagement de la souffrance". Il meurt en 1968, canonisé en 2002.',keyFacts:['Reçoit les stigmates permanents en 1918 — les porte 50 ans','Sa messe peut durer deux heures : des centaines de milliers de pèlerins','Dons attribués : bilocation, lecture des consciences, guérisons, prophétie','L\'Église le contraint un temps à cesser ses activités pastorales','Fonde un hôpital : "Maison pour le soulagement de la souffrance"']},
  {id:28,name:'Jean XXIII',icon:'🕊️',dates:'1881 – 1963',era:'XXe siècle',category:'Pape',bio:'Né Angelo Roncalli en 1881 en Lombardie dans une famille de paysans pauvres, il suit une carrière ecclésiastique discrète comme diplomate pontifical en Turquie, Grèce et France. Élu pape en 1958 à 76 ans, considéré comme un pape de transition sans ambition, il stupéfie le monde en convoquant le Concile Vatican II en 1959 — première réforme majeure de l\'Église depuis 400 ans. Son pontificat ouvre l\'Église au dialogue avec le monde moderne, les protestants et les Juifs. Surnommé "le bon pape Jean", il meurt en 1963. Canonisé en 2014.',keyFacts:['Élu pape à 76 ans, considéré comme pape de transition','Convoque Vatican II (1959) : première grande réforme depuis 400 ans','Ouvre le dialogue avec les protestants et les Juifs','Surnommé "le bon pape Jean" pour sa bonhomie naturelle','Meurt en 1963 sans voir la fin du Concile qu\'il avait lancé']},
  {id:29,name:'Jean-Paul II',icon:'🌍',dates:'1920 – 2005',era:'XXe siècle',category:'Pape',bio:'Né Karol Wojtyła en 1920 en Pologne, il traverse l\'horreur de l\'occupation nazie puis du régime communiste. Élu pape en 1978, premier pape non-italien depuis 455 ans, son pontificat de 26 ans est le deuxième plus long de l\'histoire. Il joue un rôle crucial dans l\'effondrement du communisme en Europe de l\'Est, soutenant Solidarność en Pologne. Il voyage dans 129 pays, survit à un attentat en 1981 et pardonne son agresseur. Il canonise plus de saints que tous ses prédécesseurs réunis. Il meurt en 2005. Canonisé en 2014.',keyFacts:['Premier pape non-italien depuis 455 ans','Rôle décisif dans l\'effondrement du communisme en Europe de l\'Est','Voyage dans 129 pays, rencontre des millions de fidèles','Survit à un attentat en 1981 — pardonne son agresseur','Canonise plus de saints que tous ses prédécesseurs réunis']},
  {id:30,name:'Mère Teresa de Calcutta',icon:'🤲',dates:'1910 – 1997',era:'XXe siècle',category:'Apôtre de la charité',bio:'Née Agnes Gonxha Bojaxhiu en 1910 à Skopje (actuelle Macédoine du Nord) dans une famille albanaise, elle part comme missionnaire en Inde à 18 ans. En 1946, elle reçoit un "appel dans l\'appel" : quitter le couvent pour aller vivre parmi les plus pauvres. En 1950, elle fonde les Missionnaires de la Charité à Calcutta. Prix Nobel de la Paix en 1979. Ses lettres révèlent qu\'elle a vécu 50 ans dans une nuit spirituelle profonde. Elle meurt en 1997. Canonisée en 2016 par le pape François.',keyFacts:['Quitte le couvent sur "appel dans l\'appel" pour vivre parmi les pauvres','Fonde les Missionnaires de la Charité à Calcutta en 1950','Prix Nobel de la Paix en 1979','Ses lettres révèlent 50 ans de doute et de nuit spirituelle','Canonisée en 2016 par le pape François']},
  {id:31,name:'Charles de Foucauld',icon:'🏜️',dates:'1858 – 1916',era:'XIXe-XXe siècle',category:'Ermite & Missionnaire',bio:'Né en 1858 à Strasbourg dans une famille aristocratique, Charles mène une vie de débauche et d\'aventure comme officier de l\'armée française. Explorateur du Maroc déguisé en rabbin, il se reconvertit au catholicisme en 1886 lors d\'une confession avec l\'abbé Huvelin. Il devient Trappiste, puis ermite au Sahara, parmi les Touaregs à Tamanrasset. Il apprend leur langue, compile un dictionnaire touareg-français, et vit parmi eux sans chercher à convertir. Il est assassiné lors d\'une razzia en 1916. Canonisé en 2022 par le pape François.',keyFacts:['Officier débauché converti en 1886 lors d\'une confession','Explorateur du Maroc déguisé en rabbin juif','Ermite parmi les Touaregs à Tamanrasset, sans chercher à convertir','Compile un dictionnaire touareg-français','Assassiné lors d\'une razzia en 1916, canonisé en 2022']},
  {id:32,name:'Sainte Geneviève',icon:'🕯️',dates:'v. 422 – v. 502',era:'Antiquité tardive',category:'Patronne de Paris',bio:'Née vers 422 à Nanterre, Geneviève consacre sa vie à Dieu dès l\'enfance, sur les conseils de l\'évêque Germain d\'Auxerre. Installée à Paris, elle acquiert une autorité spirituelle et pratique considérable. En 451, lors de l\'avancée d\'Attila et de ses Huns vers Paris, elle convainc la population de ne pas fuir — et Attila dévie effectivement sa route. Lors du siège de Paris par les Francs, elle organise des convois fluviaux pour ravitailler la ville affamée. Elle contribue à la conversion de Clovis au christianisme. Elle meurt vers 502.',keyFacts:['Consacrée à Dieu dès l\'enfance par l\'évêque Germain d\'Auxerre','Convainc Paris de ne pas fuir devant Attila en 451 — et Attila dévie','Organise des convois fluviaux pour ravitailler Paris assiégée','Contribue à la conversion de Clovis au christianisme','Patronne de Paris, inhumée sur la montagne qui porte son nom']},
  {id:33,name:"Sainte Jeanne d'Arc",icon:'⚜️',dates:'v. 1412 – 1431',era:'Moyen Âge tardif',category:'Héroïne & Sainte',bio:'Née vers 1412 à Domrémy en Lorraine, Jeanne est la fille d\'un laboureur. À 13 ans, elle commence à entendre des voix identifiées comme saint Michel, sainte Catherine et sainte Marguerite, lui ordonnant de "bouter l\'Anglais hors de France". À 17 ans, elle convainc le dauphin Charles VII et lève le siège d\'Orléans en 1429. Elle conduit Charles VII à Reims pour son sacre. Capturée par les Bourguignons, vendue aux Anglais, jugée pour hérésie, elle est brûlée vive à Rouen en 1431, à 19 ans. Réhabilitée en 1456, canonisée en 1920.',keyFacts:['Entend des voix dès 13 ans : saint Michel, sainte Catherine, sainte Marguerite','Convainc le dauphin Charles VII à 17 ans','Lève le siège d\'Orléans en 1429 — exploit militaire stupéfiant','Brûlée vive à Rouen à 19 ans, condamnée par un tribunal ecclésiastique','Réhabilitée 25 ans après sa mort, canonisée en 1920']},
  {id:34,name:'Abraham',icon:'🏕️',dates:'v. 2000 av. J.-C.',era:'IIe millénaire av. J.-C.',category:'Patriarche',bio:'Né à Our en Chaldée, Abraham reçoit l\'appel de Dieu qui lui demande de quitter sa terre pour une contrée inconnue. Dieu lui fait une alliance solennelle : sa descendance sera aussi nombreuse que les étoiles. Père d\'Ismaël avec Agar, puis d\'Isaac avec Sara malgré leur vieillesse, il est mis à l\'épreuve ultime lorsque Dieu lui demande de sacrifier Isaac — épreuve à laquelle il consent totalement. Sa foi inconditionnelle fait de lui le "père des croyants" pour les trois grandes traditions monothéistes : judaïsme, christianisme, islam.',keyFacts:['Quitte Our en Chaldée sur l\'appel de Dieu','Alliance de Dieu pour une descendance innombrable','Prêt à sacrifier son fils Isaac','Père des croyants pour les 3 monothéismes']},
  {id:35,name:'Moïse',icon:'🌊',dates:'v. 1300 av. J.-C.',era:'XIIIe siècle av. J.-C.',category:'Prophète et législateur',bio:'Né en Égypte d\'une famille hébraïque, sauvé des eaux par la fille du Pharaon, Moïse grandit à la cour royale avant de fuir au désert après avoir tué un garde égyptien. C\'est au buisson ardent que Dieu lui révèle son nom — YHWH — et lui confie la mission de libérer Israël de l\'esclavage. Il conduit le peuple à travers la mer Rouge, reçoit les Dix Commandements au Sinaï, et accompagne Israël quarante ans dans le désert. Il meurt en vue de la Terre promise, sans jamais y entrer. La tradition juive lui attribue la rédaction des cinq premiers livres de la Bible.',keyFacts:['Sauvé des eaux en Égypte','Révélation du nom YHWH au buisson ardent','Libère Israël et traverse la mer Rouge','Reçoit les Dix Commandements au Sinaï','Auteur traditionnel du Pentateuque']},
  {id:36,name:'David',icon:'👑',dates:'v. 1040 – v. 970 av. J.-C.',era:'Xe siècle av. J.-C.',category:'Roi et psalmiste',bio:'Berger de Bethléem choisi par Dieu contre toute attente, David devient célèbre en terrassant le géant Goliath avec une simple fronde. Musicien, poète et guerrier, il s\'impose comme second roi d\'Israël après Saül et établit Jérusalem comme capitale politique et religieuse. Son règne est marqué par des victoires militaires mais aussi par des fautes graves — l\'adultère avec Bethsabée, la mort de son fils Absalom — qui révèlent sa fragilité humaine. La tradition lui attribue la composition des Psaumes. Ancêtre de Jésus selon la chair, il incarne la figure du roi selon le cœur de Dieu.',keyFacts:['Berger devenu vainqueur de Goliath','Second roi d\'Israël, établit Jérusalem','Auteur traditionnel des Psaumes','Ancêtre de Jésus selon la chair']},
  {id:37,name:'Salomon',icon:'🦉',dates:'v. 970 – v. 930 av. J.-C.',era:'Xe siècle av. J.-C.',category:'Roi et sage',bio:'Fils de David et Bethsabée, Salomon hérite d\'un royaume unifié et puissant. À Dieu qui lui propose de choisir un don, il demande la sagesse — réponse qui lui vaut admiration divine et humaine. Il fait construire le Temple de Jérusalem, édifice destiné à abriter l\'Arche d\'Alliance, symbole de la présence de Dieu au milieu de son peuple. Sa gloire attire des délégations du monde entier, dont la reine de Saba. La tradition lui attribue le Livre des Proverbes, l\'Ecclésiaste et le Cantique des Cantiques. Malgré sa sagesse, ses nombreuses épouses étrangères l\'entraînent vers l\'idolâtrie et provoquent la fracture du royaume après sa mort.',keyFacts:['Demande la sagesse à Dieu','Construit le premier Temple de Jérusalem','Auteur de Proverbes, Ecclésiaste et Cantique','Ses mariages entraînent l\'idolâtrie et le schisme']},
  {id:38,name:'Élie',icon:'🔥',dates:'IXe siècle av. J.-C.',era:'IXe siècle av. J.-C.',category:'Prophète',bio:'Élie le Tishbite surgit brusquement dans le récit biblique comme l\'un des prophètes les plus foudroyants d\'Israël. Sous le règne d\'Achab et de Jézabel, il défie seul 450 prophètes de Baal au mont Carmel dans un affrontement spectaculaire qui se conclut par un feu divin. Épuisé et découragé après cette victoire, il fuit au désert où l\'ange de Dieu le nourrit et lui parle dans un "souffle de brise légère" — non dans le tonnerre. Il est enlevé au ciel dans un char de feu, sans connaître la mort. Dans le Nouveau Testament, Jésus est parfois comparé à lui, et Jean-Baptiste est présenté comme son retour.',keyFacts:['Défie les prophètes de Baal au mont Carmel','Rencontre Dieu dans un souffle de brise légère','Enlevé au ciel dans un char de feu']},
  {id:39,name:'Isaïe',icon:'📜',dates:'v. 740 – v. 700 av. J.-C.',era:'VIIIe siècle av. J.-C.',category:'Prophète messianique',bio:'Prophète de Jérusalem sous quatre rois de Juda, Isaïe reçoit sa vocation dans une vision saisissante du Dieu saint entouré de séraphins. Son livre est le plus long des prophètes et le plus cité dans le Nouveau Testament — Jésus lui-même s\'en réclame à Nazareth. Ses oracles annoncent le jugement sur Israël infidèle, mais aussi une espérance lumineuse : un enfant né d\'une vierge, nommé Emmanuel, un "Serviteur souffrant" qui porte les péchés de tous. Ces textes constituent pour les chrétiens les prophéties les plus directes sur la venue du Messie.',keyFacts:['Vocation avec les séraphins dans le Temple','Prophétise l\'Emmanuel né d\'une vierge','Annonce le Serviteur souffrant','Prophète le plus cité du Nouveau Testament']},
  {id:40,name:'Jérémie',icon:'💧',dates:'v. 650 – v. 586 av. J.-C.',era:'VIIe–VIe siècle av. J.-C.',category:'Prophète',bio:'Appelé dès le ventre de sa mère, Jérémie exerce son ministère dans l\'une des périodes les plus dramatiques de l\'histoire d\'Israël : la chute de Jérusalem et la déportation à Babylone. Il prêche sans relâche la conversion, est rejeté, emprisonné, jeté dans une citerne. Ses "Confessions" révèlent un homme brisé qui oscille entre fidélité à Dieu et désespoir intérieur — l\'un des textes les plus humains de toute la Bible. Il annonce pourtant l\'alliance nouvelle que Dieu gravera non sur des tables de pierre mais dans les cœurs. Les chrétiens y voient l\'annonce de la Nouvelle Alliance scellée par Jésus.',keyFacts:['Prophétise la chute de Jérusalem et l\'exil','Auteur des Confessions','Annonce la Nouvelle Alliance gravée dans les cœurs']},
  {id:41,name:'Daniel',icon:'🦁',dates:'v. 605 – v. 530 av. J.-C.',era:'VIe siècle av. J.-C.',category:'Prophète',bio:'Déporté à Babylone dès sa jeunesse, Daniel refuse de compromettre sa foi malgré les pressions de la cour babylonienne. Il interprète les songes de Nabuchodonosor, survit à la fosse aux lions sous Darius, et reçoit des visions apocalyptiques d\'une portée extraordinaire — dont celle du "Fils de l\'homme venant sur les nuées du ciel", reprise par Jésus lui-même. Son livre alterne récits édifiants et révélations symboliques. Figure de la fidélité sous persécution, il est une référence majeure pour les communautés chrétiennes traversant l\'épreuve.',keyFacts:['Déporté à Babylone','Interprète les songes de Nabuchodonosor','Survit à la fosse aux lions','Prophétise le Fils de l\'homme']},
  {id:42,name:'Ézéchiel',icon:'🦴',dates:'v. 622 – v. 570 av. J.-C.',era:'VIe siècle av. J.-C.',category:'Prophète',bio:'Prêtre deporté à Babylone avec la première vague d\'exilés, Ézéchiel reçoit sa vocation dans une vision grandiose de quatre créatures ailées et d\'une roue dans une roue — l\'une des images les plus énigmatiques de toute la Bible. Ses oracles alternent entre condamnation sévère d\'Israël infidèle et promesses de restauration radicale. Sa vision de la "vallée des ossements desséchés" qui reprennent vie annonce la résurrection et le retour du peuple en sa terre. Il introduit aussi la notion de responsabilité individuelle : chacun répond de ses propres actes devant Dieu.',keyFacts:['Vision du char de Dieu et des 4 créatures','Prophétise la résurrection des ossements desséchés','Introduit la notion de responsabilité individuelle']},
  {id:43,name:'Job',icon:'🌪️',dates:'Époque indéterminée',era:'Époque patriarcale',category:'Figure de la sagesse',bio:'Job est un homme juste et prospère que Dieu autorise Satan à éprouver. En quelques jours, il perd ses biens, ses enfants, sa santé. Ses amis lui expliquent que cette souffrance est une punition — il les réfute tous. Dans un dialogue intérieur déchirant, il ose interpeller Dieu lui-même, exiger une réponse, refuser les explications faciles. Dieu lui répond "du milieu de la tempête" non par une explication mais par une révélation de sa propre grandeur. Job se soumet, et Dieu le restaure — en condamnant au passage les "théologiens" qui prétendaient tout savoir. Son livre reste la réflexion biblique la plus profonde sur la souffrance innocente.',keyFacts:['Éprouvé malgré sa justice','Réfute les explications simplistes de ses amis','Interpelle Dieu qui répond de la tempête']},
  {id:44,name:'Ruth',icon:'🌾',dates:'v. XIIe–XIe siècle av. J.-C.',era:'Époque des Juges',category:'Figure de la fidélité',bio:'Moabite, donc étrangère au peuple d\'Israël, Ruth accompagne sa belle-mère Noémi après la mort de leurs maris, refusant de l\'abandonner dans sa misère. Sa phrase — "Où tu iras, j\'irai ; ton peuple sera mon peuple, ton Dieu sera mon Dieu" — est l\'une des plus belles déclarations de fidélité de toute la Bible. Elle s\'installe à Bethléem, glane les épis derrière les moissonneurs, et est remarquée par Boaz qui l\'épouse. De cette union naît Obed, père de Jessé, père de David. Étrangère devenue ancêtre du Messie, Ruth illustre que l\'appartenance au peuple de Dieu repose sur la foi, non sur le sang.',keyFacts:['Moabite fidèle à sa belle-mère Noémi','Glanait les champs de Boaz','Arrière-grand-mère du roi David','Ancêtre étrangère du Messie']},
  {id:45,name:'Esther',icon:'👑',dates:'v. Ve siècle av. J.-C.',era:'Ve siècle av. J.-C.',category:'Figure du courage',bio:'Jeune Juive orpheline élevée par son cousin Mardochée, Esther est choisie comme reine par le roi perse Assuérus sans que son origine juive soit connue. Lorsque le ministre Aman obtient un décret d\'extermination de tous les Juifs de l\'empire, Mardochée convainc Esther d\'intercéder auprès du roi — au risque de sa vie, car approcher le roi sans y être invité est punissable de mort. "Si je dois périr, je périrai", déclare-t-elle. Son intervention courageuse renverse le décret et sauve son peuple. Son histoire est célébrée chaque année lors de la fête juive de Pourim.',keyFacts:['Reine de l\'empire perse','Risque sa vie pour sauver les Juifs du complot d\'Aman','Son courage est fêté à Pourim']},
  {id:46,name:'Joseph (fils de Jacob)',icon:'🧥',dates:'v. XVIIIe siècle av. J.-C.',era:'IIe millénaire av. J.-C.',category:'Patriarche',bio:'Onzième fils de Jacob et fils préféré, Joseph est vendu comme esclave par ses frères jaloux de sa tunique aux couleurs vives et de ses songes prophétiques. Emmené en Égypte, il est emprisonné sur de fausses accusations, mais son don pour interpréter les rêves le propulse jusqu\'à la cour du Pharaon. Il devient vice-roi d\'Égypte et gère la crise alimentaire avec une clairvoyance remarquable. Lorsque ses frères viennent chercher du grain, il se révèle à eux non avec vengeance mais avec des larmes : "C\'est Dieu qui m\'a envoyé ici avant vous." Figure du pardon et de la Providence, il préfigure pour les chrétiens le Christ livré par les siens et exalté par Dieu.',keyFacts:['Vendu par ses frères','Interprète les rêves du Pharaon','Vice-roi d\'Égypte','Pardonne à ses frères']},
  {id:47,name:'Noé',icon:'🚢',dates:'Époque antédiluvienne',era:'Origines',category:'Patriarche',bio:'Dans un monde plongé dans la violence et la corruption, Noé est décrit comme "un homme juste, intègre parmi ses contemporains". Dieu lui commande de construire une arche pour sauver sa famille et un couple de chaque espèce animale du déluge à venir. Noé obéit sans discuter. Après les quarante jours de pluie et le retrait des eaux, il sort de l\'arche et Dieu établit avec lui la première alliance universelle, scellée par un arc-en-ciel : plus jamais Dieu ne détruira la terre par les eaux. Figure de l\'obéissance fidèle et de la grâce préservée, Noé est cité dans le Nouveau Testament et dans les traditions juive, chrétienne et islamique.',keyFacts:['Homme juste et intègre','Construit l\'arche pour survivre au Déluge','Première alliance universelle scellée par l\'arc-en-ciel']},
  {id:48,name:'Aaron',icon:'🔔',dates:'v. 1300 av. J.-C.',era:'XIIIe siècle av. J.-C.',category:'Grand prêtre',bio:'Frère aîné de Moïse, Aaron est désigné par Dieu comme son porte-parole auprès du Pharaon, car Moïse se dit inhabile à la parole. Il accomplit avec Moïse les plaies d\'Égypte et la sortie d\'Israël. Consacré par Moïse comme premier grand prêtre d\'Israël, il institue la lignée sacerdotale d\'où descendent tous les prêtres juifs. Sa faiblesse la plus célèbre est la fabrication du veau d\'or durant l\'absence de Moïse au Sinaï — épisode d\'idolâtrie collective qu\'il ne sut pas endiguer. Sa vie illustre le poids du ministère sacerdotal, entre proximité avec Dieu et fragilité humaine.',keyFacts:['Porte-parole de Moïse','Premier grand prêtre d\'Israël','Fabrique le veau d\'or']},
  {id:49,name:'Josué',icon:'🎺',dates:'v. XIIIe siècle av. J.-C.',era:'XIIIe siècle av. J.-C.',category:'Chef militaire',bio:'Assistant militaire de Moïse depuis l\'Exode, Josué est désigné par Dieu comme son successeur pour conduire Israël en Canaan. Il fait traverser le Jourdain au peuple à pied sec — miracle qui fait écho à la traversée de la mer Rouge — et mène la conquête de la Terre promise. La chute de Jéricho, dont les murailles s\'effondrent au son des trompettes, reste l\'épisode le plus emblématique de son livre. En hébreu, son nom signifie "Dieu sauve" — le même nom que Jésus en grec. Pour les chrétiens, Josué préfigure le Christ qui conduit l\'humanité vers la vraie Terre promise.',keyFacts:['Successeur de Moïse','Traverse le Jourdain à pied sec','Prend Jéricho au son des trompettes']},
  {id:50,name:'Samson',icon:'💪',dates:'v. XIIe siècle av. J.-C.',era:'Époque des Juges',category:'Juge d\'Israël',bio:'Consacré à Dieu dès sa naissance comme naziréen — ce qui lui interdit de couper ses cheveux, source de sa force surnaturelle —, Samson est le juge le plus spectaculaire de la période des Juges. Ses exploits physiques contre les Philistins sont légendaires : il tue mille hommes avec une mâchoire d\'âne, renverse les portes d\'une ville, dévaste les récoltes ennemies. Mais ses faiblesses pour les femmes étrangères, notamment Dalila qui livre le secret de sa force aux Philistins, le mènent à sa perte. Aveuglé et enchaîné, il retrouve ses forces une dernière fois et fait s\'effondrer le temple philistin sur lui-même. Figure tragique de la grâce gaspillée et du repentir final.',keyFacts:['Naziréen consacré à Dieu','Force surhumaine liée à ses cheveux','Trahis par Dalila','S\'effondre avec le temple philistin']},
  {id:51,name:'Samuel',icon:'📯',dates:'v. XIe siècle av. J.-C.',era:'XIe siècle av. J.-C.',category:'Prophète et juge',bio:'Né d\'une mère stérile, Anne, qui l\'avait consacré à Dieu avant sa naissance, Samuel grandit au sanctuaire de Silo auprès du prêtre Éli. Dieu l\'appelle dans la nuit — "Samuel ! Samuel !" — et en fait le dernier des Juges et le premier grand prophète d\'Israël depuis Moïse. Il oint Saül, premier roi d\'Israël, puis David après le rejet de Saül. Juge intègre, il n\'a jamais abusé de son pouvoir — il le rappelle lui-même au peuple à la fin de sa vie. Charnière entre l\'époque des Juges et la monarchie, il incarne la transition vers une nouvelle forme de gouvernance en Israël.',keyFacts:['Dernier des Juges, consacré dès l\'enfance','Appelé par Dieu dans la nuit','Oint les rois Saül et David']},
  {id:52,name:'Joseph (Nouveau Testament)',icon:'🪚',dates:'Ier siècle av. J.-C. – Ier siècle ap. J.-C.',era:'Ier siècle',category:'Figure centrale',bio:'Artisan charpentier de Nazareth, Joseph est un "homme juste" qui découvre la grossesse de Marie avant leur mariage. Prêt à la répudier discrètement pour la protéger, il reçoit en songe l\'instruction de l\'ange : "N\'aie pas peur de prendre Marie pour femme." Il obéit, assume la paternité légale de Jésus, et assure sa protection à travers l\'exil en Égypte pour fuir Hérode. C\'est lui qui transmet à Jésus son métier, son appartenance à la maison de David, sa connaissance de la Torah. Silencieux dans les Évangiles — il n\'y prononce pas une seule parole —, il agit toujours avec promptitude et foi. Patron des travailleurs et de l\'Église universelle.',keyFacts:['Artisan charpentier de Nazareth','Homme juste, époux de Marie','Fuit en Égypte pour protéger Jésus','Silencieux mais obéissant dans les Évangiles']},
  {id:53,name:'Marie-Madeleine',icon:'🏺',dates:'Ier siècle ap. J.-C.',era:'Ier siècle',category:'Apôtre',bio:'Femme de Magdala, Marie-Madeleine suit Jésus dès le début de son ministère après avoir été délivrée de "sept démons". Elle fait partie du cercle des femmes qui accompagnent les Douze, contribuent financièrement à la mission et restent au pied de la croix quand la plupart des apôtres ont fui. Elle est la première à trouver le tombeau vide, la première à voir le Ressuscité — qu\'elle prend d\'abord pour le jardinier —, et la première à annoncer la Résurrection aux apôtres. Cette primauté dans le témoignage pascal lui vaut le titre d\'"apôtre des apôtres", consacré par saint Jean-Paul II.',keyFacts:['Délivrée de sept démons','Présente au pied de la croix','Première témoin de la résurrection','Surnommée "l\'apôtre des apôtres"']},
  {id:54,name:'Jean-Baptiste',icon:'🐪',dates:'v. 5 av. J.-C. – v. 30 ap. J.-C.',era:'Ier siècle',category:'Prophète',bio:'Fils d\'Élisabeth et du prêtre Zacharie, Jean-Baptiste naît six mois avant Jésus, son cousin selon la chair. Dès le ventre maternel, il "tressaille" à la salutation de Marie — première reconnaissance du Christ avant même sa naissance. À l\'âge adulte, il mène une vie ascétique au désert, vêtu de peau de chameau, se nourrissant de sauterelles et de miel sauvage. Il prêche la conversion et baptise dans le Jourdain des foules immenses. Lorsque Jésus se présente pour être baptisé, Jean déclare : "C\'est moi qui ai besoin d\'être baptisé par toi." Emprisonné par Hérode Antipas, il est décapité sur le caprice de Salomé.',keyFacts:['Précurseur du Messie','Vie ascétique dans le désert','Baptise Jésus dans le Jourdain','Décapité par Hérode Antipas']},
  {id:55,name:'Lazare',icon:'🚪',dates:'Ier siècle ap. J.-C.',era:'Ier siècle',category:'Figure centrale',bio:'Lazare de Béthanie est l\'un des personnages les plus intimes de l\'Évangile de Jean : il est explicitement qualifié d\'"ami" de Jésus, avec ses sœurs Marthe et Marie. Tombé gravement malade, il meurt avant l\'arrivée de Jésus. Devant son tombeau, Jésus pleure — le verset le plus court des Évangiles — avant d\'ordonner : "Lazare, viens dehors !" Lazare sort du tombeau, les mains et les pieds liés de bandelettes. Cette résurrection est le plus grand signe accompli par Jésus avant sa propre Pâque, et c\'est elle qui précipite la décision des grands prêtres de le mettre à mort.',keyFacts:['Ami de Jésus, frère de Marthe et Marie','Ressuscité après quatre jours dans le tombeau','Sa résurrection précipite la mort de Jésus']},
  {id:56,name:'Thomas',icon:'👈',dates:'Ier siècle ap. J.-C.',era:'Ier siècle',category:'Apôtre',bio:'Surnommé Didyme ("le jumeau"), Thomas est l\'apôtre qui ose formuler le doute là où les autres se taisent. Absent lors de la première apparition du Ressuscité, il déclare : "Si je ne vois pas la marque des clous dans ses mains... je ne croirai pas." Huit jours plus tard, Jésus lui dit : "Avance ton doigt ici... et ne sois plus incrédule, mais croyant." La réponse de Thomas — "Mon Seigneur et mon Dieu !" — est la confession de foi christologique la plus explicite de tout l\'Évangile de Jean. Selon la tradition, il évangélise l\'Inde où il fonde des communautés chrétiennes.',keyFacts:['Surnommé Didyme','Doute de la résurrection jusqu\'à toucher les plaies','S\'écrie "Mon Seigneur et mon Dieu !"','Aurait évangélisé l\'Inde']},
  {id:57,name:'Matthieu',icon:'🪙',dates:'Ier siècle ap. J.-C.',era:'Ier siècle',category:'Apôtre',bio:'Collecteur d\'impôts au service de Rome — métier honni dans la société juive —, Lévi-Matthieu entend simplement Jésus lui dire "Suis-moi" et quitte tout immédiatement. Il organise un grand festin pour présenter Jésus à ses collègues "pécheurs publics", ce qui lui vaut les critiques des pharisiens. Jésus répond : "Je ne suis pas venu appeler des justes, mais des pécheurs." Devenu apôtre, Matthieu rédige, selon la tradition, le premier Évangile — le plus judaïque des quatre, abondamment nourri de citations de l\'Ancien Testament.',keyFacts:['Collecteur d\'impôts (publicain)','Appelé par Jésus à son bureau de péage','Auteur traditionnel du premier Évangile']},
  {id:58,name:'Luc',icon:'🩺',dates:'Ier siècle ap. J.-C.',era:'Ier siècle',category:'Évangéliste',bio:'Seul auteur non juif du Nouveau Testament, Luc est un médecin grec, compagnon de voyage de Paul lors de ses missions. Son Évangile est le plus littéraire et le plus attentif aux femmes, aux pauvres et aux étrangers. Il est aussi l\'auteur des Actes des Apôtres, qui racontent l\'expansion de l\'Église des origines jusqu\'à l\'arrivée de Paul à Rome. À Luc seul, on doit les récits de l\'Annonciation, de la Visitation, des bergers à Bethléem, du bon Samaritain, du fils prodigue et des disciples d\'Emmaüs.',keyFacts:['Médecin grec, compagnon de Paul','Auteur du troisième Évangile et des Actes des Apôtres','Évangile centré sur la miséricorde, les pauvres et les femmes']},
  {id:59,name:'Marc',icon:'🦁',dates:'Ier siècle ap. J.-C.',era:'Ier siècle',category:'Évangéliste',bio:'Jean-Marc est un Juif de Jérusalem dont la maison est probable lieu de réunion de la communauté primitive. Compagnon de Barnabé et de Paul, puis surtout de Pierre dont il serait l\'interprète à Rome, Marc rédige le plus court et le plus ancien des quatre Évangiles — probablement entre 65 et 70 ap. J.-C. Son récit est nerveux, direct, truffé de détails concrets qui trahissent un témoin oculaire proche. Il insiste sur la puissance des actes de Jésus plutôt que sur ses discours.',keyFacts:['Compagnon de Paul, Barnabé et Pierre','Auteur du plus ancien et plus court Évangile','Récit dynamique centré sur les actes de Jésus']},
  {id:60,name:'Barnabé',icon:'🤝',dates:'Ier siècle ap. J.-C.',era:'Ier siècle',category:'Apôtre et missionnaire',bio:'Lévite originaire de Chypre, Joseph surnommé Barnabas ("fils de l\'encouragement") est l\'un des premiers à vendre ses biens pour les mettre aux pieds des apôtres. C\'est lui qui introduit le nouveau converti Saul de Tarse auprès des apôtres méfiants. Envoyé à Antioche, il va lui-même chercher Paul à Tarse pour l\'y associer. Ensemble, ils réalisent le premier voyage missionnaire en Asie Mineure et à Chypre. Une mésentente sur Jean-Marc les sépare ensuite.',keyFacts:['Surnommé "fils de l\'encouragement"','Introduit Paul auprès des apôtres','Premier compagnon de mission de Paul']},
  {id:61,name:'Étienne',icon:'🪨',dates:'Ier siècle ap. J.-C.',era:'Ier siècle',category:'Premier martyr',bio:'Choisi parmi les sept premiers diacres de l\'Église de Jérusalem pour le service des tables, Étienne se distingue rapidement par "sa grace et sa puissance" dans l\'annonce de l\'Évangile. Accusé de blasphème devant le Sanhédrin, il prononce un long discours retraçant toute l\'histoire du salut avant de déclarer voir "le ciel ouvert et le Fils de l\'homme debout à la droite de Dieu". Traîné hors de Jérusalem, il est lapidé pendant que Saul de Tarse garde les manteaux des bourreaux. Ses dernières paroles font écho à celles de Jésus.',keyFacts:['L\'un des sept premiers diacres','Premier martyr chrétien','Pardonne à ses bourreaux en mourant']},
  {id:62,name:'Nicolas de Myre',icon:'🎁',dates:'v. 270 – v. 343',era:'IVe siècle',category:'Évêque',bio:'Évêque de Myre en Lycie (actuelle Turquie), Nicolas est l\'une des figures les plus populaires de toute l\'histoire chrétienne — paradoxalement, on ne sait presque rien de certain sur sa vie. La tradition lui attribue une générosité extraordinaire : il aurait secrètement offert des dots en or à trois jeunes filles pauvres pour les épargner de la prostitution, jeté les bourses par la fenêtre. Il aurait ressuscité trois enfants découpés en morceaux par un aubergiste. Sa figure a donné naissance au Père Noël.',keyFacts:['Évêque de Myre en Asie Mineure','Réputé pour sa charité secrète','Protecteur des enfants et des marins','A inspiré la figure du Père Noël']},
  {id:63,name:'Cécile de Rome',icon:'🎹',dates:'IIe–IIIe siècle ap. J.-C.',era:'Antiquité',category:'Martyre',bio:'Sainte Cécile est une martyre romaine dont le culte remonte au moins au Ve siècle. La tradition la présente comme une jeune patricienne romaine chrétienne qui convainc son époux Valérien et son beau-frère Tiburce de se convertir — tous trois seront martyrisés. La légende rapporte que lors de son mariage, elle "chantait dans son cœur" pour Dieu — d\'où son patronage de la musique et des musiciens. En 1599, l\'ouverture de son tombeau révéla son corps intact.',keyFacts:['Martyre romaine','A converti son mari Valérien','Patronne des musiciens car elle chantait Dieu dans son cœur']},
  {id:64,name:'Laurent de Rome',icon:'🔥',dates:'v. 225 – 258',era:'IIIe siècle',category:'Diacre et martyr',bio:'Diacre de l\'Église de Rome sous le pape Sixte II, Laurent est responsable de la gestion des biens matériels et de l\'assistance aux pauvres. Arrêté lors de la persécution de l\'empereur Valérien, il se voit ordonner de remettre les trésors de l\'Église. Il se présente avec les pauvres, les malades et les estropiés : "Voici les trésors de l\'Église." Condamné à être brûlé vif sur un gril, la tradition lui prête cette déclaration : "Tu peux me retourner, je suis assez cuit d\'un côté."',keyFacts:['Diacre à Rome sous Sixte II','Présenta les pauvres comme "trésors de l\'Église"','Brûlé vif sur un gril']},
  {id:65,name:'Ambroise de Milan',icon:'📜',dates:'v. 340 – 397',era:'IVe siècle',category:'Docteur de l\'Église',bio:'Gouverneur romain de Ligurie et d\'Émilie, Ambroise est acclamé évêque de Milan par la foule alors qu\'il n\'est pas encore baptisé — il reçoit tous les sacrements en huit jours. Son épiscopat est marqué par une autorité morale exceptionnelle : il impose une pénitence publique à l\'empereur Théodose Ier après le massacre de Thessalonique, inaugurant le principe de la responsabilité des puissants devant l\'Église. Il acheva la conversion d\'Augustin d\'Hippone.',keyFacts:['Acclamé évêque avant même d\'être baptisé','A imposé une pénitence à l\'empereur Théodose','A baptisé saint Augustin']},
  {id:66,name:'Jérôme de Stridon',icon:'🦁',dates:'v. 347 – 420',era:'IVe–Ve siècle',category:'Docteur de l\'Église',bio:'Né en Dalmatie, Jérôme est l\'érudit biblique le plus considérable de l\'Antiquité chrétienne. Maîtrisant le latin, le grec et l\'hébreu, il entreprend à la demande du pape Damase la traduction complète de la Bible en latin — la Vulgate —, qui restera la Bible officielle de l\'Église catholique pendant plus de mille ans. Ascète convaincu, il vit des années dans une grotte à Bethléem entouré d\'une communauté de vierges consacrées.',keyFacts:['A traduit la Bible en latin (la Vulgate)','Erudit maîtrisant le latin, le grec et l\'hébreu','A vécu en ermite à Bethléem']},
  {id:67,name:'Monique',icon:'💧',dates:'331 – 387',era:'IVe siècle',category:'Mère et sainte',bio:'Née à Thagaste en Afrique du Nord, Monique est une femme chrétienne mariée à un homme non croyant. Mais c\'est pour son fils Augustin qu\'elle prie sans relâche pendant des décennies, le suivant à Carthage, à Rome, à Milan, refusant de se décourager malgré ses erreurs. Un évêque lui dit : "Il est impossible que le fils de tant de larmes périsse." Elle assiste à la conversion d\'Augustin et à son baptême par Ambroise en 387.',keyFacts:['Mère de saint Augustin','A prié des années pour la conversion de son fils','Modèle de persévérance dans la prière']},
  {id:68,name:'Athanase d\'Alexandrie',icon:'🛡️',dates:'v. 296 – 373',era:'IVe siècle',category:'Docteur de l\'Église',bio:'Évêque d\'Alexandrie et pilier du concile de Nicée (325), Athanase consacre toute sa vie à défendre la divinité pleine et entière du Christ contre l\'arianisme. Sa résistance lui vaut cinq exils successifs sous quatre empereurs différents — d\'où l\'expression "Athanase contre le monde" (Athanasius contra mundum). Théologien rigoureux, il est aussi le premier à mentionner la liste des 27 livres du canon du Nouveau Testament dans sa lettre de Pâques de 367.',keyFacts:['Défenseur du concile de Nicée contre l\'arianisme','Exilé cinq fois pour sa foi','A dressé la liste des 27 livres du Nouveau Testament']},
  {id:69,name:'Hildegarde de Bingen',icon:'🌿',dates:'1098 – 1179',era:'XIIe siècle',category:'Docteure de l\'Église',bio:'Abbesse bénédictine rhénane, elle reçoit dès l\'enfance des visions lumineuses qu\'elle consigne, sur ordre divin, dans sa trilogie mystique. Mais son génie déborde largement la mystique : elle est aussi musicienne et compositrice, médecin et herboriste, philosophe de la nature, et correspondante active avec les papes, empereurs et saint Bernard. Elle prêche publiquement — chose rarissime pour une femme à son époque.',keyFacts:['Abbesse, mystique et compositrice','Visionnaire aux talents multiples (médecine, botanique)','L\'une des quatre femmes Docteures de l\'Église']}
];

    {id:9,text:"Quel était le nom d'Abraham avant son changement de nom ?",options:["Abner","Abram","Absalom","Abiram"],answer:"Abram",explanation:"Le changement de nom marque une vocation nouvelle dans l'alliance.",reference:"Genèse 17:5",theme:"HISTOIRE",difficulty:"INTERMEDIAIRE"},

    {id:11,text:"Quel patriarche lutte avec un ange et reçoit un nouveau nom ?",options:["Abraham","Isaac","Jacob","Joseph"],answer:"Jacob",explanation:"Cet épisode marque Jacob profondément et accompagne son changement de nom en Israël.",reference:"Genèse 32:28",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:12,text:"Quel fils de Jacob est vendu par ses frères ?",options:["Ruben","Benjamin","Lévi","Joseph"],answer:"Joseph",explanation:"Le récit de Joseph montre comment une injustice devient un moyen de salut dans la providence.",reference:"Genèse 37:28",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:13,text:"Quel prophète conduit l'Exode hors d'Égypte ?",options:["Aaron","Josué","Moïse","Samuel"],answer:"Moïse",explanation:"Moïse est la figure centrale de la libération, de la loi et de l'alliance au Sinaï.",reference:"Exode 14:21",theme:"LOI",difficulty:"DEBUTANT"},
    {id:14,text:"Sur quelle montagne Moïse reçoit-il la Loi ?",options:["Le Carmel","L'Hermon","Le Sinaï","Le Thabor"],answer:"Le Sinaï",explanation:"Le Sinaï est le lieu fondateur de l'alliance mosaïque.",reference:"Exode 19:20",theme:"LOI",difficulty:"DEBUTANT"},
    {id:15,text:"Combien de commandements sont donnés à Moïse ?",options:["7","10","12","40"],answer:"10",explanation:"Le Décalogue résume les exigences majeures envers Dieu et envers le prochain.",reference:"Exode 20:1-17",theme:"LOI",difficulty:"DEBUTANT"},
    {id:16,text:"Quel aliment miraculeux tombe du ciel dans le désert ?",options:["La manne","Du pain ordinaire","Des figues","Des raisins"],answer:"La manne",explanation:"La manne exprime la dépendance quotidienne du peuple envers Dieu.",reference:"Exode 16:15",theme:"LOI",difficulty:"DEBUTANT"},
    {id:17,text:"Quel est le premier roi d'Israël ?",options:["David","Salomon","Saül","Roboam"],answer:"Saül",explanation:"Saül inaugure la royauté d'Israël.",reference:"1 Samuel 10:24",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:18,text:"Quel jeune berger affronte le géant Goliath ?",options:["Jonathan","David","Abner","Éliab"],answer:"David",explanation:"David devient l'image du roi choisi par Dieu malgré une apparence modeste.",reference:"1 Samuel 17:49",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:19,text:"Quel roi construit le premier Temple de Jérusalem ?",options:["David","Salomon","Ézéchias","Josias"],answer:"Salomon",explanation:"Le Temple devient le centre du culte d'Israël pendant des siècles.",reference:"1 Rois 6:1",theme:"HISTOIRE",difficulty:"DEBUTANT"},
    {id:20,text:"Quel psaume commence par 'L'Éternel est mon berger' ?",options:["Psaume 1","Psaume 23","Psaume 91","Psaume 119"],answer:"Psaume 23",explanation:"Le Psaume 23 est l'un des textes les plus connus de toute la Bible.",reference:"Psaume 23:1",theme:"PSAUMES",difficulty:"DEBUTANT"},
    {id:21,text:"Quel prophète est avalé par un grand poisson ?",options:["Amos","Jonas","Nahum","Habacuc"],answer:"Jonas",explanation:"Le récit insiste sur la miséricorde divine.",reference:"Jonas 1:17",theme:"PROPHETES",difficulty:"DEBUTANT"},
    {id:22,text:"Quel prophète affronte les prophètes de Baal au mont Carmel ?",options:["Élisée","Ézéchiel","Élie","Amos"],answer:"Élie",explanation:"L'épisode oppose le Dieu d'Israël à l'idolâtrie.",reference:"1 Rois 18:21",theme:"PROPHETES",difficulty:"DEBUTANT"},
    {id:23,text:"Dans quelle ville Jésus naît-il ?",options:["Nazareth","Jérusalem","Bethléem","Capharnaüm"],answer:"Bethléem",explanation:"Bethléem relie Jésus à la lignée davidique et aux attentes messianiques.",reference:"Luc 2:4-7",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:24,text:"Qui baptise Jésus dans le Jourdain ?",options:["Pierre","Élie","Jean le Baptiste","Zacharie"],answer:"Jean le Baptiste",explanation:"Le baptême marque l'ouverture publique du ministère de Jésus.",reference:"Matthieu 3:13-17",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:25,text:"Combien d'apôtres Jésus choisit-il ?",options:["7","10","12","70"],answer:"12",explanation:"Le nombre douze rappelle les douze tribus d'Israël.",reference:"Matthieu 10:1-4",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:26,text:"Quel disciple trahit Jésus pour trente pièces d'argent ?",options:["Pierre","Thomas","Simon","Judas Iscariote"],answer:"Judas Iscariote",explanation:"La trahison de Judas conduit à l'arrestation de Jésus.",reference:"Matthieu 26:14-16",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:27,text:"Quel gouverneur romain condamne Jésus à mort ?",options:["Hérode Agrippa","Hérode le Grand","Ponce Pilate","Tibère"],answer:"Ponce Pilate",explanation:"Pilate incarne le cadre politique romain de l'exécution de Jésus.",reference:"Matthieu 27:24-26",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:28,text:"Quel miracle Jésus accomplit-il lors des noces de Cana ?",options:["Guérir un aveugle","Changer l'eau en vin","Nourrir 5000 personnes","Ressusciter un mort"],answer:"Changer l'eau en vin",explanation:"Ce fut le premier miracle de Jésus dans l'évangile de Jean.",reference:"Jean 2:1-11",theme:"MIRACLES",difficulty:"DEBUTANT"},
    {id:29,text:"Quel ami de Jésus est ressuscité après quatre jours ?",options:["Pierre","Jean","Lazare","Zachée"],answer:"Lazare",explanation:"Cet épisode anticipe la victoire de Jésus sur la mort.",reference:"Jean 11:38-44",theme:"MIRACLES",difficulty:"DEBUTANT"},
    {id:30,text:"Quel sermon contient les Béatitudes ?",options:["Sermon sur la plaine","Sermon de Capharnaüm","Sermon sur la montagne","Discours du Temple"],answer:"Sermon sur la montagne",explanation:"Ce sermon résume les dimensions majeures de l'éthique du Royaume.",reference:"Matthieu 5:1-12",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:31,text:"Quelle prière Jésus enseigne-t-il à ses disciples ?",options:["Le Psaume 23","Le Magnificat","Le Notre Père","Le Shema"],answer:"Le Notre Père",explanation:"Cette prière est la plus centrale de la liturgie chrétienne.",reference:"Matthieu 6:9-13",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:32,text:"Dans la parabole du fils prodigue, que fit le père en voyant son fils revenir ?",options:["Il l'ignora","Il ferma la porte","Il courut à sa rencontre","Il envoya un serviteur"],answer:"Il courut à sa rencontre",explanation:"Le père courut, tomba sur son cou — image de la grâce divine.",reference:"Luc 15:20",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:33,text:"Dans la parabole du bon Samaritain, qui aide l'homme blessé ?",options:["Un prêtre","Un lévite","Un Samaritain","Un pharisien"],answer:"Un Samaritain",explanation:"Le Samaritain, méprisé des Juifs, est le vrai modèle d'amour du prochain.",reference:"Luc 10:33-34",theme:"PARABOLES",difficulty:"DEBUTANT"},
    {id:34,text:"Quel événement marque la venue de l'Esprit Saint sur les disciples ?",options:["Le baptême de Jésus","La Transfiguration","La Pentecôte","Le repas de Cana"],answer:"La Pentecôte",explanation:"La Pentecôte marque l'élan missionnaire de l'Église naissante.",reference:"Actes 2:1-4",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:35,text:"Quel apôtre s'appelait d'abord Saul ?",options:["Barnabas","Pierre","Paul","Silas"],answer:"Paul",explanation:"Sa conversion en fait la grande figure missionnaire des nations.",reference:"Actes 13:9",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:36,text:"Quelle épître contient le célèbre chapitre 13 sur l'amour ?",options:["Romains","Galates","1 Corinthiens","Éphésiens"],answer:"1 Corinthiens",explanation:"1 Corinthiens 13 présente l'amour comme supérieur à tous les dons.",reference:"1 Corinthiens 13:1",theme:"APOTRES",difficulty:"DEBUTANT"},
    {id:37,text:"Quel livre clôt le Nouveau Testament ?",options:["3 Jean","Jude","Hébreux","L'Apocalypse"],answer:"L'Apocalypse",explanation:"Ce livre emploie un langage symbolique pour parler de jugement et d'espérance finale.",reference:"Apocalypse 1:1",theme:"APOCALYPSE",difficulty:"DEBUTANT"},
    {id:38,text:"Quel nombre est associé à la Bête dans l'Apocalypse ?",options:["444","555","666","777"],answer:"666",explanation:"Le 666 est le 'nombre de la Bête', sujet de nombreuses interprétations.",reference:"Apocalypse 13:18",theme:"APOCALYPSE",difficulty:"INTERMEDIAIRE"},
    {id:39,text:"Quel verset dit 'Dieu a tant aimé le monde qu'il a donné son Fils unique' ?",options:["Jean 1:1","Jean 3:16","Matthieu 28:19","Romains 8:28"],answer:"Jean 3:16",explanation:"Jean 3:16 est considéré comme un résumé de tout l'Évangile.",reference:"Jean 3:16",theme:"VIE_DE_JESUS",difficulty:"DEBUTANT"},
    {id:40,text:"Combien de jours Jonas passa-t-il dans le ventre du poisson ?",options:["1","3","7","40"],answer:"3",explanation:"Jonas passa trois jours dans le ventre du grand poisson — image reprise par Jésus pour sa résurrection.",reference:"Jonas 1:17",theme:"PROPHETES",difficulty:"DEBUTANT"},
    {id:41,text:"Combien de psaumes compte le livre des Psaumes ?",options:["100","120","150","180"],answer:"150",explanation:"Les 150 psaumes forment le plus grand livre poétique de la Bible, utilisés dans la liturgie juive et chrétienne.",reference:"Psaumes 1-150",theme:"PSAUMES",difficulty:"DEBUTANT"},
    {id:42,text:"Quel psaume commence par 'Les cieux racontent la gloire de Dieu' ?",options:["Psaume 8","Psaume 19","Psaume 23","Psaume 46"],answer:"Psaume 19",explanation:"Le Psaume 19 célèbre la révélation de Dieu à travers la création et la Loi.",reference:"Psaume 19:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
    {id:43,text:"Quel psaume dit 'Dieu est notre refuge et notre force' ?",options:["Psaume 23","Psaume 46","Psaume 91","Psaume 100"],answer:"Psaume 46",explanation:"Luther s'inspira du Psaume 46 pour composer 'C'est un rempart que notre Dieu', hymne emblématique de la Réforme.",reference:"Psaume 46:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
    {id:44,text:"À qui est principalement attribué la rédaction des Psaumes ?",options:["Salomon","Moïse","David","Ézéchias"],answer:"David",explanation:"La tradition attribue à David la majorité des psaumes, bien que plusieurs auteurs y aient contribué sur des siècles.",reference:"2 Samuel 23:1",theme:"PSAUMES",difficulty:"DEBUTANT"},
    {id:45,text:"Quel est le grand psaume pénitentiel de David après sa faute avec Bethsabée ?",options:["Psaume 32","Psaume 51","Psaume 69","Psaume 88"],answer:"Psaume 51",explanation:"Le Psaume 51 (Miserere) est le psaume de la contrition par excellence : 'Crée en moi un cœur pur, ô Dieu.'",reference:"Psaume 51:1",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
    {id:46,text:"Quel est le psaume le plus court de la Bible ?",options:["Psaume 100","Psaume 117","Psaume 131","Psaume 133"],answer:"Psaume 117",explanation:"Le Psaume 117 ne contient que 2 versets, mais proclame une louange universelle à Dieu pour toutes les nations.",reference:"Psaume 117:1-2",theme:"PSAUMES",difficulty:"AVANCE"},
    {id:47,text:"Quel psaume prophétise 'Ils ont percé mes mains et mes pieds' et est cité par Jésus depuis la croix ?",options:["Psaume 2","Psaume 16","Psaume 22","Psaume 69"],answer:"Psaume 22",explanation:"Jésus cite le début du Psaume 22 depuis la croix. Ce psaume décrit la souffrance du juste et se termine par la délivrance divine.",reference:"Psaume 22:16",theme:"PSAUMES",difficulty:"AVANCE"},
    {id:48,text:"Quel psaume ouvre tout le psautier avec la béatitude de l'homme qui médite la Loi ?",options:["Psaume 1","Psaume 15","Psaume 37","Psaume 112"],answer:"Psaume 1",explanation:"Le Psaume 1 introduit tout le recueil en opposant la voie du juste (qui médite la Loi) à celle du méchant.",reference:"Psaume 1:1",theme:"PSAUMES",difficulty:"DEBUTANT"},
    {id:49,text:"Combien de versets contient le Psaume 119, le plus long de la Bible ?",options:["120","150","176","200"],answer:"176",explanation:"Le Psaume 119 est un acrostiche alphabétique en hébreu : chaque groupe de 8 versets commence par la même lettre hébraïque.",reference:"Psaume 119",theme:"PSAUMES",difficulty:"INTERMEDIAIRE"},
    {id:50,text:"Dans quel psaume est-il écrit 'Avant que les montagnes fussent nées... tu es Dieu' ?",options:["Psaume 8","Psaume 90","Psaume 95","Psaume 104"],answer:"Psaume 90",explanation:"Le Psaume 90, attribué à Moïse, médite sur l'éternité de Dieu face à la brièveté de la vie humaine.",reference:"Psaume 90:2",theme:"PSAUMES",difficulty:"AVANCE"},
    {id:51,text:"Quelle phrase célèbre ouvre le livre de l'Ecclésiaste ?",options:["'La sagesse surpasse la folie'","'Vanité des vanités, tout est vanité'","'Crains Dieu et observe ses commandements'","'Il n'y a rien de nouveau sous le soleil'"],answer:"'Vanité des vanités, tout est vanité'",explanation:"L'Ecclésiaste interroge le sens de la vie humaine. La conclusion finale : craindre Dieu et garder ses commandements.",reference:"Ecclésiaste 1:2",theme:"SAGESSE",difficulty:"DEBUTANT"},
    {id:52,text:"Quel livre de sagesse met en scène un homme juste qui souffre sans raison apparente ?",options:["Les Proverbes","L'Ecclésiaste","Job","Le Cantique"],answer:"Job",explanation:"Job pose la question de la souffrance du juste. Dieu répond finalement depuis le sein de la tempête, sans justification directe.",reference:"Job 1:1",theme:"SAGESSE",difficulty:"DEBUTANT"},
    {id:53,text:"Quel livre biblique dit 'La crainte de l'Éternel est le commencement de la sagesse' ?",options:["Job","L'Ecclésiaste","Les Proverbes","Le Psautier"],answer:"Les Proverbes",explanation:"Proverbes 1:7 est le principe fondateur de toute la littérature sapientiale biblique.",reference:"Proverbes 1:7",theme:"SAGESSE",difficulty:"DEBUTANT"},
    {id:54,text:"Combien d'amis viennent réconforter Job dans sa souffrance ?",options:["2","3","4","7"],answer:"3",explanation:"Éliphaz, Bildad et Tsophar sont les trois amis de Job. Un quatrième personnage, Élihu, apparaît plus tard.",reference:"Job 2:11",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
    {id:55,text:"Quelle est la conclusion finale du livre de l'Ecclésiaste ?",options:["'La mort est la fin de tout'","'La richesse est la vraie sagesse'","'Crains Dieu et observe ses commandements'","'Le travail donne le bonheur'"],answer:"'Crains Dieu et observe ses commandements'",explanation:"Après toute l'enquête de Qohéleth sur le sens de la vie, la conclusion est que la crainte de Dieu est l'essentiel de l'humanité.",reference:"Ecclésiaste 12:13",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
    {id:56,text:"Quel est le thème central du Cantique des Cantiques ?",options:["La sagesse divine","L'amour humain et conjugal","La souffrance des justes","La vanité des richesses"],answer:"L'amour humain et conjugal",explanation:"Le Cantique est un poème d'amour. La tradition juive et chrétienne y voit aussi l'image de l'amour de Dieu pour son peuple.",reference:"Cantique 1:1",theme:"SAGESSE",difficulty:"DEBUTANT"},
    {id:57,text:"À qui est attribué principalement le livre des Proverbes ?",options:["David","Moïse","Salomon","Ézéchias"],answer:"Salomon",explanation:"La tradition attribue à Salomon la majorité des Proverbes, en lien avec sa réputation de sagesse légendaire.",reference:"Proverbes 1:1",theme:"SAGESSE",difficulty:"DEBUTANT"},
    {id:58,text:"Dans le livre de Job, depuis où Dieu répond-il à Job ?",options:["Le mont Sinaï","Le Temple","Le sein de la tempête","Une vision nocturne"],answer:"Le sein de la tempête",explanation:"La réponse de Dieu ne justifie pas la souffrance — elle révèle la transcendance divine et l'insondabilité de ses voies.",reference:"Job 38:1",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
    {id:59,text:"Quel verset des Proverbes dit 'Un cœur joyeux est un bon remède' ?",options:["Proverbes 3:5","Proverbes 17:22","Proverbes 27:17","Proverbes 31:10"],answer:"Proverbes 17:22",explanation:"Proverbes 17:22 anticipe de 3000 ans la psychoneuroimmunologie : l'état émotionnel affecte directement la santé physique.",reference:"Proverbes 17:22",theme:"SAGESSE",difficulty:"INTERMEDIAIRE"},
    {id:60,text:"Quelle phrase de l'Ecclésiaste est la plus citée hors contexte religieux ?",options:["'Vanité des vanités'","'Il n'y a rien de nouveau sous le soleil'","'Tout a un temps'","'La sagesse vaut mieux que la force'"],answer:"'Il n'y a rien de nouveau sous le soleil'",explanation:"Ecclésiaste 1:9 est probablement la citation biblique la plus utilisée dans des contextes séculiers.",reference:"Ecclésiaste 1:9",theme:"SAGESSE",difficulty:"DEBUTANT"},
    {id:61,text:"Quel prophète reçut sa vocation lors d'une vision des séraphins dans le Temple ?",options:["Jérémie","Ézéchiel","Ésaïe","Daniel"],answer:"Ésaïe",explanation:"La vision d'Ésaïe au chapitre 6 — les séraphins criant 'Saint, saint, saint' — est l'une des théophanies les plus marquantes de la Bible.",reference:"Ésaïe 6:1-8",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:62,text:"Quel prophète fut appelé 'avant de te former dans le ventre maternel' ?",options:["Ésaïe","Jérémie","Amos","Osée"],answer:"Jérémie",explanation:"La vocation de Jérémie est présentée comme prédéterminée avant sa naissance, ce qui fonde l'autorité de sa mission.",reference:"Jérémie 1:5",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:63,text:"Quel chapitre d'Ésaïe décrit le 'Serviteur souffrant' portant les péchés des hommes ?",options:["Ésaïe 7","Ésaïe 40","Ésaïe 53","Ésaïe 61"],answer:"Ésaïe 53",explanation:"Ésaïe 53 est le passage messianique le plus cité dans le Nouveau Testament pour interpréter la mort de Jésus.",reference:"Ésaïe 53:1-12",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},
    {id:64,text:"Quel prophète vit une vision de la 'roue dans la roue' et des créatures à quatre faces ?",options:["Ésaïe","Jérémie","Ézéchiel","Zacharie"],answer:"Ézéchiel",explanation:"Les visions d'Ézéchiel — le char divin (merkavah), la vallée des ossements — sont parmi les plus symboliques de l'AT.",reference:"Ézéchiel 1:15",theme:"PROPHETES",difficulty:"INTERMEDIAIRE"},

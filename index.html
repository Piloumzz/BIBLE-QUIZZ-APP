const SF_CATS={COSMO:'🌌 Cosmologie',HYDRO:'🌊 Hydrologie',GEO:'🪨 Géologie',BIO:'🧬 Biologie',MED:'🏥 Médecine',PHYS:'⚛️ Physique',ECO:'🌿 Écologie',PSY:'🧠 Psychologie',ARCHI:'🏗️ Architecture',PROPHECIE:'📯 Prophéties',INFO:'💻 Informatique',SOC:'👥 Sociologie',PARA:'🦠 Parasitologie',NUTRI:'🍎 Nutrition',GEO2:'🌋 Géophysique',ASTRO:'🔭 Astrophysique'};
const SCIENCE_FOI=[
  {id:1,cat:'COSMO',ref:'Genèse 1:1',title:'L\'univers a un début',body:'Ce verset implique que l\'univers a un début absolu. Pendant des siècles, la science supposait un univers éternel.',science:'En 1927, Georges Lemaître (prêtre) propose la théorie du Big Bang, confirmée par Hubble en 1929.'},
  {id:2,cat:'COSMO',ref:'Ésaïe 40:22',title:'L\'univers en expansion',body:'"Il étend les cieux comme un voile léger." Rédigé vers 700 av. J.-C.',science:'Hubble établit en 1929 que les galaxies s\'éloignent à une vitesse proportionnelle à leur distance.'},
  {id:3,cat:'COSMO',ref:'Job 26:7',title:'La Terre suspendue sur le néant',body:'"Il suspend la terre sur le néant." Toutes les cosmologies antiques posaient la terre sur un support.',science:'La gravitation universelle (Newton, 1687) explique pourquoi la Terre reste en orbite sans support physique.'},
  {id:4,cat:'COSMO',ref:'Ésaïe 40:22',title:'La sphéricité de la Terre',body:'Le terme hébreu ḥug désigne un cercle ou une sphère — 200 ans avant Aristote.',science:'Aristote postule une Terre ronde au IVe s. av. J.-C., preuve physique avec Magellan (1522).'},
  {id:5,cat:'COSMO',ref:'Genèse 15:5',title:'Les étoiles innombrables',body:'"Compte les étoiles, si tu peux les compter." En 2000 av. J.-C., l\'œil nu distingue ~5 000 étoiles.',science:'Les estimations actuelles donnent ~10²⁴ étoiles dans l\'univers observable — plus que les grains de sable sur Terre.'},
  {id:6,cat:'COSMO',ref:'1 Corinthiens 15:41',title:'Chaque étoile est unique',body:'"Une étoile différant d\'une autre en éclat." Écrit au Ier siècle où les étoiles semblaient identiques.',science:'La classification spectrale moderne confirme que chaque étoile a une température, luminosité et composition uniques.'},
  {id:7,cat:'COSMO',ref:'Job 38:31',title:'Les Pléiades liées, Orion dispersée',body:'"Peux-tu lier les liens des Pléiades ou desserrer la ceinture d\'Orion ?"',science:'Les Pléiades sont gravitationnellement liées. Orion est une constellation illusoire, ses étoiles dispersées.'},
  {id:8,cat:'COSMO',ref:'Psaume 102:26',title:'L\'entropie de l\'univers',body:'"Ils s\'useront tous comme un vêtement."',science:'La 2e loi de la thermodynamique (Clausius, 1865) : l\'univers vieillit inexorablement vers la mort thermique.'},
  {id:9,cat:'COSMO',ref:'Job 38:19',title:'La lumière se déplace',body:'"Par quel chemin habite la lumière ?" — implique qu\'elle voyage. Dans l\'Antiquité, la lumière était supposée instantanée.',science:'Ole Rømer mesure la vitesse de la lumière en 1676. Einstein la place au cœur de la relativité en 1905.'},
  {id:10,cat:'COSMO',ref:'Jérémie 33:25',title:'Les constantes physiques',body:'"Les lois du ciel et de la terre" — postule des lois naturelles universelles et fixes.',science:'Le principe anthropique (Carter, 1973) montre que ces constantes sont finement réglées pour permettre la vie.'},
  {id:11,cat:'COSMO',ref:'Genèse 1:3',title:'La lumière avant les étoiles',body:'"Que la lumière soit." La lumière est créée avant le soleil (créé au jour 4).',science:'Les premiers photons libres apparaissent ~380 000 ans après le Big Bang, bien avant les étoiles (~200 millions d\'années).'},
  {id:12,cat:'COSMO',ref:'Psaume 19:6',title:'Le soleil en mouvement',body:'"Sa course va d\'une extrémité du ciel à l\'autre." À l\'époque, on croyait le soleil statique.',science:'Le soleil orbite autour du centre galactique à ~220 km/s, une révolution complète en ~225 millions d\'années.'},
  {id:13,cat:'HYDRO',ref:'Ecclésiaste 1:7',title:'Le cycle de l\'eau',body:'"Tous les fleuves vont à la mer, et la mer n\'est point remplie." Salomon, ~935 av. J.-C.',science:'Le cycle hydrologique complet n\'est décrit scientifiquement qu\'en 1674 par Perrault et Mariotte.'},
  {id:14,cat:'HYDRO',ref:'Ecclésiaste 1:6',title:'La circulation atmosphérique',body:'"Le vent va vers le midi, il tourne vers le nord ; il retourne à ses circuits."',science:'Les cellules de Hadley, Ferrel et polaires forment exactement ces boucles de convection décrites.'},
  {id:15,cat:'HYDRO',ref:'Job 26:8',title:'L\'eau en suspension dans les nuages',body:'"Il enferme les eaux dans ses nuages, sans que la nue se déchire sous leur poids."',science:'Un nuage moyen contient ~500 tonnes d\'eau en suspension grâce à la tension superficielle et aux courants ascendants.'},
  {id:16,cat:'HYDRO',ref:'Psaume 8:8',title:'Les courants marins',body:'"Tout ce qui voyage les sentiers des mers." L\'expression "sentiers des mers" a inspiré Maury.',science:'Matthieu Maury (père de l\'océanographie) cartographia le Gulf Stream en se basant sur ce verset.'},
  {id:17,cat:'HYDRO',ref:'Job 28:25',title:'Le poids de l\'air',body:'"Quand il donnait son poids au vent." L\'air a une masse.',science:'Torricelli invente le baromètre en 1643. L\'atmosphère pèse ~5,15 × 10¹⁸ kg. Job y fait allusion 3 000 ans avant.'},
  {id:18,cat:'GEO',ref:'Job 38:4',title:'La structure interne de la Terre',body:'"Où étais-tu quand j\'ai fondé la terre ?" — implique des "fondements" complexes.',science:'La sismologie révèle une Terre à couches : croûte, manteau, noyau externe liquide, noyau interne solide.'},
  {id:19,cat:'GEO',ref:'Genèse 7:11',title:'Les sources hydrothermales',body:'"Les sources du grand abîme jaillirent toutes."',science:'En 1977, le submersible Alvin découvre les cheminées hydrothermales sous-marines crachant de l\'eau à 400°C.'},
  {id:20,cat:'GEO',ref:'Proverbes 8:29',title:'La tectonique des plaques',body:'"Quand il fixait les bornes à la mer."',science:'La tectonique des plaques (Wegener, 1912) montre des frontières lithosphériques précises — des "bornes" réelles.'},
  {id:21,cat:'BIO',ref:'Genèse 1:24',title:'Le principe de biogenèse',body:'"Que la terre produise des êtres vivants selon leur espèce."',science:'Louis Pasteur formalise en 1859 : la vie vient uniquement de la vie. Les barrières reproductrices maintiennent les espèces.'},
  {id:22,cat:'BIO',ref:'Lévitique 17:11',title:'La vie est dans le sang',body:'"La vie de la chair est dans le sang." — 3 500 ans avant Harvey qui décrit la circulation sanguine (1628).',science:'Le sang transporte O₂, nutriments, hormones, anticorps. Sans circulation, les organes meurent en minutes.'},
  {id:23,cat:'BIO',ref:'Actes 17:26',title:'L\'origine unique de l\'humanité',body:'"Il a fait d\'un seul sang toutes les nations des hommes."',science:'L\'ADN mitochondrial pointe vers une "Ève mitochondriale" africaine il y a ~150 000 ans. 99,9% d\'ADN commun.'},
  {id:24,cat:'BIO',ref:'Genèse 2:7',title:'Nous sommes poussière',body:'"L\'Éternel Dieu forma l\'homme de la poussière de la terre."',science:'Le corps humain est composé des mêmes éléments chimiques (O, C, H, N, Ca, P…) que le sol terrestre.'},
  {id:25,cat:'MED',ref:'Lévitique 13:45-46',title:'La quarantaine médicale',body:'"Le lépreux habitera seul, hors du camp."',science:'En Europe, la quarantaine n\'est appliquée qu\'à partir du XIVe siècle — 2 800 ans après Lévitique.'},
  {id:26,cat:'MED',ref:'Nombres 19:12',title:'Le lavage des mains',body:'"Il se purifiera avec cette eau."',science:'Semmelweis (1847) : le lavage des mains réduit la mortalité puerpérale de 35% à moins de 1%. Prescrit 3 300 ans avant.'},
  {id:27,cat:'MED',ref:'Deutéronome 23:12-13',title:'Enfouissement des déchets',body:'"Tu creuseras un trou." — prévient la contamination des sources d\'eau.',science:'L\'épidémie de choléra de Soho (1854) fut stoppée quand Snow localisa le puits contaminé par des eaux usées.'},
  {id:28,cat:'MED',ref:'Genèse 17:12',title:'Le 8e jour pour la circoncision',body:'"Tout enfant mâle sera circoncis, le huitième jour." — ni le 5e, ni le 10e.',science:'La prothrombine (facteur II de coagulation) atteint son taux maximum de 110% précisément au 8e jour de vie.'},
  {id:29,cat:'MED',ref:'Lévitique 11:7',title:'Le porc, vecteur de maladies',body:'"Le porc est impur pour vous."',science:'Le porc est vecteur de trichinellose, cysticercose, hépatite E. Sans réfrigération (Antiquité), risque maximal.'},
  {id:30,cat:'MED',ref:'Lévitique 11:13-20',title:'Les chauves-souris zoonotiques',body:'"La chauve-souris vous sera en abomination."',science:'Réservoirs de 60+ virus zoonotiques : rage, Ebola, SARS-CoV, COVID-19, Nipah, Marburg.'},
  {id:31,cat:'MED',ref:'Proverbes 17:22',title:'Le lien émotions-immunité',body:'"Un cœur joyeux est un bon remède, mais un esprit abattu dessèche les os."',science:'La psychoneuroimmunologie (Ader, 1980s) confirme le lien direct. Le cortisol chronique détruit le tissu osseux.'},
  {id:32,cat:'PHYS',ref:'Genèse 2:1-2',title:'Conservation de l\'énergie',body:'"Les cieux et la terre furent achevés." — aucune nouvelle matière ou énergie n\'est créée.',science:'1ère loi de la thermodynamique : l\'énergie se conserve, ne se crée ni ne se détruit (Joule, Helmholtz, 1840-1850).'},
  {id:33,cat:'PHYS',ref:'Hébreux 11:3',title:'La matière faite d\'invisible',body:'"Ce qu\'on voit a été fait de choses invisibles."',science:'La matière est composée à 99,9999% de vide et de forces. Le modèle atomique et subatomique le confirme.'},
  {id:34,cat:'ECO',ref:'Lévitique 25:4',title:'La jachère agricole',body:'"La septième année sera un sabbat de repos pour la terre."',science:'L\'INRAE confirme : un sol en jachère récupère 15 à 40% de sa fertilité en un an.'},
  {id:35,cat:'ECO',ref:'Deutéronome 20:19',title:'Protection des arbres fruitiers',body:'"Tu ne détruiras pas les arbres en y portant la hache."',science:'Les arbres fruitiers mettent 5 à 20 ans pour produire. Les détruire crée des famines décennales.'},
  {id:36,cat:'PSY',ref:'Proverbes 23:7',title:'La neuroplasticité',body:'"Tel qu\'il pense en son cœur, tel il est."',science:'Les thérapies cognitivo-comportementales (TCC) reposent exactement sur ce principe : changer les pensées transforme le comportement.'},
  {id:37,cat:'PSY',ref:'Proverbes 12:25',title:'L\'anxiété et le cœur',body:'"L\'inquiétude abat le cœur de l\'homme."',science:'L\'anxiété chronique multiplie par 2 le risque de maladie coronarienne (Framingham Study).'},
  {id:38,cat:'PSY',ref:'Genèse 2:18',title:'La solitude est mortelle',body:'"Il n\'est pas bon que l\'homme soit seul."',science:'Une méta-analyse (Holt-Lunstad, 2015, 3,4 millions) : l\'isolement social augmente la mortalité de 26%. OMS : "épidémie mondiale" en 2023.'},
  {id:39,cat:'ARCHI',ref:'Genèse 6:15',title:'Le design naval de l\'arche',body:'Ratio 300:50:30 coudées (6:1 longueur/largeur).',science:'Des ingénieurs navals coréens (1994) concluent que ce design offre une stabilité optimale contre les vagues de 30m.'},
  {id:40,cat:'PROPHECIE',ref:'Ézéchiel 26:12',title:'La destruction de Tyr',body:'"On jetera tes pierres dans la mer." Prophétisé vers 587 av. J.-C.',science:'En 332 av. J.-C., Alexandre le Grand jeta littéralement les débris dans la mer pour construire une chaussée vers l\'île de Tyr.'},
  {id:41,cat:'PROPHECIE',ref:'Ézéchiel 37:21-22',title:'Le retour d\'Israël',body:'"Je les rassemblerai de toutes parts et je les ramènerai dans leur pays."',science:'En 1948, l\'État d\'Israël est proclamé. Retour d\'un peuple dispersé depuis 2 000 ans — phénomène unique dans l\'histoire.'},
  {id:42,cat:'PROPHECIE',ref:'Matthieu 24:2',title:'La destruction du Temple',body:'"Il ne restera pas ici pierre sur pierre." Prophétie de ~30 ap. J.-C.',science:'En 70 ap. J.-C., Titus détruit le Temple. Les soldats démantèlent les pierres pour récupérer l\'or fondu.'},
  {id:43,cat:'INFO',ref:'Jean 1:1',title:'L\'information comme substrat',body:'"Au commencement était la Parole." — le Logos comme principe organisateur.',science:'Wheeler ("It from Bit", 1989) : l\'information est aussi fondamentale que la matière. Mécanique quantique de l\'information.'},
  {id:44,cat:'INFO',ref:'Daniel 12:4',title:'L\'explosion des connaissances',body:'"Plusieurs courront çà et là, et la science augmentera."',science:'Publications scientifiques : doublement tous les 9 ans. Transport aérien : 4,5 milliards de passagers/an.'},
  {id:45,cat:'SOC',ref:'Proverbes 11:14',title:'La sagesse des foules',body:'"Quand les conseillers sont nombreux, le salut est assuré."',science:'Galton (1907) et Surowiecki (2004) : la moyenne d\'estimations d\'un groupe surpasse l\'expert individuel.'},
  {id:46,cat:'PARA',ref:'Deutéronome 14:21',title:'Les cadavres, vecteurs pathogènes',body:'"Ne mangez pas d\'une bête morte d\'elle-même."',science:'Un animal mort accumule en 24h une charge bactérienne de 10⁸ UFC/g — largement au-dessus du seuil pathogène.'},
  {id:47,cat:'NUTRI',ref:'Genèse 1:29',title:'Les plantes, source principale',body:'"Je vous donne toute herbe qui porte semence."',science:'Les plantes à graines fournissent ~80% des calories humaines mondiales. Tous les acides aminés essentiels y sont présents.'},
  {id:48,cat:'NUTRI',ref:'Lévitique 11:21-22',title:'Les insectes comestibles',body:'"Sauterelles selon leur espèce." — autorisées à la consommation.',science:'~60-70% de protéines/masse sèche vs ~26% pour le poulet. La FAO (2013) recommande les insectes pour 2050.'},
  {id:49,cat:'GEO2',ref:'Job 37:3',title:'La foudre mondiale',body:'"Son éclair jusqu\'aux extrémités de la terre."',science:'~100 éclairs/seconde sur Terre. La résonance de Schumann (7,83 Hz) est une onde causée par les éclairs mondiaux.'},
  {id:50,cat:'ASTRO',ref:'Psaume 8:3',title:'La lune à distance parfaite',body:'"La lune et les étoiles que tu as établies."',science:'La probabilité que la lune ait exactement la taille angulaire du soleil (éclipses parfaites) est ~1/400.'},
  {id:51,cat:'MED',ref:'Lévitique 13:52',title:'Stérilisation thermique',body:'La Bible prescrit de brûler les vêtements infectés par une "lèpre maligne".',science:'La décontamination thermique (autoclave/incinération) est la méthode de référence ISO 15747 pour détruire les agents pathogènes.'},
  {id:52,cat:'MED',ref:'Nombres 8:7',title:'Aspersion et hygiène',body:'La loi mosaïque imposait l\'aspersion d\'eau pour la purification des lévites avant le service.',science:'Le lavage des mains est le premier geste de prévention des infections nosocomiales selon l\'OMS (Clean Care is Safer Care).'},
  {id:53,cat:'PHYS',ref:'Genèse 2:1-2',title:'1ère Loi de la thermodynamique',body:'"Les cieux et la terre furent achevés... Dieu se reposa." Implique qu\'aucune nouvelle matière n\'est créée.',science:'L\'énergie se conserve, elle ne se crée ni ne se détruit (Joule, Helmholtz, 1840). L\'univers est un système fermé.'},
  {id:54,cat:'PHYS',ref:'Ésaïe 51:6',title:'Entropie universelle',body:'"Les cieux se dissoudront comme une fumée, la terre s\'usera comme un vêtement."',science:'La 2e loi de la thermodynamique prédit une dégradation irréversible de l\'énergie (Clausius, 1865) menant à la mort thermique.'},
  {id:55,cat:'PHYS',ref:'Hébreux 11:3',title:'Structure atomique',body:'"Ce qu\'on voit a été fait de choses invisibles."',science:'La matière est composée d\'atomes et de particules subatomiques, constitués à 99,99% de vide et de forces invisibles.'},
  {id:56,cat:'ASTRO',ref:'Job 38:33',title:'Lois cosmiques universelles',body:'"Connais-tu les lois des cieux, et peux-tu établir leur domination sur la terre ?"',science:'Newton et Einstein ont prouvé que des lois physiques identiques (gravitation) régissent la Terre et les astres lointains.'},
  {id:57,cat:'PHYS',ref:'Ésaïe 40:12',title:'Métrologie précise',body:'Décrit la quantification des masses naturelles (peser les montagnes, mesurer les eaux).',science:'La métrologie est le fondement de la science. La Terre pèse 5,972 × 10²⁴ kg, une mesure exacte de ses "fondements".'},
  {id:58,cat:'ECO',ref:'Lévitique 25:11-12',title:'Régénération décennale',body:'Le jubilé (repos tous les 50 ans) permet une restauration profonde de la terre.',science:'La pédologie confirme que les cycles longs permettent la reconstitution des horizons fertiles et de la biodiversité microbienne.'},
  {id:59,cat:'ECO',ref:'Deutéronome 22:6',title:'Prélèvement durable',body:'Interdiction de prendre la mère avec les petits lors d\'un prélèvement en nature.',science:'C\'est le fondement de la biologie de la conservation (Soulé, 1985) pour garantir la pérennité des populations reproductrices.'},
  {id:60,cat:'PHYS',ref:'Psaume 102:26',title:'Vieillissement cosmique',body:'"Ils s\'useront tous comme un vêtement."',science:'Le modèle du Big Chill (ou mort thermique) prévoit que l\'univers s\'obscurcit et se refroidit par augmentation de l\'entropie.'},
  {id:61,cat:'COSMO',ref:'Ésaïe 34:4',title:'Courbure de l\'espace-temps',body:'"Les cieux se rouleront comme un parchemin."',science:'La relativité générale d\'Einstein (1915) décrit l\'espace-temps comme une structure géométrique déformable et pliable.'},
  {id:62,cat:'ASTRO',ref:'Psaume 147:4',title:'Identité stellaire',body:'"Il compte les étoiles, il les appelle toutes par leurs noms."',science:'La spectroscopie permet de classifier chaque étoile par une signature chimique unique, son "empreinte spectrale".'},
  {id:63,cat:'HYDRO',ref:'Job 36:27-28',title:'Distillation de la pluie',body:'"Il attire à lui les gouttes d\'eau, qui se distillent en pluie par sa vapeur."',science:'Description précise de l\'évaporation et de la condensation sur les noyaux de condensation atmosphériques.'},
  {id:64,cat:'HYDRO',ref:'Psaume 135:7',title:'Convection tropicale',body:'"Il fait monter les nuages des extrémités de la terre."',science:'Les cellules de convection (Hadley) exportent la chaleur et l\'humidité des tropiques vers les pôles.'},
  {id:65,cat:'HYDRO',ref:'Ecclésiaste 11:3',title:'Saturation des nuages',body:'"Quand les nuages sont pleins de pluie, ils la répandent sur la terre."',science:'La physique des nuages confirme que la précipitation se déclenche dès que les gouttelettes atteignent un seuil de saturation.'},
  {id:66,cat:'GEO',ref:'Psaume 104:8',title:'Orogenèse active',body:'"Les montagnes s\'élevaient, les vallées s\'abaissaient."',science:'La tectonique confirme que des chaînes (Himalaya) sont en élévation active (+5mm/an) tandis que des rifts s\'approfondissent.'},
  {id:67,cat:'GEO',ref:'Psaume 104:5-6',title:'Océan global primitif',body:'"Tu la couvrais de l\'abîme comme d\'un vêtement."',science:'Les zircons de Jack Hills confirment qu\'un océan global couvrait la Terre dès -4,4 milliards d\'années (Hadéen).'},
  {id:68,cat:'GEO',ref:'Psaume 46:2',title:'Volcanisme sous-marin',body:'"Quand les montagnes seraient ébranlées au cœur de la mer."',science:'Les dorsales médio-océaniques sont des chaînes de montagnes actives générant 75% de la production volcanique mondiale.'},
  {id:69,cat:'BIO',ref:'Job 14:7-9',title:'Totipotence végétale',body:'"S\'il est coupé, il repoussera encore... à l\'approche de l\'eau il germe."',science:'La totipotence permet à une cellule végétale de régénérer l\'organisme entier, base de la culture in vitro moderne.'},
  {id:70,cat:'BIO',ref:'Psaume 104:14',title:'Phytochimie médicinale',body:'"Il fait germer... les plantes pour les besoins des hommes."',science:'La pharmacologie moderne repose sur les métabolites secondaires des plantes (vitamines, alcaloïdes, acides essentiels).'},
  {id:71,cat:'MED',ref:'Lévitique 14:8',title:'Décontamination vectorielle',body:'Le rasage et le lavage complet étaient requis pour les malades.',science:'Le rasage élimine les niches des poux et puces, vecteurs historiques du typhus et de la peste.'},
  {id:72,cat:'MED',ref:'Nombres 31:22',title:'Stérilisation des métaux',body:'"L\'or, l\'argent, le fer... vous les ferez passer par le feu."',science:'L\'incinération et la chaleur (autoclave à 134°C) restent la norme de stérilisation chirurgicale de l\'OMS.'},
  {id:73,cat:'NUTRI',ref:'Ézéchiel 4:9',title:'Complémentation protéique',body:'Mélange de froment, orge, fèves, lentilles et millet.',science:'Le ratio céréales/légumineuses fournit un profil d\'acides aminés complet, fondement de la nutrition végétale moderne.'},
  {id:74,cat:'MED',ref:'Lévitique 19:28',title:'Risques de la scarification',body:'"Vous ne ferez point d\'incisions dans votre chair."',science:'Les incisions cutanées rituelles augmentent drastiquement les risques de transmission d\'hépatites et de staphylocoques.'},
  {id:75,cat:'MED',ref:'Lévitique 18',title:'Génétique des populations',body:'Interdictions strictes des unions consanguines.',science:'La consanguinité augmente l\'homozygotie des gènes récessifs délétères (Wright, 1921), doublant les risques de maladies graves.'},
  {id:76,cat:'PARA',ref:'Psaume 91:6',title:'Vecteurs nocturnes',body:'"La peste qui marche dans les ténèbres."',science:'De nombreux vecteurs pathogènes (Anopheles pour le paludisme) ont une activité strictement nocturne.'},
  {id:77,cat:'PHYS',ref:'Apocalypse 21:1',title:'Transitions de phase',body:'"Je vis un nouveau ciel et une nouvelle terre, car le premier avait disparu."',science:'La cosmologie quantique étudie le "vacuum decay", une transition de phase où l\'univers change d\'état énergétique.'},
  {id:78,cat:'PHYS',ref:'Job 28:26',title:'Électrostatique atmosphérique',body:'"Il donnait une voie à l\'éclair."',science:'L\'éclair suit le chemin de moindre résistance électrique (streamers), déterminé par les lois de l\'électrostatique.'},
  {id:79,cat:'HYDRO',ref:'Genèse 1:6-7',title:'Structure de l\'atmosphère',body:'L\'étendue sépare les eaux d\'en bas des eaux d\'en haut.',science:'La tropopause sépare physiquement la troposphère (nuages) de la stratosphère, organisant le cycle hydrique.'},
  {id:80,cat:'PHYS',ref:'Job 37:10',title:'Refroidissement par convection',body:'"Par le souffle de Dieu le gel se forme."',science:'Le gel résulte du retrait d\'enthalpie de fusion par convection forcée (vent froid).'},
  {id:81,cat:'PSY',ref:'Proverbes 15:30',title:'Biochimie du regard',body:'"Un regard brillant réjouit le cœur."',science:'Le contact visuel bienveillant déclenche la libération d\'ocytocine et active le système de récompense (striatum ventral).'},
  {id:82,cat:'SOC',ref:'Ecclésiaste 4:9',title:'Intelligence collaborative',body:'"Deux valent mieux qu\'un."',science:'Le "réseau de mémoire transactive" prouve que les paires résolvent les problèmes complexes 19% plus vite que les individus.'},
  {id:83,cat:'GEO',ref:'Jonas 2:6',title:'Racines isostatiques',body:'"Je suis descendu jusqu\'aux racines des montagnes."',science:'Le principe d\'isostasie (Airy, 1855) prouve que les montagnes possèdent des racines crustales plongeant jusqu\'à 80 km.'},
  {id:84,cat:'GEO',ref:'Psaume 104:32',title:'Sismicité induite',body:'"Il regarde la terre et elle tremble."',science:'Les marées terrestres et les variations de charge gravitationnelle influencent la contrainte sur les failles sismiques.'},
  {id:85,cat:'NUTRI',ref:'Proverbes 25:16',title:'Régulation du glucose',body:'Conseille de manger le miel avec modération.',science:'L\'excès de fructose/glucose induit une résistance à l\'insuline. L\'OMS recommande moins de 25g de sucres libres/jour.'},
  {id:86,cat:'MED',ref:'1 Timothée 5:23',title:'Antioxydants du vin',body:'"Use d\'un peu de vin à cause de ton estomac."',science:'Les polyphénols (resvératrol) ont des propriétés anti-inflammatoires et cardioprotectrices documentées (PREDIMED).'},
  {id:87,cat:'SOC',ref:'Genèse 11:6',title:'Effet de réseau',body:'"Ils forment un seul peuple et ont tous la même langue."',science:'La loi de Metcalfe formalise que la valeur d\'un réseau augmente exponentiellement avec le nombre de membres connectés.'},
  {id:88,cat:'INFO',ref:'Apocalypse 20:12',title:'Immuabilité des données',body:'"Des livres furent ouverts... jugés d\'après ce qui était écrit."',science:'Préfigure le concept de ledger (registre immuable), fondement de la blockchain et de l\'audit numérique.'},
  {id:89,cat:'PHYS',ref:'Ésaïe 40:26',title:'Nucléosynthèse stellaire',body:'"Qui a créé ces astres ? Il fait sortir leur armée."',science:'Les étoiles naissent par effondrement gravitationnel dans des nurseries stellaires, processus observé par le télescope James Webb.'},
  {id:90,cat:'MED',ref:'1 Corinthiens 6:19',title:'Hygiène de vie religieuse',body:'"Votre corps est le temple du Saint-Esprit."',science:'Les études sur les Blue Zones montrent que les groupes appliquant cette éthique gagnent 7 à 10 ans d\'espérance de vie.'},
  {id:91,cat:'GEO2',ref:'Job 37:3',title:'Résonance de Schumann',body:'"Son éclair jusqu\'aux extrémités de la terre."',science:'Les éclairs mondiaux (100/sec) génèrent une onde électromagnétique globale de 7,83 Hz entre le sol et l\'ionosphère.'},
  {id:92,cat:'PARA',ref:'Lévitique 11:33',title:'Désinfection des surfaces',body:'Purification stricte des ustensiles après contact impur.',science:'La microbiologie environnementale confirme que les surfaces maintiennent des charges pathogènes viables jusqu\'à 72h.'},
  {id:93,cat:'GEO',ref:'Psaume 104:6-7',title:'Cycles eustatiques',body:'"Tu les [les eaux] réprimas et elles s\'enfuirent."',science:'Décrit les régressions marines liées aux cycles glaciaires, faisant varier le niveau des mers de plus de 100m.'},
  {id:94,cat:'GEO',ref:'Michée 1:4',title:'Rifting lithosphérique',body:'"Les montagnes fondront... les vallées se fendraient."',science:'Le magma (fusion des roches) et le rifting (déchirure lithosphérique) sont les moteurs de la dérive des continents.'},
  {id:95,cat:'BIO',ref:'Genèse 1:20-21',title:'Origine aquatique',body:'"Les eaux produisirent en abondance des êtres vivants."',science:'La vie a émergé en milieu aqueux il y a ~3,8 milliards d\'années (LUCA). L\'eau est le solvant biologique indispensable.'},
  {id:96,cat:'BIO',ref:'Genèse 1:31',title:'Rationalité de la nature',body:'"Dieu vit tout ce qu\'il avait fait : c\'était très bon."',science:'Le présupposé que la nature est ordonnée et compréhensible est le fondement axiomatique de la science moderne.'},
  {id:97,cat:'PSY',ref:'Proverbes 29:25',title:'Biais de conformité',body:'"La crainte des hommes tend un piège."',science:'L\'expérience d\'Asch (1951) démontre que 75% des individus sacrifient leur jugement par peur de la désapprobation sociale.'},
  {id:98,cat:'ASTRO',ref:'Amos 5:8',title:'Rotation de Foucault',body:'"Il change l\'obscurité en aurore."',science:'La rotation terrestre (gyroscopes de Foucault, 1851) est le mécanisme exact de la transition jour/nuit.'},
  {id:99,cat:'GEO',ref:'Job 38:16',title:'Sources abyssales',body:'"As-tu pénétré jusqu\'aux sources de la mer ?" (Question posée à Job)',science:'Les sources hydrothermales, situées à des milliers de mètres de profondeur, ne furent découvertes qu\'en 1977.'},
  {id:100,cat:'MED',ref:'Psaume 32:3',title:'Stress et psychosomatique',body:'"Tant que je me suis tu, mes os se consumaient."',science:'L\'inhibition des émotions augmente le cortisol, provoquant une déminéralisation osseuse réelle (ostéoporose de stress).'},
  {id:101,cat:'COSMO',ref:'Apocalypse 6:14',title:'Relativité de la géométrie',body:'"Le ciel se retira comme un livre qu\'on roule."',science:'L\'espace-temps n\'est pas un cadre rigide mais une structure déformable et pliable selon Einstein.'},
  {id:102,cat:'PHYS',ref:'Job 38:19',title:'Trajectoire de la lumière',body:'"Par quel chemin habite la lumière ?" Implique un mouvement.',science:'La lumière voyage à 299 792 km/s. Dans l\'Antiquité, elle était perçue comme un état instantané.'},
  {id:103,cat:'MED',ref:'Lévitique 15:13',title:'Lavage à l\'eau courante',body:'La Bible spécifie de se laver dans de l\'eau "vive" (courante).',science:'L\'eau stagnante concentre les bactéries, tandis que l\'eau courante évacue les agents pathogènes par action mécanique.'},
  {id:104,cat:'ASTRO',ref:'Job 38:32',title:'Précession des équinoxes',body:'"Feras-tu paraître Mazzaroth (constellations) en son temps ?"',science:'Le cycle de 26 000 ans fait apparaître les constellations à des époques différentes du calendrier sidéral.'},
  {id:105,cat:'BIO',ref:'Genèse 2:24',title:'Épidémiologie du couple',body:'"L\'homme s\'attachera à sa femme."',science:'La fidélité monogame reste le facteur de protection statistique le plus puissant contre la propagation des IST.'},
  {id:106,cat:'ECO',ref:'Deutéronome 20:19',title:'Sécurité alimentaire',body:'Interdiction de détruire les arbres fruitiers lors d\'un siège.',science:'Les arbres fruitiers mettent 5 à 20 ans pour produire. Leur destruction condamne les générations futures à la famine.'},
  {id:107,cat:'COSMO',ref:'Job 38:7',title:'Acoustique stellaire',body:'"Quand les étoiles du matin éclataient en chants de joie."',science:'L\'astérosismologie étudie les ondes sonores internes des étoiles qui les font littéralement vibrer.'},
  {id:108,cat:'GEO',ref:'Job 28:5',title:'Chaleur géothermique',body:'"La terre... est bouleversée dans ses entrailles comme par le feu."',science:'Le gradient géothermique augmente de 30°C/km. Le noyau terrestre atteint 6000°C.'},
  {id:109,cat:'PHYS',ref:'Psaume 19:6',title:'Héliocentrisme galactique',body:'"Sa course va d\'une extrémité du ciel à l\'autre."',science:'Le soleil n\'est pas fixe ; il orbite autour du centre de la Voie Lactée à 220 km/s.'},
  {id:110,cat:'BIO',ref:'Job 10:10',title:'Coagulation embryonnaire',body:'"Tu m\'as fait cailler comme du fromage."',science:'Décrit la phase de gastrulation où le zygote liquide s\'organise en couches tissulaires solides.'},
  {id:111,cat:'MED',ref:'Proverbes 17:22',title:'Psychoneuroimmunologie',body:'"Un esprit abattu dessèche les os."',science:'Le stress chronique libère du cortisol qui inhibe les ostéoblastes, provoquant une perte de densité osseuse.'},
  {id:112,cat:'COSMO',ref:'Genèse 1:14',title:'Zeitgeber circadien',body:'"Des luminaires... pour séparer le jour d\'avec la nuit."',science:'La lumière synchronise notre horloge biologique (noyau suprachiasmatique) via la mélanopsine rétinienne.'},
  {id:113,cat:'INFO',ref:'Daniel 12:4',title:'Explosion de l\'information',body:'"Plusieurs courront çà et là, et la science augmentera."',science:'Les publications scientifiques doublent tous les 9 ans. La mobilité humaine a atteint 4,5 milliards de passagers/an.'},
  {id:114,cat:'PHYS',ref:'Hébreux 1:11',title:'Loi de conservation',body:'"Ils s\'useront tous comme un vêtement."',science:'Le principe de conservation de l\'énergie et l\'augmentation de l\'entropie définissent la fin de l\'univers.'},
  {id:115,cat:'BIO',ref:'Actes 17:26',title:'Unicité de l\'espèce',body:'"Il a fait d\'un seul sang toutes les nations."',science:'La génétique prouve que l\'humanité partage 99,9% de son ADN et descend d\'une lignée unique (Ève mitochondriale).'},
  {id:116,cat:'ECO',ref:'Lévitique 25:4',title:'Restauration des nutriments',body:'"La septième année sera un sabbat de repos pour la terre."',science:'La mise en jachère permet aux bactéries de fixer l\'azote et de restaurer la fertilité naturelle du sol.'},
  {id:117,cat:'COSMO',ref:'Jérémie 31:37',title:'Horizon cosmologique',body:'"Si les cieux peuvent être mesurés... je rejetterai Israël."',science:'L\'univers observable est limité par l\'horizon cosmologique, rendant l\'univers total "immesurable" par définition.'},
  {id:118,cat:'GEO',ref:'Job 28:25',title:'Masse de l\'atmosphère',body:'"Il donnait son poids au vent."',science:'Torricelli a prouvé en 1643 que l\'air possède une masse. L\'atmosphère pèse 5,15 × 10¹⁸ kg.'},
  {id:119,cat:'MED',ref:'Genèse 17:12',title:'Pic de prothrombine',body:'Circoncision au 8ème jour de vie.',science:'Le taux de coagulation atteint son maximum biologique (110%) précisément au 8ème jour de vie.'},
  {id:120,cat:'COSMO',ref:'Job 26:7',title:'Absence de support cosmique',body:'"Il suspend la terre sur le néant."',science:'Contrairement aux mythes antiques (tortue, piliers), la Terre flotte dans le vide, maintenue par la gravitation.'},
  {id:121,cat:'HYDRO',ref:'Ecclésiaste 1:7',title:'Équilibre évaporatif',body:'"Les fleuves vont à la mer, et la mer n\'est point remplie."',science:'L\'évaporation océanique compense exactement l\'apport des fleuves, maintenant le niveau stable.'},
  {id:122,cat:'PHYS',ref:'Hébreux 11:3',title:'Invisible subatomique',body:'"Le visible a été fait de l\'invisible."',science:'Les atomes sont constitués de particules et d\'ondes qui n\'ont pas de réalité matérielle au sens classique.'},
  {id:123,cat:'SOC',ref:'Proverbes 11:14',title:'Sagesse des foules',body:'"Le salut est dans le grand nombre de conseillers."',science:'Le crowdsourcing et l\'intelligence collective surpassent souvent l\'expertise individuelle isolée.'},
  {id:124,cat:'MED',ref:'Lévitique 11:7',title:'Vecteurs de parasitose',body:'Interdiction du porc en climat chaud.',science:'Sans réfrigération, le porc transmet trichinellose et cysticercose, risques majeurs en zone aride.'},
  {id:125,cat:'BIO',ref:'Genèse 1:24',title:'Biogenèse',body:'"Que la terre produise... selon leur espèce."',science:'Louis Pasteur (1859) réfute la génération spontanée : la vie ne provient que de la vie.'},
  {id:126,cat:'ASTRO',ref:'1 Corinthiens 15:41',title:'Diversité spectrale',body:'"Chaque étoile diffère d\'une autre en éclat."',science:'La classification moderne confirme que chaque étoile a une température et une luminosité uniques.'},
  {id:127,cat:'GEO',ref:'Proverbes 8:29',title:'Bornes tectoniques',body:'"Il fixait les bornes à la mer."',science:'Les plaques lithosphériques forment des frontières rigides et stables à l\'échelle géologique.'},
  {id:128,cat:'HYDRO',ref:'Ecclésiaste 1:6',title:'Circulation atmosphérique',body:'"Le vent retourne à ses circuits."',science:'Décrit les cellules de Hadley et de Ferrel qui forment des boucles de vent bouclées autour du globe.'},
  {id:129,cat:'COSMO',ref:'Job 38:31',title:'Liaison gravitationnelle',body:'"Peux-tu lier les liens des Pléiades ?"',science:'Les Pléiades sont un amas ouvert physiquement lié par la gravité, contrairement à Orion.'},
  {id:130,cat:'MED',ref:'Deutéronome 23:12',title:'Enfouissement sanitaire',body:'Obligation d\'enterrer les déchets hors du camp.',science:'Prévention du choléra et de la dysenterie par blocage de la contamination des nappes phréatiques.'},
  {id:131,cat:'BIO',ref:'Lévitique 17:11',title:'Fonction hématologique',body:'"La vie de la chair est dans le sang."',science:'Le sang est le vecteur vital transportant l\'oxygène et les nutriments à chaque cellule.'},
  {id:132,cat:'PHYS',ref:'Job 38:35',title:'Télécommunication électromagnétique',body:'"L\'éclair partira-t-il pour dire : Me voici ?"',science:'La lumière et la radio sont des ondes électromagnétiques transportant de l\'information.'},
  {id:133,cat:'SOC',ref:'Proverbes 23:7',title:'Neuroplasticité cognitive',body:'"Tel il pense... tel il est."',science:'Les pensées répétées modifient les connexions synaptiques (Loi de Hebb).'},
  {id:134,cat:'PARA',ref:'Lévitique 11:13',title:'Zoonoses aviaires',body:'Interdiction de consommer certains oiseaux et chauves-souris.',science:'Les chauves-souris sont des réservoirs de plus de 60 virus (Ebola, SRAS, COVID).'},
  {id:135,cat:'GEO',ref:'Genèse 7:11',title:'Hydrothermalisme abyssal',body:'"Les sources du grand abîme jaillirent."',science:'Découverte en 1977 des cheminées hydrothermales émettant de l\'eau minéralisée sous haute pression.'},
  {id:136,cat:'NUTRI',ref:'Genèse 1:29',title:'Base de la chaîne alimentaire',body:'"Je vous donne toute herbe portant semence."',science:'Les végétaux à graines fournissent 80% des calories humaines et tous les nutriments essentiels.'},
  {id:137,cat:'PSY',ref:'Proverbes 14:30',title:'Somatisation osseuse',body:'"La jalousie est la pourriture des os."',science:'Le stress émotionnel active les ostéoclastes qui détruisent la trame osseuse.'},
  {id:138,cat:'ASTRO',ref:'Job 38:12',title:'Rotation planétaire',body:'"As-tu commandé au matin... pour qu\'il saisisse les extrémités ?"',science:'La rotation de la Terre expose progressivement chaque zone à la lumière solaire.'},
  {id:139,cat:'COSMO',ref:'Psaume 19:4',title:'Propagation universelle',body:'"Leur voix retentit par toute la terre."',science:'La vitesse de la lumière permet une communication quasi instantanée sur toute la sphère terrestre.'},
  {id:140,cat:'MED',ref:'Lévitique 13:4',title:'Incubation infectieuse',body:'Quarantaine de 7 jours pour diagnostic.',science:'Correspond aux périodes d\'incubation de la variole, de la rougeole et de la typhoïde.'},
  {id:141,cat:'PHYS',ref:'Genèse 1:3',title:'Photons primitifs',body:'Lumière créée avant les étoiles.',science:'Le fond diffus cosmologique (photons) est apparu bien avant les premières étoiles.'},
  {id:142,cat:'SOC',ref:'Genèse 11:1',title:'Monolinguisme originel',body:'"Toute la terre avait une seule langue."',science:'L\'hypothèse du "Proto-World" suggère une langue ancestrale unique pour toute l\'humanité.'},
  {id:143,cat:'GEO',ref:'Job 38:22',title:'Cryosphère et stockage',body:'"As-tu vu les réservoirs de neige ?"',science:'Les calottes glaciaires stockent 69% de l\'eau douce mondiale, régulant le climat.'},
  {id:144,cat:'PHYS',ref:'Ésaïe 40:22',title:'Expansion de l\'espace',body:'"Il étend les cieux comme un voile."',science:'L\'univers est en expansion active (Loi de Hubble), l\'espace-temps s\'étire continuellement.'},
  {id:145,cat:'BIO',ref:'Genèse 2:7',title:'Composition chimique',body:'"Formé de la poussière de la terre."',science:'Le corps humain est composé des mêmes éléments (O, C, H, N, Ca) que la croûte terrestre.'},
  {id:146,cat:'MED',ref:'Proverbes 12:25',title:'Anxiété cardiaque',body:'"L\'inquiétude abat le cœur de l\'homme."',science:'Le stress chronique double les risques de maladies coronariennes par libération de cortisol.'},
  {id:147,cat:'ASTRO',ref:'Job 38:31',title:'Dispersion d\'Orion',body:'"Peux-tu desserrer les liens d\'Orion ?"',science:'Les étoiles d\'Orion ne sont pas liées et s\'éloignent les unes des autres, contrairement aux Pléiades.'},
  {id:148,cat:'COSMO',ref:'Jérémie 33:25',title:'Constantes physiques',body:'"Les lois fixes du ciel et de la terre."',science:'L\'univers repose sur des constantes immuables (vitesse de la lumière, constante de Planck).'},
  {id:149,cat:'HYDRO',ref:'Psaume 8:8',title:'Courants océaniques',body:'"Les sentiers des mers."',science:'Inspiration de M. Maury pour cartographier le Gulf Stream et fonder l\'océanographie.'},
  {id:150,cat:'MED',ref:'Lévitique 13:46',title:'Isolement social médical',body:'"Le lépreux habitera seul."',science:'La quarantaine est le seul moyen de stopper les épidémies en l\'absence de vaccins.'},
  {id:151,cat:'PHYS',ref:'Ésaïe 55:10',title:'Phases du cycle de l\'eau',body:'Pluie et neige ne retournent pas sans avoir arrosé.',science:'Distingue clairement la précipitation de l\'évaporation dans le cycle hydrologique.'},

  {id:45,section:"EVANGILES",title:"La résurrection de Lazare — Je suis la résurrection",reference:"Jean 11:17-44",theme:"MIRACLES",passage:"Jésus lui dit : 'Je suis la résurrection et la vie. Celui qui croit en moi vivra, même s'il meurt ; et quiconque vit et croit en moi ne mourra jamais. Crois-tu cela ?' Elle lui dit : 'Oui, Seigneur, je crois que tu es le Christ, le Fils de Dieu, qui devait venir dans le monde.'",context:"Lazare est mort depuis quatre jours — 'il sent déjà' (v.39). Le délai de Jésus (il attend deux jours après avoir appris la maladie) a laissé les sœurs désemparées. La scène au tombeau est l'une des plus humaines des Évangiles : Jésus pleure (v.35). Puis il commande : 'Lazare, viens dehors !' Ce miracle déclenche la décision du Sanhédrin de le mettre à mort.",keyPoints:["'Jésus pleura' (Jean 11:35) — le verset le plus court de la Bible, révélant l'humanité totale de Jésus","La confession de Marthe ('tu es le Christ, le Fils de Dieu') est le climax théologique du chapitre","La résurrection de Lazare est un signe : elle pointe vers la résurrection de Jésus lui-même","Ironie dramatique : c'est ce miracle qui déclenche la mort de Jésus"],theology:"Jean structure son évangile autour de sept signes (sèmeia). La résurrection de Lazare est le septième et culminant. Elle provoque à la fois la foi (v.45) et le complot (v.53). Paul développera la théologie de la résurrection (1 Cor 15) à partir de la réalité de la résurrection de Jésus. 'Je suis la résurrection' renforce tous les 'Je suis' johanniques.",crossRefs:["1 Corinthiens 15:21","Romains 6:4-5","Ézéchiel 37:12","Jean 5:25"]},
  {id:46,section:"EVANGILES",title:"La Cène — institution de l'Eucharistie",reference:"Luc 22:14-20",theme:"VIE_DE_JESUS",passage:"Quand l'heure fut venue, il se mit à table, et les apôtres avec lui. Il leur dit : 'J'ai désiré d'un grand désir manger cette Pâque avec vous avant de souffrir.' Il prit du pain ; après avoir rendu grâces, il le rompit et le leur donna, en disant : 'Ceci est mon corps qui est donné pour vous ; faites cela en mémoire de moi.'",context:"La Cène a lieu au soir du Jeudi Saint, lors du repas pascal. Jésus réinterprète les symboles de la Pâque : le pain = son corps, le vin = son sang de la nouvelle alliance. 'En mémoire de moi' (anamnésis) ne signifie pas un simple souvenir intellectuel mais une réactualisation liturgique. Judas est présent au début du repas.",keyPoints:["'J'ai désiré d'un grand désir' — désir ardent de Jésus de partager ce repas avant sa mort","La Pâque ancienne est accomplie et dépassée — le Christ est l'agneau pascal","'Nouvelle alliance en mon sang' — citation directe de Jérémie 31:31","'En mémoire de moi' — l'Eucharistie est la réactualisation du sacrifice une fois pour toutes"],theology:"Ce texte est au cœur des débats entre catholiques, luthériens, réformés et évangéliques sur la nature de la présence du Christ dans l'Eucharistie. Paul (1 Cor 11:23-26) transmet le même récit 'de la part du Seigneur'. La Didachè (Ier s.) et Justin Martyr (IIe s.) témoignent de la pratique eucharistique hebdomadaire. Toute la théologie sacramentelle chrétienne part d'ici.",crossRefs:["1 Corinthiens 11:23-26","Jérémie 31:31","Exode 12:14","Jean 6:51"]},
  {id:47,section:"EVANGILES",title:"Gethsémani — l'heure de l'agonie",reference:"Marc 14:32-42",theme:"VIE_DE_JESUS",passage:"Il dit à ses disciples : 'Asseyez-vous ici, pendant que je prierai.' Il prit avec lui Pierre, Jacques et Jean, et il commença à éprouver de la frayeur et de l'angoisse. Il leur dit : 'Mon âme est très affligée, jusqu'à la mort.' Il s'avança un peu, se jeta contre terre, et pria que, s'il était possible, cette heure s'éloignât de lui.",context:"Gethsémani est l'anti-Transfiguration : même trois disciples, même montagne (des Oliviers), mais la gloire fait place à l'agonie. 'Abba, Père, toutes choses te sont possibles ; éloigne de moi cette coupe' révèle l'humanité radicale de Jésus — la peur réelle devant la mort. 'Néanmoins, non pas ce que je veux, mais ce que tu veux' est la prière la plus parfaite de la Bible.",keyPoints:["'Abba' — terme d'intimité filiale unique pour s'adresser à Dieu","L'agonie de Gethsémani révèle que Jésus a vraiment peur — son incarnation est totale","Les disciples dorment trois fois — incapables de soutenir la prière","La soumission volontaire : Jésus aurait pu partir, il choisit de rester"],theology:"Ce texte est central pour la théologie de l'incarnation : un Dieu qui a peur est pleinement humain. Les docètes (qui niaient l'humanité réelle de Jésus) devaient ignorer ce passage. Hébreux 5:7-8 y fait allusion : 'ayant offert, avec grands cris et larmes, des prières... il a obéi.' Jean de la Croix voit dans la soumission de Gethsémani le modèle de l'abandon spirituel.",crossRefs:["Hébreux 5:7-8","Philippiens 2:8","Romains 8:15","Luc 22:44"]},
  {id:48,section:"EVANGILES",title:"Les apparitions pascales — Marie-Madeleine au tombeau",reference:"Jean 20:11-18",theme:"VIE_DE_JESUS",passage:"Marie se tenait dehors près du sépulcre, et elle pleurait. Jésus lui dit : 'Femme, pourquoi pleures-tu ? Qui cherches-tu ?' Elle, pensant que c'était le jardinier, lui dit : 'Seigneur, si c'est toi qui l'as emporté, dis-moi où tu l'as mis.' Jésus lui dit : 'Marie !' Elle se retourna et lui dit en hébreu : 'Rabbouni !'",context:"Marie-Madeleine, après avoir annoncé le tombeau vide aux disciples, revient seule. Pierre et Jean sont repartis. Elle pleure. Jésus ressuscité lui parle, mais elle ne le reconnaît pas jusqu'au moment où il l'appelle par son nom. La reconnaissance par le nom ('Marie !') révèle la continuité de l'amour — le ressuscité n'est pas un étranger.",keyPoints:["La première apparition pascale est à une femme — acte révolutionnaire dans l'Antiquité","La reconnaissance par le nom : 'Je connais mes brebis et mes brebis me connaissent' (Jn 10:14)","'Ne me retiens pas' (Noli me tangere) — le ressuscité a un mode d'être nouveau","Marie-Madeleine devient l'apostola apostolorum (apôtre des apôtres) en annonçant la résurrection"],theology:"L'annonce de la résurrection confiée à une femme, dont le témoignage n'était pas recevable légalement en Judée, est signe d'authenticité historique : personne n'aurait inventé un tel détail. Paul (1 Cor 15:3-8) ne la mentionne pas dans sa liste officielle — mais Jean la place en tête. Bernard de Clairvaux développera la figure de Marie-Madeleine comme modèle de contemplation.",crossRefs:["1 Corinthiens 15:5-8","Luc 24:10","Jean 10:14","Matthieu 28:1-10"]},
  {id:49,section:"EPITRES",title:"Romains 8 — rien ne peut nous séparer",reference:"Romains 8:31-39",theme:"APOTRES",passage:"Que dirons-nous donc à l'égard de ces choses ? Si Dieu est pour nous, qui sera contre nous ? Lui qui n'a point épargné son propre Fils, mais qui l'a livré pour nous tous, comment ne nous donnera-t-il pas aussi toutes choses avec lui ? Qui accusera les élus de Dieu ?",context:"Ce passage couronne tout le chapitre 8, lui-même le sommet de l'épître aux Romains. Paul a développé la justification (ch. 1-4), la sanctification (ch. 5-8). Il conclut par une série de questions rhétoriques dont la réponse est toujours : rien. La liste finale (v.38-39) est exhaustive dans sa tentative d'énumérer tout ce qui ne peut pas séparer de l'amour de Dieu.",keyPoints:["La série de questions rhétoriques ('qui accusera ?', 'qui condamnera ?') brise toute menace spirituelle","'Nous sommes plus que vainqueurs' — peripsisseuomen, superlatif de la victoire","La liste finale est cosmique : mort, vie, anges, dominations, présent, avenir, hauteur, profondeur","L'amour de Dieu est ancré dans le Christ Jésus — personnel, non abstrait"],theology:"Ce texte est l'un des plus consolants et puissants du NT. Augustin et Calvin y lisent la persévérance des élus. Luther y trouve la certitude du salut par la foi. Les chrétiens persécutés de toutes les époques y ont trouvé une force inébranlable. L'énumération 'mort, vie, anges...' est une catégorie complète de tout l'univers — rien n'y échappe.",crossRefs:["Jean 10:28","Philippiens 4:13","Psaume 118:6","1 Jean 4:16"]},
  {id:50,section:"EPITRES",title:"1 Corinthiens 15 — la résurrection, cœur de la foi",reference:"1 Corinthiens 15:12-22",theme:"APOTRES",passage:"Or, si l'on prêche que Christ est ressuscité des morts, comment quelques-uns parmi vous disent-ils qu'il n'y a point de résurrection des morts ? Si les morts ne ressuscitent pas, Christ non plus n'est pas ressuscité. Et si Christ n'est pas ressuscité, votre foi est vaine, vous êtes encore dans vos péchés.",context:"Des chrétiens de Corinthe influencés par le platonisme niaient la résurrection corporelle (l'âme immortelle leur suffisait). Paul construit un argument en cascade : si pas de résurrection → Christ n'est pas ressuscité → la prédication est vaine → la foi est vaine → nous sommes encore dans nos péchés. L'argument tient sur la centralité de la résurrection corporelle.",keyPoints:["La résurrection du Christ n'est pas un détail — c'est le fondement de tout","L'argument 'si... alors' est une démonstration par l'absurde : renier la résurrection détruit tout","'Nous sommes les plus misérables des hommes' si la résurrection n'est pas réelle (v.19)","Le parallèle Adam/Christ (v.21-22) : par un homme la mort, par un homme la résurrection"],theology:"Ce chapitre est le traité le plus complet du NT sur la résurrection. Paul distingue le corps naturel et le corps spirituel, cite les apparitions pascales (v.5-8 — la plus ancienne liste connue), et développe la résurrection universelle. La formule v.3-5 ('Christ est mort... a été enseveli... est ressuscité') est peut-être le plus ancien credo chrétien, antérieur à Paul.",crossRefs:["Romains 5:12-21","Jean 11:25","1 Thessaloniciens 4:13-18","Ézéchiel 37:12"]},
  {id:51,section:"EPITRES",title:"Galates 5 — la liberté et les fruits de l'Esprit",reference:"Galates 5:1-25",theme:"APOTRES",passage:"C'est pour la liberté que Christ nous a affranchis. Demeurez donc fermes, et ne vous laissez pas remettre sous le joug de la servitude... Si nous vivons par l'Esprit, marchons aussi selon l'Esprit. Le fruit de l'Esprit, c'est : l'amour, la joie, la paix, la patience, la bonté, la bénignité, la fidélité, la douceur, la tempérance.",context:"Paul combat des 'judaïsants' qui imposent la circoncision aux convertis. Il distingue deux modes d'existence : la chair (liste de 15 œuvres) et l'Esprit (9 fruits). La liberté chrétienne n'est pas libertinage mais vie dans l'Esprit. Les 9 fruits sont au singulier ('le fruit') — unité organique, non liste de performances.",keyPoints:["La liberté chrétienne n'est pas une liberté de faire n'importe quoi mais liberté de l'amour","Les œuvres de la chair et le fruit de l'Esprit sont deux orientations fondamentales, non deux catalogues","'Le fruit' (singulier) : unité — on ne peut avoir l'amour sans la paix, etc.","'Marcher selon l'Esprit' est une relation dynamique, non un accomplissement de règles"],theology:"Ces 9 fruits sont devenus le cadre de la vie spirituelle chrétienne. Thomas d'Aquin les analyse dans la Somme. Luther y voit le contraste loi/grâce. La psychologie contemporaine du bien-être (positive psychology) retrouve des résultats proches de cette liste. Le paradoxe de la liberté dans l'Esprit ('Aimez, et faites ce que vous voulez', dit Augustin) est le cœur de l'éthique chrétienne.",crossRefs:["Jean 15:4-5","Romains 8:4-14","Éphésiens 5:22-23","Colossiens 3:12-14"]},
  {id:52,section:"EPITRES",title:"Éphésiens 2 — sauvés par grâce",reference:"Éphésiens 2:1-10",theme:"APOTRES",passage:"Vous étiez morts par vos offenses et par vos péchés... Mais Dieu, qui est riche en miséricorde, à cause du grand amour dont il nous a aimés, nous a rendus vivants avec Christ, même quand nous étions morts par nos offenses... C'est par la grâce que vous êtes sauvés, par le moyen de la foi. Et cela ne vient pas de vous, c'est le don de Dieu.",context:"Le mouvement du texte est dramatique : mort → vie. Éphésiens 2:1-3 décrit la condition humaine sans Christ (mort, esclave, sous la colère). Éphésiens 2:4 est le grand pivot : 'Mais Dieu...' La transition est une des plus puissantes du NT. Le salut est entièrement de Dieu — grâce, amour, don — sans aucune contribution humaine (v.8-9). Puis v.10 : 'créés pour de bonnes œuvres.'",keyPoints:["'Mais Dieu' (v.4) — le pivot entre la misère humaine et la grâce divine","Le triple 'avec Christ' (v.5-6) : vivifiés, ressuscités, élevés — participation à la vie de Christ","La grâce exclut la glorification humaine ('afin que personne ne se glorifie')","V.10 équilibre : sauvés non par les œuvres, mais créés pour les accomplir"],theology:"Ce texte est la formulation la plus claire de la sola gratia et la sola fide dans Paul. Luther, Calvin, et la Réforme entière s'y sont appuyés contre le mérite. Mais v.10 ('créés pour de bonnes œuvres') préserve l'éthique. Le débat catholique/protestant sur la grâce et les œuvres tourne autour de ce passage. Augustin voit dans la 'création nouvelle' (v.10) le fondement du baptême.",crossRefs:["Romains 5:8","Tite 3:5","Jean 3:16","Jacques 2:14-26"]},
  {id:53,section:"EPITRES",title:"Philippiens 2 — la kénose du Christ",reference:"Philippiens 2:5-11",theme:"APOTRES",passage:"Ayez en vous les sentiments qui étaient en Jésus-Christ : lui, existant en forme de Dieu, n'a point regardé comme une proie à arracher d'être égal avec Dieu, mais s'est dépouillé lui-même, en prenant une forme de serviteur, en devenant semblable aux hommes.",context:"Ce texte est vraisemblablement un hymne pré-paulinien que Paul cite. Structure en deux mouvements : descente (égalité divine → serviteur → mort de croix) et exaltation (Dieu l'a souverainement élevé → tout genou fléchira). La 'kénose' (kenosis = dépouillement) est le terme théologique né de ce texte (v.7 : 'il s'est dépouillé lui-même', ekenosen).",keyPoints:["La kénose (dépouillement) n'est pas une perte de la divinité mais un choix d'abaissement","'Mort de la croix' (v.8) — Paul insiste sur le mode : la mort la plus humiliante qui soit","L'exaltation est la réponse divine à l'obéissance : 'c'est pourquoi Dieu l'a souverainement élevé'","'Tout genou fléchira' (Ésaïe 45:23) — la souveraineté universelle du Christ"],theology:"Ce texte est central dans la christologie : Concile de Chalcédoine (451), deux natures, une personne. Luther y voit la théologie de la croix (theologia crucis) contre la théologie de la gloire. Jean de la Croix et Thérèse font de la kénose le modèle de l'union mystique. Karl Barth y voit le fondement de l'éthique : 'votre attitude, celle qu'avait Christ' (v.5).",crossRefs:["Jean 1:14","Ésaïe 45:23","Hébreux 2:9","Zacharie 9:9"]},
  {id:54,section:"EPITRES",title:"Hébreux 11 — la foi, galerie des témoins",reference:"Hébreux 11:1-40",theme:"APOTRES",passage:"Or la foi est une ferme assurance des choses qu'on espère, une démonstration de celles qu'on ne voit pas. C'est pour l'avoir possédée que les anciens ont obtenu un témoignage favorable. Par la foi nous comprenons que l'univers a été formé par la parole de Dieu, en sorte que ce qu'on voit n'a pas été fait de choses visibles.",context:"L'auteur d'Hébreux compose un long poème épique sur la foi à travers l'histoire d'Israël. 'Par la foi' revient comme un refrain obsédant. Abel, Hénoc, Noé, Abraham, Sara, Isaac, Jacob, Joseph, Moïse, Rahab, Gédéon, David... La liste est volontairement incomplète — 'le temps me manquerait pour raconter.' Ces témoins 'nous entourent' comme une nuée (12:1).",keyPoints:["La définition de la foi (v.1) est la seule définition théologique explicite dans le NT","La foi porte sur ce qu'on ne voit pas — elle anticipe sans posséder encore","Tous ces témoins sont 'morts dans la foi sans avoir reçu' (v.13) — espérance eschatologique","La nuée de témoins (Hébreux 12:1) inclut les croyants de l'histoire dans la communion des saints"],theology:"Ce chapitre est le fondement de la doctrine de la communion des saints. La 'nuée de témoins' (12:1) suggère que les croyants morts nous accompagnent. La définition de la foi (v.1) a été commentée des millénaires : Thomas d'Aquin y voit la foi comme connaissance indémontrable mais certaine. Luther : la foi saisit ce que la raison ne peut atteindre.",crossRefs:["Genèse 15:6","Romains 4:18-21","Jacques 2:21-22","Apocalypse 7:9"]},
  {id:55,section:"EPITRES",title:"1 Pierre 2 — peuple sacerdotal",reference:"1 Pierre 2:4-10",theme:"APOTRES",passage:"Vous aussi, comme des pierres vivantes, édifiez-vous pour former une maison spirituelle, un saint sacerdoce, afin d'offrir des sacrifices spirituels agréables à Dieu par Jésus-Christ... Mais vous êtes une race élue, un sacerdoce royal, une nation sainte, un peuple acquis.",context:"Pierre reprend Exode 19:6 ('un royaume de sacrificateurs et une nation sainte') — statut d'Israël au Sinaï — et l'applique à l'Église chrétienne. 'Pierres vivantes' : les croyants sont des matériaux de construction autour de la 'pierre angulaire' (Christ). Le sacerdoce universel est ici affirmé : tout croyant est prêtre, pas seulement les ministres ordonnés.",keyPoints:["Le sacerdoce universel des croyants — fondement de la théologie de Luther et de la Réforme","'Pierre angulaire' : Christ comme fondement portant tout l'édifice (Ésaïe 28:16)","'Vous qui n'étiez pas un peuple, vous êtes maintenant le peuple de Dieu' (Osée 2:23) — les nations intégrées","Les quatre titres de l'Église : race élue, sacerdoce royal, nation sainte, peuple acquis"],theology:"Ce texte est au cœur du débat protestantisme/catholicisme sur le sacerdoce. Luther y trouve le sacerdoce universel des croyants (1520) contre la médiation exclusive du clergé catholique. Le Concile Vatican II (LG 10) distingue sacerdoce commun et sacerdoce ministériel, tous deux fondés sur ce texte. Pierre cite Osée — l'inclusion des nations est accomplie.",crossRefs:["Exode 19:5-6","Ésaïe 28:16","Osée 2:23","Apocalypse 5:10"]},
  {id:56,section:"EPITRES",title:"1 Jean 4 — Dieu est amour",reference:"1 Jean 4:7-21",theme:"APOTRES",passage:"Bien-aimés, aimons-nous les uns les autres ; car l'amour est de Dieu, et quiconque aime est né de Dieu et connaît Dieu. Celui qui n'aime pas n'a pas connu Dieu, car Dieu est amour. En ceci l'amour de Dieu a été manifesté envers nous, que Dieu a envoyé son Fils unique dans le monde.",context:"Jean formule deux fois 'Dieu est amour' (agape) dans ce passage (v.8 et v.16) — l'une des définitions les plus audacieuses de l'AT/NT. Ce n'est pas 'Dieu a de l'amour' mais 'Dieu EST amour' — l'amour est l'essence divine. L'amour de Dieu ne dépend pas de nos mérites ('nous l'avons aimé parce qu'il nous a aimés le premier', v.19).",keyPoints:["'Dieu est amour' — définition ontologique, non sentimentale","L'amour chrétien est d'abord reçu, puis donné : 'nous l'aimons parce qu'il nous a aimés le premier'","L'amour du frère (v.20) est le test de l'amour de Dieu : on ne peut séparer les deux","L'amour parfait chasse la crainte (v.18) — maturité spirituelle"],theology:"Ce texte a nourri la mystique de l'amour : Jean de la Croix, Thérèse de Lisieux. 'Dieu est amour' est interprété par la théologie trinitaire : l'amour intratrinitaire (Père-Fils-Esprit) déborde en création et en rédemption. Hans Urs von Balthasar fait de ce texte le centre de toute sa théologie. La différence agapè/éros est explorée par Benoît XVI dans 'Deus Caritas Est'.",crossRefs:["Jean 3:16","Romains 5:8","1 Corinthiens 13:4-7","Jean 15:12"]},
  {id:57,section:"APOCALYPSE",title:"L'Apocalypse — lettres aux sept Églises",reference:"Apocalypse 2:1-7",theme:"APOCALYPSE",passage:"À l'ange de l'Église d'Éphèse écris... Je connais tes œuvres, ton travail et ta patience... Mais j'ai contre toi que tu as abandonné ton premier amour. Souviens-toi donc d'où tu es tombé, repens-toi, et pratique tes premières œuvres.",context:"La première des sept lettres adressées aux Églises d'Asie. Éphèse est louée pour son zèle, son orthodoxie, sa résistance aux faux docteurs — mais blâmée pour avoir perdu sa ferveur initiale. La structure est identique pour chaque lettre : identification (Je suis...), connaissance (je connais tes œuvres), louange/reproche, appel (souviens-toi/repens-toi), promesse au vainqueur.",keyPoints:["L'orthodoxie sans amour est insuffisante — le cœur est central","'Souviens-toi, repens-toi, et pratique' — trois impératifs du retour à la ferveur","La promesse au vainqueur ('l'arbre de vie') renvoie à Genèse 3:24 — accomplissement eschatologique","Chaque lettre est une radiographie de l'Église en situation : force et faiblesse"],theology:"Les sept lettres sont des miroirs pour l'Église de toutes les époques. Laodicée (tiède) et Éphèse (sans amour) sont les diagnostics les plus citées. L'épître à l'Église d'Éphèse anticipe le débat sur 'foi sans amour' (cf. 1 Cor 13:2). La structure des lettres est utilisée en ecclésiologie pour examiner la vie de l'Église locale.",crossRefs:["Apocalypse 3:14-22","1 Corinthiens 13:1-3","Jérémie 2:2","Ezéchiel 16:8"]},
  {id:58,section:"APOCALYPSE",title:"La vision du trône céleste",reference:"Apocalypse 4:1-11",theme:"APOCALYPSE",passage:"Aussitôt je fus ravi en esprit. Et voici, il y avait un trône dans le ciel, et sur ce trône quelqu'un était assis. Celui qui était assis avait l'aspect d'une pierre de jaspe et de sardoine ; et le trône était environné d'un arc-en-ciel semblable à une émeraude... Et ils ne cessaient de dire : Saint, saint, saint est le Seigneur Dieu, le Tout-Puissant.",context:"Après les sept lettres, Jean est invité à monter au ciel ('monte ici'). Il voit le trône divin entouré de 24 anciens et de quatre vivants. Le Sanctus ('Saint, saint, saint') reprend directement Ésaïe 6:3. Le trône, l'arc-en-ciel, les vivants (lion, bœuf, homme, aigle) sont des symboles chargés de toute la tradition prophétique — Ézéchiel 1 est particulièrement présent.",keyPoints:["La vision du trône affirme la souveraineté divine au cœur de la tribulation terrestre","L'arc-en-ciel rappelle l'alliance de Noé — la grâce entoure le trône de jugement","Les quatre vivants (lion, bœuf, homme, aigle) symbolisent la création entière dans l'adoration","Le Sanctus liturgique de la messe catholique vient directement de ce chapitre (via Ésaïe 6)"],theology:"Ce chapitre a nourri la liturgie chrétienne depuis les origines. Les quatre vivants ont été interprétés comme les quatre Évangélistes (Irénée) : lion = Marc, bœuf = Luc, homme = Matthieu, aigle = Jean. La vision du trône est la réponse aux Églises qui souffrent : au-dessus de tout l'histoire, Dieu règne. L'eschatologie ne minimise pas le présent, elle lui donne un horizon.",crossRefs:["Ésaïe 6:1-3","Ézéchiel 1:5-14","Genèse 9:13","Daniel 7:9"]},
  {id:59,section:"APOCALYPSE",title:"L'Agneau et le livre scellé — adoration cosmique",reference:"Apocalypse 5:1-14",theme:"APOCALYPSE",passage:"Et je vis, dans la main droite de celui qui était assis sur le trône, un livre écrit dedans et dehors, scellé de sept sceaux... Et l'un des anciens me dit : 'Ne pleure pas ; voici, le lion de la tribu de Juda, le rejeton de David, a vaincu pour ouvrir le livre et ses sept sceaux.' Je regardai, et voici, il y avait au milieu du trône... un agneau, comme s'il avait été immolé.",context:"Le paradoxe central de l'Apocalypse : le lion annoncé (v.5) est l'agneau vu (v.6). La puissance divine se révèle dans l'immolation. Le livre scellé de sept sceaux représente le plan divin pour l'histoire. Seul l'Agneau peut l'ouvrir — sa mort est la clé de l'histoire. L'hymne final (v.12-14) unit ciel, terre, dessous de la terre et mer — adoration universelle.",keyPoints:["Lion → Agneau : le paradoxe christologique central de l'Apocalypse","L'Agneau 'comme immolé' mais debout — mort et résurrection ensemble","Seul l'Agneau peut ouvrir les sceaux — la croix donne sens à l'histoire","L'hymne cosmique ('à l'Agneau... la puissance, la richesse...') : le but de l'histoire est la gloire de Dieu"],theology:"Ce chapitre est le cœur théologique de l'Apocalypse. La liturgie chrétienne (Agnus Dei) est directement issue de ce texte. L'image de l'Agneau-Lion unit Jean 1:29 ('le Agneau de Dieu qui ôte le péché') et Genèse 49:9 ('lion de Juda'). Balthasar fait de ce chapitre le fondement de la théologie de la croix comme révélation ultime de Dieu.",crossRefs:["Jean 1:29","Genèse 49:9","Ésaïe 53:7","Apocalypse 19:7"]},
  {id:60,section:"APOCALYPSE",title:"La Nouvelle Jérusalem — Dieu demeure avec les hommes",reference:"Apocalypse 21:1-7",theme:"APOCALYPSE",passage:"Et je vis un nouveau ciel et une nouvelle terre ; car le premier ciel et la première terre avaient disparu, et la mer n'existait plus. Et je vis descendre du ciel, d'auprès de Dieu, la ville sainte, la nouvelle Jérusalem, préparée comme une épouse parée pour son époux. Et j'entendis du trône une voix forte qui disait : 'Voici le tabernacle de Dieu avec les hommes !'",context:"Vision finale de l'Apocalypse. La nouveauté est totale : nouveau ciel, nouvelle terre, nouvelle Jérusalem. Mais c'est une continuité : la Jérusalem 'descend' du ciel — c'est la ville actuelle transfigurée. 'Voici le tabernacle de Dieu avec les hommes' reprend l'Exode : la présence de Dieu qui habitait au milieu du camp dans le tabernacle est maintenant universelle et définitive.",keyPoints:["La nouvelle création est une transformation, non un remplacement — continuité et nouveauté","La Nouvelle Jérusalem descend du ciel — Dieu vient vers l'humanité, non l'inverse","'Il essuiera toute larme' — la souffrance passée est intégrée, non oubliée","'Il n'y aura plus de temple' (v.22) — Dieu lui-même est le Temple : accomplissement de 1 Rois 8"],theology:"Ce texte est le point culminant de toute la théologie biblique. L'histoire du salut commence par un jardin (Genèse 2) et se termine par une cité-jardin (Ap 21-22). La présence de Dieu (shekhinah) qui avait quitté le Temple (Ez 10) retourne habiter définitivement parmi les hommes. Jürgen Moltmann fait de cette eschatologie le fondement de l'espérance chrétienne.",crossRefs:["Genèse 2:8","Ézéchiel 48:35","Jean 14:2-3","2 Pierre 3:13"]},
{"id":61,"section":"TORAH","title":"Le Buisson ardent","reference":"Exode 3:1-15","theme":"VOCATION","passage":"Moïse faisait paître le troupeau de Jéthro, son beau-père. L'ange de l'Éternel lui apparut dans une flamme de feu, au milieu d'un buisson. Moïse regarda ; et voici, le buisson était tout en feu, mais le buisson ne se consumait point. Dieu dit : Je suis celui qui suis.","context":"Moïse est en exil, loin de l'Égypte et de son peuple. Dieu se révèle dans un lieu désert, non dans un palais. Le buisson qui brûle sans être détruit annonce une présence divine à la fois proche et redoutable. La vocation de Moïse naît d'une rencontre, pas d'une ambition personnelle.","keyPoints":["Dieu appelle un homme brisé par l'échec et l'exil","Le feu indique la sainteté sans destruction : Dieu purifie sans anéantir","Le nom divin 'Je suis' affirme l'existence souveraine et fidèle de Dieu","La mission de libération commence par l'écoute de la souffrance du peuple"],"theology":"Ce passage fonde la révélation du nom divin et la théologie de l'Exode. Dieu n'est pas une idée abstraite : il voit, entend, connaît et descend pour délivrer. Dans le Nouveau Testament, Jésus reprend fortement le langage du 'Je suis' dans l'Évangile de Jean.","crossRefs":["Jean 8:58","Actes 7:30-34","Exode 6:2-8","Deutéronome 32:39"]},
{"id":62,"section":"TORAH","title":"Le Shema Israël","reference":"Deutéronome 6:4-9","theme":"ALLIANCE","passage":"Écoute, Israël ! L'Éternel, notre Dieu, est le seul Éternel. Tu aimeras l'Éternel, ton Dieu, de tout ton cœur, de toute ton âme et de toute ta force. Et ces commandements que je te donne aujourd'hui seront dans ton cœur.","context":"Moïse prépare Israël à vivre dans le pays promis. Le centre de la foi biblique n'est pas seulement l'obéissance extérieure, mais l'amour total de Dieu. Le Shema devient la confession quotidienne d'Israël et structure la transmission familiale de la foi.","keyPoints":["Le monothéisme biblique est formulé comme confession et appel à l'amour","Le cœur, l'âme et la force désignent l'engagement total de la personne","La foi doit être transmise dans la maison, sur la route et dans les gestes ordinaires","La Parole n'est pas décorative : elle doit habiter la mémoire et les pratiques"],"theology":"Jésus cite ce passage comme le plus grand commandement. Le Shema relie doctrine, amour, obéissance et éducation. Il refuse une foi fragmentée : Dieu unique appelle une vie unifiée.","crossRefs":["Marc 12:29-31","Matthieu 22:37","Luc 10:27","Deutéronome 11:18-21"]},
{"id":63,"section":"HISTORIQUES","title":"Samuel entend l'appel de Dieu","reference":"1 Samuel 3:1-10","theme":"VOCATION","passage":"L'Éternel appela Samuel. Il répondit : Me voici ! Samuel ne connaissait pas encore l'Éternel, et la parole de l'Éternel ne lui avait pas encore été révélée. Éli dit à Samuel : Va, couche-toi ; et si l'on t'appelle, tu diras : Parle, Éternel, car ton serviteur écoute.","context":"La parole de Dieu est rare à l'époque des fils d'Éli. Samuel grandit dans le sanctuaire, mais doit apprendre à reconnaître personnellement la voix de Dieu. Le récit montre la transition entre un sacerdoce corrompu et une parole prophétique renouvelée.","keyPoints":["La proximité religieuse ne remplace pas la connaissance personnelle de Dieu","L'écoute précède la mission : Samuel ne parle qu'après avoir appris à entendre","Dieu peut appeler un enfant quand les institutions adultes sont défaillantes","La vocation biblique commence souvent par une disponibilité simple : 'me voici'"],"theology":"Samuel devient une figure charnière entre les juges, la monarchie et les prophètes. Le passage rappelle que Dieu restaure son peuple par sa Parole avant de transformer ses structures politiques.","crossRefs":["1 Samuel 2:35","Jérémie 1:4-10","Ésaïe 6:8","Jean 10:27"]},
{"id":64,"section":"HISTORIQUES","title":"La prière de Salomon","reference":"1 Rois 8:22-30","theme":"TEMPLE","passage":"Salomon se plaça devant l'autel de l'Éternel, en face de toute l'assemblée d'Israël. Il étendit ses mains vers le ciel et dit : Ô Éternel, Dieu d'Israël ! Il n'y a point de Dieu semblable à toi, ni en haut dans les cieux, ni en bas sur la terre.","context":"Le Temple vient d'être achevé. Salomon reconnaît pourtant que Dieu ne peut être enfermé dans une maison construite par des mains humaines. Le Temple est un lieu de prière, de mémoire et de pardon, non une prison sacrée pour la présence divine.","keyPoints":["Le Temple manifeste la présence de Dieu sans limiter sa transcendance","La prière de Salomon lie culte, justice, pardon et écoute divine","La grandeur de Dieu dépasse toute architecture religieuse","Le cœur du Temple est l'alliance, pas le bâtiment"],"theology":"Ce passage prépare la tension biblique entre présence localisée et universalité divine. Le Nouveau Testament développera cette tension avec le Christ comme Temple véritable, puis avec l'Église habitée par l'Esprit.","crossRefs":["Actes 7:48-50","Jean 2:19-21","1 Corinthiens 3:16","2 Chroniques 6:18"]},
{"id":65,"section":"POETIQUES","title":"Le Seigneur est mon berger","reference":"Psaume 23:1-6","theme":"CONFIANCE","passage":"L'Éternel est mon berger : je ne manquerai de rien. Il me fait reposer dans de verts pâturages, il me dirige près des eaux paisibles. Il restaure mon âme, il me conduit dans les sentiers de la justice, à cause de son nom.","context":"Psaume de confiance attribué à David. L'image du berger parle de direction, protection, nourriture et proximité. Le texte ne nie pas la vallée de l'ombre de la mort : il affirme que la présence de Dieu y demeure.","keyPoints":["La confiance biblique n'est pas l'absence de danger mais la présence de Dieu dans le danger","Dieu conduit, restaure et protège comme un berger fidèle","La table dressée devant les adversaires indique l'honneur donné par Dieu malgré l'opposition","La bonté et la grâce poursuivent le croyant : l'initiative reste divine"],"theology":"Jésus reprend cette image en se présentant comme le bon berger. Le psaume relie providence, protection et espérance finale dans la maison de Dieu.","crossRefs":["Jean 10:11","Ézéchiel 34:11-16","Hébreux 13:20","1 Pierre 5:4"]},
{"id":66,"section":"POETIQUES","title":"La crainte de l'Éternel","reference":"Proverbes 1:1-7","theme":"SAGESSE","passage":"La crainte de l'Éternel est le commencement de la science ; les insensés méprisent la sagesse et l'instruction. Pour connaître la sagesse et l'instruction, pour comprendre les paroles de l'intelligence.","context":"Le livre des Proverbes ouvre sur le but de la sagesse : former le discernement moral. Dans la Bible, la sagesse n'est pas seulement intellectuelle ; elle concerne les choix, les relations, la justice et la maîtrise de soi.","keyPoints":["La sagesse commence par une juste relation à Dieu","La connaissance séparée de l'humilité devient folie","L'instruction biblique vise le caractère, pas seulement l'information","Le mépris de la correction est présenté comme une marque d'insensé"],"theology":"Ce passage établit que la vraie intelligence est morale et spirituelle. Le Nouveau Testament identifiera le Christ comme sagesse de Dieu, accomplissant la recherche sapientielle de l'Ancien Testament.","crossRefs":["Job 28:28","Psaume 111:10","1 Corinthiens 1:24","Jacques 1:5"]},
{"id":67,"section":"PROPHETES_MAJ","title":"Me voici, envoie-moi","reference":"Ésaïe 6:1-8","theme":"VOCATION","passage":"L'année de la mort du roi Ozias, je vis le Seigneur assis sur un trône très élevé. Les séraphins criaient l'un à l'autre : Saint, saint, saint est l'Éternel des armées ! Toute la terre est pleine de sa gloire. J'entendis la voix du Seigneur, disant : Qui enverrai-je ? Et qui marchera pour nous ? Je répondis : Me voici, envoie-moi.","context":"Ésaïe reçoit sa vocation dans une vision du Temple céleste. La sainteté de Dieu révèle l'impureté du prophète, puis un charbon pris de l'autel purifie ses lèvres. La mission naît d'une purification reçue, non d'une compétence naturelle.","keyPoints":["La vision de Dieu produit d'abord la lucidité sur le péché","La purification précède l'envoi","Le triple 'saint' souligne l'altérité absolue de Dieu","La mission prophétique commence par une réponse libre : 'me voici'"],"theology":"Ce texte structure la théologie de la vocation prophétique : révélation, confession, purification, mission. Jean 12 applique la gloire vue par Ésaïe au Christ, renforçant une lecture christologique de la vision.","crossRefs":["Jean 12:39-41","Apocalypse 4:8","Luc 5:8-10","Hébreux 9:14"]},
{"id":68,"section":"PROPHETES_MIN","title":"Marcher humblement avec Dieu","reference":"Michée 6:6-8","theme":"JUSTICE","passage":"On t'a fait connaître, ô homme, ce qui est bien ; et ce que l'Éternel demande de toi, c'est que tu pratiques la justice, que tu aimes la miséricorde, et que tu marches humblement avec ton Dieu.","context":"Michée dénonce une religion qui multiplie les sacrifices tout en négligeant la justice. Le prophète réduit la volonté de Dieu à une triade claire : justice, miséricorde, humilité. Le culte sans éthique est présenté comme incohérent.","keyPoints":["Dieu ne cherche pas une inflation rituelle mais une transformation morale","Justice et miséricorde ne s'opposent pas : elles se corrigent mutuellement","L'humilité empêche la religion de devenir domination","La vraie piété se vérifie dans la manière de traiter les autres"],"theology":"Ce passage condense l'éthique prophétique. Jésus reprendra cette ligne contre une religiosité formaliste qui oublie la justice, la miséricorde et la fidélité.","crossRefs":["Matthieu 23:23","Osée 6:6","Amos 5:21-24","Jacques 1:27"]},
{"id":69,"section":"EVANGILES","title":"Les Béatitudes","reference":"Matthieu 5:1-12","theme":"ROYAUME","passage":"Heureux les pauvres en esprit, car le royaume des cieux est à eux ! Heureux les affligés, car ils seront consolés ! Heureux ceux qui ont faim et soif de la justice, car ils seront rassasiés ! Heureux ceux qui procurent la paix, car ils seront appelés fils de Dieu !","context":"Jésus ouvre le Sermon sur la montagne par une proclamation paradoxale du bonheur. Le Royaume renverse les critères habituels de réussite : pauvreté intérieure, douceur, justice, pureté, paix et persécution deviennent signes de proximité avec Dieu.","keyPoints":["Les Béatitudes décrivent le caractère du Royaume avant de donner des règles","Le bonheur biblique n'est pas confort mais alignement avec Dieu","La justice est présentée comme une faim profonde, pas comme une option morale","La persécution n'annule pas la bénédiction : elle peut la confirmer"],"theology":"Les Béatitudes forment le portrait du disciple et, ultimement, du Christ lui-même. Elles ne sont pas un programme moral autonome mais la manifestation d'une vie transformée par le Royaume.","crossRefs":["Luc 6:20-23","Ésaïe 61:1-3","Jacques 1:12","1 Pierre 3:14"]},
{"id":70,"section":"EPITRES","title":"L'armure de Dieu","reference":"Éphésiens 6:10-18","theme":"COMBAT_SPIRITUEL","passage":"Revêtez-vous de toutes les armes de Dieu, afin de pouvoir tenir ferme contre les ruses du diable. Car nous n'avons pas à lutter contre la chair et le sang, mais contre les dominations, contre les autorités, contre les princes de ce monde de ténèbres.","context":"Paul conclut l'épître aux Éphésiens par une image militaire. Le combat chrétien n'est pas dirigé contre des personnes, mais contre des puissances spirituelles et des logiques de mensonge. L'appel central n'est pas l'agressivité, mais la tenue ferme.","keyPoints":["Le combat spirituel vise d'abord la résistance et la fidélité","La vérité, la justice, la foi et la Parole sont des protections concrètes","L'ennemi principal n'est pas humain : cela empêche de diaboliser les personnes","La prière accompagne toute l'armure : elle n'est pas un accessoire final"],"theology":"L'armure reprend des images d'Ésaïe où Dieu lui-même se revêt de justice et de salut. Le croyant participe donc à une victoire déjà initiée par Dieu, plutôt qu'à une guerre autonome.","crossRefs":["Ésaïe 59:17","2 Corinthiens 10:3-5","1 Thessaloniciens 5:8","1 Pierre 5:8-9"]}];

  {id:'ev8',type:'event',label:'Division du royaume',year:-931,color:'#f97316',desc:"Après Salomon, le royaume se divise : Israël (Nord) et Juda (Sud). Début de deux siècles de royaumes parallèles (1 Rois 12)."},
  {id:'ev9',type:'event',label:'Chute de Samarie',year:-722,color:'#ef4444',desc:"L'Assyrie sous Sargon II détruit le royaume du Nord et déporte ses habitants. Les 10 tribus perdues disparaissent (2 Rois 17)."},
  {id:'ev10',type:'event',label:'Destruction de Jérusalem',year:-586,color:'#ef4444',desc:"Nabuchodonosor brûle le Temple, détruit Jérusalem et déporte Juda à Babylone. Fin du royaume de Juda (586 av. J.-C.)."},
  {id:'ev11',type:'event',label:'Édit de Cyrus',year:-538,color:'#22c55e',desc:"Cyrus le Grand permet aux Juifs de rentrer en Judée et de reconstruire le Temple. Accomplissement de Jérémie 29:10. 50 000 exilés rentrent."},
  {id:'ev12',type:'event',label:'Second Temple reconstruit',year:-516,color:'#c9a84c',desc:"Achèvement du Second Temple sous Zorobabel. Il durera jusqu'en 70 ap. J.-C., soit 586 ans."},
  {id:'ev13',type:'event',label:'Réforme Esdras-Néhémie',year:-445,color:'#c9a84c',desc:"Esdras rétablit la Torah. Néhémie reconstruit les murailles en 52 jours. Renouveau de l'identité juive post-exilique."},
  {id:'ev14',type:'event',label:'Naissance de Jésus',year:-4,color:'#e8c97a',desc:"Naissance à Bethléem sous Hérode le Grand (Matthieu 2). Les calculs historiques placent la naissance vers 6–4 av. J.-C."},
  {id:'ev15',type:'event',label:'Baptême de Jésus',year:28,color:'#c9a84c',desc:"Jean-Baptiste baptise Jésus dans le Jourdain. La voix du Père : Ce ci est mon Fils bien-aimé (Matthieu 3:17). Début du ministère."},
  {id:'ev16',type:'event',label:'Mort & Résurrection',year:30,color:'#e8c97a',desc:"Crucifixion sous Ponce Pilate, résurrection le troisième jour. Pentecôte 50 jours après : naissance de l'Église (Actes 2)."},
  {id:'ev17',type:'event',label:'Conversion de Paul',year:35,color:'#c9a84c',desc:"Saul de Tarse voit Jésus ressuscité sur le chemin de Damas. Devient l'apôtre des nations (Actes 9)."},
  {id:'ev18',type:'event',label:'Concile de Jérusalem',year:49,color:'#c9a84c',desc:"Les non-juifs n'ont pas à se circoncire pour être sauvés. Victoire de la grâce sur la loi (Actes 15)."},
  {id:'ev19',type:'event',label:'Destruction du Temple',year:70,color:'#ef4444',desc:"Titus détruit Jérusalem et le Second Temple. Prophétisée par Jésus (Matthieu 24:2). Fin du judaïsme sacrificiel."},
  // PERSONNAGES
  {id:'p1',type:'person',label:'Noé',year:-2400,color:'#a3a3a3',desc:"10e patriarche antédiluvien. Construit l'arche. Survit au Déluge. Alliance noachique : l'arc-en-ciel (Genèse 6–9)."},
  {id:'p2',type:'person',label:'Abraham',year:-2000,color:'#a3a3a3',desc:"Père des croyants. Quitte Ur, reçoit l'alliance. Sacrifice d'Isaac interrompu. Ancêtre d'Israël via Isaac (Genèse 12–25)."},
  {id:'p3',type:'person',label:'Moïse',year:-1300,color:'#a3a3a3',desc:"Libérateur d'Israël, législateur. Reçoit la Torah au Sinaï. Parle à Dieu face à face (Exode 33:11). Meurt sur le mont Nébo."},
  {id:'p4',type:'person',label:'David',year:-1000,color:'#a3a3a3',desc:"Roi berger, guerrier, psalmiste. Tue Goliath, unifie Israël. Alliance davidique (2 Samuel 7). Ancêtre messianique de Jésus."},
  {id:'p5',type:'person',label:'Salomon',year:-970,color:'#a3a3a3',desc:"Roi de sagesse. Construit le Temple. Auteur présumé des Proverbes et du Cantique. Son idolâtrie entraîna la division."},
  {id:'p6',type:'person',label:'Élie',year:-870,color:'#a3a3a3',desc:"Grand prophète sous Achab. Défie les 450 prophètes de Baal au Carmel. Monte au ciel dans un char de feu (2 Rois 2)."},
  {id:'p7',type:'person',label:'Ésaïe',year:-740,color:'#a3a3a3',desc:"Prince des prophètes. Prophétise la venue du Messie (Ésaïe 7:14 ; 9:6 ; 53). 66 chapitres couvrant jugement et salut."},
  {id:'p8',type:'person',label:'Jérémie',year:-627,color:'#a3a3a3',desc:"Prophète des larmes. Annonce la destruction de Jérusalem. Prophétise la nouvelle alliance (Jérémie 31:31). Témoin de 586."},
  {id:'p9',type:'person',label:'Daniel',year:-605,color:'#a3a3a3',desc:"Déporté à Babylone adolescent. Survit à la fosse aux lions. Ses visions apocalyptiques influencent l'Apocalypse de Jean."},
  {id:'p10',type:'person',label:'Jean-Baptiste',year:-4,color:'#a3a3a3',desc:"Dernier prophète de l'AT, précurseur du Messie. Baptise Jésus. Décapité par Hérode Antipas (Matthieu 14)."},
  {id:'p11',type:'person',label:'Jésus',year:0,color:'#e8c97a',desc:"Centre de la foi chrétienne. Ministère ~28–30 ap. J.-C. Mort, résurrection, ascension. Confessé Christ et Seigneur."},
  {id:'p12',type:'person',label:'Paul',year:5,color:'#a3a3a3',desc:"Pharisien converti, apôtre des nations. 3 voyages missionnaires (~46–58). 13 épîtres canoniques. Martyrisé à Rome ~64–67."},
  // LIVRES
  {id:'b1',type:'book',label:'Torah (Pentateuque)',year:-1280,color:'#10b981',desc:"Les 5 livres de Moïse. Composition finale ~IXe–Ve s. av. J.-C. Fondement de la révélation biblique."},
  {id:'b2',type:'book',label:'Josué–Samuel (livres hist.)',year:-1000,color:'#10b981',desc:"Livres historiques deutéronomistes. Rédigés ~IXe–VIIe s. av. J.-C. Conquête, Juges, monarchie naissante."},
  {id:'b3',type:'book',label:'Psaumes',year:-1000,color:'#10b981',desc:"150 poèmes et prières. Compilation sur plusieurs siècles (~Xe–Ve s.). 74 attribués à David. Liturgie du Temple."},
  {id:'b4',type:'book',label:'Proverbes / Job / Ecclésiaste',year:-950,color:'#10b981',desc:"Littérature de sagesse. Proverbes (~Xe–Ve s.), Job (~IXe–Ve s.), Ecclésiaste (~IIIe s.). Souffrance, sens, condition humaine."},
  {id:'b5',type:'book',label:'Prophètes majeurs',year:-740,color:'#10b981',desc:"Ésaïe (~740), Jérémie (~627–585), Ézéchiel (~593–571). Jugement et promesses messianiques."},
  {id:'b6',type:'book',label:'12 Petits prophètes',year:-750,color:'#10b981',desc:"12 livres courts ~VIIIe–Ve s. av. J.-C. : Amos, Osée, Michée, Aggée, Zacharie, Malachie… Clôturent le canon hébreu."},
  {id:'b7',type:'book',label:'Daniel',year:-165,color:'#10b981',desc:"Mis en scène au VIe s., rédaction probable ~165 av. J.-C. (crise des Maccabées). Premier livre apocalyptique canonique."},
  {id:'b8',type:'book',label:'Évangiles',year:65,color:'#10b981',desc:"Marc (~65–70), Matthieu et Luc (~80–90), Jean (~90–100). Quatre perspectives sur Jésus de Nazareth."},
  {id:'b9',type:'book',label:'Épîtres de Paul',year:50,color:'#10b981',desc:"1 Thessaloniciens (~50) est le plus ancien texte du NT. Grandes épîtres (Romains, Galates, Corinthiens) : ~55–58 ap. J.-C."},
  {id:'b10',type:'book',label:'Apocalypse de Jean',year:95,color:'#10b981',desc:"Rédigée ~95 ap. J.-C. sous Domitien. Dernier livre du canon chrétien. Adressée aux 7 Églises d'Asie Mineure."},
];

const GLOSSARY=[
  {term:"Agape",def:"Amour inconditionnel et désintéressé, attribut même de Dieu. Se distingue de l'éros (amour passion) et de la philia (amitié).",ref:"1 Jean 4:8"},
  {term:"Alliance (Berith)",def:"Traité solennel établissant un lien d'appartenance mutuelle entre Dieu et son peuple. Les grandes alliances bibliques sont avec Noé, Abraham, Moïse et David.",ref:"Genèse 15 / Exode 24"},
  {term:"Anamnèse",def:"Action de faire mémoire ou de se ressouvenir. En liturgie, commémoration du mystère pascal qui rend présent l'événement salvateur.",ref:"Luc 22:19"},
  {term:"Anathème",def:"Mise à part, exclusion ou malédiction frappant une personne ou une chose. Dans le NT, désigne souvent une excommunication.",ref:"Galates 1:8"},
  {term:"Apocalypse",def:"Du grec 'apokalupsis', signifiant dévoilement ou révélation. Désigne un genre littéraire révélant les mystères de l'histoire et de la fin des temps.",ref:"Apocalypse 1:1"},
  {term:"Apocryphe",def:"Livre dont l'authenticité n'est pas reconnue par le canon officiel de l'Église (ex: Évangile de Thomas).",ref:"Histoire de l'Église"},
  {term:"Canon",def:"Liste officielle des livres reconnus par la communauté croyante (juive ou chrétienne) comme divinement inspirés et normatifs pour la foi.",ref:"Histoire de l'Église"},
  {term:"Christologie",def:"Branche de la théologie chrétienne qui étudie la personne, l'enseignement et l'œuvre de Jésus-Christ.",ref:"Théologie"},
  {term:"Décalogue",def:"Les 'Dix Paroles' ou Dix Commandements donnés par Dieu à Moïse sur le mont Sinaï.",ref:"Exode 20"},
  {term:"Deutérocanonique",def:"Livres de l'Ancien Testament présents dans la Septante grecque (et la Bible catholique/orthodoxe) mais absents du canon hébraïque (ex: Tobie, Maccabées).",ref:"Canon Biblique"},
  {term:"Doxologie",def:"Formule liturgique ou hymne de louange célébrant la gloire de Dieu (ex: 'Gloire au Père, au Fils et au Saint-Esprit').",ref:"Romains 16:27"},
  {term:"Ecclésiologie",def:"Branche de la théologie qui étudie la nature, la structure et la mission de l'Église.",ref:"Éphésiens"},
  {term:"Épître",def:"Lettre adressée par un apôtre à une communauté chrétienne ou à un individu (ex: les épîtres de Paul).",ref:"Nouveau Testament"},
  {term:"Eschatologie",def:"Théologie des 'fins dernières' (la mort, le jugement, l'enfer, le paradis, le retour du Christ, la fin du monde).",ref:"Matthieu 24-25"},
  {term:"Eucharistie",def:"Sacrement central du christianisme commémorant le dernier repas (la Cène) de Jésus-Christ, signifiant 'action de grâce'.",ref:"1 Corinthiens 11"},
  {term:"Évangile",def:"Du grec 'euangelion' (bonne nouvelle). L'annonce de la victoire de Dieu sur le mal et la mort à travers la vie, la mort et la résurrection de Jésus.",ref:"Marc 1:1"},
  {term:"Exégèse",def:"Étude approfondie et critique d'un texte biblique pour en tirer le sens originel et l'intention de l'auteur.",ref:"Herméneutique"},
  {term:"Expiation",def:"Acte par lequel le péché est effacé et la relation avec Dieu restaurée, notamment par le sacrifice du Christ.",ref:"Hébreux 9"},
  {term:"Gnose / Gnosticisme",def:"Mouvement religieux antique affirmant que le salut s'obtient par une connaissance (gnosis) secrète et spirituelle, souvent combattu par les premiers chrétiens.",ref:"1 Jean"},
  {term:"Hagiographe",def:"Auteur inspiré d'un livre sacré. Fait aussi référence aux écrivains de la vie des saints.",ref:"Littérature biblique"},
  {term:"Herméneutique",def:"Théorie, art et science de l'interprétation des textes sacrés.",ref:"Exégèse"},
  {term:"Hypostase",def:"Terme théologique utilisé pour désigner les trois 'personnes' distinctes (Père, Fils, Esprit) de l'unique Trinité, ou l'union des deux natures en Christ.",ref:"Concile de Chalcédoine"},
  {term:"Incarnation",def:"Mystère central chrétien selon lequel le Verbe (Fils de Dieu) a pris chair et est devenu homme en la personne de Jésus de Nazareth.",ref:"Jean 1:14"},
  {term:"Inerrance",def:"Doctrine selon laquelle la Bible, dans ses manuscrits originaux, est sans erreur en ce qui concerne la foi et le salut.",ref:"Théologie dogmatique"},
  {term:"Justification",def:"Acte de grâce par lequel Dieu déclare juste le pécheur qui croit en Jésus-Christ, indépendamment des œuvres de la Loi.",ref:"Romains 3"},
  {term:"Kénose",def:"Dépouillement ou abaissement volontaire du Christ lors de son incarnation, renonçant à la gloire divine pour prendre la condition d'esclave.",ref:"Philippiens 2:7"},
  {term:"Logos (Verbe)",def:"Mot grec signifiant 'Parole' ou 'Raison'. Dans le prologue de Jean, il désigne le Fils préexistant de Dieu.",ref:"Jean 1:1"},
  {term:"Martyr",def:"Du grec 'martus' (témoin). Personne qui va jusqu'à souffrir la mort pour témoigner de sa foi en Jésus-Christ.",ref:"Actes 7"},
  {term:"Messie (Christ)",def:"De l'hébreu 'Mashiah' ou du grec 'Christos', signifiant 'l'Oint'. Figure royale, sacerdotale ou prophétique consacrée par Dieu.",ref:"Psaume 2"},
  {term:"Miséricorde",def:"Attitude de compassion et de pardon de Dieu envers la misère humaine. Terme très présent dans l'AT (Hesed) et le NT.",ref:"Luc 15"},
  {term:"Mystère",def:"Vérité de foi inaccessible à la seule raison humaine, mais révélée par Dieu (ex: la Trinité, l'Incarnation).",ref:"Éphésiens 3:4"},
  {term:"Omnipotence",def:"Attribut divin signifiant que Dieu est tout-puissant et que rien ne lui est impossible.",ref:"Luc 1:37"},
  {term:"Omniprésence",def:"Attribut divin signifiant que Dieu est présent partout dans sa création, sans y être confondu (pas de panthéisme).",ref:"Psaume 139"},
  {term:"Omniscience",def:"Attribut divin signifiant que Dieu connaît toutes choses : le passé, le présent, l'avenir et les cœurs.",ref:"Hébreux 4:13"},
  {term:"Orthodoxie",def:"La 'juste opinion' ou 'doctrine droite'. Conformité de la doctrine avec la révélation et la tradition de l'Église.",ref:"Théologie"},
  {term:"Panthéisme",def:"Croyance erronée pour le christianisme qui identifie Dieu à l'univers ou à la nature.",ref:"Philosophie"},
  {term:"Parabole",def:"Court récit allégorique utilisant des images de la vie quotidienne pour transmettre un enseignement spirituel ou moral.",ref:"Matthieu 13"},
  {term:"Paraclet",def:"Titre donné à l'Esprit Saint dans l'Évangile de Jean, signifiant l'Avocat, le Défenseur, ou le Consolateur appelé aux côtés du croyant.",ref:"Jean 14:16"},
  {term:"Parousie",def:"Le retour glorieux et définitif de Jésus-Christ à la fin des temps pour juger les vivants et les morts.",ref:"1 Thessaloniciens 4:15"},
  {term:"Péché originel",def:"Condition de séparation d'avec Dieu affectant toute l'humanité, consécutive à la désobéissance des premiers humains.",ref:"Romains 5:12"},
  {term:"Pentateuque (Torah)",def:"Les cinq premiers livres de la Bible (Genèse, Exode, Lévitique, Nombres, Deutéronome), fondamentaux dans la révélation juive.",ref:"Ancien Testament"},
  {term:"Pharisien",def:"Membre d'un courant du judaïsme insistant sur la stricte observance de la Loi écrite et orale. Souvent en conflit avec Jésus.",ref:"Matthieu 23"},
  {term:"Pneumatologie",def:"Branche de la théologie qui étudie le Saint-Esprit (Pneuma en grec, Ruah en hébreu).",ref:"Actes 2"},
  {term:"Prédestination",def:"Décret par lequel Dieu, de toute éternité, destine les croyants au salut par pure grâce.",ref:"Romains 8:29-30"},
  {term:"Providence",def:"Souveraineté bienveillante de Dieu par laquelle il dirige toutes choses vers leur fin ultime, le salut.",ref:"Matthieu 6:25-34"},
  {term:"Rédemption",def:"Action de racheter. Le salut accordé à l'humanité par la mort de Jésus-Christ qui la rachète de l'esclavage du péché.",ref:"Éphésiens 1:7"},
  {term:"Sabbat",def:"Le septième jour de la semaine juive (samedi), consacré au repos et à Dieu, en souvenir de la création et de l'Exode.",ref:"Exode 20:8"},
  {term:"Sadducéen",def:"Membre de l'aristocratie sacerdotale juive. Ils ne croyaient pas à la résurrection des morts ni aux anges.",ref:"Actes 23:8"},
  {term:"Sanctoral",def:"Partie du calendrier liturgique et du missel consacrée à la célébration des fêtes des saints.",ref:"Liturgie"},
  {term:"Sanhédrin",def:"Le conseil suprême et tribunal des Juifs à l'époque de Jésus, composé de 71 membres, présidé par le grand prêtre.",ref:"Marc 14:55"},
  {term:"Septante (LXX)",def:"Plus ancienne traduction grecque de la Bible hébraïque, réalisée à Alexandrie vers le IIIe siècle av. J.-C.",ref:"Histoire biblique"},
  {term:"Shema Israël",def:"Prière centrale du judaïsme proclamant l'unicité absolue de Dieu et le devoir de l'aimer totalement.",ref:"Deutéronome 6:4-5"},
  {term:"Solennité",def:"Degré le plus élevé de célébration dans le calendrier liturgique catholique (ex: Pâques, Noël, l'Assomption).",ref:"Liturgie"},
  {term:"Sotériologie",def:"Branche de la théologie traitant du salut de l'humanité à travers l'œuvre rédemptrice du Christ.",ref:"Épîtres de Paul"},
  {term:"Synoptiques",def:"Les trois premiers évangiles (Matthieu, Marc, Luc) qui présentent des structures et contenus similaires, pouvant être 'lus ensemble' (synopsis).",ref:"Nouveau Testament"},
  {term:"Tétragramme",def:"Les quatre consonnes hébraïques (YHWH) formant le nom imprononçable de Dieu, souvent traduit par 'l'Éternel' ou 'le Seigneur'.",ref:"Exode 3:14"},
  {term:"Théodicée",def:"Réflexion théologique et philosophique visant à concilier l'existence d'un Dieu bon et tout-puissant avec la présence du mal et de la souffrance.",ref:"Livre de Job"},
  {term:"Théophanie",def:"Manifestation visible de Dieu à l'homme (ex: le buisson ardent, la nuée sur le Sinaï).",ref:"Exode 3"},
  {term:"Transfiguration",def:"Événement où Jésus apparaît dans sa gloire divine sur une montagne devant Pierre, Jacques et Jean, aux côtés de Moïse et Élie.",ref:"Matthieu 17"},
  {term:"Trinité",def:"Dogme central chrétien affirmant l'existence d'un seul Dieu en trois personnes distinctes et consubstantielles : le Père, le Fils et le Saint-Esprit.",ref:"Matthieu 28:19"},
  {term:"Typologie",def:"Mode de lecture où des figures ou événements de l'Ancien Testament (le 'type') préfigurent des réalités du Nouveau Testament (l'antitype).",ref:"Hébreux"},
  {term:"Vulgate",def:"Traduction latine de la Bible réalisée par saint Jérôme au début du Ve siècle, devenue la version officielle de l'Église catholique.",ref:"Histoire de l'Église"},
  {term:"Zélote",def:"Membre d'un mouvement nationaliste juif prônant la résistance armée contre l'occupation romaine au 1er siècle.",ref:"Luc 6:15"}
];

// Pour régénérer un hash : await hashPwd('monMotDePasse') dans la console
async function hashPwd(pwd){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Valide que l'objet stats chargé depuis localStorage a le bon schéma
// Évite qu'un utilisateur manipulant le storage plante l'app ou triche sur les compteurs sensibles
function validateStats(obj){
  if(!obj||typeof obj!=='object')return defaultStats();
  const d=defaultStats();
  return{
    xp:          typeof obj.xp==='number'&&obj.xp>=0             ? Math.floor(obj.xp)          : d.xp,
    totalQ:      typeof obj.totalQ==='number'&&obj.totalQ>=0     ? Math.floor(obj.totalQ)       : d.totalQ,
    totalCorrect:typeof obj.totalCorrect==='number'&&obj.totalCorrect>=0
                                                                  ? Math.floor(obj.totalCorrect) : d.totalCorrect,
    sessions:    Array.isArray(obj.sessions)                     ? obj.sessions.slice(-50)      : d.sessions, // cap rétroactif: 50 sessions max
    earnedBadges:Array.isArray(obj.earnedBadges)                 ? obj.earnedBadges.filter(x=>BADGES_DEF.some(b=>b.id===x)) : d.earnedBadges,
    streak:      obj.streak&&typeof obj.streak==='object'        ? {last:obj.streak.last||null,count:Math.max(0,parseInt(obj.streak.count)||0),days:Array.isArray(obj.streak.days)?obj.streak.days.filter(x=>typeof x==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(x)):[]} : d.streak,
    themesPlayed:Array.isArray(obj.themesPlayed)                 ? obj.themesPlayed             : d.themesPlayed,
    sfRead:      Array.isArray(obj.sfRead)                       ? obj.sfRead                   : d.sfRead,
    ftRead:      Array.isArray(obj.ftRead)                       ? obj.ftRead                   : d.ftRead,
    missedQ:     Array.isArray(obj.missedQ)                      ? obj.missedQ.filter(x=>Number.isInteger(x)) : d.missedQ,
    mgScores:    obj.mgScores&&typeof obj.mgScores==='object'      ? obj.mgScores                 : d.mgScores,
    lectureRead: Array.isArray(obj.lectureRead)                    ? obj.lectureRead.filter(x=>Number.isInteger(x)) : d.lectureRead,
    peopleViewed:Array.isArray(obj.peopleViewed)                   ? obj.peopleViewed.filter(x=>typeof x==='string') : d.peopleViewed,
    discoveredEvents:Array.isArray(obj.discoveredEvents)             ? obj.discoveredEvents.filter(x=>typeof x==='string') : d.discoveredEvents,
    eraArtefacts:Array.isArray(obj.eraArtefacts)                     ? obj.eraArtefacts.filter(x=>typeof x==='string')           : d.eraArtefacts,
    frescoPalier:typeof obj.frescoPalier==='number'&&obj.frescoPalier>=0 ? obj.frescoPalier : d.frescoPalier,
  };
}

function triggerImport(){
  let inp=document.getElementById('bq-import-input');
  if(!inp){
    inp=document.createElement('input');
    inp.type='file';
    inp.id='bq-import-input';
    inp.accept='.json,application/json';
    inp.style.display='none';
    document.body.appendChild(inp);
    inp.addEventListener('change',handleImportFile);
  }
  inp.value='';
  inp.click();
}

function handleImportFile(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    let data;
    try{ data=JSON.parse(ev.target.result); }
    catch{ showToast('❌ Fichier JSON invalide'); return; }
    if(!data._app||data._app!=='BibleQuiz'||!data.stats){
      showToast('❌ Format non reconnu — fichier incompatible');
      return;
    }
    showImportConfirm(data);
  };
  reader.readAsText(file);
}

function showImportConfirm(data){
  const st=data.stats||{};
  const date=data._date
    ? new Date(data._date).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})
    : 'inconnue';
  const lv=getLevel(st.xp||0);
  const lvName=LEVELS[lv]?LEVELS[lv].name:'—';
  const discovered=(st.discoveredEvents||[]).length;
  const badges=(st.earnedBadges||[]).length;
  const pct=st.totalQ?Math.round((st.totalCorrect||0)/st.totalQ*100):0;

  let overlay=document.getElementById('bq-import-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='bq-import-overlay';
    overlay.className='import-modal-overlay';
    const modal=document.createElement('div');
    modal.id='bq-import-modal';
    modal.className='import-modal';
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click',e=>{ if(e.target===overlay)closeImportModal(); });
  }

  // Encode data as base64 to avoid escaping hell in onclick
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data))));

  document.getElementById('bq-import-modal').innerHTML=`
    <h3>Importer une sauvegarde</h3>
    <p>Cette opération <strong style="color:var(--wrong)">remplace toute ta progression actuelle</strong> par les données du fichier. Action irréversible.</p>

      <div>🏅 Badges : <strong>${badges}</strong> obtenus</div>
    </div>
    <div class="import-modal-actions">
      <button class="import-cancel-btn" onclick="closeImportModal()">Annuler</button>
      <button class="import-confirm-btn" onclick="confirmImport('${encoded}')">Importer</button>
    </div>`;
  overlay.classList.add('open');
}

function closeImportModal(){

function confirmImport(encoded){
  let data;
  try{ data=JSON.parse(decodeURIComponent(escape(atob(encoded)))); }
  catch{ showToast('❌ Erreur de décodage'); return; }

  // Cas connecté : application immédiate sur le compte courant
  if(S.user){
    S.user.stats=data.stats;

  const email=data.email||'invité@biblequiz';

  localStorage.setItem('bq_stats', JSON.stringify(data.stats));

function dateKey(d){return d.toISOString().slice(0,10);}
function updateStreak(){
  const st=stats();
  const today=new Date();
  const todayKey=dateKey(today);
  const yesterdayKey=dateKey(new Date(Date.now()-86400000));
  if(!st.streak.days)st.streak.days=[];
  if(st.streak.days.includes(todayKey))return; // déjà enregistré aujourd'hui
  st.streak.days.push(todayKey);
  // Garde seulement les 60 derniers jours pour éviter la croissance infinie
  if(st.streak.days.length>60)st.streak.days=st.streak.days.slice(-60);
  // Calcule le streak courant à partir des dates réelles
  let count=0;
  for(let i=0;i<60;i++){
    const d=dateKey(new Date(Date.now()-i*86400000));
    if(st.streak.days.includes(d)){count++;}
    else if(i>0){break;} // interruption : on arrête
  }
  st.streak.count=count;
  st.streak.last=todayKey;
  save();checkBadges();
}

async function doLogin(){

  const pwd=document.getElementById('ap').value;
  const h=await hashPwd(pwd);
  const found=DEMO_USERS.find(u=>u.email===email&&u.hash===h);

async function doRegister(){
  const email=document.getElementById('ae').value.trim();
  const pwd=document.getElementById('ap').value;
  const errEl=document.getElementById('auth-err');
  if(!email||pwd.length<6){errEl.innerHTML='<div class="error-msg">Email valide et mot de passe (6+ car.) requis.</div>';return;}
  if(DEMO_USERS.some(u=>u.email===email)){errEl.innerHTML='<div class="error-msg">Cet email est déjà utilisé.</div>';return;}
  const hash=await hashPwd(pwd);
  const newUser={email,hash,role:'USER'};
  DEMO_USERS.push(newUser);
  try{
    const stored=JSON.parse(localStorage.getItem('bq_registered_users')||'[]');
    stored.push(newUser);
    localStorage.setItem('bq_registered_users',JSON.stringify(stored));
  }catch(e){console.warn('bq: impossible de persister le compte',e);}
  S.user={email,role:'USER',stats:defaultStats()};
  S.page='dashboard';save();render();
}

  const currentLv=getLevel(st.xp);
  const rankRows=LEVELS.map((r,i)=>{
    const isLast=i===LEVELS.length-1;
    const nextXp=isLast?null:LEVELS[i+1].xp;
    const xpLabel=isLast?`35 000 XP`:`${r.xp.toLocaleString('fr-FR')} – ${(nextXp-1).toLocaleString('fr-FR')} XP`;
    const isCurrent=i===currentLv;
    const isUnlocked=st.xp>=r.xp;
    // Pyramid: top rank is narrowest, bottom rank is widest
    // We invert: rank 0 (Pèlerin) = bottom, rank 7 (Lumière Éternelle) = top
    return {r,i,xpLabel,isCurrent,isUnlocked,nextXp};
  });
  // Render pyramid top-to-bottom (highest rank first)
  const reversed=[...rankRows].reverse();
  const totalLevels=LEVELS.length;
  const pyramidRows=reversed.map(({r,i,xpLabel,isCurrent,isUnlocked})=>{
    const rankIndex=i; // 0=Pèlerin, 7=Lumière
    const invertedIdx=totalLevels-1-rankIndex; // 0 for top (Lumière), 7 for bottom (Pèlerin)
    const widthPct=40+invertedIdx*(60/totalLevels); // top=40%, bottom=97%
    const borderColor=isCurrent?'var(--accent)':isUnlocked?'rgba(201,168,76,.4)':'var(--border)';
    const bgColor=isCurrent?'rgba(201,168,76,.13)':isUnlocked?'rgba(201,168,76,.04)':'transparent';
    const opacity=isUnlocked?'1':'0.4';
    const currentBadge=isCurrent?`<span style="background:var(--accent);color:#0f0e17;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle">ACTUEL</span>`:'';
    const lockIcon=isUnlocked?'':' 🔒';
    return `
      <div style="width:${widthPct}%;margin:0 auto 6px;opacity:${opacity};transition:all .3s">
        <div style="background:${bgColor};border:1.5px solid ${borderColor};border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .2s" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:1.5rem">${r.icon}</span>
              <div>
                <span style="font-weight:700;color:${isCurrent?'var(--accent)':'var(--text)'};font-size:.97rem">${r.name}${lockIcon}</span>
                ${currentBadge}
                <div style="font-size:.72rem;color:var(--text2);margin-top:1px">${xpLabel}</div>
              </div>
            </div>
            <span style="font-size:.7rem;color:var(--text2);font-style:italic">Rank ${rankIndex+1}/8 — cliquer pour détails</span>
          </div>
        </div>
        <div style="display:none;background:var(--surface2);border:1px solid ${borderColor};border-top:none;border-radius:0 0 12px 12px;padding:13px 18px">
          <p style="color:var(--text2);font-size:.86rem;line-height:1.7">${RANK_DESC[rankIndex]}</p>
        </div>
      </div>`;
  }).join('');

  const userXp=st.xp;
  const curRank=LEVELS[currentLv];
  const nextRank=LEVELS[currentLv+1];
  const xpToNext=nextRank?(nextRank.xp-userXp):0;

  return`<main>
    <div class="dash-header">
      <h1>⚔️ Ranks</h1>
      <p style="color:var(--text2);font-size:.9rem">8 rangs — du Pèlerin à la Lumière Éternelle. La pyramide s'élargit vers le bas : plus tu t'y trouves haut, plus tu es rare.</p>
    </div>
    <div class="section-card" style="margin-bottom:22px">
      <div style="display:flex;align-items:center;gap:14px">
        <span style="font-size:2.2rem">${curRank.icon}</span>
        <div style="flex:1">
          <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:5px">
            <span style="font-weight:700;font-size:1.1rem;color:var(--accent)">${curRank.name}</span>
            <span style="font-size:.78rem;color:var(--text2)">Rank ${currentLv+1}/8</span>
          </div>
          <div class="xp-bar-wrap" style="margin-bottom:5px"><div class="xp-bar-fill" style="width:${nextRank?Math.min(100,Math.round((userXp-curRank.xp)/(nextRank.xp-curRank.xp)*100)):100}%"></div></div>
          <span style="font-size:.78rem;color:var(--text2)">${userXp.toLocaleString('fr-FR')} XP${nextRank?` — encore ${xpToNext.toLocaleString('fr-FR')} XP pour ${nextRank.icon} ${nextRank.name}`:' — Rang maximum atteint ✨'}</span>
        </div>
      </div>
    </div>
    <div style="margin-bottom:28px">
      ${pyramidRows}
    </div>
  </main>`;
}

function renderQuiz(){
  const q=S.quiz;

        </div>
        <div style="display:flex;gap:8px">
          <button onclick="resumeQuiz()" style="background:var(--accent);color:#0f0e17;font-weight:700;padding:7px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.84rem">Reprendre →</button>
          <button onclick="clearQuizSession();render()" style="background:none;border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.82rem">Abandonner</button>
        </div>
      </div>`:''
    ;
    return`<main><div class="quiz-setup"><h2>📖 Quiz Biblique</h2><p>Choisissez vos filtres et testez vos connaissances.</p>${resumeBanner}<div class="filter-row"><select onchange="S.quiz.theme=this.value"><option value="">Tous les thèmes</option>${Object.entries(TH).map(([v,l])=>`<option value="${v}" ${q.theme===v?'selected':''}>${l}</option>`).join('')}</select><select onchange="S.quiz.difficulty=this.value"><option value="">Toutes difficultés</option>${Object.entries(DF).map(([v,l])=>`<option value="${v}" ${q.difficulty===v?'selected':''}>${l}</option>`).join('')}</select><select onchange="S.quiz.limit=parseInt(this.value)"><option value="5">5 questions</option><option value="10" selected>10 questions</option><option value="20">20 questions</option><option value="99">Toutes</option></select></div><button class="start-btn" onclick="startQuiz()">Commencer →</button></div></main>`;
  }
  if(q.phase==='result'){
    const pct=Math.round(q.score/q.questions.length*100);
    const ok=pct>=80, partial=pct>=50;
    const CIRC=2*Math.PI*56; // r=56
    const offset=CIRC*(1-pct/100);
    const ringClass=ok?'success':(partial?'ok':'fail');
    // Par thème
    const themeMap={};
    q.questions.forEach((qs,i)=>{
      const ans=q.answers?.[i];
      if(!themeMap[qs.theme]) themeMap[qs.theme]={correct:0,total:0};
      themeMap[qs.theme].total++;
      if(ans===qs.answer) themeMap[qs.theme].correct++;
    });
    // fallback si answers non stocké
    const themeEntries=Object.entries(themeMap);
    const themeHtml=themeEntries.length>0?`
      <div class="result-theme-bars" style="text-align:left;max-width:320px;margin:0 auto">
        ${themeEntries.map(([th,d])=>{
          const tp=Math.round(d.correct/d.total*100);
          const col=tp>=80?'var(--correct)':tp>=50?'var(--accent2)':'var(--wrong)';
          return `<div class="result-theme-row">
            <span class="result-theme-name">${TH[th]||th}</span>
            <div class="result-theme-track"><div class="result-theme-fill" style="width:${tp}%;background:${col}"></div></div>
            <span style="font-size:.72rem;color:${col};min-width:32px;text-align:right">${d.correct}/${d.total}</span>
          </div>`;
        }).join('')}
      </div>`:'';
    // Citation aléatoire selon thème dominant
    const RESULT_QUOTES=[
      {t:"'Je suis le chemin, la vérité et la vie.'",s:"Jean 14:6"},
      {t:"'Cherchez d'abord le Royaume de Dieu et sa justice.'",s:"Matthieu 6:33"},
      {t:"'L'Éternel est mon berger : je ne manquerai de rien.'",s:"Psaume 23:1"},
      {t:"'Car c'est par la grâce que vous êtes sauvés, par la foi.'",s:"Éphésiens 2:8"},
      {t:"'Ta Parole est une lampe à mes pieds et une lumière sur mon sentier.'",s:"Psaume 119:105"},
      {t:"'Je puis tout par celui qui me fortifie.'",s:"Philippiens 4:13"},
    ];
    const rq=RESULT_QUOTES[Math.floor(Math.random()*RESULT_QUOTES.length)];
    return`<main><div class="scoreboard">
      <h2 style="font-size:1.5rem;margin-bottom:20px">Résultat final</h2>
      <div class="score-ring-wrap">
        <svg class="score-ring-svg" viewBox="0 0 130 130" width="140" height="140">
          <circle class="score-ring-bg" cx="65" cy="65" r="56"/>
          <circle class="score-ring-fill ${ringClass}" cx="65" cy="65" r="56"
            style="--ring-total:${CIRC.toFixed(1)};--ring-offset:${offset.toFixed(1)}"/>
        </svg>
        <div class="score-ring-label ${ringClass}">
          <span>${pct}%</span>
          <span style="font-size:.7rem;font-family:'DM Sans',sans-serif;font-weight:400;color:var(--text2)">${q.score}/${q.questions.length}</span>
        </div>
      </div>
      ${ok?'<p class="congrats" style="margin-bottom:16px">Félicitations !</p>':partial?'<p style="color:var(--accent2);font-family:Cinzel,serif;margin-bottom:16px">Bon travail — continuez !</p>':'<p style="color:var(--text2);margin-bottom:16px">Continuez à pratiquer !</p>'}
      ${themeHtml}
      <div class="result-quote">${rq.t}<cite>— ${rq.s}</cite></div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:8px">
        <button class="restart-btn" onclick="startQuiz()">Recommencer</button>
        <button class="restart-btn" onclick="S.quiz=defaultQuiz();render()">Changer filtre</button>
        <button class="restart-btn" onclick="go('dashboard')">Accueil</button>
      </div>
    </div></main>`;
  }  const question=q.questions[q.idx],prog=Math.round(((q.idx+(q.phase==='feedback'?1:0))/q.questions.length)*100),isLast=q.idx+1>=q.questions.length;
  return`<main><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${prog}%"></div></div><div class="question-card"><div class="q-meta"><span class="q-badge">${DF[question.difficulty]||question.difficulty} · ${TH[question.theme]||question.theme}</span><span class="q-counter">${q.idx+1} / ${q.questions.length}</span></div><h2>${esc(question.text)}</h2><p class="q-ref">📖 ${esc(question.reference)}</p><div class="options">${question.options.map(opt=>{let cls='opt-btn';if(q.phase==='feedback'){if(opt===question.answer)cls+=' correct-ans';else if(opt===q.selected&&opt!==question.answer)cls+=' wrong-ans';}return`<button class="${cls}" onclick="submitAnswer('${esc(opt)}')" ${q.phase==='feedback'?'disabled':''}>${esc(opt)}</button>`;}).join('')}</div></div>${q.phase==='feedback'&&q.feedback?`<div class="feedback-panel ${q.feedback.correct?'correct':'wrong'}"><div class="fb-header">${q.feedback.correct?'✅ Bonne réponse !':'❌ Mauvaise — '+esc(q.feedback.correct_ans)}</div><p class="fb-exp">${esc(q.feedback.explanation)}</p><p class="fb-ref">📖 ${esc(q.feedback.reference)}</p><div class="fb-row"><button class="next-btn" onclick="nextQuestion()">${isLast?'Voir le résultat →':'Suivante →'}</button><span class="xp-gain">+${q.feedback.correct?10:2} XP</span></div></div>`:''}<div style="margin-top:14px"><button onclick="S.quiz=defaultQuiz();clearQuizSession();S.page='quiz';render()" style="background:none;border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.8rem">← Nouveau quiz</button></div></main>`;
}
function startQuiz(){let p=DATA.questions;if(S.quiz.theme)p=p.filter(x=>x.theme===S.quiz.theme);if(S.quiz.difficulty)p=p.filter(x=>x.difficulty===S.quiz.difficulty);p=shuffle(p).slice(0,S.quiz.limit||10);if(!p.length){showToast('Aucune question pour ces filtres.');return;}clearQuizSession();S.quiz={...S.quiz,phase:'question',questions:p,idx:0,score:0,feedback:null,selected:null};render();}
function resumeQuiz(){const saved=loadQuizSession();if(!saved){showToast('Session introuvable.');return;}S.quiz=saved;render();}
function startReview(){
  const missed=(stats().missedQ||[]);
  const questions=DATA.questions.filter(q=>missed.includes(q.id));
  if(!questions.length){showToast('Aucune erreur enregistrée — bien joué !');return;}
  clearQuizSession();
  S.quiz={...defaultQuiz(),phase:'question',questions:shuffle(questions),limit:questions.length,theme:'',difficulty:''};
  S.page='quiz';
  render();
}
function submitAnswer(a){
  if(S.quiz.phase!=='question')return;
  const q=S.quiz.questions[S.quiz.idx],ok=a===q.answer;
  if(ok)S.quiz.score++;
  // Stocke la réponse pour le breakdown par thème en résultat
  if(!S.quiz.answers) S.quiz.answers={};
  S.quiz.answers[S.quiz.idx]=a;
  const st=stats();
  st.totalQ++;
  if(ok)st.totalCorrect++;
  if(q.theme&&!st.themesPlayed.includes(q.theme)){st.themesPlayed.push(q.theme);st.themesPlayed=[...new Set(st.themesPlayed)];} // dédoublonnage à l'écriture
  // Suivi des erreurs : ajoute l'ID si raté, retire si réussi
  if(!st.missedQ)st.missedQ=[];
  if(!ok){
    if(!st.missedQ.includes(q.id))st.missedQ.push(q.id);
  }else{
    st.missedQ=st.missedQ.filter(id=>id!==q.id);
  }
  addXP(ok?XP.quiz_correct:XP.quiz_wrong);
  S.quiz.selected=a;
  S.quiz.phase='feedback';
  S.quiz.feedback={correct:ok,correct_ans:q.answer,explanation:q.explanation,reference:q.reference};
  save();
  saveQuizSession();
  render();
}
function nextQuestion(){
  if(S.quiz.idx+1>=S.quiz.questions.length){
    const pct=Math.round(S.quiz.score/S.quiz.questions.length*100);
    if(pct===100){addXP(XP.quiz_perfect);showToast('💯 Score parfait ! +25 XP bonus');}
    addXP(XP.streak);
    const _st=stats();
    _st.sessions.push({theme:S.quiz.theme,correct:S.quiz.score,total:S.quiz.questions.length,pct,ts:Date.now()});
    if(_st.sessions.length>50)_st.sessions=_st.sessions.slice(-50); // cap: 50 sessions max
    updateStreak();checkBadges();
    S.quiz.phase='result';
    clearQuizSession(); // quiz terminé : on efface la session persistée
  }else{
    S.quiz.idx++;
    S.quiz.feedback=null;
    S.quiz.selected=null;
    S.quiz.phase='question';
    saveQuizSession(); // persiste la progression vers la question suivante
  }
  save();render();
}
